<style>
  :root{
    --bg:#F2F5F7; --card:#FFFFFF; --ink:#14283A; --muted:#5B6B7A;
    --teal:#0E7C86; --teal-dk:#0A5A62; --line:#DEE6EB;
    --ok:#1F7A4D; --ok-bg:#E6F4EC; --bad:#B3362E; --bad-bg:#FBEAE8;
    --mono:"SF Mono","Cascadia Code",Consolas,"Liberation Mono",monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    background:var(--bg); color:var(--ink);
    font-family:"Avenir Next","Segoe UI",-apple-system,BlinkMacSystemFont,Helvetica,Arial,sans-serif;
    line-height:1.55; padding:20px 14px 60px;
  }
  .wrap{max-width:760px;margin:0 auto}
  header{display:flex;justify-content:space-between;align-items:baseline;gap:10px;margin-bottom:6px;flex-wrap:wrap}
  h1{font-size:1.15rem;font-weight:700;letter-spacing:.01em}
  h1 span{color:var(--teal)}
  .score{font-family:var(--mono);font-size:.85rem;color:var(--muted)}
  .score b{color:var(--ink)}
  /* telemetry strip */
  .striplabel{font-family:var(--mono);font-size:.62rem;letter-spacing:.14em;color:var(--muted);margin:14px 0 5px}
  .strip{display:flex;gap:2px;flex-wrap:nowrap;border-bottom:1px solid var(--line);padding-bottom:10px}
  .tick{flex:1;height:16px;background:#E2E9EE;border-radius:2px;cursor:pointer;transition:height .15s}
  .tick.ok{background:var(--ok)} .tick.bad{background:var(--bad)}
  .tick.cur{height:24px;outline:2px solid var(--teal);outline-offset:1px}
  /* card */
  .card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:22px;margin-top:18px;box-shadow:0 1px 3px rgba(20,40,58,.06)}
  .meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;gap:8px;flex-wrap:wrap}
  .qnum{font-family:var(--mono);font-size:.8rem;color:var(--muted)}
  .chip{font-size:.68rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--teal-dk);background:#E3F1F2;border-radius:999px;padding:3px 10px}
  .stem{font-size:1.02rem;margin-bottom:18px}
  .opt{
    display:flex;gap:12px;align-items:flex-start;width:100%;text-align:left;
    background:#FAFCFD;border:1.5px solid var(--line);border-radius:10px;
    padding:13px 14px;margin-bottom:9px;cursor:pointer;font:inherit;color:inherit;
    transition:border-color .12s, background .12s;
  }
  .opt:hover:not(:disabled){border-color:var(--teal)}
  .opt:focus-visible{outline:3px solid var(--teal);outline-offset:2px}
  .opt:disabled{cursor:default}
  .opt .ltr{font-family:var(--mono);font-weight:700;color:var(--muted);flex:0 0 auto}
  .opt.sel-ok{border-color:var(--ok);background:var(--ok-bg)}
  .opt.sel-bad{border-color:var(--bad);background:var(--bad-bg)}
  .opt.reveal-ok{border-color:var(--ok);background:var(--ok-bg)}
  .verdict{font-weight:700;margin:10px 0 6px}
  .verdict.ok{color:var(--ok)} .verdict.bad{color:var(--bad)}
  .rationale{background:#F4F8FA;border-left:3px solid var(--teal);border-radius:0 8px 8px 0;padding:13px 15px;font-size:.93rem;margin-top:4px}
  .nav{display:flex;justify-content:space-between;gap:10px;margin-top:20px}
  .btn{
    font:inherit;font-weight:600;border:none;border-radius:10px;padding:11px 20px;cursor:pointer;
    background:var(--teal);color:#fff;transition:background .12s;
  }
  .btn:hover{background:var(--teal-dk)}
  .btn:disabled{background:#C4D0D8;cursor:default}
  .btn.ghost{background:transparent;color:var(--teal);border:1.5px solid var(--teal)}
  .btn.ghost:hover{background:#E3F1F2}
  .btn:focus-visible{outline:3px solid var(--ink);outline-offset:2px}
  /* results */
  .bigscore{font-family:var(--mono);font-size:2.6rem;font-weight:700;color:var(--teal-dk)}
  .sub{color:var(--muted);margin-bottom:18px}
  .catrow{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--line);font-size:.92rem}
  .bar{flex:1;height:8px;background:#E2E9EE;border-radius:99px;overflow:hidden;margin:0 12px}
  .bar i{display:block;height:100%;background:var(--teal)}
  .missedlist{margin-top:16px}
  .missedlist button{
    font-family:var(--mono);font-size:.8rem;background:var(--bad-bg);color:var(--bad);
    border:1px solid #E8C2BE;border-radius:8px;padding:6px 10px;margin:0 6px 6px 0;cursor:pointer;
  }
  .hide{display:none}
  @media (prefers-reduced-motion: reduce){ *{transition:none !important} }
  @media (max-width:480px){ .card{padding:16px} .strip{gap:1px} }

<script>
const QUESTIONS = [
{c:"Skin Cancer",q:"A 60-year-old has a new pigmented lesion. Which feature is MOST concerning for melanoma using the ABCDE criteria?",o:["A symmetric, uniformly tan, 3mm round macule that has been stable for years","A pearly papule with rolled borders and central telangiectasias","Asymmetry, irregular Borders, Color variation, Diameter >6mm, and Evolution (change in size, shape, or color over time)","A greasy, 'stuck-on' brown papule with a warty surface"],a:2,r:"ABCDE criteria for melanoma: Asymmetry (one half unlike the other), Border irregularity (notched, scalloped), Color variation (multiple colors — brown, black, red, white, blue), Diameter >6mm (larger than a pencil eraser), Evolution/change (size, shape, color, symptoms — the MOST important sign). The 'ugly duckling sign' (a lesion that looks different from the patient's other moles) is also a key clue. Any suspicious pigmented lesion warrants EXCISIONAL biopsy (full thickness, narrow margins) for accurate Breslow depth — the most important prognostic factor. Option B describes basal cell carcinoma; option D describes a benign seborrheic keratosis. Melanoma is the deadliest skin cancer; early detection dramatically improves survival."},
{c:"Skin Cancer",q:"A 70-year-old fair-skinned man has a slow-growing, pearly, dome-shaped papule with rolled (raised) borders, central ulceration, and overlying telangiectasias on his nose. Diagnosis?",o:["Squamous cell carcinoma — scaly, ulcerated, on sun-exposed skin","Melanoma — pigmented and irregular","Basal cell carcinoma — the most common skin cancer; pearly/translucent papule with rolled borders, telangiectasias, and possible central ulceration ('rodent ulcer'); locally invasive but rarely metastasizes","Actinic keratosis — rough, scaly precancerous lesion"],a:2,r:"Basal cell carcinoma (BCC): the MOST COMMON skin cancer (and most common human cancer). Appearance: pearly/translucent, dome-shaped papule with rolled (raised, 'rolled') borders, overlying telangiectasias (fine blood vessels), and may have central ulceration ('rodent ulcer'). Occurs on sun-exposed areas (face, nose, ears). Caused by chronic UV exposure; fair skin is a risk factor. Locally invasive and destructive but RARELY metastasizes. Diagnosis: biopsy. Treatment: surgical excision, Mohs micrographic surgery (for face/high-risk/recurrent — tissue-sparing with margin control), electrodesiccation and curettage, or topical/radiation for select cases. Squamous cell carcinoma (SCC): scaly, hyperkeratotic, ulcerated nodule/plaque — higher metastatic potential than BCC, arises from actinic keratoses."},
{c:"Skin Cancer",q:"A 68-year-old farmer has a firm, scaly, hyperkeratotic nodule with ulceration on his lower lip that has grown over 2 months. Diagnosis and key risk factor?",o:["Basal cell carcinoma — pearly with telangiectasias","Actinic keratosis — never becomes invasive","Squamous cell carcinoma — scaly, ulcerated, indurated nodule on sun-exposed skin (lips, ears, dorsal hands); chronic UV exposure is the main risk; higher metastatic potential than BCC, especially on the lip/ear","Seborrheic keratosis — benign 'stuck-on' lesion"],a:2,r:"Squamous cell carcinoma (SCC): the second most common skin cancer. Appearance: firm, scaly/hyperkeratotic, indurated nodule or plaque, often with ulceration or crusting, on SUN-EXPOSED areas (face, ears, lower LIP, dorsal hands, balding scalp). Risk factors: chronic UV exposure (main), fair skin, immunosuppression (organ transplant recipients — markedly increased risk), chronic wounds/scars, HPV, arsenic. Precursor: actinic keratosis (rough, scaly precancerous lesions) and SCC in situ (Bowen's disease). SCC has HIGHER METASTATIC POTENTIAL than BCC, especially lesions on the LIP, EAR, in immunosuppressed patients, or large/poorly differentiated tumors. Diagnosis: biopsy. Treatment: surgical excision, Mohs surgery for high-risk sites. Counsel sun protection and monitor immunosuppressed patients closely."},
{c:"Skin Cancer — Precancer",q:"A 65-year-old has multiple rough, scaly, sandpaper-textured pink-brown macules on his bald scalp and forearms (sun-exposed areas). Diagnosis and significance?",o:["Seborrheic keratosis — benign, no treatment needed","Melanoma in situ — wide excision","Actinic (solar) keratosis — a precancerous lesion from chronic sun damage; a small percentage progress to squamous cell carcinoma; treat with cryotherapy (isolated lesions) or field therapy (topical 5-fluorouracil, imiquimod) for multiple lesions","Psoriasis — topical steroids"],a:2,r:"Actinic keratosis (AK, solar keratosis): a PRECANCEROUS lesion resulting from chronic UV/sun damage. Appearance: rough, scaly, 'SANDPAPER'-textured macules/papules (often better FELT than seen), pink/red/brown, on sun-exposed areas (bald scalp, face, ears, dorsal forearms/hands). Significance: a percentage (estimated ~0.1-10% per lesion per year) progress to SQUAMOUS CELL CARCINOMA — AKs are markers of significant sun damage and SCC risk. Treatment: isolated lesions — CRYOTHERAPY (liquid nitrogen); multiple/diffuse lesions ('field cancerization') — FIELD THERAPY with topical 5-fluorouracil, imiquimod, ingenol mebutate, or photodynamic therapy. Biopsy if thick, indurated, ulcerated, rapidly growing, or not responding to treatment (rule out SCC). Counsel sun protection and regular skin surveillance. Seborrheic keratosis: benign, 'stuck-on,' waxy/warty lesions — not related to sun/cancer."},
{c:"Common Lesions",q:"A 55-year-old has a well-demarcated, waxy, 'stuck-on' appearing brown papule with a verrucous (warty) surface on the back. It has been slowly growing for years and is asymptomatic. Diagnosis?",o:["Melanoma — requires excision","Basal cell carcinoma — biopsy","Seborrheic keratosis — a common BENIGN epidermal growth; waxy, 'stuck-on,' well-demarcated, verrucous; no treatment needed unless symptomatic/cosmetic; cryotherapy or curettage for removal","Squamous cell carcinoma — scaly and ulcerated"],a:2,r:"Seborrheic keratosis (SK): an extremely common, BENIGN epidermal growth in middle-aged and older adults. Appearance: well-demarcated, waxy/greasy, 'STUCK-ON' (appears pasted onto the skin), tan-to-dark-brown, with a verrucous (warty) or velvety surface; size varies; commonly on the trunk, face, scalp. Asymptomatic (occasionally itchy/irritated). No malignant potential. No treatment needed; cryotherapy, curettage, or shave removal for symptomatic, irritated, or cosmetically undesired lesions. Distinguish from melanoma (irregular, evolving, ABCDE features) — when uncertain, biopsy. The SIGN OF LESER-TRELAT: sudden eruption of multiple seborrheic keratoses may rarely be a paraneoplastic sign of internal malignancy (especially GI adenocarcinoma) — warrants evaluation. Dermatosis papulosa nigra: small SK variant common in darker-skinned individuals (face)."},
{c:"Eczema",q:"A 6-month-old has dry, erythematous, intensely itchy patches on the cheeks and the extensor surfaces. The family has a history of asthma and allergic rhinitis. Diagnosis and cornerstone of management?",o:["Contact dermatitis — identify and remove the allergen only","Psoriasis — topical vitamin D analogs","Atopic dermatitis (eczema) — chronic, relapsing, intensely pruritic; part of the atopic triad (eczema, asthma, allergic rhinitis); cornerstone is liberal EMOLLIENTS/moisturizers + topical corticosteroids for flares + trigger avoidance + gentle skin care","Tinea corporis — topical antifungal"],a:2,r:"Atopic dermatitis (eczema): a chronic, relapsing, intensely PRURITIC inflammatory skin condition. Part of the ATOPIC TRIAD (atopic dermatitis + asthma + allergic rhinitis — often a family history). Distribution by age: infants — cheeks, scalp, EXTENSOR surfaces; children/adults — FLEXURAL areas (antecubital and popliteal fossae, neck, wrists). Features: dry skin (xerosis), erythematous patches, scaling, lichenification (from chronic scratching), the 'itch-scratch cycle.' Management cornerstones: (1) LIBERAL EMOLLIENTS/moisturizers (the foundation — restore the skin barrier, apply frequently especially after bathing); (2) TOPICAL CORTICOSTEROIDS for flares (low-potency for face/folds, mid-potency for body); (3) gentle skin care (lukewarm short baths, fragrance-free products, pat dry); (4) TRIGGER avoidance (irritants, allergens, heat, sweat); (5) topical calcineurin inhibitors (tacrolimus, pimecrolimus) as steroid-sparing for sensitive areas; (6) antihistamines for itch/sleep; treat secondary infection (Staph). Severe: dupilumab (biologic), phototherapy."},
{c:"Contact Dermatitis",q:"A 30-year-old hiker develops intensely itchy, linear (streak-like) vesicles and erythema on the forearms 2 days after a hike. Diagnosis and first-line treatment?",o:["Atopic dermatitis — emollients","Cellulitis — oral antibiotics","Allergic contact dermatitis (e.g., poison ivy/urushiol) — type IV delayed hypersensitivity; LINEAR vesicles where the plant brushed the skin; treat with topical corticosteroids (mid-high potency) for localized disease, oral corticosteroids (e.g., prednisone taper over 2-3 weeks) for severe/widespread cases; cool compresses, antihistamines for itch","Scabies — permethrin"],a:2,r:"Allergic contact dermatitis (ACD): a type IV (delayed, T-cell-mediated) hypersensitivity reaction occurring 24-72 hours after exposure to an allergen. Classic example: POISON IVY/oak/sumac (urushiol) — produces intensely pruritic erythema and VESICLES in a LINEAR/streak pattern where the plant brushed against the skin (a key diagnostic clue). Other common allergens: nickel, fragrances, preservatives, topical antibiotics (neomycin), latex. Treatment: (1) Remove/avoid the allergen, wash the skin and clothing (urushiol can re-expose); (2) Topical CORTICOSTEROIDS (mid-to-high potency) for localized disease; (3) ORAL corticosteroids (prednisone taper over 2-3 WEEKS — a short burst may cause rebound) for SEVERE or WIDESPREAD involvement, or face/genital involvement; (4) Cool compresses, oral antihistamines for itch/sleep. The vesicle FLUID does NOT spread the rash (a common myth). IRRITANT contact dermatitis (more common): direct non-immune damage (soaps, chemicals) — burning more than itching, no sensitization needed. Patch testing identifies the allergen in recurrent ACD."},
{c:"Psoriasis",q:"A 40-year-old has well-demarcated, erythematous plaques with thick, silvery-white scale on the extensor surfaces (elbows, knees) and scalp. Removing the scale causes pinpoint bleeding. Diagnosis and first-line treatment for limited disease?",o:["Atopic dermatitis — flexural distribution, weeping","Tinea corporis — KOH-positive scraping","Plaque psoriasis — well-demarcated plaques with silvery scale on extensor surfaces; Auspitz sign (pinpoint bleeding when scale removed); first-line for limited disease is topical corticosteroids ± vitamin D analogs (calcipotriene); phototherapy or systemic/biologic agents for moderate-severe disease","Seborrheic dermatitis — greasy yellow scale"],a:2,r:"Plaque psoriasis (psoriasis vulgaris): a chronic immune-mediated condition with accelerated keratinocyte turnover. Classic: well-demarcated, erythematous plaques with thick, SILVERY-WHITE SCALE on EXTENSOR surfaces (elbows, knees), scalp, lower back, and nails. Signs: AUSPITZ sign (pinpoint bleeding when scale is removed), Koebner phenomenon (lesions at sites of trauma), nail pitting/onycholysis. Associated with PSORIATIC ARTHRITIS (up to 30%) and increased cardiovascular/metabolic risk. First-line for LIMITED/localized disease: TOPICAL CORTICOSTEROIDS (potency by site) ± topical VITAMIN D ANALOGS (calcipotriene), often in combination; topical calcineurin inhibitors for face/folds; coal tar; topical retinoids. MODERATE-SEVERE disease (>5-10% BSA or significant impact): phototherapy (narrowband UVB), systemic agents (methotrexate, cyclosporine, apremilast, acitretin), or BIOLOGICS (TNF inhibitors, IL-17, IL-23, IL-12/23 inhibitors). Screen for psoriatic arthritis and cardiometabolic comorbidities. Distinguish from seborrheic dermatitis (greasy yellow scale, scalp/nasolabial folds) and eczema (flexural, weeping)."},
{c:"Fungal — Tinea",q:"A 25-year-old has an annular (ring-shaped) lesion with a raised, scaly, erythematous active border and central clearing on the trunk. Diagnosis, confirmatory test, and treatment?",o:["Nummular eczema — topical corticosteroids","Psoriasis — topical vitamin D","Tinea corporis (ringworm) — a dermatophyte infection; confirm with KOH preparation (shows septate hyphae); treat with TOPICAL antifungals (clotrimazole, terbinafine); oral antifungals for extensive or refractory cases; do NOT use topical steroids alone (tinea incognito)","Granuloma annulare — observation"],a:2,r:"Tinea corporis (ringworm): a superficial DERMATOPHYTE (fungal) infection of the body. Classic: ANNULAR (ring-shaped) lesion with a raised, scaly, erythematous ACTIVE BORDER and CENTRAL CLEARING; often pruritic. Confirmatory test: KOH (potassium hydroxide) PREPARATION of skin scrapings from the active border — shows septate, branching HYPHAE under the microscope. Treatment: TOPICAL antifungals (clotrimazole, miconazole, terbinafine, ketoconazole) applied to the lesion and a margin beyond, for 2-4 weeks; ORAL antifungals (terbinafine, fluconazole, itraconazole) for extensive, refractory, or follicular involvement, and for tinea capitis (scalp) and onychomycosis (nails) which require systemic therapy. AVOID topical corticosteroids alone — they suppress the inflammation but allow the fungus to spread, producing 'TINEA INCOGNITO' (altered, atypical appearance, harder to diagnose). Related: tinea pedis (athlete's foot), tinea cruris (jock itch), tinea capitis (scalp — oral therapy + may need selenium sulfide shampoo for spores), tinea versicolor (Malassezia — hypo/hyperpigmented patches, 'spaghetti and meatballs' on KOH)."},
{c:"Fungal — Candida",q:"An obese patient with diabetes has a beefy-red, macerated rash with satellite papules and pustules in the skin folds beneath the breasts and in the groin. Diagnosis and management?",o:["Tinea cruris — central clearing with a raised border","Contact dermatitis — remove the irritant","Cutaneous candidiasis (intertrigo) — beefy-red, moist, macerated rash in skin folds with characteristic SATELLITE lesions; treat with topical antifungals (nystatin, clotrimazole), keep the area dry, manage risk factors (obesity, diabetes, moisture)","Inverse psoriasis — topical steroids"],a:2,r:"Cutaneous candidiasis / candidal intertrigo: a Candida (yeast) infection of moist, warm skin folds (intertriginous areas). Locations: inframammary folds, axillae, groin, abdominal folds, gluteal cleft, web spaces. Appearance: BEEFY-RED, moist, macerated erythema with characteristic SATELLITE PAPULES and PUSTULES (small lesions outside the main confluent rash — a key diagnostic clue) and peripheral scale. Risk factors: obesity, DIABETES, moisture/sweating, occlusion, antibiotics, immunosuppression, incontinence. Treatment: TOPICAL ANTIFUNGALS (nystatin, clotrimazole, miconazole, ketoconazole); KEEP THE AREA DRY (drying agents, absorbent powders, barrier creams, air exposure); manage underlying risk factors (glycemic control, weight loss, moisture reduction). Severe/widespread or immunocompromised: oral fluconazole. Distinguish from tinea (dermatophyte — central clearing, raised annular border, no satellite lesions) and inverse psoriasis (well-demarcated, less macerated)."},
{c:"Bacterial — Impetigo",q:"A 5-year-old has honey-colored crusted lesions around the nose and mouth that started as small vesicles. The child is otherwise well. Diagnosis and treatment?",o:["Herpes simplex — grouped vesicles, antiviral therapy","Eczema — emollients and steroids","Impetigo — a superficial bacterial skin infection (S. aureus, S. pyogenes) with characteristic HONEY-COLORED crusts; localized disease: topical mupirocin; widespread/multiple lesions: oral antibiotics (cephalexin, dicloxacillin); highly contagious — emphasize hygiene","Tinea faciei — topical antifungal"],a:2,r:"Impetigo: a common, highly contagious, superficial bacterial skin infection — most common in children. Organisms: Staphylococcus aureus (most common) and Streptococcus pyogenes (Group A Strep). NON-BULLOUS impetigo (most common): begins as papules/vesicles that rupture and form characteristic HONEY-COLORED (golden) CRUSTS, typically around the nose and mouth. BULLOUS impetigo: larger flaccid bullae (S. aureus toxin-mediated). Treatment: LOCALIZED/limited disease — topical MUPIROCIN (or retapamulin) for 5 days; WIDESPREAD/numerous lesions or outbreaks — oral antibiotics (cephalexin or dicloxacillin; clindamycin or TMP-SMX/doxycycline if MRSA suspected). Highly CONTAGIOUS — emphasize hand hygiene, avoid sharing towels, keep lesions covered, and keep children home until 24 hours of treatment. Complication: post-streptococcal glomerulonephritis (not prevented by antibiotic treatment of the skin lesions). Distinguish from herpes (grouped vesicles on an erythematous base, recurrent)."},
{c:"Bacterial — Cellulitis",q:"A 50-year-old has a warm, erythematous, tender, swollen area on the lower leg with poorly demarcated borders. There is no fluctuance or abscess. The patient is afebrile. Diagnosis and first-line treatment for non-purulent cellulitis?",o:["Necrotizing fasciitis — emergent surgery","Deep vein thrombosis — anticoagulation","Cellulitis (non-purulent) — a deeper dermal/subcutaneous bacterial infection usually from Streptococcus; first-line outpatient treatment targets streptococci: cephalexin or dicloxacillin; mark the borders and reassess; add MRSA coverage if purulent or risk factors are present","Stasis dermatitis — compression and emollients"],a:2,r:"Cellulitis: a bacterial infection of the deeper DERMIS and SUBCUTANEOUS tissue. Appearance: warm, erythematous, tender, swollen skin with POORLY demarcated borders (vs erysipelas, which is more superficial with sharply demarcated raised borders); may have lymphangitic streaking and regional lymphadenopathy; systemic signs (fever) in more severe cases. NON-PURULENT cellulitis (no abscess/drainage): usually STREPTOCOCCAL (also MSSA) → first-line targets strep: CEPHALEXIN or dicloxacillin (penicillin-allergic: clindamycin). PURULENT cellulitis/abscess: more likely S. aureus including MRSA → add MRSA coverage (TMP-SMX, doxycycline, or clindamycin) and incise/drain any abscess. Outpatient management: MARK the borders of erythema and reassess in 48 hours (expansion may indicate failure or alternative diagnosis); elevate the limb. IV antibiotics and admission for: systemic toxicity, rapid progression, failed oral therapy, immunocompromise, or extensive disease. Address risk factors (tinea pedis as an entry point, edema, venous insufficiency). Rule out necrotizing fasciitis (pain out of proportion, crepitus, rapid progression, systemic toxicity — surgical emergency)."},
{c:"Viral — Herpes Zoster",q:"A 65-year-old has a painful, unilateral vesicular rash in a band-like distribution on one side of the trunk that does not cross the midline, preceded by burning pain. Diagnosis, treatment, and key complication?",o:["Contact dermatitis — topical steroids","Herpes simplex — recurrent grouped vesicles","Herpes zoster (shingles) — reactivation of varicella-zoster virus in a single DERMATOME (does not cross midline); treat with antivirals (acyclovir, valacyclovir, famciclovir) ideally within 72 hours; the key complication is postherpetic neuralgia; recommend the recombinant zoster vaccine for prevention","Bullous pemphigoid — tense bullae"],a:2,r:"Herpes zoster (shingles): reactivation of latent VARICELLA-ZOSTER VIRUS (VZV) in a sensory dorsal root ganglion. Presentation: a prodrome of burning/tingling PAIN, followed by a painful, unilateral, grouped VESICULAR rash in a single DERMATOMAL distribution that does NOT CROSS the MIDLINE (a hallmark). Risk increases with age and immunosuppression. Treatment: ANTIVIRALS (valacyclovir, famciclovir, or acyclovir) — most effective when started WITHIN 72 HOURS of rash onset (reduces severity, duration, and risk of complications); analgesia. KEY COMPLICATION: POSTHERPETIC NEURALGIA (PHN) — persistent dermatomal pain after the rash resolves (more common and severe with age); managed with gabapentin/pregabalin, TCAs, topical lidocaine/capsaicin. HERPES ZOSTER OPHTHALMICUS (V1 distribution — involves the eye; Hutchinson's sign = lesions on the nose tip): vision-threatening — urgent ophthalmology. RAMSAY HUNT syndrome (facial nerve + ear involvement): facial palsy, ear vesicles, hearing changes. PREVENTION: recombinant zoster vaccine (Shingrix) for adults ≥50. Contagious to non-immune individuals (can cause chickenpox) via contact with vesicle fluid until crusted."},
{c:"Viral — Warts",q:"A 16-year-old has several rough, hyperkeratotic papules with tiny black dots (thrombosed capillaries) on the fingers. Diagnosis and management?",o:["Molluscum contagiosum — dome-shaped umbilicated papules","Squamous cell carcinoma — biopsy","Common warts (verruca vulgaris) — caused by human papillomavirus (HPV); rough papules with thrombosed capillaries ('black dots'); many resolve spontaneously; treatments include salicylic acid, cryotherapy, and other destructive methods","Actinic keratosis — cryotherapy and field therapy"],a:2,r:"Common warts (verruca vulgaris): benign epidermal growths caused by HUMAN PAPILLOMAVIRUS (HPV). Appearance: rough, hyperkeratotic, skin-colored to brown papules, often with characteristic tiny BLACK DOTS (thrombosed capillaries) — disrupting the normal skin lines. Common on hands/fingers (common warts), soles (plantar warts — painful, inward-growing), face (flat warts). Spread by direct contact and autoinoculation. Management: many resolve SPONTANEOUSLY over months to years (especially in children); treatments (for symptomatic/persistent/cosmetic) include topical SALICYLIC ACID (first-line at home), CRYOTHERAPY (liquid nitrogen), cantharidin, and other destructive/immune methods (no single treatment is uniformly effective; recurrence is common). Molluscum contagiosum: a poxvirus — dome-shaped, flesh-colored papules with central UMBILICATION (dimple); self-limited; common in children and as an STI in adults. Genital/anal warts (condyloma acuminata): HPV — counsel on HPV vaccination for prevention."},
{c:"Acne",q:"A 17-year-old has comedones (blackheads and whiteheads), inflammatory papules, and a few pustules on the face. There is no scarring or nodules. Diagnosis and appropriate first-line treatment for mild-moderate acne?",o:["Rosacea — avoid triggers, topical metronidazole","Folliculitis — topical antibiotics only","Acne vulgaris — for mild-moderate disease: topical retinoid (tretinoin, adapalene) ± benzoyl peroxide ± topical antibiotic (combination therapy); benzoyl peroxide reduces antibiotic resistance; reserve oral antibiotics and isotretinoin for more severe/refractory disease","Perioral dermatitis — stop topical steroids"],a:2,r:"Acne vulgaris: a common pilosebaceous disorder involving follicular hyperkeratinization, increased sebum, Cutibacterium acnes, and inflammation. Lesion types: comedones (non-inflammatory — open 'blackheads,' closed 'whiteheads'), inflammatory papules/pustules, and nodules/cysts (severe). Treatment is stepwise by severity: MILD-MODERATE: topical RETINOID (tretinoin, adapalene — comedolytic, the cornerstone) ± BENZOYL PEROXIDE (antibacterial, reduces C. acnes and prevents antibiotic resistance) ± topical ANTIBIOTIC (clindamycin, erythromycin — always combine with benzoyl peroxide, never as monotherapy to limit resistance). Combination products improve adherence. MODERATE-SEVERE: add ORAL ANTIBIOTICS (doxycycline, minocycline — anti-inflammatory, limit duration ~3 months) ± hormonal therapy (combined oral contraceptives, spironolactone in women). SEVERE/NODULOCYSTIC/SCARRING/refractory: oral ISOTRETINOIN (highly effective; teratogenic — iPLEDGE program, two forms of contraception, monitor lipids/LFTs, mood). Set expectations: improvement takes 8-12 weeks. Avoid topical steroids (cause steroid acne)."},
{c:"Rosacea",q:"A 45-year-old woman has central facial erythema, flushing, telangiectasias, and inflammatory papules and pustules on the cheeks and nose. There are NO comedones. Triggers include sun, alcohol, and spicy food. Diagnosis and first-line treatment?",o:["Acne vulgaris — comedones present, topical retinoid","Systemic lupus — malar rash with photosensitivity","Rosacea — central facial erythema, flushing, telangiectasias, papulopustules WITHOUT comedones; first-line: trigger avoidance, sun protection, and topical metronidazole, azelaic acid, or ivermectin; oral doxycycline for moderate-severe; topical brimonidine for persistent erythema","Seborrheic dermatitis — greasy scale in the nasolabial folds"],a:2,r:"Rosacea: a chronic inflammatory facial condition, typically in fair-skinned adults 30-50. Subtypes/features: erythematotelangiectatic (central facial ERYTHEMA, FLUSHING, TELANGIECTASIAS), papulopustular (inflammatory papules/pustules — but NO COMEDONES, which distinguishes it from acne), phymatous (rhinophyma — thickened, bulbous nose), ocular rosacea (dry, gritty eyes, blepharitis). TRIGGERS: sun exposure, heat, alcohol, spicy foods, hot beverages, emotional stress, temperature extremes. Management: (1) TRIGGER avoidance and gentle skin care + daily SUN PROTECTION (key); (2) Topical agents — METRONIDAZOLE, azelaic acid, or ivermectin (for papulopustular); (3) Topical brimonidine or oxymetazoline (for persistent erythema/flushing — vasoconstrictors); (4) ORAL doxycycline (anti-inflammatory dose) for moderate-severe papulopustular or ocular rosacea; (5) Laser/light therapy for telangiectasias and rhinophyma. Distinguish from acne (has comedones), lupus malar rash (spares nasolabial folds, photosensitive, systemic features), and seborrheic dermatitis."},
{c:"Seborrheic Dermatitis",q:"A 35-year-old has greasy, yellowish scales and erythema on the scalp, eyebrows, nasolabial folds, and behind the ears. It waxes and wanes. Diagnosis and first-line treatment?",o:["Psoriasis — silvery scale on extensor surfaces","Atopic dermatitis — flexural, intensely itchy","Seborrheic dermatitis — greasy yellow scales in sebaceous-rich areas (scalp, eyebrows, nasolabial folds); associated with Malassezia yeast; first-line: antifungal shampoos/creams (ketoconazole, selenium sulfide, zinc pyrithione) and low-potency topical corticosteroids for flares","Tinea capitis — oral antifungal required"],a:2,r:"Seborrheic dermatitis: a common chronic inflammatory condition in sebaceous-gland-rich (oily) areas, associated with MALASSEZIA yeast and sebum. Appearance: GREASY, YELLOWISH scales with underlying erythema on the SCALP (dandruff in mild form), eyebrows, glabella, NASOLABIAL FOLDS, ears, central chest. Chronic, relapsing course. More common/severe in: Parkinson's disease, HIV (extensive/severe seborrheic dermatitis can be a presenting sign — consider HIV testing), and infants (cradle cap). First-line treatment: ANTIFUNGAL shampoos/topicals — KETOCONAZOLE, SELENIUM SULFIDE, zinc pyrithione, or ciclopirox (target Malassezia); low-potency TOPICAL CORTICOSTEROIDS or topical calcineurin inhibitors for inflammatory flares (limit steroid use on the face). For the scalp: medicated shampoos used regularly. Distinguish from psoriasis (silvery scale, sharply demarcated, extensor surfaces), atopic dermatitis (flexural, very itchy), and tinea (KOH-positive)."},
{c:"Urticaria",q:"A 28-year-old develops transient, intensely itchy, raised wheals (hives) that appear and resolve within hours, migrating to different body areas, after taking an antibiotic. There is no lip/tongue swelling or breathing difficulty. Diagnosis and first-line treatment?",o:["Erythema multiforme — target lesions, fixed","Contact dermatitis — fixed location, vesicles","Acute urticaria (hives) — transient, migratory, intensely pruritic wheals lasting <24 hours each; first-line treatment is second-generation H1 antihistamines (cetirizine, loratadine, fexofenadine); identify and remove the trigger; monitor for angioedema/anaphylaxis","Stevens-Johnson syndrome — mucosal involvement, hospitalize"],a:2,r:"Urticaria (hives): transient, raised, erythematous, intensely PRURITIC WHEALS (edematous plaques) caused by mast cell histamine release. Key features: individual lesions are TRANSIENT (each resolves within 24 hours, typically hours) and MIGRATORY (appear and disappear in different locations) — this fleeting nature distinguishes urticaria from fixed eruptions. ACUTE urticaria (<6 weeks): often from infections, medications (antibiotics, NSAIDs), foods, insect stings, or allergic reactions. CHRONIC urticaria (>6 weeks): often idiopathic/autoimmune. First-line treatment: SECOND-GENERATION H1 ANTIHISTAMINES (cetirizine, loratadine, fexofenadine — non-sedating; can up-dose to 2-4x standard for chronic urticaria); identify and remove triggers. Add H2 blockers or a short steroid course for severe acute episodes; omalizumab for refractory chronic urticaria. CRITICAL: monitor for ANGIOEDEMA (deeper swelling — lips, tongue, face) and ANAPHYLAXIS (airway compromise, hypotension, wheezing) — these are emergencies requiring epinephrine. Urticaria + angioedema + respiratory/cardiovascular symptoms = anaphylaxis → IM epinephrine immediately."},
{c:"Drug Eruptions",q:"A patient started a new medication (e.g., an antibiotic or anticonvulsant) 10 days ago and now has a widespread symmetric morbilliform (measles-like) maculopapular rash without mucosal involvement, blistering, or systemic toxicity. Diagnosis and management?",o:["Stevens-Johnson syndrome — discontinue and hospitalize","Anaphylaxis — IM epinephrine","Morbilliform (maculopapular) drug eruption — the most common type of drug rash; benign, no mucosal/systemic involvement; discontinue the offending drug, supportive care (antihistamines, topical steroids); monitor for warning signs of severe reactions (mucosal lesions, blistering, facial edema, fever, systemic symptoms)","Erythema multiforme — target lesions from infection"],a:2,r:"Morbilliform (maculopapular/exanthematous) drug eruption: the MOST COMMON type of cutaneous drug reaction. Appearance: widespread, symmetric, MORBILLIFORM (measles-like) erythematous macules and papules, typically beginning on the trunk 7-14 days after starting the drug (sooner with re-exposure); pruritic. Common culprits: antibiotics (penicillins, sulfonamides), anticonvulsants, allopurinol, NSAIDs. It is BENIGN when there is NO mucosal involvement, NO blistering/skin sloughing, NO facial edema, and NO systemic toxicity. Management: DISCONTINUE the offending drug, supportive care (oral antihistamines, topical corticosteroids, emollients); document the drug allergy. CRITICAL: monitor for RED FLAGS of SEVERE cutaneous drug reactions — mucosal involvement, skin pain, blistering/sloughing (SJS/TEN), facial edema + fever + eosinophilia + organ involvement (DRESS), pustules (AGEP), or lymphadenopathy. These severe reactions require immediate drug cessation, hospitalization, and specialist care. A simple morbilliform eruption is low-risk, but vigilance for evolution into a severe reaction is essential."},
{c:"Severe Drug Reactions",q:"A patient on a new anticonvulsant develops fever, a painful rash with skin sloughing and positive Nikolsky sign, and erosions of the lips, oral mucosa, and conjunctiva, affecting 8% of the body surface area. Diagnosis and immediate action?",o:["Morbilliform drug eruption — stop the drug, outpatient care","Urticaria — antihistamines","Stevens-Johnson syndrome (SJS) — a life-threatening severe cutaneous drug reaction with MUCOSAL involvement, skin detachment, and positive Nikolsky sign (<10% BSA = SJS; >30% = toxic epidermal necrolysis); IMMEDIATELY discontinue the offending drug and admit (burn unit/ICU) for supportive care","Pemphigus vulgaris — chronic autoimmune blistering"],a:2,r:"Stevens-Johnson syndrome (SJS) / Toxic epidermal necrolysis (TEN): a spectrum of LIFE-THREATENING severe cutaneous adverse reactions, usually drug-induced. Common triggers: anticonvulsants (lamotrigine, carbamazepine, phenytoin), sulfonamides, allopurinol, NSAIDs, antibiotics. Features: prodrome of fever/malaise, then a painful rash with widespread erythema, dusky macules/targetoid lesions, BLISTERING and EPIDERMAL DETACHMENT/sloughing, positive NIKOLSKY SIGN (skin shears off with lateral pressure), and MUCOSAL involvement (oral, ocular, genital erosions — a hallmark). Classification by body surface area (BSA) of detachment: SJS <10%, SJS/TEN overlap 10-30%, TEN >30%. Immediate action: STOP the offending drug IMMEDIATELY (the single most important step — improves survival), ADMIT to a BURN UNIT or ICU for supportive care (fluid/electrolyte management, wound care, infection prevention, nutrition, ophthalmology for eye involvement), and specialist management (consider IVIG, cyclosporine — evidence variable). High mortality (especially TEN). Use SCORTEN to estimate prognosis. Avoid re-exposure permanently and document the allergy."},
{c:"Infestations — Scabies",q:"A patient and several household members have intensely itchy rashes, worse at night, with burrows in the finger web spaces, wrists, and waistline. Diagnosis and treatment?",o:["Atopic dermatitis — emollients and steroids","Contact dermatitis — remove the allergen","Scabies — infestation by Sarcoptes scabiei mite; intense nocturnal itching, burrows in web spaces/wrists/waist; treat with topical permethrin 5% (apply neck-down, repeat in 1 week) OR oral ivermectin; treat ALL close contacts simultaneously and wash/bag bedding and clothing","Tinea corporis — topical antifungal"],a:2,r:"Scabies: a contagious infestation by the mite Sarcoptes scabiei, which burrows into the skin. Hallmark: INTENSE PRURITUS, classically WORSE AT NIGHT, and often affecting multiple HOUSEHOLD members/close contacts. Distribution: finger WEB SPACES, flexor WRISTS, axillae, waistline, genitals, and (in infants/elderly) palms, soles, and scalp. Pathognomonic finding: BURROWS (thin, serpiginous gray lines); diagnosis confirmed by skin scraping showing mites, eggs, or feces. Treatment: TOPICAL PERMETHRIN 5% cream — apply to the ENTIRE body from the NECK DOWN (include under nails, all folds), leave on 8-14 hours, then wash off; REPEAT in 1 week. Alternative: ORAL IVERMECTIN (useful for outbreaks, crusted scabies, or when topical is impractical). CRITICAL: treat ALL household members and close contacts SIMULTANEOUSLY (even if asymptomatic), and decontaminate — wash bedding, clothing, and towels in hot water/high heat, or bag non-washables for 72 hours. Counsel that ITCHING may PERSIST for 2-4 weeks after successful treatment (post-scabietic itch — not treatment failure). Crusted (Norwegian) scabies: severe, highly contagious form in immunocompromised — needs combined topical + oral therapy."},
{c:"Infestations — Lice",q:"A 7-year-old has scalp itching, and examination reveals small whitish-gray oval nits firmly attached to hair shafts near the scalp, plus a few crawling lice. Diagnosis and first-line treatment?",o:["Seborrheic dermatitis (dandruff) — flakes that move freely","Tinea capitis — oral antifungal","Pediculosis capitis (head lice) — nits firmly cemented to hair shafts; first-line: topical pediculicides (permethrin 1% or pyrethrins), repeat in 7-10 days; wet combing to remove nits; treat household contacts with infestation and decontaminate fomites","Atopic dermatitis — emollients"],a:2,r:"Pediculosis capitis (head lice): infestation by Pediculus humanus capitis, very common in school-age children. Spread by direct head-to-head contact (and shared combs/hats). Features: scalp itching (allergic reaction to louse saliva), and NITS (egg cases) — small whitish-gray oval structures FIRMLY CEMENTED to hair shafts near the scalp (unlike dandruff, which flakes off easily); live lice may be seen (more reliable for active infestation). Diagnosis: identifying live lice or viable nits; wet combing with a fine-toothed (nit) comb improves detection. First-line treatment: TOPICAL PEDICULICIDES — permethrin 1% or pyrethrins (over-the-counter) — apply and REPEAT in 7-10 days (to kill newly hatched lice, as the agents are not fully ovicidal); wet combing to remove nits. Resistant cases: malathion, spinosad, topical ivermectin, or oral ivermectin. Treat affected household/close contacts; decontaminate fomites (wash bedding/clothing in hot water, bag non-washables). No need to exclude children from school long-term ('no-nit' policies are not recommended). Distinguish from seborrheic dermatitis (mobile flakes) and tinea capitis."},
{c:"Hair/Nails — Alopecia Areata",q:"A 30-year-old develops sudden, well-circumscribed, smooth, round patches of complete hair loss on the scalp, with no scaling, scarring, or inflammation. 'Exclamation point' hairs are seen at the margins. Diagnosis?",o:["Tinea capitis — scaling and broken hairs, KOH positive","Telogen effluvium — diffuse shedding after stress","Alopecia areata — an autoimmune, NON-scarring hair loss producing well-circumscribed smooth round patches with 'exclamation point' hairs; often regrows spontaneously; treatments include intralesional/topical corticosteroids; associated with other autoimmune conditions","Androgenetic alopecia — patterned thinning"],a:2,r:"Alopecia areata: an AUTOIMMUNE, NON-SCARRING form of hair loss (the hair follicles are preserved, allowing potential regrowth). Presentation: sudden onset of well-circumscribed, smooth, ROUND PATCHES of COMPLETE hair loss, typically on the scalp (can affect beard, eyebrows, eyelashes, or body hair), WITHOUT scaling, scarring, or inflammation. Characteristic 'EXCLAMATION POINT' HAIRS (short, broken hairs that taper toward the scalp) at the patch margins; nail pitting may occur. Variants: alopecia totalis (entire scalp), alopecia universalis (entire body). Associated with other autoimmune conditions (thyroid disease, vitiligo, type 1 diabetes). Course: unpredictable — often spontaneous regrowth, but may recur or progress. Treatments: intralesional or topical CORTICOSTEROIDS (first-line for limited disease), topical minoxidil, topical immunotherapy, and JAK inhibitors (baricitinib) for severe/extensive disease. Distinguish from: tinea capitis (scaling, broken hairs, KOH/culture positive — needs oral antifungal), telogen effluvium (diffuse shedding 2-3 months after a stressor), androgenetic alopecia (patterned thinning), and scarring alopecias (permanent follicle destruction)."},
{c:"Pigmentary — Vitiligo",q:"A 25-year-old has well-demarcated, depigmented (milky-white) macules and patches symmetrically on the hands, around the eyes, and the mouth. There is no scaling or symptoms. Diagnosis and association?",o:["Tinea versicolor — fine scale, KOH positive","Pityriasis alba — hypopigmented, ill-defined, in children","Vitiligo — autoimmune destruction of melanocytes causing well-demarcated DEPIGMENTED (completely white) macules; associated with other autoimmune diseases (especially thyroid disease); treatments include topical corticosteroids/calcineurin inhibitors, phototherapy, and sun protection of affected skin","Post-inflammatory hypopigmentation — follows skin injury"],a:2,r:"Vitiligo: an acquired AUTOIMMUNE disorder of MELANOCYTE destruction, causing loss of skin pigment. Appearance: well-demarcated, DEPIGMENTED (completely milky-white, not just lighter) macules and patches, often SYMMETRIC and favoring the face (especially periorificial — around eyes and mouth), hands, elbows, knees, and genitals; may show Koebner phenomenon (lesions at sites of trauma). Wood's lamp accentuates the depigmentation. Associations: other AUTOIMMUNE conditions — especially THYROID disease (Hashimoto's, Graves'), also type 1 diabetes, pernicious anemia, Addison's disease, alopecia areata (screen for thyroid disease). Psychosocial impact can be significant. Treatments: topical CORTICOSTEROIDS or topical CALCINEURIN INHIBITORS (tacrolimus — good for face), PHOTOTHERAPY (narrowband UVB), topical JAK inhibitor (ruxolitinib), excimer laser, and SUN PROTECTION (depigmented skin burns easily and the contrast worsens with tanning of normal skin); cosmetic camouflage. Distinguish from tinea versicolor (fine scale, KOH-positive — hypopigmented not depigmented), pityriasis alba, and post-inflammatory hypopigmentation."},
{c:"Pigmentary — Tinea Versicolor",q:"A 22-year-old notices multiple hypopigmented (and some hyperpigmented) finely scaling patches on the upper trunk and shoulders, more noticeable after sun exposure (they fail to tan). Diagnosis, test, and treatment?",o:["Vitiligo — completely depigmented, no scale","Pityriasis rosea — herald patch and 'Christmas tree' pattern","Tinea (pityriasis) versicolor — superficial Malassezia yeast infection; hypo/hyperpigmented finely scaling patches on the trunk; KOH shows 'spaghetti and meatballs' (hyphae and spores); treat with topical antifungals (selenium sulfide, ketoconazole) — pigment normalizes slowly over weeks-months","Secondary syphilis — palms and soles involved"],a:2,r:"Tinea versicolor (pityriasis versicolor): a common superficial skin infection caused by overgrowth of the lipophilic yeast MALASSEZIA (normal skin flora). Appearance: multiple well-demarcated, finely SCALING macules/patches on the upper trunk, shoulders, neck, and upper arms; color varies ('versicolor') — HYPOpigmented (the yeast produces azelaic acid, inhibiting melanocytes — so patches fail to tan and become more noticeable after sun exposure), HYPERpigmented, or pink/tan. Usually asymptomatic (mild itch). More common in hot, humid climates and with sweating. Diagnosis: KOH preparation of scrapings shows the classic 'SPAGHETTI AND MEATBALLS' appearance (short hyphae + round spores); Wood's lamp may show yellow-green fluorescence. Treatment: TOPICAL ANTIFUNGALS — SELENIUM SULFIDE shampoo/lotion, KETOCONAZOLE shampoo/cream, or other azoles applied to affected areas; oral antifungals (fluconazole, itraconazole) for extensive/recurrent disease. COUNSEL: the PIGMENT changes NORMALIZE SLOWLY over weeks to months AFTER the infection is cleared (the scaling resolves first) — this is not treatment failure. Recurrence is common; periodic prophylactic shampoo use helps."},
{c:"Pediatric — Viral Exanthem",q:"A 5-year-old has a high fever for 3 days that suddenly resolves, followed by the appearance of a rose-pink maculopapular rash on the trunk that spreads outward. The child appears well. Diagnosis?",o:["Measles — rash appears WITH high fever and Koplik spots","Scarlet fever — sandpaper rash and strawberry tongue","Roseola infantum (exanthem subitum, HHV-6) — high fever for 3-4 days that resolves, FOLLOWED by a rose-pink maculopapular rash starting on the trunk; the child appears well; supportive care only","Fifth disease — 'slapped cheek' appearance"],a:2,r:"Roseola infantum (exanthem subitum, 'sixth disease'): caused by human herpesvirus 6 (HHV-6, sometimes HHV-7). Classic age: 6 months to 2 years (this scenario in a 5-year-old is a bit older but tests the pattern). Hallmark sequence: 3-4 days of HIGH FEVER (can trigger febrile seizures) in a relatively WELL-appearing child, then the fever SUDDENLY RESOLVES and is FOLLOWED by the appearance of a rose-pink maculopapular rash starting on the TRUNK and spreading outward (the 'fever first, then rash AFTER defervescence' pattern is the key). Self-limited; supportive care only. Compare other pediatric exanthems: MEASLES (rubeola) — high fever WITH cough/coryza/conjunctivitis, KOPLIK spots (white spots on buccal mucosa), then a cephalocaudal rash; SCARLET FEVER (Group A Strep) — 'sandpaper' rash, strawberry tongue, circumoral pallor, treat with penicillin; FIFTH DISEASE (erythema infectiosum, parvovirus B19) — 'SLAPPED CHEEK' facial rash then lacy reticular rash on extremities; HAND-FOOT-MOUTH (coxsackievirus) — oral ulcers + vesicles on hands/feet; RUBELLA — mild rash + posterior auricular/occipital lymphadenopathy."},
{c:"Pressure Injury",q:"A bedbound nursing home resident has a sacral wound with full-thickness skin loss exposing subcutaneous fat, but no exposed bone, tendon, or muscle. There is some slough. How is this pressure injury staged and what is a key prevention strategy?",o:["Stage 1 — intact skin with non-blanchable erythema","Stage 2 — partial-thickness loss with a shallow open ulcer","Stage 3 pressure injury — full-thickness skin loss with visible subcutaneous fat (no exposed bone/tendon/muscle); prevention centers on REPOSITIONING (turn at least every 2 hours), pressure-redistributing surfaces, moisture/skin care, nutrition, and regular skin assessment","Unstageable — base obscured by eschar"],a:2,r:"Pressure injury (pressure ulcer) staging (NPUAP/NPIAP): STAGE 1 — INTACT skin with localized NON-BLANCHABLE erythema. STAGE 2 — PARTIAL-thickness skin loss with exposed dermis (a shallow open ulcer or intact/ruptured blister). STAGE 3 — FULL-thickness skin loss exposing SUBCUTANEOUS FAT (slough may be present), but NO exposed bone, tendon, or muscle (this scenario). STAGE 4 — full-thickness loss with EXPOSED bone, tendon, or muscle. UNSTAGEABLE — full-thickness loss with the base obscured by slough/ESCHAR (cannot determine depth). DEEP TISSUE PRESSURE INJURY — persistent non-blanchable deep red/maroon/purple discoloration or blood-filled blister. PREVENTION (key for at-risk/immobile patients): REPOSITION/turn at least every 2 hours, use pressure-redistributing support surfaces (specialty mattresses, cushions), keep skin clean and DRY (manage moisture/incontinence), optimize NUTRITION and hydration, minimize friction/shear, and perform regular SKIN ASSESSMENTS (Braden Scale to assess risk). Treatment by stage: pressure offloading + appropriate wound care/dressings; debridement of nonviable tissue (not dry stable heel eschar); treat infection."},
{c:"Burns",q:"A patient spills hot liquid on the forearm. The burn is red, painful, moist, and blistered, blanches with pressure, and is very sensitive to touch. What depth is this burn and what is the basic management?",o:["Superficial (first-degree) — red, dry, no blisters (like sunburn)","Full-thickness (third-degree) — white/charred, painless, leathery","Superficial partial-thickness (second-degree) — red, moist, BLISTERED, painful, and blanching; management: cool the burn, clean, appropriate dressings, pain control, leave intact blisters, monitor for infection; most heal in 1-3 weeks","Deep full-thickness (fourth-degree) — involves muscle/bone"],a:2,r:"Burn depth classification: SUPERFICIAL (first-degree): epidermis only — red, DRY, painful, NO blisters, blanches (like a sunburn); heals in days without scarring. SUPERFICIAL PARTIAL-THICKNESS (second-degree): epidermis + superficial dermis — red, MOIST, BLISTERED, very PAINFUL/sensitive, BLANCHES with pressure (this scenario); heals in ~1-3 weeks, usually without scarring. DEEP PARTIAL-THICKNESS: into deeper dermis — may be less painful, slower healing, scarring likely. FULL-THICKNESS (third-degree): entire dermis — white/charred/leathery, dry, PAINLESS (nerve endings destroyed), does NOT blanch; requires grafting. FOURTH-DEGREE: into muscle/bone. Basic management of partial-thickness burns: COOL the burn (cool running water, not ice), clean gently, appropriate dressings (and topical antimicrobials for larger burns), PAIN control, leave intact blisters intact (protect the wound), tetanus prophylaxis, and monitor for infection. REFER/transfer to a burn center for: large burns (estimate %TBSA using the Rule of Nines), full-thickness burns, burns to the face/hands/feet/genitals/major joints, circumferential burns, electrical/chemical/inhalation injury, and burns in very young/old patients. Estimate fluid resuscitation (Parkland formula) for large burns."},
{c:"Hidradenitis",q:"A 28-year-old obese smoker has recurrent painful nodules, abscesses, draining sinus tracts, and scarring in the axillae and groin (intertriginous areas). Diagnosis and management approach?",o:["Furunculosis — single boils, treat each with I&D","Cutaneous candidiasis — topical antifungal","Hidradenitis suppurativa — a chronic inflammatory disorder of apocrine-gland-bearing intertriginous skin (axillae, groin, inframammary); recurrent painful nodules, abscesses, sinus tracts, and scarring; management: lifestyle (weight loss, smoking cessation), topical/oral antibiotics, and biologics (adalimumab) for moderate-severe disease","Acne vulgaris — topical retinoid"],a:2,r:"Hidradenitis suppurativa (HS, acne inversa): a chronic, recurrent, inflammatory disorder of the hair follicles in APOCRINE-gland-bearing, INTERTRIGINOUS skin — the AXILLAE, GROIN, inframammary, perineal, and gluteal areas. Features: recurrent PAINFUL inflammatory NODULES, ABSCESSES, DRAINING SINUS TRACTS, 'double-headed' comedones, and ROPE-LIKE SCARRING over time. Risk factors: OBESITY, SMOKING (strong associations), family history, female sex, metabolic syndrome. Significant impact on quality of life. Hurley staging (I-III) by severity. Management (multimodal): (1) LIFESTYLE — weight loss, SMOKING CESSATION, loose clothing, gentle skin care; (2) Topical/intralesional therapy — topical clindamycin, intralesional corticosteroids for acute nodules; (3) Systemic ANTIBIOTICS (anti-inflammatory) — doxycycline, or clindamycin + rifampin; (4) Hormonal therapy (spironolactone, OCPs in women); (5) BIOLOGICS — adalimumab (TNF inhibitor, FDA-approved) for moderate-severe; (6) Surgery (incision and drainage for acute abscesses provides only temporary relief; wide excision of chronically affected areas for definitive treatment). Distinguish from simple furunculosis (isolated boils) and acne."},
{c:"Pediatric — Diaper Dermatitis",q:"An infant has erythema on the convex surfaces of the buttocks and thighs that SPARES the skin folds, without satellite lesions. Diagnosis and management?",o:["Candidal diaper dermatitis — involves folds with satellite lesions, needs antifungal","Atopic dermatitis — cheeks and extensors","Irritant (contact) diaper dermatitis — erythema on convex surfaces that SPARES the skin folds; from prolonged contact with urine/feces and friction; management: frequent diaper changes, gentle cleansing, barrier creams (zinc oxide/petrolatum), and air exposure","Seborrheic dermatitis — greasy scale"],a:2,r:"Irritant (contact) diaper dermatitis: the MOST COMMON diaper rash, caused by prolonged contact with urine and feces, friction, moisture, and increased skin pH. KEY DISTINGUISHING FEATURE: erythema on the CONVEX (exposed) surfaces that come into contact with the diaper — the buttocks, lower abdomen, genitals, and upper thighs — while SPARING the SKIN FOLDS (the creases are protected from direct contact). No satellite lesions. Management: (1) FREQUENT diaper changes (keep the area dry); (2) Gentle cleansing (water or fragrance-free wipes, pat dry); (3) BARRIER creams/ointments — ZINC OXIDE or petrolatum (protect skin from moisture/irritants); (4) AIR exposure (diaper-free time); (5) avoid over-washing and irritant products. CANDIDAL diaper dermatitis (the key contrast): INVOLVES the SKIN FOLDS, beefy-red, with SATELLITE papules/pustules — occurs after prolonged irritant dermatitis or antibiotics → treat with a TOPICAL ANTIFUNGAL (nystatin, clotrimazole). If a presumed irritant dermatitis does not improve with barrier care or involves the folds with satellites, treat for candida."},
{c:"Melanoma — Staging",q:"A suspicious pigmented lesion is biopsied and confirmed to be melanoma. Which single histologic feature is the MOST important prognostic factor and guides further management?",o:["The color of the lesion","The patient's age at diagnosis","Breslow depth (tumor thickness in millimeters) — the most important prognostic factor in melanoma; deeper tumors have a worse prognosis and guide the need for wider excision margins and sentinel lymph node biopsy","The anatomic location only"],a:2,r:"Melanoma prognosis and management: BRESLOW DEPTH (tumor THICKNESS measured in millimeters from the granular layer of the epidermis to the deepest tumor cell) is the SINGLE MOST IMPORTANT PROGNOSTIC FACTOR — thicker (deeper) melanomas have a higher risk of metastasis and worse survival. This is why the initial biopsy of a suspicious lesion should be an EXCISIONAL (full-thickness) biopsy rather than a superficial shave (to accurately measure depth). Breslow depth guides: WIDE LOCAL EXCISION margins (e.g., melanoma in situ ~0.5-1 cm; thin invasive 1 cm; thicker 1-2 cm margins) and the decision for SENTINEL LYMPH NODE BIOPSY (generally considered for tumors ≥0.8-1.0 mm or with high-risk features — assesses regional nodal spread and prognosis). Other prognostic factors: ulceration (worsens stage), mitotic rate, and (for advanced disease) lymph node and distant metastasis. Staging follows the AJCC TNM system. Advanced/metastatic melanoma treatment has been transformed by immunotherapy (checkpoint inhibitors — anti-PD-1, anti-CTLA-4) and targeted therapy (BRAF/MEK inhibitors for BRAF-mutated tumors). Prevention and EARLY detection (the ABCDEs, regular skin exams) remain critical — thin, early melanomas are highly curable."},
