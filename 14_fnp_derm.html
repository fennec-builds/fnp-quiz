{c:"Viral — Herpes Simplex",q:"A 22-year-old has recurrent painful grouped vesicles on an erythematous base on the lip (vermilion border), preceded by tingling, recurring at the same site during stress and illness. Diagnosis and treatment?",o:["Impetigo — honey-colored crust, topical mupirocin","Aphthous ulcers — intraoral, topical steroids","Herpes labialis (HSV-1) — recurrent GROUPED vesicles on an erythematous base at the same site, with a tingling prodrome; treat with antivirals (acyclovir, valacyclovir) started early; consider suppressive therapy for frequent recurrences","Angular cheilitis — at the corners of the mouth, antifungal"],a:2,r:"Herpes labialis ('cold sores,' usually HSV-1): recurrent infection from reactivation of latent herpes simplex virus in the trigeminal ganglion. Classic: a tingling/burning PRODROME, followed by GROUPED VESICLES on an ERYTHEMATOUS BASE at the SAME site (typically the LIP/vermilion border), which crust and heal over ~1-2 weeks. Triggers: stress, illness/fever ('fever blisters'), sun exposure, menstruation. Contagious via direct contact (shedding occurs even without visible lesions). Treatment: ORAL ANTIVIRALS (acyclovir, valacyclovir, famciclovir) — most effective when started EARLY (at the prodrome); topical antivirals are less effective. SUPPRESSIVE daily antiviral therapy for FREQUENT recurrences (or to reduce transmission). Sun protection (lip balm with SPF) helps prevent UV-triggered recurrences. HSV complications: herpetic whitlow (finger), herpes gladiatorum, HERPETIC KERATITIS (eye — vision-threatening, refer urgently), eczema herpeticum (disseminated HSV in atopic dermatitis — a dermatologic emergency), and neonatal herpes. Distinguish from aphthous ulcers (intraoral, non-vesicular, not contagious) and angular cheilitis (corners of the mouth, often candidal)."},
{c:"Bites/Stings",q:"A patient develops a rapidly enlarging, well-demarcated, expanding ERYTHEMATOUS ring with central clearing ('bull's-eye') at the site of a recent tick bite, with mild flu-like symptoms. Diagnosis and treatment?",o:["Cellulitis — non-demarcated erythema, treat for strep","Allergic reaction to the bite — antihistamines only","Erythema migrans of early Lyme disease — a target/bull's-eye rash at the tick bite site; treat empirically with doxycycline (or amoxicillin/cefuroxime in pregnancy or children) — do NOT wait for serology when the classic rash is present","Spider bite — supportive care"],a:2,r:"Erythema migrans (EM): the characteristic early skin manifestation of LYME DISEASE (Borrelia burgdorferi, transmitted by Ixodes/deer ticks). Appearance: an expanding, well-demarcated, ERYTHEMATOUS annular rash, often with CENTRAL CLEARING producing a 'BULL'S-EYE'/target appearance, developing days to a few weeks after the tick bite at the bite site; usually warm but not very painful or itchy; may be accompanied by flu-like symptoms (fatigue, headache, myalgia, fever). KEY POINT: when classic EM is present in an endemic area, treat EMPIRICALLY — do NOT wait for serologic confirmation (antibody tests are often NEGATIVE in early disease and EM is diagnostic). Treatment: oral DOXYCYCLINE (first-line; also covers possible co-infection with anaplasma); AMOXICILLIN or CEFUROXIME for pregnant women and young children (where doxycycline is traditionally avoided, though short courses are now considered acceptable in children). Early treatment prevents later disseminated Lyme (carditis, neurologic — facial palsy/meningitis, and arthritis). Tick-bite prophylaxis (single-dose doxycycline) may be considered for high-risk Ixodes bites in endemic areas."},
{c:"Bullous Disorders",q:"An elderly patient has multiple large, TENSE bullae on an erythematous/urticarial base on the trunk and flexures, with intense itching. The blisters do not rupture easily and the Nikolsky sign is NEGATIVE. Mucous membranes are largely spared. Diagnosis?",o:["Pemphigus vulgaris — flaccid bullae, positive Nikolsky, mucosal involvement","Stevens-Johnson syndrome — drug-induced, mucosal erosions","Bullous pemphigoid — an autoimmune subepidermal blistering disease of the elderly; TENSE bullae, negative Nikolsky sign, intense pruritus, mucosa usually spared; treat with topical/systemic corticosteroids","Dermatitis herpetiformis — grouped vesicles, associated with celiac disease"],a:2,r:"Bullous pemphigoid (BP): the most common autoimmune blistering disease, typically in the ELDERLY. Autoantibodies target the basement membrane (hemidesmosomal proteins BP180/BP230), causing SUBEPIDERMAL blisters. Features: large, TENSE bullae (they do NOT rupture easily because the blister roof is full-thickness epidermis), often on an erythematous or urticarial base, on the trunk, flexures, and extremities; INTENSE PRURITUS (may precede blisters); mucous membranes are usually SPARED or minimally involved; NIKOLSKY SIGN NEGATIVE. Diagnosis: skin biopsy with direct immunofluorescence (linear IgG and C3 along the basement membrane). Treatment: topical (clobetasol) or systemic CORTICOSTEROIDS, steroid-sparing agents (doxycycline/nicotinamide, methotrexate, azathioprine, rituximab for refractory). KEY CONTRAST — PEMPHIGUS VULGARIS: autoantibodies target desmoglein (INTRAepidermal), producing FLACCID bullae that rupture easily into painful erosions, POSITIVE Nikolsky sign, and prominent MUCOSAL (oral) involvement — more serious, requires aggressive immunosuppression. DERMATITIS HERPETIFORMIS: intensely pruritic grouped vesicles on extensor surfaces, associated with CELIAC disease — treat with a gluten-free diet and dapsone."},
{c:"Photosensitivity/Drugs",q:"A patient on doxycycline develops an exaggerated sunburn-like erythema on sun-exposed skin after brief sun exposure. Which counseling point is most important for this and other photosensitizing medications?",o:["Photosensitivity is permanent and the drug can never be used again","Sunscreen is unnecessary while on antibiotics","Several common medications cause PHOTOSENSITIVITY (e.g., tetracyclines/doxycycline, sulfonamides, fluoroquinolones, thiazides, amiodarone, NSAIDs, retinoids); counsel strict sun protection (SPF, protective clothing, avoid peak sun) while taking them","Photosensitivity only occurs with topical medications"],a:2,r:"Drug-induced photosensitivity: certain medications make the skin more sensitive to UV light, causing exaggerated sunburn-like reactions (phototoxic) or eczematous/rash reactions (photoallergic) on SUN-EXPOSED areas. COMMON photosensitizing drugs: TETRACYCLINES (especially DOXYCYCLINE), SULFONAMIDES, FLUOROQUINOLONES, THIAZIDE diuretics (hydrochlorothiazide), AMIODARONE, NSAIDs (piroxicam, naproxen), RETINOIDS (isotretinoin), voriconazole, some chemotherapy agents, and St. John's Wort. Counseling (the key point): advise STRICT SUN PROTECTION while taking these medications — broad-spectrum SUNSCREEN (SPF 30+), PROTECTIVE CLOTHING/hat/sunglasses, AVOID peak sun hours (10am-4pm), and avoid tanning beds. The reaction is generally reversible after stopping the drug (and resolves as it clears). This is a very common and testable medication-counseling point — proactively warn patients started on photosensitizing drugs (especially doxycycline, which is widely prescribed for acne, infections, and Lyme prophylaxis). Also relevant: thiazide use is associated with increased risk of certain skin cancers with chronic photosensitization."},
{c:"Skin Exam — Wound Care",q:"A patient has a chronic venous stasis ulcer on the medial lower leg (gaiter area) with surrounding hyperpigmentation, edema, and varicose veins. The pulses are intact. What is the cornerstone of management?",o:["Strict bed rest and leg dependency","Arterial bypass surgery — these are arterial ulcers","COMPRESSION therapy (the cornerstone of venous ulcer management) — plus leg ELEVATION, appropriate moist wound dressings, and treatment of edema; ensure adequate arterial supply (check ABI) before applying compression","Long-term systemic antibiotics for all venous ulcers"],a:2,r:"Venous stasis ulcers: the most common type of lower-extremity ulcer, caused by chronic venous insufficiency (venous hypertension). Features: located on the MEDIAL lower leg/ankle ('GAITER area'), shallow with irregular borders, often with surrounding HYPERPIGMENTATION (hemosiderin deposition), edema, varicose veins, lipodermatosclerosis, and stasis dermatitis; pulses are typically INTACT (distinguishing from arterial ulcers). CORNERSTONE of management: COMPRESSION THERAPY (compression stockings/bandages) — reduces venous hypertension and edema, the underlying problem; combined with LEG ELEVATION (above heart level when resting), appropriate MOIST wound dressings, and good skin/wound care. CRITICAL safety step: assess ARTERIAL supply (check the ANKLE-BRACHIAL INDEX, ABI) BEFORE applying compression — significant arterial disease (low ABI) is a contraindication to high compression (could worsen ischemia). CONTRAST — ARTERIAL ulcers: located on the toes/distal foot/pressure points, 'punched-out,' painful (especially with elevation/at night), with diminished pulses, pallor on elevation — these need REVASCULARIZATION, NOT compression. NEUROPATHIC (diabetic) ulcers: over pressure points (plantar foot), painless, need offloading. Identify the ulcer type to direct correct management."},
{c:"Hypersensitivity — Erythema Multiforme",q:"A young adult develops symmetric TARGET (target/iris) lesions with concentric color zones on the palms, soles, and extremities about 1-2 weeks after a herpes simplex outbreak. Mucosal involvement is minimal. Diagnosis and most common trigger?",o:["Urticaria — transient migratory wheals","Stevens-Johnson syndrome — extensive mucosal involvement and skin sloughing","Erythema multiforme (minor) — distinctive TARGET lesions on the extremities/palms/soles; the most common trigger is HERPES SIMPLEX VIRUS infection (also Mycoplasma); usually self-limited; treat the underlying cause and provide supportive care","Contact dermatitis — linear vesicles"],a:2,r:"Erythema multiforme (EM): an acute, immune-mediated hypersensitivity reaction characterized by distinctive TARGET (TARGETOID/iris) LESIONS — round lesions with concentric color zones (a dusky/blistered center, a pale edematous ring, and an erythematous outer ring). Distribution: symmetric, favoring the EXTREMITIES (especially the dorsal hands, palms, soles, and extensor surfaces) — an ACRAL distribution. EM MINOR: little/no mucosal involvement, self-limited. EM MAJOR: more significant mucosal involvement. MOST COMMON TRIGGER: HERPES SIMPLEX VIRUS (HSV) infection (recurrent EM is often HSV-driven, appearing ~1-2 weeks after an outbreak); other triggers include Mycoplasma pneumoniae (especially in children), and some medications. Management: identify and treat the underlying trigger (antiviral suppression for HSV-associated recurrent EM; treat Mycoplasma); supportive care (antihistamines, topical steroids); usually self-limited over 2-4 weeks. IMPORTANT DISTINCTION: EM is now considered SEPARATE from SJS/TEN (which are drug-induced, have widespread atypical/flat targetoid lesions on the trunk, prominent mucosal erosions, and epidermal detachment — far more serious). True target lesions on the extremities with an infectious trigger point to EM."},
{c:"Pityriasis Rosea",q:"A 20-year-old develops a single 3-cm oval, salmon-colored, scaly patch on the trunk, followed a week later by multiple smaller similar lesions oriented along skin cleavage lines in a 'Christmas tree' pattern on the back. Diagnosis and management?",o:["Tinea corporis — annular with central clearing, KOH positive","Secondary syphilis — must be excluded if palms/soles involved","Pityriasis rosea — a self-limited eruption beginning with a 'herald patch,' followed by smaller oval lesions along skin cleavage lines ('Christmas tree' pattern) on the trunk; likely viral (HHV-6/7); management is reassurance and supportive care; resolves in 6-8 weeks","Psoriasis — silvery plaques on extensor surfaces"],a:2,r:"Pityriasis rosea: a common, self-limited, likely viral (associated with HHV-6/HHV-7) skin eruption, typically in adolescents and young adults. Classic sequence: (1) a single 'HERALD PATCH' — a larger (2-5 cm) oval, salmon/pink, scaly patch with a fine 'collarette' of scale, often on the trunk — appears FIRST; (2) about 1-2 weeks later, a generalized eruption of multiple SMALLER oval lesions appears on the trunk, oriented with their long axes ALONG the SKIN CLEAVAGE/LANGER LINES, classically producing a 'CHRISTMAS TREE' (drooping fir tree) pattern on the back. Mild or no itching; the face is usually spared. Management: REASSURANCE and SUPPORTIVE care — it is SELF-LIMITED, resolving spontaneously in ~6-8 weeks; topical emollients/steroids or oral antihistamines for itch; possibly a role for UVB or acyclovir in severe/widespread cases (limited evidence). IMPORTANT: SECONDARY SYPHILIS can mimic pityriasis rosea — if there is PALM/SOLE involvement, lymphadenopathy, a history of a genital lesion, or risk factors, CHECK SYPHILIS SEROLOGY (RPR). Also consider drug eruptions and guttate psoriasis in the differential."},
{c:"Onychomycosis",q:"A 60-year-old has a thickened, yellow-brown, crumbling great toenail with subungual debris. A diagnosis of fungal nail infection is suspected. What should be done before starting oral antifungal therapy?",o:["Start oral terbinafine empirically for all thick yellow nails","Topical antifungal cream applied to the nail surface is curative","CONFIRM the diagnosis (KOH prep, fungal culture, or PAS nail clipping) before starting oral antifungals — many dystrophic nails are not fungal; oral terbinafine is first-line if confirmed, with baseline LFTs given hepatotoxicity risk","No treatment is ever indicated for nail fungus"],a:2,r:"Onychomycosis (tinea unguium): fungal infection of the nail (usually dermatophytes; toenails > fingernails). Appearance: thickened, discolored (yellow-brown/white), brittle/crumbling nails with SUBUNGUAL DEBRIS and onycholysis (nail separating from the bed). KEY MANAGEMENT POINT: CONFIRM the diagnosis BEFORE starting systemic therapy — many dystrophic/thickened nails are NOT fungal (psoriasis, trauma, lichen planus, etc.), and oral antifungals carry risks and require prolonged courses. Confirmatory tests: KOH microscopy, fungal CULTURE, or PAS staining of a nail clipping (most sensitive). Treatment: ORAL antifungals are needed for cure (topicals alone rarely penetrate the nail effectively) — TERBINAFINE is first-line (most effective for dermatophytes; ~6 weeks for fingernails, ~12 weeks for toenails); itraconazole is an alternative. Check BASELINE LFTs (terbinafine and itraconazole are HEPATOTOXIC; itraconazole has cardiac and drug-interaction concerns). Topical agents (efinaconazole, ciclopirox) for mild disease or when oral therapy is contraindicated (lower cure rates). Counsel that the nail grows out slowly — full clearance takes months even after the fungus is eradicated. Address risk factors (tinea pedis, moisture, occlusive footwear)."},
{c:"Skin — Spider Angioma/Liver",q:"A patient with chronic alcohol use has multiple vascular lesions consisting of a central red papule (arteriole) with radiating thin vessels that blanch with central pressure, on the upper trunk and face. What are these and what underlying condition should be considered?",o:["Cherry angiomas — benign, no significance","Petechiae — suggest thrombocytopenia","Spider angiomas (spider nevi/telangiectasias) — a central arteriole with radiating vessels that blanch with central pressure; multiple lesions, especially with palmar erythema, suggest CHRONIC LIVER DISEASE (hyperestrogenism) — evaluate liver function","Kaposi sarcoma — purple plaques, HIV-associated"],a:2,r:"Spider angiomas (spider nevi, nevus araneus): vascular lesions consisting of a CENTRAL ARTERIOLE (red papule) with radiating, thin, web-like vessels. Characteristic feature: applying pressure to the CENTRAL point causes the entire lesion to BLANCH, and it refills from the center outward when released. A few isolated spider angiomas can be normal (and they are common in pregnancy and children due to estrogen). However, MULTIPLE spider angiomas — especially on the upper trunk, face, and arms (distribution of the superior vena cava), often together with PALMAR ERYTHEMA, gynecomastia, and other stigmata — suggest CHRONIC LIVER DISEASE/CIRRHOSIS (related to HYPERESTROGENISM, as the diseased liver fails to metabolize estrogen). In a patient with chronic alcohol use and multiple spider angiomas, EVALUATE for liver disease (LFTs, assess for other stigmata of cirrhosis: jaundice, ascites, caput medusae, asterixis). Also seen in pregnancy and with estrogen therapy. Distinguish from cherry angiomas (benign small red papules of aging, no central arteriole/radiating pattern), petechiae (do NOT blanch — suggest bleeding/platelet disorders), and telangiectasias of other causes."},
{c:"Acanthosis Nigricans",q:"An obese adolescent has velvety, hyperpigmented, thickened skin in the axillae and on the posterior neck. Diagnosis and the most important underlying condition to evaluate for?",o:["Tinea — KOH-positive scaling","Dirty skin — improves with scrubbing","Acanthosis nigricans — velvety hyperpigmented thickening in flexural areas (neck, axillae); most commonly a marker of INSULIN RESISTANCE (obesity, type 2 diabetes, metabolic syndrome, PCOS); evaluate for diabetes/insulin resistance; rarely a paraneoplastic sign of internal malignancy in older adults","Post-inflammatory hyperpigmentation — follows injury"],a:2,r:"Acanthosis nigricans (AN): a skin finding of velvety, HYPERPIGMENTED, thickened (hyperkeratotic) plaques in FLEXURAL/intertriginous areas — the posterior NECK, AXILLAE, groin, and other body folds. It does NOT wash off (a clue when patients/families think it is dirt). MOST COMMON significance: a cutaneous marker of INSULIN RESISTANCE/hyperinsulinemia — associated with OBESITY, TYPE 2 DIABETES, METABOLIC SYNDROME, and PCOS (polycystic ovary syndrome). In an obese adolescent or adult with AN, EVALUATE for insulin resistance and diabetes (fasting glucose/A1c) and address the underlying metabolic condition (weight loss and treating insulin resistance can improve AN). Other causes: certain MEDICATIONS (e.g., systemic corticosteroids, niacin, oral contraceptives), endocrinopathies. PARANEOPLASTIC acanthosis nigricans: a less common but important form — RAPID onset of extensive AN (especially involving the palms/mucous membranes) in an OLDER, non-obese adult can be a marker of INTERNAL MALIGNANCY (classically GASTRIC adenocarcinoma) → warrants malignancy evaluation. The clinical context (young/obese vs older/sudden/extensive) guides the workup."},
{c:"Cherry Angioma",q:"A 55-year-old has multiple small, bright red, dome-shaped papules scattered on the trunk that have increased in number with age. They are asymptomatic and blanch minimally. Diagnosis and management?",o:["Melanoma — excise all red lesions","Spider angioma — sign of liver disease","Cherry angiomas (Campbell de Morgan spots) — common BENIGN vascular papules that increase with age; no treatment needed; reassurance; removal (laser, electrocautery) only for cosmetic reasons or if bleeding/irritated","Petechiae — evaluate for a bleeding disorder"],a:2,r:"Cherry angiomas (Campbell de Morgan spots, senile angiomas): extremely common, BENIGN vascular (capillary) proliferations. Appearance: small, bright red to purple, dome-shaped (or flat) papules, typically on the TRUNK, increasing in NUMBER and size with AGE (very common in adults over 30-40). Asymptomatic; may bleed if traumatized. No malignant potential and no systemic significance (a normal aging change). Management: REASSURANCE — no treatment is needed. Removal (electrocautery, laser, shave excision) is purely OPTIONAL for cosmetic reasons or if a lesion is repeatedly traumatized/bleeding. Distinguish from: SPIDER ANGIOMA (central arteriole with radiating vessels, blanches centrally — multiple ones suggest liver disease/estrogen excess); PETECHIAE/purpura (do NOT blanch — suggest bleeding/platelet disorders); and amelanotic melanoma or other concerning lesions (when uncertain or atypical/changing, evaluate/biopsy). A sudden eruption of many new angiomas is usually still benign but, like other sudden widespread skin changes, can occasionally prompt evaluation."},
{c:"Stasis Dermatitis",q:"An older patient with chronic lower-extremity edema and venous insufficiency has bilateral itchy, erythematous, scaly, hyperpigmented (brownish) skin changes on the medial lower legs and ankles. There is no fever and the patient is systemically well. Diagnosis and management?",o:["Bilateral cellulitis — IV antibiotics for both legs","Contact dermatitis — patch testing","Stasis dermatitis — inflammatory skin changes from chronic venous insufficiency/edema (bilateral, medial lower legs, hyperpigmentation); management: compression, leg elevation, emollients, and topical corticosteroids for active inflammation; do NOT treat as cellulitis (which is usually unilateral and acute)","Necrotizing fasciitis — surgical emergency"],a:2,r:"Stasis dermatitis (venous eczema/gravitational dermatitis): an inflammatory dermatosis resulting from CHRONIC VENOUS INSUFFICIENCY and lower-extremity EDEMA (venous hypertension → capillary leak → inflammation). Features: typically BILATERAL, on the MEDIAL lower legs and ankles (gaiter area); itchy, erythematous, scaly skin with brownish HYPERPIGMENTATION (hemosiderin deposition), edema, and sometimes weeping or lichenification; chronic cases progress to lipodermatosclerosis and venous ulcers. KEY POINT: stasis dermatitis is frequently MISDIAGNOSED as CELLULITIS — but cellulitis is usually UNILATERAL, ACUTE, warm, tender, often with fever/systemic signs, whereas stasis dermatitis is typically BILATERAL, CHRONIC, itchy, and the patient is systemically WELL (avoid unnecessary antibiotics). Management: treat the underlying venous insufficiency — COMPRESSION therapy and LEG ELEVATION (the cornerstone), EMOLLIENTS for dry skin, TOPICAL CORTICOSTEROIDS for active inflammatory flares, and treat any secondary infection. Address edema and venous disease to prevent progression to ulceration."},
{c:"Molluscum Contagiosum",q:"A 6-year-old has multiple small, flesh-colored, dome-shaped papules with central UMBILICATION (a dimple) on the trunk and arms. They are asymptomatic. Diagnosis and management?",o:["Warts — rough surface, thrombosed capillaries","Chickenpox — vesicles on an erythematous base","Molluscum contagiosum — a self-limited poxvirus infection producing dome-shaped, flesh-colored papules with central umbilication; common in children; usually resolves spontaneously over months; treatment optional (cryotherapy, curettage, cantharidin) for symptomatic or persistent lesions","Acne — comedones and pustules"],a:2,r:"Molluscum contagiosum: a common, self-limited skin infection caused by a POXVIRUS. Appearance: discrete, small (2-5 mm), DOME-SHAPED, FLESH-COLORED to pearly papules with characteristic CENTRAL UMBILICATION (a small central dimple/depression). Spread by direct skin-to-skin contact, autoinoculation (scratching), and fomites. Very common in CHILDREN (trunk, extremities, face); in adults it can be SEXUALLY TRANSMITTED (genital/lower abdomen) — and widespread/atypical molluscum in an adult should prompt consideration of immunosuppression (HIV). Course: SELF-LIMITED — usually resolves spontaneously over several months to ~1-2 years in immunocompetent hosts. Management: often OBSERVATION/reassurance (especially in children, given spontaneous resolution and the discomfort of treatment); active TREATMENT is OPTIONAL for symptomatic, persistent, spreading, cosmetically bothersome, or genital lesions — options include cryotherapy, curettage, cantharidin, or topical agents (avoid the face with aggressive destructive methods). Counsel on avoiding scratching/sharing towels to limit spread. Distinguish from warts (rough, no umbilication) and, if uncertain or atypical, consider other diagnoses."},
{c:"Sun Protection",q:"During a well visit, a fair-skinned patient with a history of multiple sunburns asks how to reduce skin cancer risk. What is the most evidence-based counseling?",o:["A 'base tan' from a tanning bed protects against future burns","Sunscreen alone, applied once in the morning, provides all-day protection","Use broad-spectrum sunscreen SPF 30+, reapply every 2 hours and after swimming/sweating; seek shade during peak hours (10am-4pm); wear protective clothing, wide-brim hats, and UV-blocking sunglasses; AVOID tanning beds; perform skin self-exams","Vitamin supplements prevent skin cancer, so sun protection is unnecessary"],a:2,r:"Skin cancer prevention counseling (evidence-based): UV exposure is the major modifiable risk factor for melanoma and non-melanoma skin cancers. Recommendations: (1) BROAD-SPECTRUM SUNSCREEN SPF 30+ (covers UVA and UVB), applied generously to all exposed skin ~15-30 minutes before sun exposure and REAPPLIED every 2 hours and after swimming or sweating; (2) SEEK SHADE, especially during PEAK UV hours (10am-4pm); (3) PROTECTIVE CLOTHING (UPF-rated/tightly woven), WIDE-BRIM HATS, and UV-blocking SUNGLASSES — physical protection is highly effective; (4) AVOID TANNING BEDS entirely (indoor tanning markedly increases melanoma risk, especially with use before age ~35) — there is NO such thing as a safe 'base tan'; (5) be cautious near reflective surfaces (water, snow, sand) and at high altitude; (6) perform regular SKIN SELF-EXAMINATIONS (watch for new/changing lesions — ABCDEs) and see a clinician for suspicious lesions. USPSTF recommends behavioral counseling on sun protection for fair-skinned individuals aged 6 months-24 years (Grade B) and selectively for adults >24. Counsel high-risk patients (fair skin, history of sunburns/skin cancer, many nevi, immunosuppression, family history) most intensively."},
{c:"Paronychia",q:"A patient who frequently bites their nails has acute redness, swelling, warmth, and tenderness of the skin fold around a fingernail, with a small collection of pus. Diagnosis and management?",o:["Onychomycosis — oral antifungal","Felon — deep pulp space infection, requires urgent surgical drainage","Acute paronychia — a bacterial infection (usually S. aureus) of the nail fold; management: warm soaks for early/mild cases; INCISION AND DRAINAGE if an abscess has formed; oral antibiotics (cover S. aureus) if significant surrounding cellulitis or no response to drainage","Herpetic whitlow — grouped vesicles, do NOT incise"],a:2,r:"Acute paronychia: an acute bacterial infection of the NAIL FOLD (the soft tissue around the nail), usually from minor trauma that breaches the skin barrier — nail biting, manicures, hangnails, finger sucking. Most common organism: Staphylococcus aureus (sometimes Strep or mixed flora). Presentation: redness, swelling, warmth, and tenderness of the proximal/lateral nail fold, sometimes with a visible collection of PUS. Management: EARLY/mild (no abscess) — WARM SOAKS several times daily, topical antibiotics/antiseptics; if an ABSCESS has formed — INCISION AND DRAINAGE (the key intervention; elevate the nail fold or incise to release pus); add ORAL ANTIBIOTICS (covering S. aureus — e.g., cephalexin, dicloxacillin, or clindamycin/TMP-SMX if MRSA risk) if there is significant surrounding cellulitis, immunocompromise, or failure to respond to drainage. CHRONIC paronychia: a different entity — prolonged inflammation (often in those with wet-work exposure; associated with Candida and irritants) → keep hands dry, avoid irritants, topical steroids ± antifungals. IMPORTANT: do NOT incise a HERPETIC WHITLOW (HSV infection of the finger — grouped vesicles, viral, treated with antivirals; incision can worsen it) — distinguish by the vesicular appearance and history."},
{c:"Lipoma",q:"A 45-year-old has a soft, mobile, non-tender, rubbery subcutaneous mass on the back that has been slowly growing over years. It is not attached to the overlying skin and has no surface changes. Diagnosis and management?",o:["Sebaceous (epidermoid) cyst — has a central punctum","Liposarcoma — all soft tissue masses are malignant","Lipoma — a common BENIGN tumor of fat; soft, mobile, rubbery, non-tender, slow-growing; reassurance and observation are appropriate; excision only for symptomatic, rapidly growing, atypical, or cosmetically bothersome lesions","Abscess — incise and drain"],a:2,r:"Lipoma: a common BENIGN tumor of mature ADIPOSE (fat) tissue. Classic features: SOFT, easily MOBILE (slips under the fingers), RUBBERY, NON-TENDER, slow-growing subcutaneous nodule; not attached to the overlying skin (which appears normal — no punctum or surface change); most common on the trunk, neck, shoulders, and proximal extremities. Usually asymptomatic. Management: REASSURANCE and OBSERVATION — no treatment is needed for typical, asymptomatic lipomas. EXCISION is considered for: symptomatic lesions (pain, e.g., if pressing on a nerve), cosmetically bothersome lesions, diagnostic uncertainty, or lesions with ATYPICAL/concerning features. RED FLAGS that warrant imaging (MRI) and/or biopsy to exclude LIPOSARCOMA (rare malignant counterpart): rapid growth, large size (>5 cm), deep/firm/fixed lesions, pain, or location in the retroperitoneum/deep soft tissue. Distinguish from EPIDERMOID (sebaceous) CYST — which is firmer, may have a central PUNCTUM, can become inflamed/infected, and may express keratinous material. For a classic small soft mobile lipoma, reassurance is appropriate."},
{c:"Epidermoid Cyst",q:"A patient has a firm, mobile, dome-shaped subcutaneous nodule with a central visible punctum on the back. It occasionally drains foul-smelling cheesy material and sometimes becomes red and tender. Diagnosis and management?",o:["Lipoma — soft, no punctum","Malignant melanoma — pigmented and irregular","Epidermoid (sebaceous) cyst — a benign cyst with a central punctum that may discharge keratinous material; management: leave asymptomatic cysts alone; for an acutely inflamed/infected cyst, incision and drainage ± antibiotics; complete surgical excision (including the cyst wall) when non-inflamed to prevent recurrence","Abscess from cellulitis — always from skin infection"],a:2,r:"Epidermoid cyst (commonly called a 'sebaceous cyst,' though it arises from the epidermis/follicle, not sebaceous glands): a common benign cyst lined by epidermis and filled with KERATIN. Features: a firm, mobile, dome-shaped subcutaneous nodule, often with a central PUNCTUM (a small dark pore connecting to the skin surface); may intermittently discharge foul-smelling, cheesy/'caseous' KERATIN material; can become INFLAMED, red, tender, and secondarily infected (forming an abscess). Management: ASYMPTOMATIC cysts — observation/reassurance (no treatment needed). ACUTELY INFLAMED/INFECTED cyst — incision and drainage to relieve the acute infection (± antibiotics if surrounding cellulitis); definitive treatment should wait until inflammation resolves. To PREVENT RECURRENCE — complete surgical EXCISION of the entire cyst WALL (sac) when the cyst is NON-inflamed (if the wall remains, the cyst recurs). Distinguish from LIPOMA (soft, no punctum, fat). Multiple cysts may occur with Gardner syndrome (consider if numerous, especially with other features). For a quiescent cyst, reassurance and elective excision if bothersome are appropriate."}
,
{c:"Melasma",q:"A 32-year-old pregnant woman develops symmetric, blotchy, light-to-dark brown hyperpigmented patches on the cheeks, forehead, and upper lip. Diagnosis, common triggers, and management?",o:["Vitiligo — depigmented white patches","Tinea versicolor — fine scale, KOH positive","Melasma (chloasma) — acquired symmetric facial hyperpigmentation triggered by hormones (pregnancy, oral contraceptives) and UV exposure; management centers on STRICT sun protection, plus topical agents (hydroquinone, tretinoin, azelaic acid) for non-pregnant patients; often improves postpartum","Acanthosis nigricans — velvety flexural pigmentation"],a:2,r:"Melasma (chloasma, the mask of pregnancy): an acquired disorder of symmetric facial HYPERPIGMENTATION — blotchy, light-to-dark brown patches, classically on the cheeks, forehead, upper lip, and chin. More common in women and in those with darker skin types. TRIGGERS: hormonal factors (PREGNANCY, oral contraceptives, hormone therapy) and especially ULTRAVIOLET/sun exposure (UV markedly worsens it). Management: (1) STRICT SUN PROTECTION is the cornerstone (broad-spectrum SPF, ideally tinted/iron-oxide-containing sunscreen for visible light, plus hats/shade) — without sun protection, other treatments fail; (2) discontinue contributing hormones when feasible; (3) TOPICAL lightening agents for non-pregnant patients — HYDROQUINONE, TRETINOIN, AZELAIC ACID, or combination triple therapy (hydroquinone + tretinoin + a topical steroid); chemical peels and lasers as cautious adjuncts. IMPORTANT: in PREGNANCY, avoid hydroquinone and tretinoin — emphasize SUN PROTECTION and reassurance, as pregnancy-related melasma often FADES postpartum (though it may persist or recur). Set realistic expectations: melasma is chronic, relapsing, and recurs readily with sun exposure."}
];

const N = QUESTIONS.length;
let idx = 0;
let answers = new Array(N).fill(null); // selected option index
const LETTERS = ["A","B","C","D"];

const strip = document.getElementById("strip");
const qcard = document.getElementById("qcard");
const resultsCard = document.getElementById("results");

function buildStrip(){
  strip.innerHTML = "";
  for(let i=0;i<N;i++){
    const t = document.createElement("div");
    t.className = "tick";
    t.title = "Question " + (i+1);
    t.addEventListener("click", ()=>{ idx = i; render(); });
    strip.appendChild(t);
  }
}
function paintStrip(){
  const ticks = strip.children;
  for(let i=0;i<N;i++){
    const t = ticks[i];
    t.className = "tick";
    if(answers[i] !== null){
      t.classList.add(answers[i] === QUESTIONS[i].a ? "ok" : "bad");
    }
    if(i === idx && !resultsVisible()) t.classList.add("cur");
  }
}
function resultsVisible(){ return !resultsCard.classList.contains("hide"); }

function counts(){
  let done=0, right=0;
  for(let i=0;i<N;i++){
    if(answers[i]!==null){ done++; if(answers[i]===QUESTIONS[i].a) right++; }
  }
  return {done,right};
}
function paintScore(){
  const {done,right} = counts();
  document.getElementById("sc-done").textContent = done;
  document.getElementById("sc-right").textContent = right;
}

function render(){
  resultsCard.classList.add("hide");
  qcard.classList.remove("hide");
  const Q = QUESTIONS[idx];
  const picked = answers[idx];
  let html = "";
  html += '<div class="meta"><span class="qnum">QUESTION ' + (idx+1) + ' / ' + N + '</span><span class="chip">' + Q.c + '</span></div>';
  html += '<p class="stem">' + Q.q + '</p>';
  Q.o.forEach((opt,i)=>{
    let cls = "opt";
    if(picked !== null){
      if(i === picked && picked === Q.a) cls += " sel-ok";
      else if(i === picked) cls += " sel-bad";
      else if(i === Q.a) cls += " reveal-ok";
    }
    html += '<button class="'+cls+'" data-i="'+i+'" '+(picked!==null?"disabled":"")+'><span class="ltr">'+LETTERS[i]+'</span><span>'+opt+'</span></button>';
  });
  if(picked !== null){
    const good = picked === Q.a;
    html += '<div class="verdict '+(good?"ok":"bad")+'">'+(good ? "Correct" : "Incorrect — answer is " + LETTERS[Q.a])+'</div>';
    html += '<div class="rationale">'+Q.r+'</div>';
  }
  html += '<div class="nav">';
  html += '<button class="btn ghost" id="prevBtn" '+(idx===0?"disabled":"")+'>Back</button>';
  if(idx < N-1){
    html += '<button class="btn" id="nextBtn">Next question</button>';
  } else {
    html += '<button class="btn" id="finishBtn">See results</button>';
  }
  html += '</div>';
  qcard.innerHTML = html;

  qcard.querySelectorAll(".opt").forEach(btn=>{
    btn.addEventListener("click", ()=>{
      if(answers[idx] !== null) return;
      answers[idx] = parseInt(btn.dataset.i,10);
      render();
    });
  });
  const prev = document.getElementById("prevBtn");
  if(prev) prev.addEventListener("click", ()=>{ idx--; render(); });
  const next = document.getElementById("nextBtn");
  if(next) next.addEventListener("click", ()=>{ idx++; render(); });
  const fin = document.getElementById("finishBtn");
  if(fin) fin.addEventListener("click", showResults);
  paintStrip(); paintScore();
}

function showResults(){
  const {done,right} = counts();
  const pct = done ? Math.round((right/done)*100) : 0;
  // category breakdown
  const cats = {};
  QUESTIONS.forEach((Q,i)=>{
    if(!cats[Q.c]) cats[Q.c] = {n:0, ok:0, ans:0};
    cats[Q.c].n++;
    if(answers[i]!==null){ cats[Q.c].ans++; if(answers[i]===Q.a) cats[Q.c].ok++; }
  });
  let html = '<div class="bigscore">'+right+' / '+done+' ('+pct+'%)</div>';
  html += '<p class="sub">'+(done<N ? (N-done)+' question'+(N-done===1?"":"s")+' unanswered — they are not counted against you. ' : '')+'A passing pace on the real ANCC is roughly the low-to-mid 70s percent range, so use this as a directional gauge, not a verdict.</p>';
  html += '<h2 style="font-size:.95rem;margin-bottom:6px">By category</h2>';
  Object.keys(cats).forEach(c=>{
    const o = cats[c];
    const p = o.ans ? Math.round((o.ok/o.ans)*100) : 0;
    html += '<div class="catrow"><span style="flex:0 0 44%">'+c+'</span><span class="bar"><i style="width:'+(o.ans? p:0)+'%"></i></span><span style="font-family:var(--mono);font-size:.8rem">'+o.ok+'/'+o.ans+(o.ans<o.n?' of '+o.n:'')+'</span></div>';
  });
  // missed list
  const missed = [];
  for(let i=0;i<N;i++) if(answers[i]!==null && answers[i]!==QUESTIONS[i].a) missed.push(i);
  if(missed.length){
    html += '<div class="missedlist"><h2 style="font-size:.95rem;margin-bottom:8px">Review missed questions</h2>';
    missed.forEach(i=>{ html += '<button data-jump="'+i+'">Q'+(i+1)+'</button>'; });
    html += '</div>';
  }
  html += '<div class="nav"><button class="btn ghost" id="backBtn">Back to questions</button><button class="btn" id="resetBtn">Start over</button></div>';
  resultsCard.innerHTML = html;
  resultsCard.classList.remove("hide");
  qcard.classList.add("hide");
  resultsCard.querySelectorAll("[data-jump]").forEach(b=>{
    b.addEventListener("click", ()=>{ idx = parseInt(b.dataset.jump,10); render(); });
  });
  document.getElementById("backBtn").addEventListener("click", ()=>{ render(); });
  document.getElementById("resetBtn").addEventListener("click", ()=>{
    if(confirm("Clear all answers and start over?")){
      answers = new Array(N).fill(null); idx = 0; render();
    }
  });
  paintStrip(); paintScore();
}

buildStrip();
render();
</script>
</body>
</html>
