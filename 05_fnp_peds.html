<style>
  :root{
    --bg:#F2F5F7; --card:#FFFFFF; --ink:#14283A; --muted:#5B6B7A;
    --teal:#0E7C86; --teal-dk:#0A5A62; --line:#DEE6EB;
    --ok:#1F7A4D; --ok-bg:#E6F4EC; --bad:#B3362E; --bad-bg:#FBEAE8;
    --mono:"SF Mono","Cascadia Code",Consolas,"Liberation Mono",monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    background:var(--bg); color:var(--ink);
    font-family:"Avenir Next","Segoe UI",-apple-system,BlinkMacSystemFont,Helvetica,Arial,sans-serif;
    line-height:1.55; padding:20px 14px 60px;
  }
  .wrap{max-width:760px;margin:0 auto}
  header{display:flex;justify-content:space-between;align-items:baseline;gap:10px;margin-bottom:6px;flex-wrap:wrap}
  h1{font-size:1.15rem;font-weight:700;letter-spacing:.01em}
  h1 span{color:var(--teal)}
  .score{font-family:var(--mono);font-size:.85rem;color:var(--muted)}
  .score b{color:var(--ink)}
  /* telemetry strip */
  .striplabel{font-family:var(--mono);font-size:.62rem;letter-spacing:.14em;color:var(--muted);margin:14px 0 5px}
  .strip{display:flex;gap:2px;flex-wrap:nowrap;border-bottom:1px solid var(--line);padding-bottom:10px}
  .tick{flex:1;height:16px;background:#E2E9EE;border-radius:2px;cursor:pointer;transition:height .15s}
  .tick.ok{background:var(--ok)} .tick.bad{background:var(--bad)}
  .tick.cur{height:24px;outline:2px solid var(--teal);outline-offset:1px}
  /* card */
  .card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:22px;margin-top:18px;box-shadow:0 1px 3px rgba(20,40,58,.06)}
  .meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;gap:8px;flex-wrap:wrap}
  .qnum{font-family:var(--mono);font-size:.8rem;color:var(--muted)}
  .chip{font-size:.68rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--teal-dk);background:#E3F1F2;border-radius:999px;padding:3px 10px}
  .stem{font-size:1.02rem;margin-bottom:18px}
  .opt{
    display:flex;gap:12px;align-items:flex-start;width:100%;text-align:left;
    background:#FAFCFD;border:1.5px solid var(--line);border-radius:10px;
    padding:13px 14px;margin-bottom:9px;cursor:pointer;font:inherit;color:inherit;

  }
  .opt:hover:not(:disabled){border-color:var(--teal)}
  .opt:focus-visible{outline:3px solid var(--teal);outline-offset:2px}
  .opt:disabled{cursor:default}
  .opt .ltr{font-family:var(--mono);font-weight:700;color:var(--muted);flex:0 0 auto}
  .opt.sel-ok{border-color:var(--ok);background:var(--ok-bg)}
  .opt.sel-bad{border-color:var(--bad);background:var(--bad-bg)}
  .opt.reveal-ok{border-color:var(--ok);background:var(--ok-bg)}
  .verdict{font-weight:700;margin:10px 0 6px}

  .rationale{background:#F4F8FA;border-left:3px solid var(--teal);border-radius:0 8px 8px 0;padding:13px 15px;font-size:.93rem;margin-top:4px}
  .nav{display:flex;justify-content:space-between;gap:10px;margin-top:20px}
  .btn{
    font:inherit;font-weight:600;border:none;border-radius:10px;padding:11px 20px;cursor:pointer;
    background:var(--teal);color:#fff;transition:background .12s;
  }
  .btn:hover{background:var(--teal-dk)}
  .btn:disabled{background:#C4D0D8;cursor:default}
  .btn.ghost{background:transparent;color:var(--teal);border:1.5px solid var(--teal)}
  .btn.ghost:hover{background:#E3F1F2}
  .btn:focus-visible{outline:3px solid var(--ink);outline-offset:2px}
  /* results */
  .bigscore{font-family:var(--mono);font-size:2.6rem;font-weight:700;color:var(--teal-dk)}
  .sub{color:var(--muted);margin-bottom:18px}
  .catrow{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--line);font-size:.92rem}
  .bar{flex:1;height:8px;background:#E2E9EE;border-radius:99px;overflow:hidden;margin:0 12px}
  .bar i{display:block;height:100%;background:var(--teal)}
  .missedlist{margin-top:16px}
  .missedlist button{
    font-family:var(--mono);font-size:.8rem;background:var(--bad-bg);color:var(--bad);
    border:1px solid #E8C2BE;border-radius:8px;padding:6px 10px;margin:0 6px 6px 0;cursor:pointer;
  }
  .hide{display:none}
  @media (prefers-reduced-motion: reduce){ *{transition:none !important} }
  @media (max-width:480px){ .card{padding:16px} .strip{gap:1px} }

<script>
const QUESTIONS = [
{c:"Development",q:"A parent brings her 12-month-old for a well visit. Which set of milestones is EXPECTED at this age?",o:["Walks independently, uses a spoon, and has 50-word vocabulary","Pulls to stand, waves bye-bye, uses 1-3 meaningful words (mama/dada), and has pincer grasp","Runs steadily, stacks 6 blocks, and speaks in 2-word phrases","Scribbles with a crayon and jumps with both feet"],a:1,r:"12-month milestones: Gross motor = pulls to stand, cruises furniture, may take first independent steps. Fine motor = pincer grasp (thumb + index finger), transfers objects. Language = 1-3 meaningful words (mama, dada used correctly), follows simple commands with gesture. Social = stranger anxiety, waves bye-bye, plays pat-a-cake. Walking typically begins between 12-15 months. Two-word phrases and 50-word vocabulary are 24-month milestones. Not walking by 18 months is a red flag."},
{c:"Development",q:"An 18-month-old presents for a well visit. Which finding would be MOST concerning and warrant immediate developmental evaluation?",o:["Not yet running — still walks with a wide gait","Has 15 words but not yet using 2-word phrases","Does not point to show objects or share interest with others (no joint attention)","Still puts objects in mouth occasionally"],a:2,r:"Absence of joint attention (pointing to show interest, looking to share experiences) by 12-15 months is an early RED FLAG for autism spectrum disorder. Joint attention is a critical social-communicative milestone — it indicates the child understands shared focus. Other red flags: no babbling by 12 months, no single words by 16 months, no two-word phrases by 24 months, ANY loss of previously acquired skills at ANY age. Wide gait and fewer than 50 words at 18 months are within normal range; 2-word phrases come at 24 months."},
{c:"Development",q:"At a 4-year well visit, which language and cognitive skill is expected?",o:["Says 10 single words","Uses 2-word phrases only","Speaks in full sentences of 4-6 words, names colors, and can tell a simple story","Reads simple books independently"],a:2,r:"4-year milestones: Language = speaks in full sentences (5-6 words), uses complex grammar, names colors and shapes, tells stories, asks 'why' questions, speech is understandable to strangers. Fine motor = draws a person with 4 parts, copies a cross and square, uses scissors. Gross motor = hops on one foot, skips, pumps a swing. Social = plays cooperatively with others, distinguishes fantasy from reality (mostly). Not speaking in sentences by 3 is a red flag."},
{c:"Development",q:"A parent reports her 3-year-old had been saying 15 words but stopped talking 2 months ago and now says only 3-4 words. What is the MOST important clinical implication?",o:["Normal — vocabulary fluctuates in toddlers","Likely a phase — recheck at age 4","Loss of previously acquired skills at ANY age is a red flag that ALWAYS warrants urgent developmental and medical evaluation","Only concerning if regression lasts more than 6 months"],a:2,r:"Developmental REGRESSION — loss of previously acquired skills — is ALWAYS a red flag at any age, requiring urgent evaluation. In a toddler, unexplained language regression raises concern for autism spectrum disorder, Rett syndrome (in girls), Landau-Kleffner syndrome (acquired epileptic aphasia), psychosocial stressors, or hearing loss. Do not reassure and wait. Order hearing evaluation, refer for developmental assessment, and consider EEG if seizures are possible."},
{c:"Autism Screening",q:"At which well-child visits does the AAP recommend universal autism spectrum disorder screening using the M-CHAT-R/F?",o:["9 months and 12 months","12 months and 15 months","18 months and 24 months","24 months and 36 months"],a:2,r:"AAP recommends universal ASD screening with the M-CHAT-R/F (Modified Checklist for Autism in Toddlers, Revised with Follow-up) at the 18-MONTH and 24-MONTH well-child visits — in addition to ongoing developmental surveillance at every visit. Early identification allows earlier intervention, which significantly improves outcomes. Risk factors for ASD: male sex, family history (sibling with ASD increases risk to ~20%), genetic syndromes (Fragile X, tuberous sclerosis). Diagnosis is clinical; no biomarker test exists."},
{c:"Vaccines",q:"Per the AAP and CDC schedule, the first dose of Hepatitis B vaccine should be given:",o:["At the 2-month visit with other vaccines","At 6 months of age","Within 24 hours of birth — before hospital discharge","Only after confirming maternal HBsAg status before giving to the newborn"],a:2,r:"Hepatitis B vaccine: first dose within 24 hours of birth for ALL infants, regardless of maternal HBsAg status. For infants of HBsAg-POSITIVE mothers: also give HBIG (hepatitis B immune globulin) within 12 hours of birth. If maternal HBsAg status is UNKNOWN: give first dose within 12 hours and test the mother immediately; if positive, give HBIG as soon as possible (within 7 days). The 3-dose series is completed at 1-2 months and 6 months."},
{c:"Vaccines",q:"Rotavirus vaccine has an important age restriction. At what age is the final dose contraindicated?",o:["After 12 months","After 8 months (32 weeks)","After 2 years","After 6 months"],a:1,r:"Rotavirus vaccine (Rotarix or RotaTeq) must NOT be given after 8 months (32 weeks) of age. Reason: the background rate of intussusception increases with age, and the risk-benefit ratio becomes unfavorable after 8 months. The series must be started by 14 weeks 6 days and completed by 8 months 0 days. If a dose is missed and the child is now over 8 months, do not give additional doses — the series is abandoned. This age cutoff is a classic boards distinction for rotavirus."},
{c:"Vaccines",q:"HPV vaccine is routinely recommended at age 11-12. A 14-year-old who has never been vaccinated starts the HPV series today. How many doses does she need?",o:["1 dose","2 doses given 6-12 months apart","3 doses given at 0, 1-2, and 6 months","4 doses total"],a:2,r:"HPV vaccine dosing: 2-dose series if the FIRST DOSE is given before age 15 (doses separated by 6-12 months). 3-dose series if the first dose is given at age 15 or older, or in immunocompromised patients (regardless of age at first dose). This 14-year-old gets 2 doses if given now. Recommended starting age is 11-12 (can start at 9). Catch-up vaccination through age 26 for everyone; shared decision-making for adults 27-45. Protects against HPV 6, 11, 16, 18, 31, 33, 45, 52, 58 (Gardasil 9)."},
{c:"Vaccines",q:"A 4-year-old is due for her DTaP booster. Her parents ask why a 5th dose is needed at this age. Best explanation?",o:["The first 4 doses at 2, 4, 6, and 15 months provide immunity that wanes by school age — a booster at 4-6 years maintains protection during school years","5 doses are needed for all vaccines","The booster changes the vaccine to Td (no pertussis)","The 5th dose replaces the 4th dose if it was missed"],a:0,r:"DTaP primary series: doses at 2, 4, 6, and 15-18 months (4 doses). BOOSTER at 4-6 years (5th dose) reinforces waning immunity before school entry — when children are in close contact with classmates, pertussis exposure risk increases. Tdap (not DTaP) replaces one Td booster in adolescence (age 11-12) and is recommended in every pregnancy (27-36 weeks). Adults: Td booster every 10 years with one lifetime Tdap if not previously given."},
{c:"Vaccines",q:"A 2-month-old infant is brought in for well visit vaccines. The mother reports she is HIV-positive and her infant's HIV status is still unknown pending testing. Which vaccine should be WITHHELD until HIV status is confirmed?",o:["DTaP","Pneumococcal (PCV15)","Hepatitis B","Rotavirus (oral live attenuated vaccine)"],a:3,r:"Rotavirus vaccine is a LIVE attenuated oral vaccine. In an infant with HIV (especially with CD4 count unknown or low), live vaccines carry risk of vaccine-derived disease. WITHOLD rotavirus until HIV status is confirmed. If the infant is HIV-negative or HIV-positive with CD4 ≥25%: may proceed with vaccination. DTaP, PCV, and Hep B are inactivated vaccines — safe regardless of HIV status. This principle applies to all live vaccines in potentially immunocompromised infants."},
{c:"Newborn Care",q:"A 3-day-old breastfed newborn is jaundiced. Total bilirubin is 11 mg/dL. The jaundice appeared on day 2. Baby is feeding 8-10 times daily, has adequate wet diapers, and is gaining weight. How is this classified?",o:["Pathologic jaundice — requires immediate phototherapy","Physiologic jaundice — appears after 24 hours, peaks day 3-5, resolves by 2 weeks; monitor with hour-specific nomogram","Breastmilk jaundice — stop breastfeeding immediately","Hemolytic jaundice — check Coombs test immediately"],a:1,r:"Physiologic jaundice: appears AFTER 24 hours, peaks day 3-5, resolves by 2 weeks. Caused by high fetal RBC turnover + immature hepatic conjugation. PATHOLOGIC jaundice: appears in the FIRST 24 HOURS — always abnormal (hemolysis, infection, metabolic disease). Management of physiologic jaundice: use the Bhutani hour-specific nomogram — plot bilirubin against the infant's age in hours to determine phototherapy threshold. Do NOT stop breastfeeding unless advised by a specialist (temporary interruption is rarely needed)."},
{c:"Newborn Care",q:"Per AAP safe sleep guidelines, which recommendation is MOST important for reducing SIDS risk?",o:["Infants should sleep on their side — safer than back or stomach","Soft mattress with bumper pads provides the safest sleep environment","Infants should always sleep on their BACK on a FIRM, flat surface in their own sleep space — no soft objects, bed-sharing, or inclined surfaces","Co-sleeping in the parental bed is acceptable if parents are non-smokers"],a:2,r:"AAP 2022 safe sleep guidelines: (1) Always place on BACK (supine) — every sleep, every time; (2) Firm, flat sleep surface (crib/bassinet/play yard meeting safety standards) with fitted sheet; (3) Own sleep space — NOT in adult bed (bed-sharing linked to SIDS/ASSB); (4) Room-sharing (not bed-sharing) for at least 6 months; (5) No soft objects, loose bedding, bumpers, or inclined surfaces (recall of infant rockers/sleepers); (6) No smoking exposure; (7) Breastfeeding and pacifier use are protective. Back-to-sleep campaign reduced SIDS by >50%."},
{c:"Newborn Care",q:"The AAP currently recommends breastfeeding exclusively for how long, followed by continued breastfeeding with complementary foods?",o:["Exclusively for 3 months, then introduce formula","Exclusively for 6 months, then continue breastfeeding alongside complementary foods for 2 years or beyond","Exclusively for 4 months only — formula is equally recommended after that","No specific recommendation — parent preference determines duration"],a:1,r:"AAP 2022 updated recommendation: exclusive breastfeeding for 6 months, then continued breastfeeding alongside introduction of complementary foods for 2 YEARS or as long as mutually desired (updated from the prior recommendation of at least 1 year). Breast milk provides optimal nutrition, immunity (sIgA, lactoferrin), and microbiome benefits. Benefits to mothers: reduced breast/ovarian cancer risk, natural child spacing (LAM), faster uterine involution. Contraindications: maternal HIV in developed countries, active TB, some medications (see LactMed), infant galactosemia."},
{c:"Nutrition",q:"When should complementary (solid) foods be introduced, and what is a key early sign of readiness?",o:["At 3-4 months — early introduction reduces allergies","At 4 months regardless of readiness signs","Around 6 months when the infant can sit with minimal support, shows interest in food, and has lost the tongue-thrust reflex","Not until 12 months — breast milk or formula is complete nutrition"],a:2,r:"Complementary foods are introduced around 6 months (no earlier than 4 months) when the infant shows READINESS signs: (1) sits with minimal support (head control); (2) shows interest in food; (3) tongue-thrust reflex diminished. Early introduction (before 4 months) risks aspiration, overfeeding, and GI issues. Delaying beyond 6-7 months may increase feeding aversions and iron deficiency risk. Current evidence: early introduction of allergenic foods (peanuts, eggs) at 4-6 months REDUCES the risk of allergy — recommend introducing peanut products by 6 months, especially in high-risk infants (severe eczema or egg allergy)."},
{c:"Otitis Media",q:"An 18-month-old has bilateral AOM with temperature of 39.5°C and ear pulling for 2 days. Per AAP guidelines, the correct management is:",o:["Watchful waiting — antibiotics are rarely needed at this age","Amoxicillin 80-90 mg/kg/day divided BID x10 days — bilateral AOM in a child under 2 with fever requires antibiotic treatment","Amoxicillin-clavulanate only if high-risk","Tympanostomy tubes as first step"],a:1,r:"AAP AOM guidelines: OBSERVATION (watchful waiting) is appropriate ONLY for: (1) age ≥2 years with unilateral, non-severe AOM; or (2) age 6-23 months with unilateral AOM without severe features, if close follow-up is assured. ANTIBIOTICS REQUIRED for: ANY child under 6 months, bilateral AOM at any age 6-23 months, AOM with otorrhea, severe AOM (high fever, severe otalgia). This 18-month-old with bilateral AOM and high fever requires antibiotics. High-dose amoxicillin (80-90 mg/kg/day) is first-line."},
{c:"Otitis Media",q:"A 3-year-old has had 5 episodes of AOM in the past 12 months. Parents ask about tympanostomy tubes. What is the current AAP indication for tube referral?",o:["Any child over age 2 with 3 or more episodes in 12 months","3 or more AOM episodes in 6 months OR 4 or more in 12 months — referral to ENT for tube consideration is appropriate","Tubes are only indicated for AOM with persistent effusion beyond 6 months","Watchful waiting — tubes have no proven benefit"],a:1,r:"Tympanostomy tube indications (AAP): recurrent AOM = ≥3 episodes in 6 months OR ≥4 in 12 months (with at least 1 in the past 6 months); or persistent otitis media with effusion (OME) ≥3 months (bilateral) or ≥3 months unilateral with hearing loss or developmental concerns. Tubes dramatically reduce recurrent infections, improve hearing, and reduce need for repeated antibiotics. The decision also considers quality of life, hearing impact, and parental preference."},
{c:"Pharyngitis",q:"A 10-year-old has sore throat, fever, tonsillar exudates, and cervical lymphadenopathy. No cough. Rapid strep test is positive. Best management?",o:["No treatment — most strep pharyngitis resolves without antibiotics","Amoxicillin 50 mg/kg/day for 10 days — first-line for confirmed GAS pharyngitis","Azithromycin for 5 days is preferred","Tonsillectomy should be discussed immediately"],a:1,r:"Confirmed GAS (Group A Strep) pharyngitis: treat with amoxicillin (or penicillin VK) for 10 days — no documented resistance to penicillin. Centor/McIsaac criteria: exudate(1), anterior cervical lymphadenopathy(1), fever(1), no cough(1), age 3-14(1) — total ≥3 warrants rapid strep test or empiric treatment. Treatment goals: prevent rheumatic fever, reduce suppurative complications, shorten illness. If negative rapid strep and high suspicion in children: confirm with throat culture. Azithromycin only for penicillin allergy. Duration matters — 10 days regardless of symptom resolution."},
{c:"Respiratory",q:"A 7-month-old in December presents with wheezing, rhinorrhea for 3 days, mild respiratory distress, and oxygen saturation of 95% on room air. Most likely diagnosis and treatment?",o:["Asthma exacerbation — start albuterol nebulizer","Viral bronchiolitis (RSV most common cause) — supportive care only: suction, hydration, oxygen if needed","Community-acquired pneumonia — start amoxicillin","Croup — give dexamethasone"],a:1,r:"Bronchiolitis: most common lower respiratory infection in infants under 2. Winter peak, RSV most common cause. Presents with URI followed by wheezing and increased work of breathing. Management is SUPPORTIVE ONLY: nasal suctioning, hydration (nasogastric or IV if needed), supplemental oxygen for saturation <90-92%. Albuterol, nebulized racemic epinephrine, corticosteroids, antibiotics, chest physiotherapy — NONE are recommended (AAP guidelines). Palivizumab (RSV prophylaxis) is given monthly to high-risk infants (premature, CHD, pulmonary disease). Hospitalize for O2 sat <90%, poor feeding, moderate-severe distress."},
{c:"Respiratory",q:"A 2-year-old has a harsh, barky 'seal-bark' cough and inspiratory stridor that began last night. She is playful and not drooling. Temperature is 38.1°C. Most likely diagnosis and management?",o:["Epiglottitis — do not examine throat, call ENT emergently","Bacterial tracheitis — IV antibiotics immediately","Croup (laryngotracheobronchitis, viral) — cool mist, single dose of oral dexamethasone 0.6 mg/kg","Foreign body aspiration — chest X-ray and bronchoscopy"],a:2,r:"Croup: viral (parainfluenza most common), ages 6 months-3 years, fall/winter, bark-like seal cough, inspiratory stridor, low-grade fever, NO drooling or sitting in tripod position. Management: oral dexamethasone 0.6 mg/kg x1 (reduces airway inflammation, reduces hospitalization risk, most important intervention). Racemic epinephrine nebulizer for moderate-severe distress (provides temporary relief — observe 2-3 hours before discharge). Epiglottitis (H. influenzae type b): high fever, drooling, muffled voice, tripod/sniffing position, toxic-appearing — DO NOT examine throat, call anesthesia/ENT."},
{c:"Respiratory",q:"A 5-year-old with known asthma uses albuterol for symptoms 4 times per week and wakes at night twice per month. Per NAEPP classification, this is:",o:["Intermittent asthma — no controller therapy needed","Mild persistent asthma — add daily low-dose inhaled corticosteroid","Moderate persistent asthma — medium-dose ICS + LABA","Severe persistent asthma — oral corticosteroid needed"],a:1,r:"NAEPP asthma classification in children: Intermittent = symptoms ≤2 days/week, ≤2 nights/month; Mild persistent = >2 days/week (but not daily), 3-4 nights/month; Moderate persistent = daily symptoms, >1 night/week; Severe persistent = continuous symptoms, frequent nighttime symptoms. This child is MILD PERSISTENT (4 days/week albuterol, 2 nights/month). Step up to daily low-dose inhaled corticosteroid (fluticasone, budesonide). Remember: albuterol is rescue only — needing it more than 2 days/week indicates need for controller therapy."},
{c:"Infectious Disease",q:"A febrile 20-day-old infant presents with temperature of 38.3°C rectal. She looks well, is feeding normally, and has no focal findings. What is the correct management?",o:["Reassure parents and have them return if fever persists 72 hours","Empiric oral amoxicillin and close follow-up in 24 hours","Full sepsis evaluation (CBC, blood culture, UA/urine culture, LP), hospitalize, and start empiric IV antibiotics pending cultures","Acetaminophen and recheck in the office tomorrow"],a:2,r:"Febrile neonates (under 28-30 days): ALL require a FULL sepsis workup — blood culture, CBC with differential, urinalysis and urine culture, and lumbar puncture (CSF cell count, glucose, protein, culture). Hospitalize and start empiric IV antibiotics (ampicillin + gentamicin, or ampicillin + cefotaxime) because neonates cannot be risk-stratified by clinical appearance alone. Neonatal immune responses are immature — a well-appearing neonate can rapidly decompensate with bacteremia or meningitis. Risk-stratification tools (Rochester, Philadelphia, Boston criteria) begin at 28-60 days."},
{c:"Infectious Disease",q:"A 4-year-old develops high fever, severe headache, photophobia, neck stiffness, and a non-blanching petechial rash. Most urgent next step?",o:["Lumbar puncture first, then start antibiotics","Order a CT scan of the head before any other intervention","Start IV antibiotics (ceftriaxone) IMMEDIATELY — do not delay for LP or CT if meningococcal meningitis is suspected","Obtain blood cultures only and observe for 6 hours"],a:2,r:"Bacterial meningitis is a MEDICAL EMERGENCY. Non-blanching petechial rash + meningeal signs = presumed meningococcemia/bacterial meningitis. START antibiotics IMMEDIATELY (ceftriaxone IV/IM) — do not delay for LP if the child is deteriorating or has signs of sepsis. Blood cultures can be drawn in seconds before the first dose. LP can follow after antibiotics are started; treatment should NEVER be delayed waiting for LP results. Also give dexamethasone for suspected bacterial meningitis (reduces inflammation and hearing loss risk). Meningococcemia can be fatal within hours."},
{c:"Febrile Seizures",q:"A 2-year-old has a generalized tonic-clonic seizure lasting 90 seconds during a fever of 39.8°C. He recovers quickly and is now acting normally. This is his first seizure. Parents are terrified. Best counseling?",o:["This is a complex febrile seizure — immediate neurology referral and EEG are mandatory","This is a simple febrile seizure — benign, does NOT cause brain damage, does NOT mean epilepsy, and recurs in about 30% of children; anticonvulsant prophylaxis is NOT routinely recommended","Febrile seizures always require MRI and EEG","Prescribe phenobarbital prophylaxis to prevent recurrence"],a:1,r:"Simple febrile seizure: generalized (not focal), lasts <15 minutes, occurs once in a 24-hour period, with complete recovery. Benign condition — does NOT cause brain damage or death, does NOT predict epilepsy (only 2-5% of children with febrile seizures develop epilepsy). Recurrence risk: ~30% overall. Routine labs, EEG, neuroimaging, and anticonvulsant prophylaxis are NOT indicated for a first simple febrile seizure. Complex febrile seizure: focal, lasts >15 minutes, or recurs within 24 hours — warrants further evaluation."},
{c:"Kawasaki Disease",q:"A 3-year-old has had fever for 6 days, bilateral non-purulent conjunctivitis, strawberry tongue, cracked red lips, cervical lymphadenopathy, and a diffuse rash. What is the diagnosis and treatment?",o:["Scarlet fever — treat with penicillin","Toxic shock syndrome — IV fluids and antibiotics","Kawasaki disease — IVIG 2 g/kg single infusion + high-dose aspirin; echocardiogram to evaluate for coronary artery aneurysms","Measles — supportive care and vitamin A"],a:2,r:"Kawasaki disease: classic diagnostic criteria (fever ≥5 days + 4 of 5): (1) bilateral non-exudative conjunctivitis; (2) oral changes — strawberry tongue, cracked lips, erythematous oropharynx; (3) polymorphous rash; (4) cervical lymphadenopathy (usually unilateral, >1.5 cm); (5) extremity changes — erythema/edema of hands/feet, periungual desquamation. Treatment: IVIG 2 g/kg IV once + high-dose aspirin (anti-inflammatory phase) → low-dose aspirin (antiplatelet, after fever resolves). Echocardiogram to evaluate for coronary artery aneurysms (most serious complication — present in 15-25% untreated). If treated promptly, aneurysm risk drops to <5%."},
{c:"UTI",q:"A 9-month-old girl presents with fever of 39.5°C, fussiness, and poor feeding for 2 days. No URI symptoms. Urinalysis shows pyuria and bacteriuria. Which statement about pediatric UTI workup is correct?",o:["Bag specimen is sufficient to diagnose UTI","Catheterized specimen or suprapubic aspiration is required for reliable urine culture — bag specimens have high false-positive rates","No imaging is needed for a first febrile UTI in an infant","Oral antibiotics are always sufficient — hospitalization is never needed"],a:1,r:"Pediatric UTI diagnosis requires a RELIABLE urine specimen: catheterization or suprapubic aspiration. Bag specimens have contamination rates of up to 50% — acceptable only for screening; culture must be confirmed by catheter if bag urinalysis is positive. First febrile UTI in a young child: renal-bladder ultrasound (RBUS) to evaluate for structural abnormality. VCUG (voiding cystourethrogram) is no longer routine after a first UTI (AAP 2011 guidelines) — reserved for abnormal ultrasound, recurrent UTI, or atypical presentation. Hospitalize if toxic-appearing, unable to take oral meds, under 2 months."},
{c:"ADHD",q:"Parents of a 7-year-old report his teacher says he cannot sit still, often interrupts, and cannot follow multi-step directions. Symptoms are present at home and school. Per DSM-5, which is required for an ADHD diagnosis?",o:["Symptoms must be present only at school — home behavior doesn't count","Symptoms must be present in at least 2 settings before age 12, cause functional impairment, and not be better explained by another disorder","Diagnosis requires a brain scan (fMRI or EEG)","A single parent report is sufficient — teacher reports are optional"],a:1,r:"DSM-5 ADHD criteria: ≥6 symptoms of inattention and/or hyperactivity-impulsivity for ≥6 months; symptoms present BEFORE age 12; present in ≥2 settings (school AND home or other); cause FUNCTIONAL IMPAIRMENT; not better explained by another psychiatric or medical condition. Diagnosis is CLINICAL — no brain imaging, genetic test, or biomarker. Tools: Vanderbilt or Conners rating scales from parents AND teachers. Rule out: vision/hearing problems, sleep disorders, anxiety, thyroid disease, learning disabilities."},
{c:"ADHD",q:"A school-age child (age 6) is diagnosed with ADHD. Per AAP guidelines, what is the FIRST-LINE treatment?",o:["Methylphenidate (stimulant) without behavior therapy","Behavior therapy alone — no medications until age 12","FDA-approved stimulant medication (methylphenidate or amphetamine) PLUS behavioral therapy — combined is most effective","Dietary changes and elimination of food dyes only"],a:2,r:"AAP ADHD treatment guidelines: ages 4-5 = behavioral therapy FIRST, medication only if insufficient. Ages 6-11 = FDA-approved stimulant medication + behavioral therapy (COMBINATION is most effective). Ages 12+ = stimulant medication + behavioral therapy; adolescents should be engaged in treatment planning. First-line stimulants: methylphenidate (Ritalin, Concerta) or amphetamine salts (Adderall). Non-stimulant alternatives: atomoxetine (Strattera), guanfacine, clonidine. Monitor: growth, blood pressure, appetite, sleep, and tics. Stimulants do NOT increase substance abuse risk when properly managed."},
{c:"Lead Poisoning",q:"At which well-child visit is universal blood lead level screening recommended for children in areas with high risk of lead exposure, and what is the current CDC reference value?",o:["At birth — lead crosses the placenta","At 1 year and 2 years — 3.5 mcg/dL is the reference value requiring evaluation","At age 5 only — when children enter school","At 6 months — 10 mcg/dL is the acceptable level"],a:1,r:"Lead screening: universal at 12 months and 24 months in high-risk areas (pre-1978 housing, low income, recent immigration). CDC reference value: 3.5 mcg/dL (lowered from 5 in 2021) — this triggers evaluation and case management, NOT a treatment threshold. No safe blood lead level exists. Lead sources: paint chips and dust (pre-1978 homes), contaminated soil, some toys, imported pottery. Effects: cognitive impairment, behavioral problems, IQ reduction. Treatment: remove the source; chelation only for very high levels (≥45 mcg/dL). Prevention = primary goal."},
{c:"Anemia",q:"A 15-month-old is exclusively breastfed and has not had formula or iron-fortified foods introduced yet. CBC shows Hgb 9.2 g/dL, MCV 66 fL. Most likely diagnosis and management?",o:["Sickle cell disease — order hemoglobin electrophoresis","Thalassemia minor — no treatment needed","Iron deficiency anemia — iron supplementation 3-6 mg/kg/day elemental iron and dietary counseling","B12 deficiency — IM vitamin B12"],a:2,r:"Iron deficiency anemia (IDA): most common nutritional deficiency in children. Risk: exclusively breastfed infants beyond 6 months without iron-rich complementary foods (breast milk has low iron). Microcytic (low MCV), hypochromic anemia. Prevention: iron-fortified formula, iron-fortified cereals, meat at complementary food introduction; iron supplementation (1 mg/kg/day) for exclusively breastfed infants from 4-6 months of age. Treatment: elemental iron 3-6 mg/kg/day between meals; expect reticulocytosis in 7-10 days, Hgb improvement in 1 month. Recheck CBC in 4 weeks. Limit cow's milk to <16-24 oz/day (interferes with iron absorption)."},
{c:"Failure to Thrive",q:"An 18-month-old's weight has dropped from the 40th to the 8th percentile over 6 months. He is developmentally normal. Parents report adequate food availability and normal feeding behaviors. Exam is unremarkable. What is the MOST common cause of failure to thrive in developed countries?",o:["Cystic fibrosis","Congenital heart disease","Non-organic (psychosocial) causes — inadequate caloric intake related to feeding interactions, poverty, neglect, or disordered feeding dynamics","Celiac disease"],a:2,r:"Failure to thrive (FTT, now termed growth faltering): weight crossing two major percentile lines downward. MOST COMMON cause in developed countries: NON-ORGANIC — inadequate caloric intake related to poverty, poor feeding technique, food insecurity, feeding aversions, or neglect. Organic causes (GI malabsorption, cardiac, endocrine, metabolic) account for a minority and usually present with additional clinical clues. Workup: detailed dietary history (3-day food diary), feeding observation, social history, basic labs (CBC, chemistry, TSH, UA). Hospitalization to observe feeding behavior is sometimes diagnostic."},
{c:"Child Abuse",q:"A 7-month-old is brought in for 'fussiness.' Exam reveals subdural hematoma on CT and bilateral retinal hemorrhages. The infant has no bruising and no prior documented injuries. Parents report 'he fell off the couch.' Which statement is most accurate?",o:["A couch fall is a plausible explanation for these findings","Retinal hemorrhages and subdural hematoma in a pre-mobile infant are highly suspicious for abusive head trauma (shaken baby syndrome) — mandatory report to CPS and forensic evaluation required","This is likely a medical condition — order coagulation studies and discharge","Discharge if parents appear cooperative"],a:1,r:"Abusive head trauma (AHT/shaken baby syndrome): classic triad — subdural hematoma, retinal hemorrhages, and encephalopathy — in an infant with an implausible or no history of trauma. A couch fall (<1 meter) is NOT a mechanism consistent with these findings. Red flags for inflicted injury: injuries inconsistent with developmental stage (pre-mobile infant), injuries inconsistent with given history, delayed presentation, changing story. MANDATORY REPORT to CPS. Skeletal survey (to look for multiple fractures in various stages of healing) and ophthalmologic exam are part of the workup."},
{c:"Rash",q:"A 9-month-old develops high fever (40°C) for 3-4 days with no other symptoms. On day 4 the fever breaks suddenly, and a rose-pink macular rash appears on the trunk spreading to the neck and arms. Diagnosis?",o:["Measles — report to public health","Scarlet fever — start amoxicillin immediately","Roseola infantum (HHV-6) — benign, self-limited; reassure parents","Kawasaki disease — admit for IVIG"],a:2,r:"Roseola infantum: caused by HHV-6 (and sometimes HHV-7). Classic pattern: HIGH fever (often 39-41°C) for 3-5 days in an otherwise well-looking infant, followed by ABRUPT DEFERVESCENCE and appearance of a ROSE-PINK macular rash on the trunk (rash = fever breaks). Most common in infants 6-24 months. Self-limited, no treatment needed. Key complication: febrile seizure during the high-fever phase (HHV-6 is a common trigger). Measles: prodrome with 3 Cs (Cough, Coryza, Conjunctivitis) + Koplik spots + descending maculopapular rash."},
{c:"GI Emergencies",q:"A 3-month-old male presents with projectile, non-bilious vomiting after every feeding for 2 weeks. He appears hungry after vomiting and has had weight loss. A firm, olive-shaped mass is palpable in the right upper quadrant. Diagnosis and typical lab finding?",o:["Gastroesophageal reflux — thicken feeds","Pyloric stenosis — hypochloremic, hypokalemic METABOLIC ALKALOSIS from loss of HCl in vomit","Intussusception — air enema reduction","Malrotation with volvulus — emergent surgery"],a:1,r:"Hypertrophic pyloric stenosis: male:female 4:1, presents at 3-6 weeks (up to 12 weeks). Progressive projectile, NON-BILIOUS vomiting (pylorus is proximal to bile ducts). Infant is hungry after vomiting ('projectile but not fussy'). Palpable 'olive' mass (hypertrophied pylorus) in RUQ. Diagnosis confirmed with ultrasound. Labs: hypochloremic, hypokalemic, metabolic ALKALOSIS (from loss of HCl and H+ in vomit). Treatment: correct electrolytes FIRST, then surgical pyloromyotomy (Ramstedt procedure). BILIOUS vomiting in a newborn = malrotation with volvulus until proven otherwise — surgical emergency."},
{c:"GI Emergencies",q:"An 18-month-old suddenly develops episodic severe abdominal pain, drawing his legs to his chest, followed by periods of normal activity. He passes a dark red 'currant jelly' stool. Most likely diagnosis and treatment?",o:["Acute appendicitis — surgical consult","Intussusception — air or contrast enema reduction (diagnostic and therapeutic)","Viral gastroenteritis — oral rehydration","Meckel's diverticulum — expectant management"],a:1,r:"Intussusception: telescoping of one bowel segment into another, most common at ileocecal junction, peak age 3 months-3 years. Classic triad: episodic severe abdominal pain (child draws knees up, screams) with periods of lethargy, vomiting, and 'currant jelly' stool (blood and mucus from mucosal ischemia — a LATE sign). Lead points in older children: Meckel's diverticulum, lymphoma, polyp. Diagnosis: ultrasound (target/donut sign). Treatment: pneumatic or contrast enema (diagnostic AND therapeutic, ~80-90% success). If failed or peritonitis: surgical reduction."},
{c:"Orthopedics",q:"A routine exam of a 1-week-old newborn reveals limited abduction of the left hip and a positive Ortolani maneuver. Diagnosis and management?",o:["Normal finding — hips are always tight in newborns","Developmental dysplasia of the hip (DDH) — confirm with ultrasound (preferred under 6 months) and refer to pediatric orthopedics for Pavlik harness","X-ray the hip immediately to confirm","No workup needed unless the child is not walking by 18 months"],a:1,r:"Developmental dysplasia of the hip (DDH): dislocated or dysplastic hip joint. Screening: Ortolani (hip relocated with abduction — CLUNK) and Barlow (hip dislocatable with adduction — CLICK) maneuvers at every well visit up to 6 months. Risk factors: female, breech position, family history, first-born, oligohydramnios. Diagnosis under 6 months: ULTRASOUND (ossification centers not yet visible on X-ray). Over 6 months: X-ray. Treatment: Pavlik harness (dynamic flexion-abduction) in infants — >90% success rate if treated early. Delayed diagnosis: may require surgical reduction."},
{c:"Dermatology",q:"A 6-month-old has a bright red, moist rash in the diaper area that spares the skin folds. A second infant in the same daycare has patches of WHITE satellite lesions at the periphery. Most likely cause and treatment of the second infant's rash?",o:["Irritant contact diaper rash — zinc oxide barrier cream","Candidal diaper dermatitis — topical antifungal (clotrimazole or miconazole) plus barrier cream","Psoriasis — topical steroid","Seborrheic dermatitis — ketoconazole shampoo"],a:1,r:"Candidal diaper dermatitis: bright red rash INVOLVING the skin folds (unlike irritant dermatitis which SPARES folds), with SATELLITE LESIONS (papules and pustules at the periphery) — pathognomonic for Candida. Often follows antibiotic use (disrupts normal flora). Treatment: topical azole antifungal (clotrimazole, miconazole) with each diaper change + zinc oxide barrier cream. Irritant contact dermatitis: convex surfaces (buttocks, genitalia), spares folds, no satellite lesions — treat with frequent diaper changes and zinc oxide. If severe or not improving: rule out superimposed candidiasis."},
{c:"Dermatology",q:"A 6-year-old has a scaly, pruritic patch on the scalp with broken-off hair stubbles and mild cervical lymphadenopathy. Wood's lamp shows dull green fluorescence in some areas. Diagnosis and appropriate treatment?",o:["Head lice — permethrin 1% shampoo","Tinea capitis (scalp ringworm) — ORAL antifungal required (topical alone is insufficient); griseofulvin or terbinafine for 6-8 weeks","Seborrheic dermatitis — selenium sulfide shampoo","Alopecia areata — no treatment needed"],a:1,r:"Tinea capitis: dermatophyte infection of the scalp, most common in school-age children. Presents with scaly patches, hair loss, black dots (broken hair). ORAL antifungal is REQUIRED — topical does not penetrate the hair follicle. First-line: griseofulvin (6-8 weeks) or terbinafine (4 weeks). Selenium sulfide or ketoconazole shampoo is ADJUNCTIVE to reduce spore shedding (prevents spread to others). Kerion: inflammatory boggy mass from tinea capitis — also oral antifungal (NOT I&D). Treat household contacts with antifungal shampoo and screen."},
{c:"Growth",q:"At a 10-year-old well visit, BMI is calculated at the 96th percentile. Per CDC and AAP definitions, this is classified as:",o:["Overweight","Obese","Severely obese — only if BMI >35","Normal — BMI percentiles are not meaningful in children"],a:1,r:"Pediatric BMI classifications (ages 2-19): Underweight = <5th percentile; Healthy weight = 5th-84th percentile; Overweight = 85th-94th percentile; Obese = ≥95th percentile; Severely obese = ≥120% of the 95th percentile (or ≥35 kg/m²). BMI percentile is age- and sex-specific in children — unlike adults where absolute cutoffs are used. Childhood obesity is associated with T2DM, hypertension, dyslipidemia, sleep apnea, orthopedic problems, and psychological impact. AAP 2023 guidelines: recommend early, intensive behavioral intervention and consider pharmacotherapy (metformin, GLP-1) for eligible adolescents."},
{c:"Newborn Screening",q:"Newborn metabolic screening (NBS) — the 'heel stick' — is performed in all U.S. states. Which condition is screened for and, if missed, causes irreversible intellectual disability but is completely preventable with early dietary restriction?",o:["Congenital hypothyroidism — treated with levothyroxine","Phenylketonuria (PKU) — irreversible cognitive impairment prevented by phenylalanine-free diet started within days of birth","Cystic fibrosis — treated with CFTR modulators","Sickle cell disease — treated with penicillin prophylaxis"],a:1,r:"Phenylketonuria (PKU): autosomal recessive deficiency of phenylalanine hydroxylase — phenylalanine accumulates and causes irreversible intellectual disability, seizures, and behavior problems. Completely preventable by EARLY DIETARY RESTRICTION of phenylalanine (special low-phe formula, avoid high-protein foods). NBS detects PKU before symptoms appear — treatment must start within days. Also on NBS: congenital hypothyroidism (most common endocrine NBS finding), congenital adrenal hyperplasia, hemoglobin disorders, organic acidemias, fatty acid oxidation disorders, biotinidase deficiency, galactosemia, and many more (RUSP panel)."},
{c:"Adolescent Health",q:"A 16-year-old presents to the clinic alone requesting STI testing. In most states, which services can minors consent to WITHOUT parental permission?",o:["Only well-child care","Only vaccinations","STI diagnosis and treatment, contraception, pregnancy care, mental health, and substance abuse treatment — in most states, minors can consent to these sensitive services","No services — all require parental consent under age 18"],a:2,r:"Minor consent laws vary by state, but most states allow minors to consent without parental involvement for: STI testing and treatment, contraception, pregnancy-related care, mental health services, and substance abuse treatment. Providers should be familiar with their state's specific laws. Encouraging parental involvement is always recommended, but confidentiality must be maintained unless the minor gives permission to share. Exceptions to confidentiality: risk of harm to self or others. Maintaining access to confidential care for adolescents increases their likelihood of seeking healthcare for sensitive issues."}
,
{c:"Vaccines",q:"A 2-month-old is seen for her first well visit and vaccines. Her mother had chickenpox (varicella) as a child. Does the infant need varicella vaccine today?",o:["Yes — give varicella vaccine today at 2 months","No — varicella vaccine is not given until 12-15 months; maternal antibodies offer some early protection","Yes — two doses are always given before 6 months","Varicella vaccine is only for children who did not have chickenpox naturally"],a:1,r:"Varicella vaccine schedule: first dose at 12-15 months, second dose at 4-6 years (2-dose series). It is a live attenuated vaccine and cannot be given before 12 months. Maternal IgG antibodies transferred through the placenta offer some early protection but wane by 6-12 months. Varicella is contraindicated in severe immunocompromise and pregnancy. Children who had natural varicella infection are immune and do not need the vaccine. Catch-up: any person without evidence of immunity should receive 2 doses."},
{c:"Dermatology",q:"A 5-year-old has intense scalp itching. Exam reveals 1 mm white oval structures firmly attached to hair shafts near the scalp. Live bugs are found on combing. First-line treatment?",o:["Oral griseofulvin for 6 weeks","Permethrin 1% cream rinse, left on for 10 minutes, repeated in 9-10 days; manual nit removal with fine-tooth comb","Selenium sulfide shampoo daily for 2 weeks","Oral ivermectin only — topical treatments are ineffective"],a:1,r:"Head lice (Pediculosis capitis): nits firmly cemented to hair shafts (distinguishes from dandruff which brushes off easily). First-line: permethrin 1% (Nix) — apply to shampooed, towel-dried hair, leave 10 minutes, rinse; repeat in 9-10 days (kills newly hatched nymphs from surviving eggs). Manual nit removal with fine-tooth comb. All household contacts should be checked. Wash bedding/clothing in hot water. School exclusion is NOT recommended by AAP. Resistance to permethrin is increasing — alternatives: malathion, benzyl alcohol, spinosad, or oral ivermectin (off-label in children <15 kg)."},
{c:"Adolescent Health",q:"A 15-year-old athlete reports months of irregular periods, stress fractures in both feet, and restricts her diet to maintain her weight for gymnastics. Her BMI is 17.5. What condition does she have?",o:["Anorexia nervosa only","Normal athletic response to high training load","Female athlete triad — low energy availability, menstrual dysfunction, and low bone density — requires multidisciplinary intervention and sport modification","Hypothyroidism — check TSH only"],a:2,r:"Female athlete triad: the spectrum of (1) low energy availability (with or without disordered eating); (2) menstrual dysfunction (oligo/amenorrhea); (3) low bone density. Now part of the broader Relative Energy Deficiency in Sport (RED-S) framework. Management: multidisciplinary (sports medicine, dietitian, psychologist), increase caloric intake, reduce training load. OCPs do NOT adequately restore bone density — the key driver is energy availability. Red flags for return-to-sport clearance: persistent amenorrhea, worsening bone density, or eating disorder behaviors."},
{c:"Development",q:"At a 9-month well visit, which social-emotional milestone is expected and healthy?",o:["The baby should not show preference for parents over strangers yet","Severe separation anxiety lasting more than 3 days indicates attachment disorder","Stranger anxiety and separation anxiety are NORMAL at 8-12 months — they signal healthy attachment, not a problem","The baby should be interacting with strangers comfortably by 9 months"],a:2,r:"Stranger anxiety (fear/distress around unfamiliar people) and separation anxiety (distress when caregiver leaves) both peak between 8-18 months — they are developmentally NORMAL and reflect healthy attachment (the infant recognizes and prefers their primary caregivers). Reassure parents this is expected and healthy. Attachment theory: Ainsworth's 'secure attachment' includes brief distress on separation that resolves with reunion. Pathologic separation anxiety (persisting beyond the expected age range with significant functional impairment) is a separate clinical entity requiring evaluation."},
{c:"Scoliosis",q:"During a 12-year-old girl's well visit, you perform an Adams forward bend test and notice a prominent right thoracic rib hump. Next best step?",o:["Reassure — rib humps are normal in pubescent girls","Measure the spinal curve with a scoliometer (inclinometer); if >5-7 degrees, refer for standing posterior-anterior spine X-ray","Refer directly to surgery","Order a spinal MRI today"],a:1,r:"Adolescent idiopathic scoliosis (AIS): most common in girls, onset around puberty. Adams forward bend test: patient bends forward — a rib hump indicates vertebral rotation. Use a SCOLIOMETER to quantify trunk rotation; >5-7 degrees trunk rotation warrants a standing PA spine X-ray. Cobb angle on X-ray determines management: <20 degrees = observation; 20-40 degrees = bracing; >45-50 degrees = surgical referral. USPSTF does not recommend universal screening, but AAP recommends clinical assessment at well visits during adolescence."},
{c:"Dermatology",q:"A 4-month-old has red, weeping, intensely pruritic patches on the cheeks and extensor surfaces of the arms. The mother has a history of seasonal allergies. Most likely diagnosis and first-line management?",o:["Infantile psoriasis — topical coal tar","Contact dermatitis — identify and remove the allergen only","Atopic dermatitis (eczema) — regular emollients, gentle cleansers, low-potency topical corticosteroids for flares, avoid triggers","Candidal dermatitis — topical antifungal"],a:2,r:"Atopic dermatitis (eczema): most common pediatric chronic skin condition. Distribution: infants — face and extensor surfaces; older children — flexural creases (antecubital, popliteal). Associated with personal/family history of atopy (asthma, allergic rhinitis, food allergy). Management: (1) Liberal daily emollients (moisturizers) as the foundation; (2) Gentle, fragrance-free cleansers, lukewarm baths; (3) Low-potency topical corticosteroids (hydrocortisone 1%) for flares; (4) Avoid triggers (wool, irritants, sweat, dry air). Moderate-severe or refractory: topical calcineurin inhibitors (tacrolimus, pimecrolimus) or dupilumab (for age ≥6 months, severe)."},
{c:"Infectious Disease",q:"A 10-year-old is diagnosed with classic pertussis: 2 weeks of paroxysmal cough ending in a high-pitched inspiratory 'whoop,' followed by post-tussive vomiting. Which statement about prophylaxis is correct?",o:["Only unvaccinated household contacts need prophylaxis","All close contacts regardless of vaccination status should receive azithromycin prophylaxis to prevent spread — pertussis vaccine reduces severity but does not fully prevent transmission","Only the child needs treatment; household contacts do not need prophylaxis","Prophylaxis is only for infants under 1 year in the household"],a:1,r:"Pertussis (Bordetella pertussis): post-exposure prophylaxis with azithromycin (preferred) is recommended for ALL close contacts regardless of vaccination status — because vaccine immunity wanes (especially DTP from childhood, which is why Tdap boosters are needed) and even vaccinated contacts can be infected (though with less severity). Highest-risk contacts: infants under 12 months (severe/life-threatening disease) and pregnant women (to protect the newborn). Treatment of the infected patient: azithromycin or erythromycin (most effective if started in catarrhal phase, but still reduces transmission in paroxysmal phase)."},
{c:"Screening",q:"A 4-year-old fails vision screening at her well visit — she cannot read the 20/40 line with her right eye. Left eye is 20/20. What is the most common cause and appropriate action?",o:["Refractive error — prescribe glasses and no further workup","Amblyopia (lazy eye) — refer to pediatric ophthalmology for patching therapy and glasses","Retinoblastoma — refer for MRI immediately","Normal — children cannot read the 20/40 line until age 6"],a:1,r:"Amblyopia (lazy eye): reduced visual acuity in one eye due to abnormal visual development during the critical period (birth to 7-8 years). Most common cause: anisometropia (unequal refractive error), strabismus, or visual deprivation (cataract). AAP recommends vision screening at every well visit, starting with objective screening at 6-30 months (photo/instrument screening) and visual acuity at age 3. Treatment: correct the underlying cause (glasses, cataract removal) + patching or atropine penalization of the better eye. Treatment is effective only during the critical period — early detection is essential."},
{c:"GI",q:"A 3-year-old has been constipated for 8 months. Exam reveals a palpable stool mass in the left lower quadrant, and digital rectal exam shows normal tone with a large hard stool. Parents report stool soiling in his underwear almost daily. Diagnosis?",o:["Hirschsprung disease — refer for rectal biopsy","Functional constipation with overflow encopresis — medical treatment with PEG (polyethylene glycol) disimpaction and maintenance","Dietary fiber deficiency only — no medication needed","Anal fissures — treat topically only"],a:1,r:"Functional constipation with overflow encopresis: the retained stool creates a megacolon, and liquid stool leaks around the hard mass causing 'soiling' (encopresis). Parents and children often mistakenly think the child is not trying. Management: (1) DISIMPACTION with PEG 3350 (Miralax) or rectal enemas; (2) MAINTENANCE therapy with daily PEG for months (prevents re-accumulation); (3) Behavior/toilet training program; (4) Dietary changes (fiber, fluids). Hirschsprung (absent ganglion cells): presents in neonates with failure to pass meconium, no stool on rectal exam — biopsy confirms. Functional constipation has stool on rectal exam; Hirschsprung's typically has an empty rectum."},
{c:"Neonatology",q:"A newborn of a mother who used heroin throughout pregnancy is born and by day 2 has high-pitched crying, poor feeding, diarrhea, sweating, and tremors. Most likely diagnosis and management?",o:["Neonatal sepsis — blood cultures and IV antibiotics","Hypoglycemia — dextrose IV","Neonatal opioid withdrawal syndrome (NOWS/NAS) — monitor with Finnegan score, non-pharmacologic care (swaddling, low-stimulation), and morphine or methadone if scores indicate pharmacologic treatment","Neonatal hypocalcemia — calcium supplementation"],a:2,r:"Neonatal opioid withdrawal syndrome (NOWS, formerly NAS): occurs in infants exposed to opioids in utero — heroin, methadone, buprenorphine, prescription opioids. Onset: 24-72 hours for heroin, up to 5-7 days for methadone. Symptoms: high-pitched cry, irritability, tremors, poor feeding, diarrhea, diaphoresis, seizures in severe cases. Assessment: modified Finnegan Neonatal Abstinence Scoring Tool (FNAST). Management: non-pharmacologic FIRST (swaddling, rooming-in, breastfeeding if mother on MAT and not using illicit drugs); escalate to pharmacologic (morphine or methadone) if scores persistently elevated. Expect prolonged hospital stay."}
];

const N = QUESTIONS.length;
let idx = 0;
let answers = new Array(N).fill(null); // selected option index
const LETTERS = ["A","B","C","D"];

const strip = document.getElementById("strip");
const qcard = document.getElementById("qcard");
const resultsCard = document.getElementById("results");

function buildStrip(){
  strip.innerHTML = "";
  for(let i=0;i<N;i++){
    const t = document.createElement("div");
    t.className = "tick";
    t.title = "Question " + (i+1);
    t.addEventListener("click", ()=>{ idx = i; render(); });
    strip.appendChild(t);
  }
}
function paintStrip(){
  const ticks = strip.children;
  for(let i=0;i<N;i++){
    const t = ticks[i];
    t.className = "tick";
    if(answers[i] !== null){
      t.classList.add(answers[i] === QUESTIONS[i].a ? "ok" : "bad");
    }
    if(i === idx && !resultsVisible()) t.classList.add("cur");
  }
}
function resultsVisible(){ return !resultsCard.classList.contains("hide"); }

function counts(){
  let done=0, right=0;
  for(let i=0;i<N;i++){
    if(answers[i]!==null){ done++; if(answers[i]===QUESTIONS[i].a) right++; }
  }
  return {done,right};
}
function paintScore(){
  const {done,right} = counts();
  document.getElementById("sc-done").textContent = done;
  document.getElementById("sc-right").textContent = right;
}

function render(){
  resultsCard.classList.add("hide");
  qcard.classList.remove("hide");
  const Q = QUESTIONS[idx];
  const picked = answers[idx];
  let html = "";
  html += '<div class="meta"><span class="qnum">QUESTION ' + (idx+1) + ' / ' + N + '</span><span class="chip">' + Q.c + '</span></div>';
  html += '<p class="stem">' + Q.q + '</p>';
  Q.o.forEach((opt,i)=>{
    let cls = "opt";
    if(picked !== null){
      if(i === picked && picked === Q.a) cls += " sel-ok";
      else if(i === picked) cls += " sel-bad";
      else if(i === Q.a) cls += " reveal-ok";
    }
    html += '<button class="'+cls+'" data-i="'+i+'" '+(picked!==null?"disabled":"")+'><span class="ltr">'+LETTERS[i]+'</span><span>'+opt+'</span></button>';
  });
  if(picked !== null){
    const good = picked === Q.a;
    html += '<div class="verdict '+(good?"ok":"bad")+'">'+(good ? "Correct" : "Incorrect — answer is " + LETTERS[Q.a])+'</div>';
    html += '<div class="rationale">'+Q.r+'</div>';
  }
  html += '<div class="nav">';
  html += '<button class="btn ghost" id="prevBtn" '+(idx===0?"disabled":"")+'>Back</button>';
  if(idx < N-1){
    html += '<button class="btn" id="nextBtn">Next question</button>';
  } else {
    html += '<button class="btn" id="finishBtn">See results</button>';
  }
  html += '</div>';
  qcard.innerHTML = html;

  qcard.querySelectorAll(".opt").forEach(btn=>{
    btn.addEventListener("click", ()=>{
      if(answers[idx] !== null) return;
      answers[idx] = parseInt(btn.dataset.i,10);
      render();
    });
  });
  const prev = document.getElementById("prevBtn");
  if(prev) prev.addEventListener("click", ()=>{ idx--; render(); });
  const next = document.getElementById("nextBtn");
  if(next) next.addEventListener("click", ()=>{ idx++; render(); });
  const fin = document.getElementById("finishBtn");
  if(fin) fin.addEventListener("click", showResults);
  paintStrip(); paintScore();
}

function showResults(){
  const {done,right} = counts();
  const pct = done ? Math.round((right/done)*100) : 0;
  // category breakdown
  const cats = {};
  QUESTIONS.forEach((Q,i)=>{
    if(!cats[Q.c]) cats[Q.c] = {n:0, ok:0, ans:0};
    cats[Q.c].n++;
    if(answers[i]!==null){ cats[Q.c].ans++; if(answers[i]===Q.a) cats[Q.c].ok++; }
  });
  let html = '<div class="bigscore">'+right+' / '+done+' ('+pct+'%)</div>';
  html += '<p class="sub">'+(done<N ? (N-done)+' question'+(N-done===1?"":"s")+' unanswered — they are not counted against you. ' : '')+'A passing pace on the real ANCC is roughly the low-to-mid 70s percent range, so use this as a directional gauge, not a verdict.</p>';
  html += '<h2 style="font-size:.95rem;margin-bottom:6px">By category</h2>';
  Object.keys(cats).forEach(c=>{
    const o = cats[c];
    const p = o.ans ? Math.round((o.ok/o.ans)*100) : 0;
    html += '<div class="catrow"><span style="flex:0 0 44%">'+c+'</span><span class="bar"><i style="width:'+(o.ans? p:0)+'%"></i></span><span style="font-family:var(--mono);font-size:.8rem">'+o.ok+'/'+o.ans+(o.ans<o.n?' of '+o.n:'')+'</span></div>';
  });
  // missed list
  const missed = [];
  for(let i=0;i<N;i++) if(answers[i]!==null && answers[i]!==QUESTIONS[i].a) missed.push(i);
  if(missed.length){
    html += '<div class="missedlist"><h2 style="font-size:.95rem;margin-bottom:8px">Review missed questions</h2>';
    missed.forEach(i=>{ html += '<button data-jump="'+i+'">Q'+(i+1)+'</button>'; });
    html += '</div>';
  }
  html += '<div class="nav"><button class="btn ghost" id="backBtn">Back to questions</button><button class="btn" id="resetBtn">Start over</button></div>';
  resultsCard.innerHTML = html;
  resultsCard.classList.remove("hide");
  qcard.classList.add("hide");
  resultsCard.querySelectorAll("[data-jump]").forEach(b=>{
    b.addEventListener("click", ()=>{ idx = parseInt(b.dataset.jump,10); render(); });
  });
  document.getElementById("backBtn").addEventListener("click", ()=>{ render(); });
  document.getElementById("resetBtn").addEventListener("click", ()=>{
    if(confirm("Clear all answers and start over?")){
      answers = new Array(N).fill(null); idx = 0; render();
    }
  });
  paintStrip(); paintScore();
}

buildStrip();
render();
</script>
</body>
</html>
