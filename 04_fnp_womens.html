<style>
  :root{

<script>
const QUESTIONS = [
{c:"Cervical Cancer Screening",q:"A 24-year-old female presents for her annual visit. She became sexually active at age 18 and has no prior abnormal Pap results. Per USPSTF guidelines, what is the correct cervical cancer screening recommendation?",o:["HPV co-testing every 5 years — she is overdue","Pap smear alone every 3 years — no HPV testing until age 30","Pap smear every year — she is high risk due to early sexual debut","No screening until age 25"],a:1,r:"Ages 21-29: cytology (Pap) ALONE every 3 years. HPV testing is NOT recommended under 30 — transient HPV infections are extremely common in young women and almost always clear spontaneously. Adding HPV testing in this age group creates anxiety and unnecessary follow-up. Age of sexual debut does NOT change the starting age (21) or method. Screening ends at 65 with adequate prior screening history."},
{c:"Cervical Cancer Screening",q:"A 38-year-old with no prior abnormal results requests cervical cancer screening. Which is the preferred option for her age group?",o:["Pap smear alone every year","Pap smear alone every 3 years OR HPV/Pap co-testing every 5 years — both are acceptable","HPV co-testing every 10 years","No further screening — she had a normal Pap at age 30"],a:1,r:"Ages 30-65: two acceptable options per USPSTF/ASCCP: (1) Pap smear alone every 3 years, or (2) HPV and Pap co-testing every 5 years, or (3) primary HPV testing alone every 5 years. All three are equivalent in risk reduction. Co-testing or primary HPV testing every 5 years is the most common current practice and the most efficient (fewer tests over a lifetime). Screening STOPS at 65 with adequate prior screening history and no high-grade history."},
{c:"Cervical Cancer Screening",q:"A 28-year-old's Pap smear returns as ASC-US (atypical squamous cells of undetermined significance). Per current ASCCP guidelines, the BEST next step is:",o:["Repeat Pap in 6 months","Immediate colposcopy","Reflex HPV testing — if HPV negative, return to routine screening; if positive, colposcopy","LEEP (loop electrosurgical excision procedure) now"],a:2,r:"ASC-US management per ASCCP 2019: REFLEX HPV testing. If HPV negative → return to routine screening (co-test in 3 years or Pap in 3 years). If HPV positive → colposcopy. For patients under 25 with ASC-US or LSIL: observe without colposcopy (repeat co-test in 1 year) because high-grade disease is unlikely and overtreatment harms future pregnancy outcomes. Immediate LEEP without histologic confirmation is never appropriate."},
{c:"Cervical Cancer Screening",q:"Which Pap smear result ALWAYS requires immediate colposcopy, regardless of HPV status or patient age?",o:["LSIL in a 25-year-old","ASC-US with negative HPV","ASC-H (atypical squamous cells — cannot exclude HSIL)","Normal result with positive HR-HPV"],a:2,r:"ASC-H and HSIL always require colposcopy — these results suggest possible high-grade dysplasia (CIN 2/3) and cannot be managed with surveillance alone. ASC-H means 'cannot exclude high-grade squamous intraepithelial lesion.' In contrast: LSIL in young patients (under 25) is observed; ASC-US with negative HPV returns to routine screening. HSIL in a non-pregnant patient may even proceed directly to LEEP (see-and-treat) at the provider's discretion."},
{c:"Contraception",q:"A 30-year-old with migraine WITH aura, smoking history, and hypertension requests combined oral contraceptives. Which factor represents an ABSOLUTE contraindication (CDC MEC Category 4)?",o:["Age 30","Hypertension alone (well-controlled)","Migraine with aura — risk of ischemic stroke","Having previously used OCPs"],a:2,r:"CDC Medical Eligibility Criteria (MEC) Category 4 = absolute contraindication to combined hormonal contraceptives (pill, patch, ring): migraine WITH aura (ischemic stroke risk), current VTE or DVT/PE, ischemic heart disease, stroke, breast cancer (current), liver disease/cirrhosis, age >35 and smoking ≥15 cigarettes/day. Hypertension alone (well-controlled) is Category 3 (relative contraindication). She needs a progestin-only or non-hormonal method."},
{c:"Contraception",q:"A patient using the progestin-only pill (POP / mini-pill) takes her pill 5 hours late. What is the correct guidance?",o:["No action needed — she has a 12-hour window","Take the missed pill immediately and use backup contraception for 48 hours — the POP window is only 3 hours","She has already missed a pill and needs emergency contraception","Skip that day's pill and continue as normal"],a:1,r:"The progestin-only pill has a NARROW 3-hour window (traditional POPs like norethindrone). If taken more than 3 hours late, it should be taken as soon as remembered AND backup contraception (condoms) used for 48 hours. Exception: Slynd (drospirenone POP) has a 24-hour window. Combined OCPs have a more forgiving 12-24 hour missed pill window. This is a commonly tested clinical counseling point — the 3-hour rule distinguishes POP from combined OCP management."},
{c:"Contraception",q:"A 22-year-old who is fully breastfeeding (no supplemental feeds) is 6 weeks postpartum and her periods have not returned. She asks if breastfeeding alone is sufficient contraception. Which criteria must ALL be met for Lactational Amenorrhea Method (LAM) to be effective?",o:["Any breastfeeding provides full protection for 12 months","Fully breastfeeding (no supplemental feeds), amenorrheic, AND less than 6 months postpartum — all three required","Breastfeeding plus any progestin-only method for backup","Amenorrhea alone is sufficient regardless of feeding method"],a:1,r:"LAM is approximately 98% effective ONLY when ALL THREE criteria are met: (1) baby is less than 6 months old; (2) mother is fully/exclusively breastfeeding (no formula, solids, or pump substitution); (3) menstrual periods have not returned. When ANY criterion fails, LAM is no longer reliable and a formal contraceptive method should be initiated. Progestin-only methods (mini-pill, Mirena, implant) are safe during breastfeeding; combined OCPs are avoided in the first 6 weeks (estrogen suppresses milk supply)."},
{c:"Contraception",q:"A nulliparous 25-year-old requests an intrauterine device. She is appropriately counseled that:",o:["IUDs are only approved for parous women","Both hormonal (Mirena, Kyleena) and copper IUDs are safe and effective in nulliparous women; insertion may be more uncomfortable but safety is equivalent","The copper IUD is the only option for nulliparous women","IUD insertion will cause infertility"],a:1,r:"IUDs are SAFE and HIGHLY EFFECTIVE in nulliparous women — the restriction to parous women is outdated. Nulliparous women may experience more cramping and pain during insertion (smaller uterine cavity), but safety and efficacy are equivalent. Nulliparous women should be pre-medicated with NSAIDs before insertion. Infertility is NOT a risk — fertility returns immediately upon removal. IUDs are actually recommended as first-line contraception in adolescents and nulliparous women due to their high efficacy (>99%)."},
{c:"Breast Health",q:"A 32-year-old presents with a smooth, firm, mobile 1.5 cm breast mass discovered on self-exam. There is no skin change, nipple discharge, or axillary lymphadenopathy. Most likely diagnosis and initial evaluation?",o:["Breast cancer — refer for mastectomy","Fibroadenoma — most likely; evaluate with ultrasound as first-line imaging in women under 40","Fibrocystic change — no workup needed","Duct ectasia — discharge is expected"],a:1,r:"A smooth, firm, mobile, well-circumscribed breast mass in a young woman most likely represents a FIBROADENOMA — the most common benign breast tumor in women under 30. Evaluation: ultrasound is preferred for women under 40 (denser breast tissue limits mammogram sensitivity). Mammogram preferred age 40+. Any solid mass requires tissue diagnosis (core needle biopsy) to confirm benignity. Triple assessment: clinical exam + imaging + histology. Fibroadenomas can be monitored if biopsy confirms benignity."},
{c:"Breast Health",q:"Per USPSTF 2024 updated guidelines, mammography screening for average-risk women should begin at which age?",o:["Age 35 annually","Age 40 biennially (every 2 years)","Age 50 biennially","Age 45 annually"],a:1,r:"USPSTF 2024 update: recommends biennial (every 2 years) mammography screening for ALL women starting at AGE 40 through age 74 (Grade B). This is a significant change from the prior 2016 recommendation that allowed individual choice at 40-49 and recommended screening at 50+. The ACS recommends annual mammograms starting at 45. Know both for boards. Women at HIGH risk (BRCA mutation, prior chest radiation) should start earlier with annual MRI + mammogram."},
{c:"Breast Health",q:"A patient is referred for BRCA genetic counseling. Which personal or family history MOST warrants this referral?",o:["Maternal grandmother with breast cancer at age 72","Personal history of fibroadenoma","Mother diagnosed with breast cancer at age 38 and a maternal aunt with ovarian cancer","Dense breast tissue on mammogram"],a:2,r:"BRCA1/2 testing is indicated when there is significant family history suggesting hereditary breast/ovarian cancer syndrome: breast cancer before age 50 in a first-degree relative, bilateral breast cancer, male breast cancer, ovarian/fallopian tube cancer at any age, or multiple affected relatives especially on the same side of the family. A first-degree relative with breast cancer at 38 PLUS an ovarian cancer history is a strong indication for genetic counseling and BRCA testing. Breast cancer at 72 in a grandmother is less concerning — likely sporadic."},
{c:"Osteoporosis",q:"Per USPSTF, routine DEXA screening for osteoporosis should be initiated for postmenopausal women without known risk factors at which age?",o:["Age 50","Age 60","Age 65","Age 70"],a:2,r:"USPSTF recommends DEXA screening for osteoporosis in: (1) ALL women aged 65 and older (Grade B); (2) postmenopausal women under 65 whose 10-year fracture risk (by FRAX tool) equals or exceeds that of a 65-year-old white woman with no risk factors. Risk factors justifying earlier screening: low body weight, smoking, family history of hip fracture, alcohol use, rheumatoid arthritis, corticosteroid use. FRAX tool is used to estimate 10-year fracture probability."},
{c:"Menopause",q:"A 53-year-old reports hot flashes, night sweats, and vaginal dryness. Her last menstrual period was 14 months ago. How is menopause diagnosed, and when is FSH testing useful?",o:["Menopause requires FSH >50 mIU/mL for confirmation","Menopause is a CLINICAL diagnosis: 12 consecutive months of amenorrhea without another cause — FSH testing is NOT routinely needed in typical presentations","Menopause requires estradiol <20 pg/mL","An endometrial biopsy must confirm menopause"],a:1,r:"Menopause = clinical diagnosis: 12 consecutive months of amenorrhea without another pathologic cause, in the expected age range. FSH fluctuates widely during perimenopause — a single elevated FSH does NOT confirm menopause. FSH testing IS useful in: women under 45 (premature ovarian insufficiency), women on hormonal contraception masking periods, or atypical presentations. Genitourinary syndrome of menopause (vaginal dryness, dyspareunia, urinary symptoms) is distinct from vasomotor symptoms and may persist long-term."},
{c:"Menopause",q:"A 51-year-old with intact uterus requests hormone replacement therapy for severe hot flashes. She has no personal history of breast cancer, VTE, or cardiovascular disease. Which regimen is appropriate?",o:["Estrogen only — simplest regimen","Combined estrogen + progestogen — estrogen alone causes endometrial hyperplasia and cancer in women with a uterus","Progesterone only — estrogen is always contraindicated","Testosterone only for libido"],a:1,r:"Women with an INTACT UTERUS must receive combined estrogen + progestogen therapy — unopposed estrogen causes endometrial hyperplasia and endometrial carcinoma. Women who have had a HYSTERECTOMY can safely use estrogen alone. Contraindications to HRT: undiagnosed vaginal bleeding, personal history of breast cancer, active or prior VTE, active liver disease, coronary artery disease in older postmenopausal women (timing hypothesis). Benefits: vasomotor symptom relief, mood, bone protection, urogenital symptoms."},
{c:"Menopause",q:"A 55-year-old cannot take hormone replacement therapy due to a prior history of breast cancer. She has severe hot flashes affecting her sleep and quality of life. Best pharmacologic alternative?",o:["Topical estrogen cream only","SSRIs (paroxetine — only FDA-approved) or SNRIs (venlafaxine), or gabapentin — all have evidence for vasomotor symptoms","Medroxyprogesterone (progesterone alone) is the safest option after breast cancer","Only lifestyle modification — no pharmacologic alternatives exist"],a:1,r:"Non-hormonal options for vasomotor symptoms with evidence: SSRIs (paroxetine 7.5 mg — the only FDA-approved non-hormonal option; also escitalopram, citalopram off-label), SNRIs (venlafaxine, desvenlafaxine), gabapentin, clonidine (less commonly used). Avoid SSRIs (especially paroxetine, fluoxetine) with tamoxifen — CYP2D6 inhibition reduces tamoxifen conversion to its active metabolite endoxifen. Also know: fezolinetant (Veozah) — a newer non-hormonal FDA-approved option (NK3 receptor antagonist, 2023)."},
{c:"PCOS",q:"A 26-year-old has irregular periods (8-10 per year), excess facial hair, and acne. Ultrasound shows 14 follicles in the right ovary. Which diagnostic criteria are met, and what is the diagnosis?",o:["Hypothyroidism — check TSH first","Primary ovarian insufficiency — FSH will be elevated","PCOS — she meets 3 of 3 Rotterdam criteria: oligo-ovulation, hyperandrogenism, and polycystic ovaries","Hyperprolactinemia — prolactin will be elevated"],a:2,r:"PCOS (Rotterdam criteria, 2003): diagnosis requires 2 of 3: (1) oligo- or anovulation (irregular periods); (2) clinical or biochemical hyperandrogenism (excess hair, acne, elevated testosterone); (3) polycystic ovarian morphology on ultrasound (≥12 follicles in one ovary or ovarian volume >10 mL). She meets ALL THREE. Must EXCLUDE other causes first: thyroid disease (TSH), hyperprolactinemia (prolactin), congenital adrenal hyperplasia (17-hydroxyprogesterone), and Cushing syndrome. PCOS is the most common endocrine disorder in women of reproductive age."},
{c:"PCOS",q:"A 28-year-old with PCOS desires contraception and improved menstrual regularity. She has no contraindications to estrogen. First-line treatment?",o:["Clomiphene citrate","Metformin alone","Combined oral contraceptive pill — regulates cycles, reduces androgens, and provides contraception","Spironolactone alone"],a:2,r:"Combined OCP is first-line for PCOS management in women desiring contraception: (1) regulates menstrual cycles (reducing endometrial hyperplasia risk from unopposed estrogen); (2) suppresses LH (reducing ovarian androgen production); (3) increases SHBG (reducing free testosterone); (4) provides contraception. Metformin is added for insulin resistance or if OCP is not tolerated. Spironolactone (anti-androgen) is added for persistent hirsutism not controlled by OCP alone. Clomiphene/letrozole are for ovulation induction when pregnancy is desired."},
{c:"Endometriosis",q:"A 29-year-old has progressive cyclic pelvic pain, dysmenorrhea, dyspareunia, and dyschezia. Pelvic ultrasound is normal. What is the gold standard diagnostic test, and what is first-line management?",o:["MRI pelvis — if normal, no further workup needed","Empiric treatment is appropriate; gold standard diagnosis is laparoscopy with biopsy — initial management is NSAIDs and hormonal suppression (OCP or progestin)","CA-125 level — confirms endometriosis if elevated","Pelvic floor physical therapy only"],a:1,r:"Endometriosis: endometrial-like tissue outside the uterus causing cyclic pain. Classic symptoms: dysmenorrhea (pain with periods), dyspareunia (pain with intercourse), dyschezia (pain with defecation — rectal involvement), and infertility. Gold standard: LAPAROSCOPY with histologic biopsy. However, empiric treatment is appropriate if presentation is classic: NSAIDs for pain + hormonal suppression (combined OCP, progestin, or GnRH agonist/antagonist). CA-125 is elevated in endometriosis but is NOT diagnostic — too nonspecific."},
{c:"PID",q:"A 23-year-old presents with lower abdominal pain, cervical motion tenderness, and mucopurulent cervical discharge. Temperature is 38.2°C. WBC is elevated. Minimum criteria for PID diagnosis and outpatient treatment?",o:["Diagnosis requires laparoscopy for confirmation","Minimum criteria: uterine or adnexal tenderness OR cervical motion tenderness — treat empirically; outpatient regimen is ceftriaxone 500 mg IM + doxycycline 100 mg BID x14 days + metronidazole 500 mg BID x14 days","Requires positive chlamydia or gonorrhea culture before treating","Only admit to hospital — all PID requires IV antibiotics"],a:1,r:"PID diagnosis is CLINICAL — minimum criteria per CDC: uterine tenderness, adnexal tenderness, OR cervical motion tenderness (CMT) in a sexually active woman with no other cause. Treat empirically. Outpatient regimen (2021 CDC): ceftriaxone 500 mg IM x1 (1g if >150 kg) + doxycycline 100 mg BID + metronidazole 500 mg BID x14 days. HOSPITALIZE for: inability to tolerate oral meds, surgical emergency not excluded, tubo-ovarian abscess, pregnancy, severe illness, treatment failure after 72 hours outpatient."},
{c:"Ectopic Pregnancy",q:"A 28-year-old with a positive pregnancy test has unilateral pelvic pain and light vaginal bleeding. Transvaginal ultrasound shows no intrauterine gestational sac. Serum beta-hCG is 2,800 mIU/mL. Most likely diagnosis and next step?",o:["Normal early intrauterine pregnancy — repeat ultrasound in 1 week","Ectopic pregnancy must be excluded — beta-hCG above the discriminatory zone (1,500-2,000) with no IUP on TVUS is highly suspicious; urgent gynecology referral","Inevitable abortion — expectant management","Molar pregnancy — check AFP"],a:1,r:"When beta-hCG exceeds the discriminatory zone (~1,500-2,000 mIU/mL) and no intrauterine gestational sac is visible on transvaginal ultrasound, ectopic pregnancy must be excluded urgently. Risk factors: prior ectopic, PID, IUD, tubal surgery, assisted reproduction. Treatment: hemodynamically stable → methotrexate (if criteria met); unstable or ruptured → emergency surgery. Never assume a slow-rising hCG means inevitable abortion without ruling out ectopic first — rupture can be fatal."},
{c:"Abnormal Uterine Bleeding",q:"A 58-year-old postmenopausal woman reports a single episode of vaginal bleeding 3 years after her last period. She has no history of hormone therapy. Most appropriate next step?",o:["Reassure — one episode is likely atrophic vaginitis","Prescribe vaginal estrogen cream empirically","Endometrial biopsy and/or transvaginal ultrasound — postmenopausal bleeding is endometrial cancer until proven otherwise","Repeat Pap smear first"],a:2,r:"ANY postmenopausal vaginal bleeding must be evaluated for endometrial carcinoma — the most common gynecologic cancer. Evaluation: transvaginal ultrasound (endometrial stripe >4-5 mm warrants biopsy) AND/OR endometrial biopsy (Pipelle sampling — office procedure, well-tolerated). Do not assume atrophy without tissue confirmation, especially with a single episode and no prior atrophy diagnosis. Most common cause IS atrophy, but endometrial cancer must be excluded first. Risk factors: obesity, diabetes, PCOS, unopposed estrogen, tamoxifen, Lynch syndrome."},
{c:"Dysmenorrhea",q:"A 20-year-old has severe crampy pelvic pain beginning 1-2 days before her period and lasting 3 days. Pelvic exam and ultrasound are normal. First-line treatment?",o:["Oral contraceptive pills","NSAIDs (ibuprofen or naproxen) started 1-2 days before onset and continued through the first 2 days of menses","Opioids for breakthrough pain","Surgical referral for laparoscopy"],a:1,r:"Primary dysmenorrhea (no underlying pathology) is caused by excessive prostaglandin production causing uterine cramping and ischemia. First-line: NSAIDs (prostaglandin synthesis inhibitors) — most effective when started 1-2 days BEFORE expected onset (preemptive dosing) and continued around-the-clock (not PRN) through the first 2 days. If NSAIDs inadequate: combined OCP (reduces prostaglandins by thinning endometrium). Secondary dysmenorrhea (endometriosis, fibroids, adenomyosis) should be suspected if onset is late-cycle, progressive worsening, or associated with infertility/dyspareunia."},
{c:"PMDD",q:"A 34-year-old reports severe irritability, hopelessness, and inability to concentrate during the 10 days before each period, with complete resolution 2-3 days after onset. These symptoms cause her to miss work monthly. Diagnosis and first-line treatment?",o:["Major depressive disorder — start SSRI continuously","PMS — lifestyle changes only","Premenstrual dysphoric disorder (PMDD) — SSRIs, either continuous or luteal-phase dosing","Bipolar disorder — mood stabilizer"],a:2,r:"PMDD: severe mood and physical symptoms (irritability, depression, anxiety, breast tenderness, bloating) in the LUTEAL PHASE (after ovulation), resolving within days of menstruation. Key: symptoms must cause functional impairment and be confirmed prospectively over 2 cycles (not just recalled). First-line: SSRIs — uniquely, they can be given either CONTINUOUSLY or LUTEAL-PHASE ONLY (14 days before menses), both effective. OCPs (particularly drospirenone-containing — Yaz) are second-line. PMS is milder and doesn't meet PMDD criteria."},
{c:"Amenorrhea",q:"A 26-year-old woman has had no menstrual periods for 5 months. She is sexually active and uses condoms. Which test should be ordered FIRST?",o:["TSH","Serum prolactin","FSH and LH","Urine or serum beta-hCG (pregnancy test)"],a:3,r:"Pregnancy must ALWAYS be ruled out first in secondary amenorrhea — before any other workup. After excluding pregnancy, the systematic evaluation includes: TSH (hypothyroidism), prolactin (hyperprolactinemia), FSH/LH (to distinguish ovarian from hypothalamic-pituitary cause). Causes of secondary amenorrhea by frequency: pregnancy (most common), hypothalamic amenorrhea (stress, low weight, exercise), hyperprolactinemia, thyroid disease, PCOS, premature ovarian insufficiency. Always start with the pregnancy test."},
{c:"Amenorrhea",q:"A 32-year-old has secondary amenorrhea and serum prolactin of 140 ng/mL. TSH is normal. Next best step?",o:["Start bromocriptine empirically","MRI of the pituitary gland to evaluate for prolactinoma","Repeat prolactin in 6 months only","Start combined OCP"],a:1,r:"Hyperprolactinemia (prolactin >25 ng/mL) with amenorrhea and/or galactorrhea warrants pituitary MRI to evaluate for PROLACTINOMA — the most common pituitary tumor. Symptoms: amenorrhea, galactorrhea, headaches, visual field changes (bitemporal hemianopsia if large). Treatment: dopamine agonists (cabergoline — first-line; bromocriptine — safe in pregnancy). Other causes of elevated prolactin: hypothyroidism, medications (antipsychotics, metoclopramide, domperidone, SSRIs), pregnancy, stress, nipple stimulation."},
{c:"Prenatal Care",q:"A 28-year-old at 10 weeks gestation asks about folic acid. She has no prior pregnancies. What is the appropriate counseling?",o:["Start 4 mg folic acid — high dose is always recommended","Folic acid 400-800 mcg daily for all pregnant women; 4 mg daily only for women with prior neural tube defect, diabetes, seizure medications (valproate, carbamazepine), or obesity","Folic acid is only needed in the first 4 weeks — she has missed the window","No folic acid is needed after the first trimester"],a:1,r:"Standard folic acid: 400-800 mcg (0.4-0.8 mg) daily — ideally starting at least 1 month before conception and continuing through the first trimester (neural tube closes at 4-6 weeks). HIGH-DOSE 4 mg daily: prior child with NTD, personal history of NTD, diabetes (pre-gestational), use of folate antagonists (valproate, carbamazepine, methotrexate), BMI >35. The patient at 10 weeks has not missed the window — folic acid continues throughout pregnancy and supports overall development."},
{c:"Prenatal Care",q:"Which prenatal screening test is performed between 35-37 weeks gestation, and what treatment is given if positive?",o:["Down syndrome screening — no treatment in pregnancy","Gestational diabetes screen — diet modification only","Group B Streptococcus (GBS) culture of vaginal-rectal swab — IV penicillin G during active labor if colonized","HIV test — start antiretroviral therapy immediately"],a:2,r:"GBS (Streptococcus agalactiae) vaginal-rectal swab at 35-37 weeks. If colonized: IV penicillin G during active labor (preferred) or ampicillin. Alternative if penicillin allergic with LOW allergy risk: cefazolin. High penicillin allergy risk (anaphylaxis): obtain GBS susceptibility and use clindamycin or vancomycin. GBS in the neonate causes sepsis, pneumonia, and meningitis. Colonized mothers without intrapartum prophylaxis have ~1/200 risk of GBS disease in their newborn."},
{c:"Prenatal Care",q:"An Rh-negative mother at 28 weeks gestation has an Rh-positive partner and no prior sensitization (negative indirect Coombs test). What is indicated?",o:["No action needed until delivery","Rho(D) immune globulin (RhoGAM) 300 mcg at 28 weeks AND within 72 hours of delivery if newborn is Rh-positive","Amniocentesis to determine fetal blood type now","Rho(D) immune globulin only if there is maternal bleeding"],a:1,r:"Rh sensitization prevention: Rho(D) immune globulin 300 mcg IM at 28 weeks gestation (antepartum prophylaxis) AND within 72 hours of delivery of an Rh-positive newborn (postpartum). Also give after any event with possible fetal-maternal hemorrhage: spontaneous or therapeutic abortion, amniocentesis, CVS, external cephalic version, trauma, ectopic pregnancy. Once sensitized (positive indirect Coombs), RhoGAM is no longer helpful — focus shifts to fetal monitoring for hydrops fetalis."},
{c:"Preeclampsia",q:"A 31-year-old G1P0 at 36 weeks gestation has BP 148/92 on two readings 4 hours apart, and 2+ proteinuria. She has no symptoms. Diagnosis and management?",o:["Gestational hypertension — no proteinuria required; manage outpatient","Preeclampsia without severe features — hospitalize or close outpatient monitoring; consider delivery at 37 weeks","Chronic hypertension — was present before 20 weeks","HELLP syndrome — check platelet count and liver enzymes only"],a:1,r:"Preeclampsia: new-onset hypertension (BP ≥140/90) after 20 weeks WITH proteinuria (≥300 mg/24hr or protein:creatinine ratio ≥0.3) OR end-organ damage (thrombocytopenia, renal insufficiency, impaired liver function, pulmonary edema, new headache, visual disturbance). Preeclampsia WITHOUT severe features: BP 140-159/90-109, mild proteinuria. Management: hospitalize or close outpatient monitoring; delivery at 37 weeks is recommended. Magnesium sulfate is given DURING LABOR for seizure prophylaxis."},
{c:"Preeclampsia",q:"A patient with preeclampsia develops a seizure at 38 weeks gestation. What is the immediate treatment for the seizure and ongoing prevention?",o:["IV lorazepam for seizure; continue with observation only","IV or IM magnesium sulfate — treatment of choice for eclamptic seizures AND for seizure prophylaxis in severe preeclampsia","Phenytoin IV loading dose","Immediate cesarean section without medication"],a:1,r:"Eclampsia = new-onset seizure in the context of preeclampsia. MAGNESIUM SULFATE is the treatment of choice for eclamptic seizures AND for prevention of eclampsia in severe preeclampsia — it is NOT a standard antiepileptic drug (doesn't work for other seizure types). Mechanism: reduces cerebral vasospasm and lowers neuronal excitability. Toxicity: loss of deep tendon reflexes (first sign), respiratory depression, cardiac arrest. Antidote: calcium gluconate IV. Delivery is the definitive cure for preeclampsia/eclampsia."},
{c:"Gestational Diabetes",q:"A 30-year-old at 26 weeks gestation has a 1-hour 50g glucose challenge test result of 155 mg/dL (normal <140). Next step?",o:["Diagnose gestational diabetes and start insulin immediately","Proceed to 3-hour 100g oral glucose tolerance test to confirm diagnosis","Repeat the 1-hour test in 2 weeks","Diagnose GDM based on this single elevated result and start medical nutrition therapy"],a:1,r:"GDM screening protocol: 1-hour 50g GCT at 24-28 weeks. If ≥140 mg/dL (some centers use ≥130) → proceed to 3-HOUR 100g OGTT for diagnosis. GDM is diagnosed if 2 or more of the 4 values are abnormal (Carpenter-Coustan criteria). Management: medical nutrition therapy (diet/exercise) first; if glucose targets not met → insulin (preferred in pregnancy) or metformin/glyburide (second-line, less preferred). GDM increases risk of macrosomia, shoulder dystocia, neonatal hypoglycemia, and long-term maternal/child diabetes risk."},
{c:"Postpartum",q:"A 29-year-old who delivered 3 weeks ago reports persistent sadness, crying, difficulty bonding with her baby, and feeling like a terrible mother. She denies thoughts of harming herself or her baby. How is this distinguished from postpartum blues, and what is the treatment?",o:["This is postpartum blues — it always resolves by 2 weeks and requires no treatment","Postpartum DEPRESSION — persists beyond 2 weeks, causes functional impairment; first-line is SSRIs (sertraline preferred while breastfeeding) and therapy","Postpartum psychosis — needs emergency hospitalization","No treatment needed — normal new mother adjustment"],a:1,r:"Postpartum blues: mood lability, tearfulness, beginning within 2-4 days of delivery, resolves within 2 WEEKS — no treatment needed. Postpartum DEPRESSION: persistent symptoms beyond 2 weeks causing functional impairment — requires treatment. Screening: Edinburgh Postnatal Depression Scale (EPDS) — score ≥13 indicates likely depression. First-line: SSRIs (sertraline has the least breast milk transfer — preferred while breastfeeding) + psychotherapy (CBT). Postpartum psychosis (hallucinations, delusions, confusion) is a psychiatric emergency requiring hospitalization."},
{c:"IPV Screening",q:"Per USPSTF recommendations, which women should be screened for intimate partner violence (IPV)?",o:["Only women presenting with injuries","Women over 40 with a prior history of IPV only","All women of reproductive age — screening is recommended regardless of symptoms (Grade B)","Only during prenatal visits"],a:2,r:"USPSTF Grade B recommendation: screening for IPV in ALL WOMEN OF REPRODUCTIVE AGE (approximately 14-46 years) and referring those who screen positive to intervention services. IPV affects 1 in 4 women and is associated with depression, PTSD, chronic pain, unintended pregnancy, STIs, and injury. Ask in a private setting (never with partner present). Validated tools: HITS (Hurt, Insult, Threaten, Scream) or HARK. Universal precautions: ask all women, not just those appearing at risk."},
{c:"Urinary Incontinence",q:"A 52-year-old reports leaking urine when she coughs, sneezes, or exercises. She denies urgency. Pelvic floor exam shows hypermobility. Which type of incontinence is this, and what is first-line treatment?",o:["Urge incontinence — treat with oxybutynin","Stress incontinence — first-line is pelvic floor muscle exercises (Kegel exercises) and lifestyle modifications","Overflow incontinence — catheterize to assess post-void residual","Mixed incontinence — treat both with anticholinergics and surgery"],a:1,r:"Stress urinary incontinence: leakage with increased intra-abdominal pressure (cough, sneeze, exercise, laugh) — caused by urethral hypermobility or intrinsic sphincter deficiency. First-line: pelvic floor muscle training (PFMT/Kegel exercises) — evidence-based, effective in 50-70% of women. Also: weight loss if obese, reduce fluid/caffeine intake. Second-line: pessary, bladder neck support devices. Surgical: mid-urethral sling (most effective long-term). Urge incontinence (OAB): urgency-driven leakage — treated with bladder training and anticholinergics/beta-3 agonists."},
{c:"Female Athlete Triad",q:"A 19-year-old competitive gymnast has not had a menstrual period in 8 months, has stress fractures of both tibias, and restricts her diet to maintain low body weight for competition. This presentation is best described as:",o:["Anorexia nervosa only — refer to psychiatry","Female athlete triad: low energy availability, menstrual dysfunction, and low bone mineral density — requires multidisciplinary management","Hypothyroidism — check TSH and treat","Normal physiologic adaptation to intense training"],a:1,r:"Female athlete triad: three interrelated conditions (now part of the broader Relative Energy Deficiency in Sport — RED-S framework): (1) low energy availability (with or without disordered eating); (2) menstrual dysfunction (including amenorrhea, oligomenorrhea); (3) low bone mineral density (stress fractures, osteopenia). Treatment requires a multidisciplinary team: sports medicine, dietitian, psychologist. Increasing caloric intake and reducing training load are the foundation. Hormonal contraceptives do NOT adequately restore bone density — energy availability is the key intervention."},
{c:"Fibroids",q:"A 37-year-old has heavy menstrual bleeding, a 10-week size uterus on exam, and pelvic pressure. Ultrasound confirms multiple uterine fibroids. She has completed childbearing. Initial medical management includes:",o:["Immediate surgical referral only","NSAIDs, combined hormonal contraceptives, or levonorgestrel IUD for menorrhagia management; GnRH agonists for short-term size reduction before surgery","High-dose progesterone indefinitely","No treatment — fibroids always regress after menopause"],a:1,r:"Uterine fibroids (leiomyomas): most common benign gynecologic tumor (incidence much higher in Black women). Symptoms: heavy menstrual bleeding (most common), bulk symptoms (pressure, urinary frequency), and subfertility. Medical management: combined OCP/hormonal IUD (reduce bleeding), NSAIDs (reduce blood loss), GnRH agonists (shrink fibroids preoperatively, cause amenorrhea — max 6 months due to bone loss). Surgical: myomectomy (fertility-sparing), hysterectomy (definitive). Uterine fibroid embolization is a non-surgical option."},
{c:"Vulvovaginal Candidiasis",q:"A patient presents with intense vulvar pruritus and thick white 'cottage cheese' discharge. Vaginal pH is 4.0. Microscopy shows pseudohyphae. First-line treatment for uncomplicated candidiasis?",o:["Metronidazole 500 mg BID x7 days","Fluconazole 150 mg orally once, OR topical azole for 1-7 days","Doxycycline 100 mg BID x7 days","Azithromycin 1 g orally once"],a:1,r:"Vulvovaginal candidiasis (VVC): intense pruritus, thick white discharge, normal-to-low pH (3.8-4.5 — distinguishes from BV and trichomoniasis), pseudohyphae or budding yeast on KOH prep. Treatment for UNCOMPLICATED VVC: fluconazole 150 mg oral single dose OR topical azole cream/suppository (miconazole, clotrimazole). Complicated VVC (recurrent ≥4 episodes/year, severe, immunocompromised, non-albicans species): fluconazole x3 doses every 72 hours, then weekly maintenance for 6 months. Metronidazole treats BV; doxycycline/azithromycin treat chlamydia."},
{c:"Ovarian Conditions",q:"A 24-year-old presents to urgent care with sudden-onset severe right lower quadrant pain, nausea, and vomiting. Ultrasound shows an enlarged right ovary with absent Doppler flow. Most urgent diagnosis to exclude?",o:["Appendicitis — send to surgery","Ovarian torsion — gynecologic surgical emergency requiring prompt surgical intervention","Ruptured ovarian cyst — manage conservatively","Ectopic pregnancy — check beta-hCG"],a:1,r:"Ovarian torsion: sudden, severe unilateral pelvic pain (often colicky, with nausea/vomiting), ovarian enlargement on ultrasound, absent or decreased Doppler flow. This is a SURGICAL EMERGENCY — the ovarian pedicle twists, cutting off blood supply; delay leads to ovarian necrosis. Risk factors: ovarian cysts (especially dermoid), ovarian hyperstimulation syndrome (OHSS), prior torsion. Beta-hCG should be checked to exclude ectopic, but absent Doppler with acute pain requires emergent gynecology involvement regardless."},
{c:"Prenatal Screening",q:"A 34-year-old is 11 weeks pregnant. Which first-trimester combined screening test estimates risk for chromosomal abnormalities?",o:["Quad screen (AFP, hCG, estriol, inhibin A)","First-trimester combined screening: nuchal translucency ultrasound + PAPP-A + free beta-hCG — screens for Trisomy 21, 18, and 13","Amniocentesis — diagnostic, not screening","Cell-free fetal DNA (cfDNA) alone is always the best first step"],a:1,r:"First-trimester combined screening (10-13 weeks): nuchal translucency (NT) ultrasound + PAPP-A (pregnancy-associated plasma protein A) + free beta-hCG. Detects ~85-90% of Down syndrome cases. Quad screen is a SECOND-trimester screening option (15-20 weeks). Cell-free fetal DNA (NIPT/cfDNA) has the highest sensitivity/specificity for aneuploidy but is currently offered as screening to high-risk patients (age ≥35, prior affected pregnancy, abnormal ultrasound) — increasingly offered to all patients. Amniocentesis is DIAGNOSTIC (direct karyotype) — offered after abnormal screening."},
{c:"Genitourinary Syndrome",q:"A 58-year-old postmenopausal woman not on HRT reports vaginal dryness, dyspareunia, and recurrent UTIs. Which treatment is both safe and targeted for these symptoms, even in breast cancer survivors?",o:["Systemic oral estrogen is the only effective treatment","Vaginal lubricants and moisturizers for symptom relief; low-dose vaginal estrogen (cream, ring, or tablet) has minimal systemic absorption and is generally safe even after breast cancer (in consultation with oncology)","Avoid all estrogen in any form after menopause","Topical testosterone only"],a:1,r:"Genitourinary syndrome of menopause (GSM): vaginal atrophy, dryness, dyspareunia, urinary urgency and recurrent UTIs caused by estrogen deficiency. Local vaginal estrogen (low-dose cream, Vagifem tablets, Estring ring) has MINIMAL systemic absorption — much safer than oral HRT. Most guidelines allow use even after hormone receptor-positive breast cancer, in consultation with oncology. Ospemifene (oral SERM) and intravaginal DHEA (prasterone) are non-estrogen alternatives. Lubricants/moisturizers relieve symptoms but do not treat the underlying atrophy."},
{c:"Endometrial Cancer",q:"A 62-year-old obese woman with type 2 diabetes and hypertension presents with postmenopausal vaginal bleeding. Which risk factor MOST increases her risk of endometrial cancer?",o:["Hypertension","Nulliparity — but only in women under 50","Obesity and diabetes — through unopposed estrogen from peripheral aromatization of androgens in adipose tissue","Age alone — endometrial cancer only occurs after 70"],a:2,r:"Endometrial cancer risk factors: obesity (adipose tissue converts androgens to estrone — unopposed estrogen stimulates endometrial proliferation), type 2 diabetes, hypertension, nulliparity, late menopause, PCOS, unopposed estrogen therapy, tamoxifen use, and Lynch syndrome. Obesity is the STRONGEST modifiable risk factor — overweight women have 2-3x the risk; obese women 3-10x. Postmenopausal bleeding in an obese, diabetic woman requires IMMEDIATE evaluation (TVUS + endometrial biopsy). Oral contraceptives and progestin use are PROTECTIVE."},
{c:"Thyroid in Pregnancy",q:"A woman with known hypothyroidism on levothyroxine 100 mcg daily becomes pregnant at 6 weeks. TSH at confirmation is 3.1 mIU/L. How should her levothyroxine be managed?",o:["No change — TSH is within normal range","Increase the levothyroxine dose by approximately 25-30% immediately — pregnancy increases thyroid hormone demand starting in the first trimester","Discontinue levothyroxine — thyroid disease improves in pregnancy","Switch to liothyronine (T3) for better placental transfer"],a:1,r:"Pregnancy increases thyroid hormone demand by approximately 30-50% due to: increased TBG (thyroid-binding globulin) from estrogen, fetal thyroid hormone needs, increased renal iodine clearance, and placental deiodinase activity. TSH goals in pregnancy are LOWER than non-pregnant: first trimester <2.5 mIU/L, second/third <3.0 mIU/L (some guidelines allow up to 4.0). Empirically increase levothyroxine dose by 25-30% (e.g., take 2 extra doses per week) upon confirmed pregnancy and recheck TSH every 4-6 weeks. Untreated hypothyroidism risks: miscarriage, preterm birth, impaired fetal neurodevelopment."}
,
{c:"Contraception",q:"A 19-year-old requests the most effective reversible contraception available. She has no contraindications. Which option has the lowest typical-use failure rate?",o:["Combined oral contraceptive pill (0.3% perfect use, 7% typical)","Male condom (2% perfect, 13% typical)","Subdermal implant (Nexplanon) — less than 0.1% typical use","Contraceptive patch (0.3% perfect, 7% typical)"],a:2,r:"Long-acting reversible contraceptives (LARCs) — implant and IUDs — have the LOWEST failure rates because they eliminate user error. Nexplanon (etonogestrel subdermal implant): <0.1% failure rate with both perfect and typical use, effective for 3 years. Hormonal IUDs (Mirena 7 years, Kyleena 5 years) and copper IUD (10-12 years): also <1% typical use. Typical-use failure reflects real-world use including missed doses — user-dependent methods (pill, patch, ring, condom) have significantly higher typical-use failure rates than perfect-use rates."},
{c:"STI Screening",q:"Per CDC and USPSTF recommendations, which women should be screened for chlamydia and gonorrhea annually?",o:["All sexually active women, regardless of age","All sexually active women aged 24 and under, plus older women at increased risk (new or multiple partners, inconsistent condom use)","Only women with symptoms","Only women with a prior STI history"],a:1,r:"USPSTF Grade B: annual chlamydia and gonorrhea screening for all sexually active women ≤24 years old, and for older women at increased risk (new or multiple sexual partners, inconsistent condom use, prior STI, sex work, illicit drug use). Many chlamydia and gonorrhea infections are asymptomatic — untreated cases lead to PID, tubal infertility, and chronic pelvic pain. Screening is done via NAAT (nucleic acid amplification test) on vaginal swab or urine. Also screen for syphilis and HIV based on risk."},
{c:"Vulvar Conditions",q:"A 68-year-old postmenopausal woman has chronic vulvar pruritus and a white, parchment-like, crinkled appearance of the vulvar skin with loss of labial architecture. Biopsy confirms lichen sclerosus. First-line treatment?",o:["Topical antifungal (clotrimazole)","Topical ultra-potent corticosteroid (clobetasol propionate) — first-line for lichen sclerosus","Systemic estrogen","Vulvectomy"],a:1,r:"Lichen sclerosus: chronic inflammatory skin condition, most common in postmenopausal women; white, atrophic, fragile skin with figure-of-eight pattern around vulva and anus. Intense pruritus, dyspareunia. NOT a yeast infection — antifungals are ineffective. First-line: ultra-potent topical corticosteroid (clobetasol propionate 0.05%) — initial intensive course then maintenance. Critical: untreated or inadequately treated lichen sclerosus has ~5% lifetime risk of vulvar squamous cell carcinoma. Long-term follow-up is essential."},
{c:"Contraception",q:"A 38-year-old smoker (1 ppd) requests combined oral contraceptives. Why is this a concern?",o:["Smoking reduces OCP effectiveness","Women over 35 who smoke ≥15 cigarettes per day: combined hormonal contraceptives are CDC MEC Category 4 (contraindicated) due to markedly elevated VTE and stroke risk","Smoking causes irregular bleeding on OCPs only — continue with close monitoring","Only applicable to smokers over 45"],a:1,r:"Women ≥35 who smoke ≥15 cigarettes per day: combined estrogen-containing contraceptives are CDC MEC Category 4 (ABSOLUTE contraindication). The combination of estrogen (promotes clotting) + smoking (endothelial damage, prothrombotic) + age (baseline cardiovascular risk) creates unacceptable VTE, stroke, and MI risk. Light smokers (<15 cig/day) age ≥35: CDC MEC Category 3 (relative contraindication — risks outweigh benefits). Safe alternatives: progestin-only methods, IUD, implant, condoms — none of which carry the same cardiovascular risk."},
{c:"Ovarian Cancer",q:"USPSTF currently recommends which approach to ovarian cancer screening in average-risk asymptomatic women?",o:["Annual CA-125 and transvaginal ultrasound starting at age 50","Annual transvaginal ultrasound alone starting at 45","USPSTF recommends AGAINST routine ovarian cancer screening — harms outweigh benefits in average-risk women","CA-125 every 2 years starting at menopause"],a:2,r:"USPSTF Grade D: recommends AGAINST routine screening for ovarian cancer with CA-125 or transvaginal ultrasound in asymptomatic average-risk women. Reason: no evidence of mortality reduction, and false positives lead to invasive diagnostic surgeries with serious complications (bowel injury, bleeding, infection, infertility) in women who do not have cancer. High-risk women (BRCA1/2 mutation, Lynch syndrome, strong family history) should be referred to genetics and managed through specialized surveillance protocols, not population screening."},
{c:"Prenatal Care",q:"A first-trimester prenatal visit includes a standard laboratory panel. Which test is included SPECIFICALLY to identify a potentially curable cause of congenital hearing loss, blindness, and neurologic damage?",o:["ABO/Rh blood type","Rubella immunity (IgG antibody)","CBC for anemia","Urine culture for asymptomatic bacteriuria"],a:1,r:"Rubella (IgG antibody) is checked at the first prenatal visit to assess immunity. Non-immune pregnant women exposed to rubella risk congenital rubella syndrome in the fetus: cataracts, congenital heart defects (PDA, pulmonary artery stenosis), sensorineural hearing loss, microcephaly, and intellectual disability. Non-immune pregnant women CANNOT receive the live MMR vaccine during pregnancy — they receive it POSTPARTUM and are counseled to avoid pregnancy for 4 weeks after vaccination. Other first-trimester labs: CBC, blood type/antibody screen, rubella, syphilis (RPR/VDRL), hepatitis B (HBsAg), HIV, urine culture, cervical STI screening."},
{c:"Abnormal Uterine Bleeding",q:"A 42-year-old with irregular heavy menstrual bleeding has a 14 mm endometrial stripe on ultrasound and an endometrial biopsy showing simple endometrial hyperplasia WITHOUT atypia. Best management?",o:["Immediate hysterectomy","Observation only for 6 months","Progestin therapy (oral or levonorgestrel IUD) and repeat biopsy in 3-6 months","Radiation therapy"],a:2,r:"Endometrial hyperplasia WITHOUT atypia: low malignant potential (~1-3% risk of progression). First-line: PROGESTIN THERAPY — cyclic or continuous progestins (medroxyprogesterone acetate) or the levonorgestrel IUD (Mirena is highly effective — direct intrauterine progestin delivery). Repeat biopsy in 3-6 months to confirm regression. Hyperplasia WITH atypia has 25-40% risk of concurrent or developing endometrial cancer — hysterectomy is generally recommended. Treating the underlying cause (obesity, unopposed estrogen) is also essential."},
{c:"Breastfeeding",q:"A new mother asks which medications are contraindicated during breastfeeding. Which is the most important one to counsel about?",o:["Acetaminophen","Sertraline","Codeine — FDA black box warning after infant deaths in ultra-rapid CYP2D6 metabolizer mothers","Ibuprofen"],a:2,r:"Codeine is contraindicated in breastfeeding mothers (FDA black box warning): codeine is converted by CYP2D6 to morphine. Ultra-rapid metabolizers (genetic variant) produce dangerously high morphine concentrations in breast milk, causing fatal neonatal respiratory depression. Several infant deaths have been reported. Tramadol carries a similar risk. Safe analgesics while breastfeeding: acetaminophen and ibuprofen (first-line). Sertraline has the best safety profile among SSRIs in breastfeeding (lowest breast milk transfer). LactMed (NIH database) is the go-to reference for medication safety in lactation."}
];

const N = QUESTIONS.length;
let idx = 0;
let answers = new Array(N).fill(null); // selected option index
const LETTERS = ["A","B","C","D"];

const strip = document.getElementById("strip");
const qcard = document.getElementById("qcard");
const resultsCard = document.getElementById("results");

function buildStrip(){
  strip.innerHTML = "";
  for(let i=0;i<N;i++){
    const t = document.createElement("div");
    t.className = "tick";
    t.title = "Question " + (i+1);
    t.addEventListener("click", ()=>{ idx = i; render(); });
    strip.appendChild(t);
  }
}
function paintStrip(){
  const ticks = strip.children;
  for(let i=0;i<N;i++){
    const t = ticks[i];
    t.className = "tick";
    if(answers[i] !== null){
      t.classList.add(answers[i] === QUESTIONS[i].a ? "ok" : "bad");
    }
    if(i === idx && !resultsVisible()) t.classList.add("cur");
  }
}
function resultsVisible(){ return !resultsCard.classList.contains("hide"); }

function counts(){
  let done=0, right=0;
  for(let i=0;i<N;i++){
    if(answers[i]!==null){ done++; if(answers[i]===QUESTIONS[i].a) right++; }
  }
  return {done,right};
}
function paintScore(){
  const {done,right} = counts();
  document.getElementById("sc-done").textContent = done;
  document.getElementById("sc-right").textContent = right;
}

function render(){
  resultsCard.classList.add("hide");
  qcard.classList.remove("hide");
  const Q = QUESTIONS[idx];
  const picked = answers[idx];
  let html = "";
  html += '<div class="meta"><span class="qnum">QUESTION ' + (idx+1) + ' / ' + N + '</span><span class="chip">' + Q.c + '</span></div>';
  html += '<p class="stem">' + Q.q + '</p>';
  Q.o.forEach((opt,i)=>{
    let cls = "opt";
    if(picked !== null){
      if(i === picked && picked === Q.a) cls += " sel-ok";
      else if(i === picked) cls += " sel-bad";
      else if(i === Q.a) cls += " reveal-ok";
    }
    html += '<button class="'+cls+'" data-i="'+i+'" '+(picked!==null?"disabled":"")+'><span class="ltr">'+LETTERS[i]+'</span><span>'+opt+'</span></button>';
  });
  if(picked !== null){
    const good = picked === Q.a;
    html += '<div class="verdict '+(good?"ok":"bad")+'">'+(good ? "Correct" : "Incorrect — answer is " + LETTERS[Q.a])+'</div>';
    html += '<div class="rationale">'+Q.r+'</div>';
  }
  html += '<div class="nav">';
  html += '<button class="btn ghost" id="prevBtn" '+(idx===0?"disabled":"")+'>Back</button>';
  if(idx < N-1){
    html += '<button class="btn" id="nextBtn">Next question</button>';
  } else {
    html += '<button class="btn" id="finishBtn">See results</button>';
  }
  html += '</div>';
  qcard.innerHTML = html;

  qcard.querySelectorAll(".opt").forEach(btn=>{
    btn.addEventListener("click", ()=>{
      if(answers[idx] !== null) return;
      answers[idx] = parseInt(btn.dataset.i,10);
      render();
    });
  });
  const prev = document.getElementById("prevBtn");
  if(prev) prev.addEventListener("click", ()=>{ idx--; render(); });
  const next = document.getElementById("nextBtn");
  if(next) next.addEventListener("click", ()=>{ idx++; render(); });
  const fin = document.getElementById("finishBtn");
  if(fin) fin.addEventListener("click", showResults);
  paintStrip(); paintScore();
}

function showResults(){
  const {done,right} = counts();
  const pct = done ? Math.round((right/done)*100) : 0;
  // category breakdown
  const cats = {};
  QUESTIONS.forEach((Q,i)=>{
    if(!cats[Q.c]) cats[Q.c] = {n:0, ok:0, ans:0};
    cats[Q.c].n++;
    if(answers[i]!==null){ cats[Q.c].ans++; if(answers[i]===Q.a) cats[Q.c].ok++; }
  });
  let html = '<div class="bigscore">'+right+' / '+done+' ('+pct+'%)</div>';
  html += '<p class="sub">'+(done<N ? (N-done)+' question'+(N-done===1?"":"s")+' unanswered — they are not counted against you. ' : '')+'A passing pace on the real ANCC is roughly the low-to-mid 70s percent range, so use this as a directional gauge, not a verdict.</p>';
  html += '<h2 style="font-size:.95rem;margin-bottom:6px">By category</h2>';
  Object.keys(cats).forEach(c=>{
    const o = cats[c];
    const p = o.ans ? Math.round((o.ok/o.ans)*100) : 0;
    html += '<div class="catrow"><span style="flex:0 0 44%">'+c+'</span><span class="bar"><i style="width:'+(o.ans? p:0)+'%"></i></span><span style="font-family:var(--mono);font-size:.8rem">'+o.ok+'/'+o.ans+(o.ans<o.n?' of '+o.n:'')+'</span></div>';
  });
  // missed list
  const missed = [];
  for(let i=0;i<N;i++) if(answers[i]!==null && answers[i]!==QUESTIONS[i].a) missed.push(i);
  if(missed.length){
    html += '<div class="missedlist"><h2 style="font-size:.95rem;margin-bottom:8px">Review missed questions</h2>';
    missed.forEach(i=>{ html += '<button data-jump="'+i+'">Q'+(i+1)+'</button>'; });
    html += '</div>';
  }
  html += '<div class="nav"><button class="btn ghost" id="backBtn">Back to questions</button><button class="btn" id="resetBtn">Start over</button></div>';
  resultsCard.innerHTML = html;
  resultsCard.classList.remove("hide");
  qcard.classList.add("hide");
  resultsCard.querySelectorAll("[data-jump]").forEach(b=>{
    b.addEventListener("click", ()=>{ idx = parseInt(b.dataset.jump,10); render(); });
  });
  document.getElementById("backBtn").addEventListener("click", ()=>{ render(); });
  document.getElementById("resetBtn").addEventListener("click", ()=>{
    if(confirm("Clear all answers and start over?")){
      answers = new Array(N).fill(null); idx = 0; render();
    }
  });
  paintStrip(); paintScore();
}

buildStrip();
render();
</script>
</body>
</html>
