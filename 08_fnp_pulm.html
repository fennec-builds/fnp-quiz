<script>
const QUESTIONS = [
{c:"Asthma — Acute",q:"A 28-year-old with known asthma arrives with wheezing, respiratory rate 26, O2 sat 91%, and is able to speak in short phrases. This is a moderate exacerbation. What is the correct INITIAL management sequence?",o:["IV corticosteroids only — bronchodilators are not first-line","Supplemental oxygen, SABA (albuterol) via MDI with spacer or nebulizer every 20 minutes x3, systemic corticosteroids, and consider ipratropium for moderate-severe exacerbation","Heliox immediately — reduces airway resistance","Intubation — O2 sat 91% requires mechanical ventilation"],a:1,r:"Moderate asthma exacerbation management: (1) Supplemental O2 to maintain SpO2 ≥93%; (2) SABA (albuterol) every 20 minutes x3 doses then as needed — cornerstone; (3) Systemic corticosteroids (prednisone 40-60 mg/day or methylprednisolone IV) — reduce airway inflammation, reduce relapse, shorten hospitalization; (4) Ipratropium (Atrovent) added to SABA for moderate-severe exacerbations — additional bronchodilation via different mechanism; (5) IV magnesium sulfate 2g for severe exacerbations not responding to above (bronchodilates by inhibiting smooth muscle calcium). Intubation only for impending respiratory failure (altered mental status, worsening CO2, unable to maintain SpO2)."},
{c:"Asthma — Chronic Management",q:"A 19-year-old has asthma with symptoms 4 times per week and waking at night once weekly. She is on low-dose fluticasone (ICS) alone. Symptoms persist. The preferred step-up to Step 3 therapy is:",o:["Add oral prednisone daily","Add theophylline","Add a long-acting beta-agonist (LABA) to the current ICS — NEVER use LABA without ICS in asthma","Increase SABA to scheduled 4x daily"],a:2,r:"NAEPP asthma step therapy Step 3 (mild-moderate persistent inadequately controlled on low-dose ICS): PREFERRED = low-dose ICS + LABA combination. LABA MUST always be combined with ICS in asthma (FDA black box: monotherapy LABAs increase asthma-related death risk). Step 2: low-dose ICS. Step 3: low-dose ICS/LABA OR medium-dose ICS. Step 4: medium-dose ICS/LABA. Step 5: high-dose ICS/LABA ± tiotropium. Step 6: high-dose ICS/LABA + oral corticosteroid. Review and step down therapy if well-controlled for ≥3 months."},
{c:"Asthma — Biologics",q:"A 35-year-old with severe persistent asthma has uncontrolled symptoms on high-dose ICS/LABA. Her blood eosinophil count is 480 cells/mcL and IgE is 85 IU/mL. Which biologic agent targets her specific inflammatory pathway?",o:["Omalizumab (Xolair) — targets IgE, preferred with elevated eosinophils","Mepolizumab (Nucala) or benralizumab (Fasenra) — anti-IL-5 agents target eosinophilic inflammation; indicated for severe eosinophilic asthma","Dupilumab (Dupixent) — most effective for aspirin-exacerbated asthma specifically","Rituximab — anti-CD20 depletes B cells in asthma"],a:1,r:"Biologic targets in severe asthma: Omalizumab (anti-IgE): allergic asthma with elevated IgE ≥30 IU/mL + perennial aeroallergen sensitization; indicated regardless of eosinophil count. Mepolizumab/benralizumab (anti-IL-5/anti-IL-5Rα): eosinophilic asthma (blood eos ≥150-300 cells/mcL). Dupilumab (anti-IL-4Rα): moderate-severe asthma with eosinophilic or OCS-dependent phenotype; also treats atopic dermatitis. Tezepelumab (anti-TSLP): newest, broadest phenotype. This patient's elevated eosinophils (480) and subtherapeutic IgE (85) point to anti-IL-5 therapy."},
{c:"Asthma — Monitoring",q:"A patient's asthma action plan uses peak flow monitoring. Her personal best peak flow is 420 L/min. Today's reading is 220 L/min. In which zone is she and what action is required?",o:["Green zone — continue regular medications","Yellow zone — 50-79% of personal best, increase bronchodilator use and contact provider","Red zone — <50% of personal best (220/420 = 52%... let me recalculate — actually 220/420 = 52%: yellow zone","Red zone — <50% of personal best; 220/420 = 52% → this is the yellow zone, not red"],a:1,r:"Peak flow zones: Green = ≥80% personal best (≥336 L/min here) — well controlled, continue medications. Yellow = 50-79% personal best (210-335 L/min here) — CAUTION, use rescue SABA, consider oral corticosteroids, contact provider. Red = <50% personal best (<210 L/min here) — DANGER, immediate medical attention needed, use SABA, oral corticosteroids, emergency care. 220/420 = 52% = YELLOW ZONE. Action: use SABA immediately and contact provider; if no improvement, go to ED. Peak flow is effort-dependent — always compare to PERSONAL BEST, not predicted value."},
{c:"Asthma — Special",q:"A 24-year-old runner gets wheezing and chest tightness 5-10 minutes after starting exercise, resolving within 30-60 minutes of stopping. She has no symptoms at rest. Management?",o:["Diagnose COPD — exercise-related bronchospasm is not asthma","Pre-treat with 2 puffs of SABA (albuterol) 15-20 minutes before exercise — this is exercise-induced bronchoconstriction (EIB) and is the most effective preventive treatment","Daily ICS is required before any further exercise","Avoid all exercise permanently — EIB is too dangerous"],a:1,r:"Exercise-induced bronchoconstriction (EIB): bronchospasm triggered by exercise, typically peaking 5-15 minutes post-exercise and resolving within 60 minutes. Very common in athletes (10-50% of elite athletes). Management: pre-exercise SABA (2 puffs, 15-20 min before) is most effective and immediate strategy. Additional options: warm-up exercise (refractory period), face mask/scarf in cold air, daily ICS for frequent EIB, LTRA (montelukast) as add-on. EIB does NOT require diagnosis of underlying asthma. Screen athletes for undiagnosed asthma if EIB is frequent or severe."},
{c:"Asthma — Pregnancy",q:"A 26-year-old in her second trimester has moderate persistent asthma. She is concerned about using inhaled corticosteroids during pregnancy. Best counseling?",o:["Stop all asthma medications — no drug is safe in pregnancy","Use ICS only if in the third trimester","Uncontrolled asthma during pregnancy poses greater risks to the mother and fetus than properly managed asthma; ICS are safe (budesonide has the most safety data); continue all indicated controller medications","Switch to oral theophylline — safer in pregnancy than ICS"],a:2,r:"Asthma in pregnancy: the principle is 'it is safer to treat asthma than to leave it uncontrolled.' Uncontrolled asthma → fetal hypoxia, preterm birth, IUGR, preeclampsia. Medications: ICS (budesonide preferred — Category B, most data), SABA (albuterol — safe), systemic corticosteroids for acute exacerbations (preferred over uncontrolled asthma). Theophylline: narrow therapeutic window, frequent monitoring needed — not preferred. LABAs: limited data but generally continued if previously controlled. LTRA (montelukast): limited pregnancy data — generally continued if previously well-controlled. Monitor PFTs and symptoms more frequently during pregnancy."},
{c:"Asthma — Medications",q:"A 32-year-old with asthma and allergic rhinitis was recently started on montelukast (Singulair). Two weeks later his partner reports he has been having nightmares, mood swings, and expressed suicidal thoughts. Most appropriate action?",o:["Continue montelukast — psychiatric symptoms are unrelated","Increase the dose — therapeutic effect has not been reached","Discontinue montelukast immediately — FDA 2020 black box warning for serious neuropsychiatric events including suicidal ideation; symptoms typically resolve after stopping","Add an antidepressant and continue montelukast"],a:2,r:"Montelukast (leukotriene receptor antagonist): FDA 2020 black box warning for serious neuropsychiatric adverse events — depression, suicidal ideation/behavior, aggression, hallucinations, sleep disturbances. Symptoms can occur at ANY age. Discontinue immediately if neuropsychiatric symptoms occur. The FDA now recommends reserving montelukast for patients who cannot achieve control with ICS or who have concurrent allergic rhinitis, after weighing risks. Do not prescribe as first-line when ICS is appropriate. Discuss the risk with patients and caregivers before prescribing."},
{c:"COPD — Diagnosis",q:"A 62-year-old smoker (40 pack-years) with chronic cough and dyspnea has post-bronchodilator spirometry: FEV1 58% predicted, FVC 81% predicted, FEV1/FVC 0.62. GOLD classification?",o:["Normal spirometry — values within acceptable range","GOLD 1 (mild COPD) — FEV1 ≥80%","GOLD 2 (moderate COPD) — post-bronchodilator FEV1/FVC <0.70 confirms COPD; FEV1 50-79% = GOLD 2","Asthma — FEV1/FVC ratio below 0.70 is pathognomonic for asthma"],a:2,r:"COPD diagnosis: post-bronchodilator FEV1/FVC <0.70 (fixed obstruction — does not fully reverse with bronchodilator, unlike asthma). GOLD severity by FEV1 % predicted: GOLD 1 (mild): ≥80%; GOLD 2 (moderate): 50-79%; GOLD 3 (severe): 30-49%; GOLD 4 (very severe): <30%. GOLD 2 + symptoms = initiate long-acting bronchodilator. Spirometry is required to diagnose COPD — clinical history and symptoms alone are insufficient. Always use POST-bronchodilator values to diagnose and classify."},
{c:"COPD — Treatment",q:"A 58-year-old with GOLD 2 COPD has moderate dyspnea (mMRC score 2) with no recent exacerbations. What is the recommended initial pharmacologic therapy?",o:["Inhaled corticosteroid (ICS) alone — reduces inflammation","PRN short-acting bronchodilator (SABA) only","Long-acting muscarinic antagonist (LAMA) such as tiotropium — first-line for most symptomatic COPD; reduces exacerbations, dyspnea, and improves exercise tolerance","Oral prednisone daily — reduces airway inflammation long-term"],a:2,r:"GOLD 2024 COPD treatment by symptom/exacerbation group: Group A (few symptoms, low exacerbation risk): LAMA or LABA; Group B (more symptoms, low risk): LAMA (preferred) or LABA; Group E (high exacerbation risk): LAMA + LABA or LABA + ICS. ICS ALONE is NOT recommended in COPD — always combine with LABA and only when indicated (frequent exacerbations OR blood eosinophils ≥300). LAMA (tiotropium, umeclidinium, aclidinium): superior to LABA alone for reducing exacerbations. Oral corticosteroids: short-term for exacerbations ONLY, not maintenance."},
{c:"COPD — ICS",q:"Under which circumstances should an inhaled corticosteroid (ICS) be ADDED to a COPD patient already on a LAMA + LABA combination?",o:["Always — all COPD patients benefit from ICS","ICS should never be used in COPD — increases pneumonia risk in all patients","When blood eosinophils ≥300 cells/mcL, ≥2 moderate exacerbations or ≥1 hospitalization per year despite dual bronchodilator therapy, or concurrent asthma-COPD overlap","When FEV1 drops below 50%"],a:2,r:"ICS in COPD — GOLD 2024 indications for triple therapy (LAMA + LABA + ICS): (1) Blood eosinophils ≥300 cells/mcL (strongest predictor of ICS response); (2) ≥2 moderate exacerbations or ≥1 severe (hospitalizing) exacerbation per year despite dual bronchodilator therapy; (3) History of concurrent asthma (ACOS). ICS RISKS: increased pneumonia risk (especially with higher doses and lower FEV1), candidiasis, dysphonia, osteoporosis long-term. ICS should NOT be used as monotherapy in COPD. WITHDRAW ICS if: few exacerbations and low eosinophils — can safely reduce without worsening."},
{c:"COPD — Exacerbation",q:"A 70-year-old with GOLD 3 COPD presents with increased dyspnea, increased sputum production, and purulent green sputum for 4 days. He is treated with bronchodilators. Should he receive antibiotics?",o:["No — antibiotics are never indicated for COPD exacerbations","Only if fever is present — purulent sputum alone does not warrant antibiotics","Yes — increased dyspnea + increased sputum + purulent sputum (all 3 Anthonisen criteria) warrants antibiotic therapy; outpatient: amoxicillin-clavulanate, doxycycline, or azithromycin","Only IV antibiotics are appropriate — oral antibiotics are ineffective"],a:2,r:"COPD exacerbation antibiotics — Anthonisen criteria: antibiotics indicated if patient has 2 or more of: (1) increased dyspnea, (2) increased sputum volume, (3) purulent sputum. Having all 3 = type 1 exacerbation = strong antibiotic indication. Most common bacterial causes: H. influenzae, S. pneumoniae, M. catarrhalis; Pseudomonas in severe COPD. Outpatient (mild-moderate): amoxicillin-clavulanate, doxycycline, or azithromycin x5-7 days. Severe/hospitalized: respiratory fluoroquinolone or beta-lactam. Also: short-course oral corticosteroids (prednisone 40 mg x5 days) for exacerbations."},
{c:"COPD — Oxygen",q:"A 66-year-old with severe COPD (GOLD 3) has resting PaO2 of 54 mmHg and SpO2 of 87% on room air. She has mild polycythemia. Which statement about long-term oxygen therapy (LTOT) is correct?",o:["LTOT is not indicated unless PaO2 falls below 40 mmHg","LTOT should only be used at night","LTOT is indicated (PaO2 ≤55 or SpO2 ≤88%); use ≥15-18 hours/day; improves survival — one of the only interventions proven to reduce mortality in COPD alongside smoking cessation","LTOT is never used in ambulatory patients — only for mechanical ventilation"],a:2,r:"Long-term oxygen therapy (LTOT) indications: PaO2 ≤55 mmHg OR SpO2 ≤88% at rest; OR PaO2 56-59 mmHg with cor pulmonale, polycythemia (Hct >56%), or signs of right heart failure. Use ≥15-18 hours/day. Benefits: improves survival, reduces pulmonary hypertension progression, improves exercise tolerance, reduces polycythemia. Target SpO2 88-92% in COPD (avoid excessive O2 → hypoxic drive suppression → CO2 retention). Two interventions proven to reduce COPD mortality: smoking cessation (most important) and LTOT (in those who qualify)."},
{c:"COPD — Rehab",q:"A 65-year-old with GOLD 3 COPD is on optimal inhaler therapy but remains breathless with ADLs. He asks if anything else can help. What is the most important non-pharmacologic intervention supported by evidence?",o:["Vitamin D supplementation — prevents exacerbations","Breathing exercises at home without professional supervision","Pulmonary rehabilitation — supervised exercise training + education significantly improves dyspnea, exercise capacity, and quality of life; reduces hospitalizations; does NOT improve FEV1","Avoid all exercise — rest preserves lung function"],a:2,r:"Pulmonary rehabilitation (PR): multidisciplinary program including exercise training, education, and behavioral support. Evidence: reduces dyspnea (most important benefit), improves exercise tolerance, improves health-related quality of life, reduces hospital admissions and readmissions. Does NOT improve FEV1 or slow disease progression. Indicated for GOLD 2-4 with persistent symptoms despite optimal pharmacotherapy. Also indicated post-exacerbation (reduces 30-day readmission). Underutilized despite strong evidence. Insurance coverage exists for eligible COPD patients. Not a cure — combination with optimal medications is most effective."},
{c:"COPD — Alpha-1 Antitrypsin",q:"A 45-year-old non-smoker develops emphysema predominantly in the lower lobes. Her FEV1/FVC is 0.61 and FEV1 is 52%. Her father had emphysema at age 40. What should be suspected and tested?",o:["Asthma — lower lobe emphysema is classic for asthma","Hypersensitivity pneumonitis — lower lobe distribution suggests antigen exposure","Alpha-1 antitrypsin (A1AT) deficiency — early-onset emphysema in a non-smoker or light smoker, lower lobe predominance, family history; test serum A1AT level and phenotype","Normal — emphysema always occurs in the upper lobes"],a:2,r:"Alpha-1 antitrypsin deficiency: autosomal recessive, most common genetic cause of emphysema. Normally A1AT inhibits neutrophil elastase — deficiency allows unchecked elastin destruction. Features: early-onset emphysema (age 30-50), lower lobe predominance (opposite of smoking-related upper lobe emphysema), non-smoker or light smoker, liver disease (cirrhosis). Diagnosis: serum A1AT level + phenotype (PIZZ = most severe). Normal: MM genotype. Treatment: smoking cessation (critical), standard COPD treatment, IV A1AT augmentation therapy (alpha-1 proteinase inhibitor) weekly for severe deficiency with FEV1 25-65% predicted. Screen all patients with COPD at least once."},
{c:"Pulmonary Function Tests",q:"A 55-year-old presents with progressive dyspnea. Spirometry: FVC 58% predicted, FEV1 61% predicted, FEV1/FVC 0.82. TLC on plethysmography is 65% predicted. Which pattern is this and what diseases cause it?",o:["Obstructive pattern — COPD or asthma","Mixed obstructive/restrictive pattern","Restrictive pattern — FVC reduced, FEV1/FVC normal or elevated, TLC reduced; causes: ILD (IPF, sarcoidosis), neuromuscular disease, pleural disease, obesity, chest wall deformity","Normal — values within two standard deviations of mean"],a:2,r:"Restrictive lung disease pattern: FVC reduced, FEV1 proportionally reduced, FEV1/FVC NORMAL or INCREASED (>70%), TLC reduced (gold standard for restriction). Causes: intrinsic lung disease (IPF, sarcoidosis, hypersensitivity pneumonitis), pleural disease (effusion, mesothelioma), neuromuscular disease (ALS, myasthenia, diaphragm paralysis), chest wall/skeletal (kyphoscoliosis, ankylosing spondylitis), obesity. Compare: obstructive pattern = FEV1/FVC <0.70, FEV1 reduced proportionally more than FVC. TLC is normal in pure obstruction and reduced in restriction — TLC measurement distinguishes the two when FVC is reduced."},
{c:"Pulmonary Function Tests",q:"A 40-year-old with suspected asthma has normal spirometry at rest. He has intermittent wheezing and dyspnea. Which test would confirm airway hyperresponsiveness?",o:["Single-breath diffusion capacity (DLCO) — most sensitive for asthma","Peak flow monitoring for 2 weeks","Methacholine challenge test — a fall in FEV1 ≥20% at a concentration ≤16 mg/mL (PC20) confirms airway hyperresponsiveness","High-resolution CT (HRCT) — confirms mucosal thickening"],a:2,r:"Methacholine challenge test: used when spirometry is NORMAL but asthma is suspected. Methacholine (cholinergic agonist) is inhaled in increasing doses — causes bronchoconstriction in hyperreactive airways. POSITIVE result: FEV1 drops ≥20% from baseline at a concentration (PC20) ≤8-16 mg/mL. High sensitivity for asthma — a NEGATIVE test effectively rules out asthma as the cause of symptoms. NOT specific for asthma — also positive in COPD, allergic rhinitis, CHF. CONTRAINDICATIONS: FEV1 <60-65% predicted (risk of severe bronchospasm), recent MI, uncontrolled HTN, pregnancy. Stop all bronchodilators before testing."},
{c:"Pulmonary Function Tests",q:"A patient with emphysema-predominant COPD has a reduced DLCO (diffusing capacity of CO). What does a reduced DLCO indicate?",o:["Reduced lung volumes only — DLCO is not related to alveolar damage","Increased airway resistance — DLCO measures bronchial caliber","Reduced alveolar surface area available for gas exchange — emphysema destroys alveolar walls; DLCO is the most sensitive test for emphysema and is reduced in conditions that impair gas transfer","DLCO is never reduced in COPD — only in restrictive disease"],a:2,r:"DLCO (diffusing capacity of the lungs for carbon monoxide): measures the ability of the alveolar-capillary membrane to transfer gas. Reduced DLCO causes: emphysema (alveolar wall destruction reduces surface area), IPF and other ILD (thickened membrane), pulmonary vascular disease (PE, pulmonary hypertension — reduced capillary blood volume), anemia. DLCO is NORMAL or INCREASED in: asthma (no alveolar damage), pulmonary hemorrhage (extra Hgb in alveoli absorbs CO), heart failure (congested pulmonary vasculature). COPD: FEV1/FVC distinguishes obstructive pattern; DLCO is low in emphysema-predominant COPD but may be near-normal in chronic bronchitis."},
{c:"Lung Cancer — Screening",q:"A 55-year-old with a 25 pack-year history of smoking who quit 8 years ago asks about lung cancer screening. Per USPSTF 2021 updated guidelines, is he eligible?",o:["No — he quit smoking over 5 years ago so screening is no longer indicated","No — must be at least 60 years old","Yes — annual low-dose CT screening is recommended for adults 50-80 who currently smoke or quit within the past 15 years AND have ≥20 pack-year history","Only eligible if he has a first-degree relative with lung cancer"],a:2,r:"USPSTF 2021 lung cancer screening (Grade B): annual LDCT for adults ages 50-80 who meet ALL criteria: (1) ≥20 pack-year history; (2) Currently smoke OR quit within the past 15 years. He qualifies: age 55, 25 pack-years, quit 8 years ago (<15 years). Updated from prior 2013 recommendation (ages 55-80, 30 pack-years). Annual screening continues until: age 80, quit >15 years ago, or health status limits curative intent treatment. Shared decision-making includes discussing false positives and potential for invasive workup. Reduces lung cancer mortality by ~20% in eligible population."},
{c:"Lung Cancer",q:"A 58-year-old smoker has a central lung mass on CT, mediastinal lymphadenopathy, and is found to have serum sodium of 125 mEq/L (SIADH). Biopsy shows small, oat-shaped cells with scant cytoplasm. What type of lung cancer is this and what is the management priority?",o:["Non-small cell lung cancer — surgery is first-line","Small cell lung cancer (SCLC) — limited stage, chemoradiation; extensive stage, chemotherapy; SCLC is very chemo/radiation sensitive but rarely surgically curable; SIADH is a classic paraneoplastic syndrome","Squamous cell carcinoma — associated with hypercalcemia","Adenocarcinoma — found peripherally, associated with EGFR mutations"],a:1,r:"Small cell lung cancer (SCLC): 15-20% of lung cancers. Features: central location, rapid growth, early mediastinal involvement, paraneoplastic syndromes (SIADH — most common, Cushing's from ectopic ACTH, Lambert-Eaton myasthenic syndrome, cerebellar ataxia). Staging: limited (confined to one hemithorax + mediastinum, can be encompassed in one radiation field) vs extensive. Treatment: EXTREMELY chemo/radiation sensitive initially (carboplatin + etoposide + atezolizumab) — but most relapse. Surgery is rarely appropriate (very limited disease only). Median survival: limited ~15-20 months, extensive ~8-13 months. Non-small cell lung cancer (NSCLC): adenocarcinoma (peripheral, EGFR/ALK mutations, non-smokers), squamous (central, hypercalcemia via PTHrP, smokers), large cell."},
{c:"Lung Cancer",q:"A 54-year-old construction worker presents with right shoulder pain radiating to the ulnar aspect of his right arm, with drooping of his right eyelid, constricted right pupil, and absent right forehead sweating. Chest X-ray shows a right apical lung mass. What is this syndrome?",o:["Cervical disc herniation — C8 radiculopathy","Pancoast tumor (superior sulcus) with Horner's syndrome — right apical mass invading the sympathetic chain and brachial plexus","Brachial plexus birth injury — Erb's palsy","Myasthenia gravis — ptosis with variable features"],a:1,r:"Pancoast tumor: primary lung cancer arising in the superior sulcus (lung apex). Compression of adjacent structures: (1) Brachial plexus (C8-T1) → arm pain radiating to 4th/5th fingers, intrinsic hand muscle weakness; (2) Sympathetic chain → Horner's syndrome: ipsilateral ptosis (partial), miosis, anhidrosis, enophthalmos; (3) Subclavian vessels → arm edema. Most common type: squamous cell carcinoma. MRI chest for staging (evaluates vascular/neural involvement). Treatment: combined concurrent chemoradiation followed by surgery if resectable. Any ptosis + small pupil + absent sweating on the same side as a lung mass = classic Pancoast presentation."},
{c:"Pleural Disease",q:"A 65-year-old with CHF has a new right-sided pleural effusion. Thoracentesis: pleural fluid protein 1.8 g/dL, serum protein 6.2 g/dL (ratio 0.29), pleural LDH 98 IU/L, serum LDH 310 IU/L (ratio 0.32), pleural LDH <2/3 ULN. How are these results interpreted?",o:["Exudate — likely malignancy; further workup needed","Transudate — all three Light's criteria are negative (ratio <0.5, <0.6, <2/3 ULN); consistent with CHF","Exudate — CHF always causes exudative effusions","Indeterminate — repeat thoracentesis in 2 weeks"],a:1,r:"Light's criteria for exudate — requires ANY ONE of: (1) Pleural fluid protein/serum protein ratio >0.5; (2) Pleural fluid LDH/serum LDH ratio >0.6; (3) Pleural fluid LDH >2/3 upper limit of normal serum LDH. This patient meets NONE → TRANSUDATE. Transudative causes: CHF (most common, ~75% bilateral), cirrhosis, nephrotic syndrome, hypoalbuminemia, atelectasis. Exudative causes: malignancy, pneumonia/parapneumonic effusion, PE, TB, rheumatoid arthritis, pancreatitis. Caveat: CHF treated with diuretics can mimic exudate (serum protein concentrates). Serum-effusion albumin gradient >1.2 g/dL suggests transudate despite apparent exudate."},
{c:"Pleural Disease",q:"A 50-year-old develops a right pneumonia with parapneumonic effusion. Thoracentesis reveals pleural fluid pH 7.18, LDH 1,400, glucose 38 mg/dL, and frank pus on gross inspection. What does this finding require?",o:["Continue antibiotics and repeat thoracentesis in 1 week","Decortication surgery immediately — no drainage options","Immediate tube thoracostomy (chest tube) drainage — complicated parapneumonic effusion (pH <7.2, glucose <60, LDH >1000, or frank empyema) requires drainage in addition to antibiotics","Broad-spectrum antibiotics alone will resolve this"],a:2,r:"Complicated parapneumonic effusion / empyema indications for DRAINAGE: pH <7.2 (most important), glucose <60 mg/dL, LDH >1000 IU/L, positive Gram stain or culture, loculated effusion, frank pus (empyema). This patient meets multiple criteria — chest tube is mandatory. Antibiotics alone cannot penetrate the pleural space adequately when empyema is present. If loculated: intrapleural fibrinolytics (tPA + DNase) or video-assisted thoracoscopic surgery (VATS) for decortication. Uncomplicated parapneumonic: responds to antibiotics alone (pH >7.3, glucose >60, no bacteria)."},
{c:"Pleural Disease",q:"A 22-year-old tall, thin male develops sudden left-sided pleuritic chest pain and dyspnea while playing video games. Chest X-ray shows 25% left pneumothorax with a visible pleural line. He is hemodynamically stable. Appropriate management?",o:["Immediate chest tube (large-bore, 28 Fr) — all pneumothoraces require chest tube","No treatment — all primary spontaneous pneumothoraces resolve spontaneously","Needle aspiration or small-bore chest tube, with consideration for hospital observation — a large primary spontaneous pneumothorax with symptoms warrants intervention","Emergency thoracotomy — pneumothorax is always a surgical emergency"],a:2,r:"Primary spontaneous pneumothorax (PSP): young, thin males, no underlying lung disease, usually from rupture of apical blebs. Management based on size and symptoms: Small PSP (<2 cm or <20% hemithorax) AND stable AND minimal symptoms: 100% O2 (speeds reabsorption), observe 3-6 hours, discharge if stable. Large PSP (≥2 cm or ≥20%) OR symptomatic: needle aspiration (simple and effective in PSP) or small-bore chest tube. Secondary spontaneous pneumothorax (underlying lung disease): always more aggressive management — hospitalize and chest tube. Tension pneumothorax: hemodynamic instability, tracheal deviation — immediate needle decompression."},
{c:"Pulmonary Embolism",q:"A 45-year-old woman, 3 weeks post-hip surgery, presents with sudden dyspnea and pleuritic chest pain. HR 108, BP 118/76, RR 22, SpO2 94%. She has right calf swelling. Wells PE score is 6 (high probability). Most appropriate next step?",o:["D-dimer only — if negative, PE is excluded","Ventilation-perfusion (V/Q) scan — preferred over CT","CT pulmonary angiography (CTPA) — high pretest probability requires definitive imaging; D-dimer is not useful here (high probability patients should go directly to imaging)","Echocardiography alone is sufficient"],a:2,r:"Wells PE score interpretation: <2 = low probability → PERC rule or D-dimer; 2-6 = intermediate → D-dimer or CTPA; >4-6 = high probability → go directly to CTPA (D-dimer is not useful — will be positive due to high pretest probability, but a negative D-dimer would be unreliable at high probability). CTPA is the gold standard for PE diagnosis (fast, accurate, widely available). V/Q scan preferred when: contrast allergy, pregnancy (lower radiation to fetus), renal insufficiency. Start anticoagulation empirically in high-probability patients while waiting for imaging if bleeding risk is acceptable."},
{c:"Pulmonary Embolism",q:"A patient is confirmed to have a massive pulmonary embolism with sustained hypotension (BP 78/50) unresponsive to IV fluids. She has no contraindications to thrombolysis. What is the treatment?",o:["Anticoagulation alone with heparin — never use thrombolytics outside of MI","Systemic thrombolysis (alteplase 100 mg IV over 2 hours) — massive PE with hemodynamic compromise is the primary indication","IVC filter only — it removes the clot without bleeding risk","Emergency surgical embolectomy is always required before any medical therapy"],a:1,r:"Massive PE (high-risk PE): PE + sustained hypotension (SBP <90 mmHg for >15 min, or need for vasopressors), cardiogenic shock, or cardiac arrest. Treatment: SYSTEMIC THROMBOLYSIS — alteplase 100 mg IV over 2 hours. Reduces right heart strain, improves hemodynamics. Risk: major bleeding (~10%), intracranial hemorrhage (~2%). Absolute contraindications: prior intracranial hemorrhage, ischemic stroke <3 months, active bleeding, known intracranial neoplasm. If thrombolytics are contraindicated → catheter-directed therapy or surgical embolectomy. Submassive PE (hemodynamically stable but RV strain): anticoagulation first; consider thrombolytics for clinical deterioration. Standard anticoagulation (DOAC preferred): all confirmed PE without massive."},
{c:"Sleep Disorders",q:"A 52-year-old obese male snores loudly, has witnessed apneas by his wife, and wakes unrefreshed. Epworth Sleepiness Scale score is 16/24 (excessive). Home sleep apnea test shows AHI of 22 events/hour. Diagnosis and first-line treatment?",o:["Primary insomnia — start zolpidem","Narcolepsy — schedule polysomnography with MSLT","Moderate obstructive sleep apnea (AHI 15-29/hour) — CPAP is the gold standard treatment; improves AHI, daytime somnolence, blood pressure, and quality of life","Mild OSA — lifestyle counseling only, no CPAP needed"],a:2,r:"OSA severity by AHI (apnea-hypopnea index per hour of sleep): Mild: 5-14; Moderate: 15-29; Severe: ≥30. Diagnosis requires: AHI ≥15 regardless of symptoms, OR AHI ≥5 with symptoms (excessive daytime sleepiness, witnessed apneas, or 3 of: choking/gasping, hypertension, BMI >35, AF, T2DM, heart failure). Home sleep apnea test (HSAT): acceptable for uncomplicated suspected OSA; polysomnography (PSG) for complex cases. CPAP: gold standard — provides positive airway pressure, splints airway open. Alternatives: mandibular advancement device (mild-moderate OSA), positional therapy, upper airway surgery (uvulopalatopharyngoplasty for selected patients). Weight loss reduces AHI significantly."},
{c:"Sleep Disorders",q:"A 58-year-old with BMI 42 and known OSA on CPAP has a morning ABG showing PaCO2 of 52 mmHg. She reports waking with headaches. Diagnosis?",o:["CPAP non-compliance — increase CPAP pressure","Hypercapnic respiratory failure — needs immediate intubation","Obesity hypoventilation syndrome (OHS) — daytime hypercapnia (PaCO2 >45 mmHg) in the setting of obesity without another cause; CPAP treats the OSA component but BiPAP may be needed for OHS-related hypercapnia","Normal finding — PaCO2 up to 55 is normal in obesity"],a:2,r:"Obesity hypoventilation syndrome (OHS): BMI ≥30 + daytime hypercapnia (PaCO2 >45 mmHg) + absence of other cause (COPD, neuromuscular disease). Mechanism: obesity reduces chest wall compliance → increased work of breathing → ventilatory failure. OSA coexists in 70-90%. CPAP addresses OSA but may be insufficient for daytime hypercapnia. BiPAP (bilevel PAP): delivers higher pressure on inspiration (IPAP) and lower on expiration (EPAP) — provides ventilatory support. Treatment: weight loss (most effective, potentially curative), BiPAP, tracheostomy for refractory cases. Untreated OHS: cor pulmonale, pulmonary hypertension, increased mortality vs OSA alone."},
{c:"Sleep Disorders",q:"Which validated screening tool assesses OSA risk, and what threshold suggests high risk requiring further evaluation?",o:["Epworth Sleepiness Scale ≥10 alone is diagnostic for OSA","STOP-BANG score ≥3 indicates high OSA risk — Snoring, Tired, Observed apneas, Pressure (HTN), BMI >35, Age >50, Neck >40 cm, Gender male","Berlin Questionnaire only — STOP-BANG is not validated","PHQ-9 score — depression often mimics sleep apnea"],a:1,r:"STOP-BANG questionnaire: 8 binary (yes/no) questions. Each 'yes' = 1 point. Score 0-2: low risk; 3-4: intermediate risk; ≥5: high risk (or ≥3 with ANY 2 of: male, BMI >35, neck >40 cm). High sensitivity (>90%) for moderate-severe OSA. Used in preoperative anesthesia assessment (undiagnosed OSA → increased perioperative risk). Epworth Sleepiness Scale: measures daytime sleepiness (0-24 scale) — ≥10 = excessive daytime sleepiness, not diagnostic. Berlin Questionnaire: another validated tool. STOP-BANG is most widely used in clinical practice due to its simplicity and high sensitivity."},
{c:"Interstitial Lung Disease",q:"A 65-year-old male with a history of smoking presents with 2 years of progressive exertional dyspnea and dry cough. Exam reveals fine inspiratory 'Velcro' crackles at lung bases and digital clubbing. HRCT shows honeycombing and traction bronchiectasis in a basal, subpleural distribution. PFTs show restriction with reduced DLCO. Diagnosis and treatment?",o:["COPD — start LAMA inhaler","Hypersensitivity pneumonitis — remove the causative antigen","Idiopathic pulmonary fibrosis (IPF) — antifibrotic therapy (pirfenidone or nintedanib); avoid corticosteroids which worsen outcomes","Sarcoidosis — bilateral hilar lymphadenopathy and respond to corticosteroids"],a:2,r:"IPF (idiopathic pulmonary fibrosis): UIP (usual interstitial pneumonia) pattern on HRCT — honeycombing ± traction bronchiectasis, basal predominant, subpleural (pathognomonic). Age >60, male, smoker, progressive dry cough + dyspnea. Velcro crackles + clubbing are characteristic. PFTs: restriction + reduced DLCO. Treatment: antifibrotic agents (pirfenidone or nintedanib) slow the rate of FVC decline — do NOT improve or stabilize; they reduce progression. AVOID corticosteroids in IPF (the PANTHER trial showed harm). Prognosis: poor, median survival 2-5 years from diagnosis. Refer for lung transplant evaluation early. Pulmonary rehab and supplemental oxygen for hypoxia."},
{c:"Interstitial Lung Disease",q:"A 38-year-old pigeon breeder develops dyspnea, cough, and low-grade fever 4-6 hours after cleaning her pigeon coops. Symptoms improve when she is away from home. HRCT shows ground-glass opacities and centrilobular nodules. BAL shows lymphocytosis. Diagnosis?",o:["Acute eosinophilic pneumonia — treat with corticosteroids","Usual interstitial pneumonia (IPF) — antifibrotic therapy","Hypersensitivity pneumonitis (bird fancier's lung) — remove exposure to avian antigens; corticosteroids for acute episodes; chronic HP can lead to irreversible fibrosis","Sarcoidosis — systemic corticosteroids"],a:2,r:"Hypersensitivity pneumonitis (HP): immune-mediated lung disease from sensitization to inhaled organic antigens. Classic examples: Bird fancier's/pigeon breeder's lung (avian proteins — feathers, droppings), Farmer's lung (thermophilic actinomycetes in moldy hay), Hot tub lung (NTM — Mycobacterium avium), Ventilation pneumonitis. Temporal relationship between exposure and symptoms is key (4-8 hours post-exposure for acute HP). Removal of antigen: cornerstone of treatment. Corticosteroids for acute symptomatic episodes. Chronic HP: ongoing exposure → progressive fibrosis that may be irreversible. Distinguish from IPF: younger age, identifiable antigen, BAL lymphocytosis, lack of honeycombing initially."},
{c:"Interstitial Lung Disease",q:"A 35-year-old Black woman presents with bilateral hilar lymphadenopathy on chest X-ray, uveitis, and elevated ACE level. Serum calcium is 11.2 mg/dL. PFTs show mild restriction. Diagnosis and most common indication for treatment?",o:["Lymphoma — order CT-guided biopsy and refer to oncology immediately","Tuberculosis — start RIPE therapy","Sarcoidosis — treat when symptomatic or when there is significant pulmonary function decline, cardiac involvement, neurologic involvement, or hypercalcemia","Normal variant — bilateral hilar lymphadenopathy is common in Black women"],a:2,r:"Sarcoidosis: multisystem granulomatous disease (non-caseating granulomas). Most common in Black women, ages 20-40. Classic pulmonary presentation: bilateral hilar lymphadenopathy (BHL) ± parenchymal infiltrates, restriction on PFTs. Extrapulmonary: uveitis (leading cause of vision loss), skin (lupus pernio, erythema nodosum), cardiac (arrhythmias, heart block — leading cause of sarcoid death), neurosarcoid (CN VII palsy most common), hypercalcemia (1,25-OH vitamin D production by granulomas). Elevated ACE: nonspecific marker (positive in ~75% of active sarcoid). Lung stages I-IV. Treatment: systemic corticosteroids for symptomatic disease, significant pulmonary involvement, cardiac, ocular, or neurologic disease, or hypercalcemia. Stage I (BHL only) often remits spontaneously."},
{c:"Occupational Lung Disease",q:"A 60-year-old retired shipyard worker has progressive exertional dyspnea, dry cough, and basilar crackles. Chest X-ray shows bilateral lower lobe reticular opacities and pleural plaques. HRCT confirms lower lobe fibrosis. He has a 40-year history of shipyard asbestos exposure. What is his GREATEST cancer risk?",o:["Bladder cancer from asbestos fibers in the urine","Colorectal cancer — asbestos is a colorectal carcinogen","Malignant mesothelioma of the pleura (or peritoneum) — the only cancer essentially caused exclusively by asbestos; also significantly increases lung cancer risk (synergistic with smoking)","Leukemia — asbestos causes bone marrow suppression"],a:2,r:"Asbestos exposure causes: (1) Asbestosis — dose-dependent diffuse interstitial fibrosis (lower lobes, basilar crackles, similar to IPF); (2) Pleural plaques — calcified plaques, marker of past exposure, does not cause symptoms but confirms exposure; (3) Malignant mesothelioma — pleural or peritoneal malignancy essentially exclusive to asbestos; latency 20-50 years; no smoking synergy (unlike lung cancer); poor prognosis; (4) Lung cancer — asbestos + smoking = synergistic increase (50x the risk of smoking alone). Mesothelioma is the cancer uniquely associated with asbestos. Pleural plaques alone without fibrosis do NOT cause functional impairment."},
{c:"Occupational Lung Disease",q:"A 55-year-old sandblaster develops progressive dyspnea and bilateral upper lobe nodules with 'eggshell' calcification of hilar lymph nodes on chest X-ray. He has worked in a quarry for 25 years. Diagnosis and major complication?",o:["Cystic fibrosis — standard CFTR modulator therapy","Coal worker's pneumoconiosis — observe only","Silicosis from crystalline silica exposure — associated with dramatically increased risk of tuberculosis reactivation (silicotuberculosis) and progression to complicated silicosis (progressive massive fibrosis)","Asbestosis — basilar fibrosis expected, not upper lobe nodules"],a:2,r:"Silicosis: inhalation of crystalline silica (SiO2). At-risk occupations: sandblasting, quarry work, tunneling, foundry work, stone cutting. HRCT: upper lobe nodules (distinguishes from asbestosis — lower lobe), eggshell calcification of hilar/mediastinal lymph nodes (pathognomonic). Three forms: acute (massive exposure, rapidly fatal), accelerated (10-year exposure), chronic (≥10 years, most common). Major complication: SILICO-TUBERCULOSIS — silica impairs macrophage function → dramatically increased TB risk; screen for and treat LTBI in all silicosis patients. Also: increased lung cancer risk. Progressive massive fibrosis (PMF): conglomerate fibrotic masses when nodules coalesce."},
{c:"Critical Care",q:"A 42-year-old develops acute respiratory failure after sepsis from pneumonia. Chest X-ray shows bilateral infiltrates. ABG: PaO2 58 mmHg on FiO2 0.80 (P/F ratio 58/0.8 = 72.5). Echo shows no cardiac cause. How is this classified?",o:["Acute cardiogenic pulmonary edema — treat with diuretics","Type 2 (hypercapnic) respiratory failure — ventilate with BiPAP","Severe ARDS — Berlin criteria: acute onset, bilateral infiltrates not fully explained by effusion, non-cardiac, P/F ratio ≤100 on PEEP ≥5 cmH2O; requires lung-protective ventilation","COPD exacerbation — systemic steroids and bronchodilators"],a:2,r:"ARDS Berlin criteria (requires ALL): (1) Acute onset within 1 week of precipitant; (2) Bilateral opacities on CXR/CT not fully explained by effusion, atelectasis, or nodules; (3) Not fully explained by cardiac failure/fluid overload (echo to exclude if no clear precipitant); (4) PaO2/FiO2 ratio on PEEP ≥5: Mild 201-300, Moderate 101-200, Severe ≤100. P/F ratio <100 = SEVERE ARDS. Management: lung-protective ventilation (tidal volume 6 mL/kg IBW, plateau pressure ≤30 cmH2O), PEEP optimization, prone positioning for severe ARDS (>12 hours/day — reduces mortality). Neuromuscular blockade for severe early ARDS. Conservative fluid after resuscitation."},
{c:"Critical Care",q:"A 70-year-old with advanced COPD and FEV1 30% presents with confusion, worsening dyspnea, pH 7.28, PaCO2 68 mmHg, PaO2 55 mmHg on 2L NC. Which ventilatory support is FIRST-LINE before considering intubation?",o:["High-flow nasal cannula (HFNC) only","Immediate intubation — avoid non-invasive options in COPD","Non-invasive ventilation (BiPAP) — evidence-based first-line for hypercapnic respiratory failure in COPD exacerbation; reduces mortality, reduces intubation rate, reduces ICU stay","Heliox only"],a:2,r:"Non-invasive ventilation (NIV/BiPAP) in COPD exacerbation: indicated for hypercapnic respiratory failure (pH 7.25-7.35, PaCO2 >45 mmHg) — first-line intervention before intubation. Evidence (multiple RCTs): NIV reduces need for intubation by ~60%, reduces mortality, reduces ICU and hospital length of stay. Contraindications: hemodynamic instability, unable to protect airway, severe agitation, facial trauma, inability to fit mask, GI bleed with aspiration risk. If NIV fails (worsening pH, mental status, secretion burden, patient intolerance) → intubate. Target pH ≥7.35, PaCO2 improvement, O2 sat 88-92%. Start NIV early before severe acidosis (pH <7.25 = poor NIV response)."},
{c:"Respiratory Failure",q:"A 30-year-old develops sudden onset hypoxemia with PaO2 58 mmHg and PaCO2 32 mmHg (normal or low CO2) from an acute lobar pneumonia. This fits which type of respiratory failure?",o:["Type 2 (hypercapnic) respiratory failure — CO2 is retained","Mixed type — both O2 and CO2 are abnormal","Type 1 (hypoxemic) respiratory failure — low PaO2 with normal or LOW PaCO2; caused by V/Q mismatch, shunt, or diffusion impairment — the patient is working hard to breathe (tachypnea drives CO2 down)","Normal respiratory physiology — PaO2 58 is acceptable"],a:2,r:"Respiratory failure types: Type 1 (HYPOXEMIC): PaO2 <60 mmHg with NORMAL or LOW PaCO2. Patient is often tachypneic (hyperventilating) — blowing off CO2 in an attempt to compensate for hypoxemia. Causes: pneumonia, ARDS, pulmonary edema, pulmonary embolism, atelectasis, V/Q mismatch, intracardiac shunt. Type 2 (HYPERCAPNIC): PaO2 <60 mmHg AND PaCO2 >45 mmHg. Caused by alveolar HYPOVENTILATION. Causes: COPD, asthma exacerbation, neuromuscular disease (ALS, GBS), obesity hypoventilation, sedative overdose, chest wall disease. Type 1 can progress to Type 2 as the patient fatigues — a RISING PaCO2 in a patient with Type 1 failure is an ominous sign."},
{c:"Chronic Cough",q:"A 42-year-old non-smoker not on any ACE inhibitor has had a dry persistent cough for 3 months. Chest X-ray is normal. Spirometry is normal. No history of GERD symptoms. What is the most likely diagnosis and evaluation approach?",o:["Lung cancer — CT scan immediately","COPD — order post-bronchodilator spirometry","Upper airway cough syndrome (UACS, formerly post-nasal drip) — most common cause of chronic cough in non-smokers not on ACE-i; treat empirically with antihistamine-decongestant; also evaluate for GERD (pH monitoring or empiric PPI) and asthma/EIB (methacholine challenge)","Interstitial lung disease — HRCT and bronchoscopy"],a:2,r:"Chronic cough (>8 weeks) in a non-smoker not on ACE inhibitor — the BIG THREE causes account for >90% of cases: (1) Upper airway cough syndrome / post-nasal drip (most common) — nasal congestion, throat-clearing, cobblestoning of posterior pharynx; treat with antihistamine-decongestant; (2) Asthma (including cough-variant asthma) — cough without wheezing; spirometry may be normal → methacholine challenge; (3) GERD — often no typical heartburn; PPI trial 8 weeks. ACE inhibitor cough: occurs in 10-15% (highest in Asian women) → switch to ARB. Chest X-ray is first step — if normal, systematically address the big three empirically."},
{c:"Chronic Cough",q:"A 55-year-old started lisinopril for hypertension 6 weeks ago. He now has a persistent dry, tickling cough affecting his sleep. He has no prior respiratory disease. Most appropriate management?",o:["Add an antitussive (dextromethorphan) and continue lisinopril","Stop lisinopril and switch to an ARB (e.g., losartan) — ARBs do not cause cough","Order methacholine challenge — new asthma is the likely cause","Continue lisinopril — cough is transient and resolves within 2 weeks"],a:1,r:"ACE inhibitor cough: occurs in 10-15% of patients (up to 30-40% in Asian patients — especially East Asian women). Mechanism: ACE inhibitors block bradykinin degradation → bradykinin accumulates in airways → stimulates cough receptors. Onset: weeks to months after starting. Character: dry, persistent, tickling, 'scratchy throat' quality. Resolution: within 4 weeks of stopping the ACE inhibitor (if cough persists beyond 4 weeks, consider other causes). Treatment: switch to ARB (losartan, valsartan, etc.) — ARBs do NOT affect bradykinin metabolism and do NOT cause cough. This is one of the most common reasons for ACE inhibitor discontinuation."},
{c:"Pulmonary Hypertension",q:"A 32-year-old woman with scleroderma (systemic sclerosis) develops progressive exertional dyspnea, near-syncope on exertion, and a loud P2 on exam. Echo shows RV enlargement and estimated RVSP of 58 mmHg. Right heart catheterization confirms mean PAP of 38 mmHg with PCWP of 10 mmHg. WHO group classification?",o:["WHO Group 2 — left heart disease is the most common cause of PH","WHO Group 3 — lung disease/hypoxia (COPD/ILD)","WHO Group 1 — pulmonary arterial hypertension (PAH); connective tissue disease (especially scleroderma) is the most common underlying cause of PAH; PCWP <15 confirms pre-capillary PH","WHO Group 4 — chronic thromboembolic PH (CTEPH)"],a:2,r:"WHO PH Classification: Group 1 (PAH): pre-capillary PH (mPAP ≥20, PVR elevated, PCWP ≤15); causes: idiopathic, heritable, drug-induced (methamphetamine, fenfluramine), CTD (scleroderma most common — 15-35% develop PAH), HIV, portal hypertension, CHD. Group 2: left heart disease — most common cause of PH overall (post-capillary, PCWP >15). Group 3: lung disease/hypoxia — COPD, IPF, sleep apnea. Group 4: CTEPH — surgically treatable (pulmonary endarterectomy). Group 1 treatment: pulmonary vasodilators — PDE5 inhibitors (sildenafil), endothelin receptor antagonists (bosentan, ambrisentan), prostacyclin analogues (epoprostenol for severe disease)."},
{c:"Miscellaneous",q:"A 52-year-old with no smoking history develops recurrent pneumonias in the same right lower lobe over 3 years. CT shows cylindrical bronchial dilation with a 'signet ring sign' (dilated bronchus larger than adjacent pulmonary artery). Diagnosis and underlying cause to consider?",o:["Recurrent aspiration — treat with postural drainage only","Lung cancer — refer to thoracic surgery immediately","Bronchiectasis — common causes include prior severe infections, cystic fibrosis, primary ciliary dyskinesia, immunodeficiency, ABPA; evaluate for treatable underlying cause","Normal CT finding — 'signet ring sign' is an artifact"],a:2,r:"Bronchiectasis: permanent, irreversible dilation of bronchi from chronic inflammation and infection. HRCT 'signet ring sign': dilated bronchus (ring) + adjacent vessel (the dot = the signet). Recurrent pneumonias in the SAME location = classic bronchiectasis presentation. Causes: (1) Post-infectious (most common — childhood infections, TB, NTM, adenovirus); (2) Cystic fibrosis; (3) Primary ciliary dyskinesia; (4) Immunodeficiency (hypogammaglobulinemia — check immunoglobulins); (5) ABPA (allergic bronchopulmonary aspergillosis — responds to corticosteroids + itraconazole); (6) GERD/aspiration; (7) IBD. Management: airway clearance (chest physiotherapy, flutter valve), treat exacerbations (often Pseudomonas aeruginosa in chronic cases), treat underlying cause."},
{c:"Cystic Fibrosis",q:"A 22-year-old with cystic fibrosis is homozygous for the ΔF508 CFTR mutation. He has FEV1 of 65% predicted and chronic Pseudomonas aeruginosa colonization. Which advance in CF treatment is most transformative for his genotype?",o:["Daily IV tobramycin — most effective antibiotic","Lung transplant listing immediately at age 22","Elexacaftor/tezacaftor/ivacaftor (Trikafta) — CFTR modulator triple therapy effective for ΔF508 (and many other mutations); improves lung function by up to 14 percentage points FEV1, reduces exacerbations by >63%, transforms the disease trajectory","DNase (dornase alfa) — cures the CFTR defect"],a:2,r:"CFTR modulators: target the underlying CFTR protein defect — a paradigm shift in CF treatment. Trikafta (elexacaftor/tezacaftor/ivacaftor): approved for ΔF508 and many other mutations (covers ~90% of CF patients); dramatically improves lung function, sweat chloride, BMI, quality of life; reduces pulmonary exacerbations; approved age ≥2. Earlier modulators: Ivacaftor (Kalydeco) — for 'gating' mutations (~5% of CF); Lumacaftor/ivacaftor (Orkambi) — homozygous ΔF508, less effective. Supportive therapies (still needed even with modulators): airway clearance, inhaled antibiotics (tobramycin for Pseudomonas), DNase alfa, hypertonic saline, fat-soluble vitamins, pancreatic enzyme replacement. This is a transformative treatment that is changing the natural history of CF."},
{c:"Hemoptysis",q:"A 68-year-old with a 50 pack-year history coughs up about 400 mL of blood over 4 hours. He has a known right upper lobe mass. This is classified as massive hemoptysis. What is the MOST immediate priority?",o:["Chest X-ray first — confirm source before any intervention","Oral antifibrinolytics (tranexamic acid) and observe","Airway protection — position patient with bleeding side DOWN, consider endotracheal intubation with large-bore ETT to protect the contralateral lung; urgent bronchoscopy for localization and potential endobronchial tamponade; bronchial artery embolization","Anticoagulation reversal — most hemoptysis is from anticoagulants"],a:2,r:"Massive hemoptysis (>300-500 mL/24h): the danger is ASPHYXIATION from blood flooding the airway — NOT exsanguination. Priority: PROTECT AIRWAY. Position bleeding side DOWN (contralateral lung up) to protect the non-bleeding lung. If intubating: use large-bore ETT, selectively intubate the non-bleeding bronchus. Urgent bronchoscopy: localize bleeding, endobronchial tamponade. Bronchial artery embolization (BAE): most effective immediate intervention for controlling massive hemoptysis from BAE-accessible vessels. Common causes of hemoptysis: TB (worldwide most common), lung cancer (in smokers), bronchiectasis, Aspergilloma (fungus ball erodes into vessels), PE."},
{c:"COPD — Smoking Cessation",q:"A patient with GOLD 2 COPD continues to smoke. Which statement most accurately describes the impact of smoking cessation on COPD progression?",o:["Smoking cessation does not help if COPD is already diagnosed — damage is irreversible","Smoking cessation improves FEV1 to normal levels over 2-3 years","Smoking cessation is the most effective intervention to slow the rate of FEV1 decline in COPD — it does not restore lost function but prevents further accelerated loss; it also reduces exacerbation frequency and reduces all-cause mortality","Only pharmacologic therapy (inhalers) can slow COPD progression once diagnosed"],a:2,r:"Smoking cessation in COPD: the SINGLE MOST EFFECTIVE intervention for modifying COPD progression. Evidence from the Lung Health Study: quitting smoking slows the rate of FEV1 decline from ~60 mL/year (smokers) to the normal aging rate (~25-30 mL/year). It does NOT restore already-lost lung function. Benefits: slower disease progression, reduced exacerbations, reduced lung cancer risk, reduced cardiovascular risk, improved survival. Inhalers (LAMAs, LABAs) reduce symptoms and exacerbations but do NOT slow FEV1 decline. Only smoking cessation and LTOT (in hypoxemic patients) have proven survival benefits in COPD — smoking cessation is THE priority at every visit."}
,
{c:"Asthma — COPD Overlap",q:"A 60-year-old has a 30 pack-year smoking history but also has a childhood diagnosis of asthma. Spirometry shows FEV1/FVC 0.65 post-bronchodilator with 18% bronchodilator reversibility. She has blood eosinophils of 340. How does this presentation differ from pure COPD management?",o:["Treat exactly the same as pure COPD — reversibility and eosinophils are irrelevant","Asthma-COPD overlap (ACOS) — ICS is more strongly indicated early in management due to eosinophilic inflammation; LABA alone is contraindicated in ACOS given the asthma component","Treat as pure asthma — COPD diagnosis is irrelevant once asthma is confirmed","ICS should never be used when FEV1/FVC is <0.70"],a:1,r:"Asthma-COPD overlap (ACO/ACOS): features of BOTH asthma and COPD in the same patient. Clinical clues: substantial bronchodilator reversibility (>12% and >200 mL), blood eosinophils ≥300, prior asthma diagnosis, age >40, smoking history. Management: ICS is a PRIORITY (as in asthma) and should be added earlier than in pure COPD — LABA should NEVER be used without ICS (asthma component). LAMA is often added as triple therapy. Monitor blood eosinophils — higher counts predict better ICS response. This distinction matters: pure COPD can deprioritize ICS, but ACOS requires it."},
{c:"COPD — Exacerbation",q:"A 72-year-old with GOLD 3 COPD is admitted with a moderate exacerbation. She is started on bronchodilators. She refuses intubation if needed. Which corticosteroid regimen is evidence-based for inpatient COPD exacerbation?",o:["Methylprednisolone 1g IV daily x7 days","Prednisone 40 mg orally for 5 days — shorter courses are equally effective as longer courses and reduce steroid side effects","Prednisone 60 mg daily x14 days — longer courses have superior outcomes","Inhaled budesonide alone — systemic steroids are not needed for COPD exacerbations"],a:1,r:"Systemic corticosteroids for COPD exacerbation: REDUCE time to FEV1 improvement, shorten hospital stay, and reduce treatment failure. Evidence: oral prednisone 40 mg daily x5 days is as effective as longer courses (REDUCE trial — no difference at 6 months between 5-day and 14-day). Benefits: faster FEV1 recovery, shorter hospitalization. Risks: hyperglycemia (especially in diabetics), adrenal suppression with long courses, increased pneumonia risk. Inhaled corticosteroids are NOT adequate substitutes for systemic steroids in acute exacerbations. Add antibiotics if purulent sputum or other criteria are met."},
{c:"Lung Cancer",q:"A 55-year-old non-smoker woman is found to have a 3 cm peripheral right upper lobe adenocarcinoma. Molecular testing shows an EGFR exon 19 deletion. What does this finding mean for treatment?",o:["EGFR mutation is irrelevant — all lung cancers are treated with platinum-based chemotherapy first","EGFR mutation means the tumor is not treatable","EGFR-mutated non-small cell lung cancer responds to EGFR tyrosine kinase inhibitors (TKIs) such as osimertinib — targeted oral therapy with superior outcomes vs chemotherapy for EGFR-mutated NSCLC","Surgical resection is no longer possible with EGFR mutation"],a:2,r:"Molecular targeted therapy in NSCLC: adenocarcinoma of the lung is routinely tested for actionable driver mutations: EGFR (most common in non-smokers, women, East Asian), ALK, ROS1, KRAS, BRAF, MET, RET, NTRK. EGFR mutations (exon 19 deletion, L858R): respond to EGFR TKIs — osimertinib (third-generation, first-line preferred), erlotinib, gefitinib. Dramatically better PFS and OS than platinum chemotherapy for EGFR-mutated advanced NSCLC. Also: immunotherapy with pembrolizumab for PD-L1 high expression (≥50%) without driver mutations. NP boards increasingly test awareness of targeted therapy — this is the future of oncology in primary care awareness."},
{c:"Pleural Disease",q:"A patient with recurrent malignant pleural effusions from breast cancer requires repeated thoracenteses every 2-3 weeks. Which definitive procedure reduces the need for repeated thoracenteses?",o:["Thoracotomy and pleurectomy only","High-dose diuretics — reduce pleural fluid production","Pleurodesis (chemical — talc) or tunneled indwelling pleural catheter (PleurX catheter) — both are effective for recurrent malignant effusions; choice depends on lung re-expansion and patient preference","Mediastinal radiation only"],a:2,r:"Recurrent malignant pleural effusion management: (1) Chemical pleurodesis — talc (most effective agent) instilled via thoracoscopy or chest tube; scleroses pleural surfaces together; requires complete lung re-expansion; outpatient talc slurry via chest tube or VATS; (2) Tunneled indwelling pleural catheter (PleurX): outpatient, drained at home by patient/caregiver every 1-3 days; preferred when lung fails to re-expand (trapped lung) or patient cannot tolerate pleurodesis; can lead to spontaneous pleurodesis in ~50% of patients after weeks. Both are superior to repeated thoracenteses for quality of life and cost. Choose based on performance status, lung expansion, and patient preference."},
{c:"Pulmonary Hypertension",q:"A 45-year-old has exertional dyspnea and a previous bilateral pulmonary embolism. V/Q scan shows multiple perfusion defects in a non-wedge distribution suggesting chronic thromboembolic disease. Mean PAP is 36 mmHg on right heart catheterization. Diagnosis and potentially curative treatment?",o:["Group 1 PAH — pulmonary vasodilators only","Group 3 PH from COPD — LTOT and smoking cessation","Chronic thromboembolic pulmonary hypertension (CTEPH), WHO Group 4 — pulmonary endarterectomy (PEA) surgery is potentially curative; for inoperable disease: riociguat (soluble guanylate cyclase stimulator) is approved","Group 2 PH from left heart disease — optimize cardiac medications"],a:2,r:"CTEPH (WHO Group 4): occurs in ~4% of patients after acute PE. Organized thrombus obstructs pulmonary arteries chronically → pulmonary hypertension. V/Q scan is SUPERIOR to CTPA for CTEPH detection. Pulmonary endarterectomy (PEA): surgical removal of organized thrombus — POTENTIALLY CURATIVE with >90% long-term survival in operable cases. Assess operability based on thrombus accessibility, hemodynamics, comorbidities. For inoperable CTEPH or residual PH after PEA: riociguat (soluble guanylate cyclase stimulator) — only drug FDA-approved specifically for inoperable CTEPH. Balloon pulmonary angioplasty: emerging option for selected inoperable patients. Lifelong anticoagulation in all CTEPH patients."},
{c:"Spirometry",q:"A patient's spirometry report shows FEV1 72% predicted and FVC 68% predicted, giving an FEV1/FVC ratio of 0.79. What pattern does this represent?",o:["Obstructive — FEV1/FVC <0.80 confirms obstruction","Mixed obstructive and restrictive pattern","Restrictive pattern — FVC is reduced, FEV1/FVC is preserved (0.79 is above the 0.70 threshold), suggesting reduced lung volumes rather than airflow obstruction; TLC should be measured to confirm","Normal — all values are within acceptable limits"],a:2,r:"Interpreting spirometry with reduced FVC: if FVC is reduced and FEV1/FVC is NORMAL (>0.70), this suggests restriction (not obstruction). However, spirometry CANNOT definitively diagnose restriction — TLC measurement (by plethysmography) is required. If TLC is also reduced → confirmed restriction. If TLC is normal despite reduced FVC → consider poor effort, neuromuscular weakness, or early restriction. Obstructive pattern: FEV1/FVC <0.70 (post-bronchodilator), FEV1 reduced proportionally more than FVC. Common error: calling reduced FVC with preserved FEV1/FVC 'obstructive' — always check the ratio first."},
{c:"OSA — Complications",q:"A 50-year-old with severe untreated OSA (AHI 45) and no prior cardiac history is referred for resistant hypertension evaluation. He is on three antihypertensive medications with poor BP control. What is the relationship between OSA and his hypertension?",o:["OSA and hypertension are coincidental — obesity explains both","OSA is an independent risk factor for resistant hypertension; effective CPAP therapy can modestly reduce BP, particularly nocturnal BP and in patients with severe OSA","CPAP eliminates the need for antihypertensives in most patients","Only loop diuretics can control OSA-related hypertension"],a:1,r:"OSA and cardiovascular disease: OSA is an INDEPENDENT risk factor for hypertension — intermittent hypoxia → sympathetic activation → endothelial dysfunction → sustained HTN. OSA is one of the most common identifiable causes of RESISTANT HYPERTENSION (evaluate all resistant HTN patients for OSA). CPAP effects on BP: modest reductions (~2-3 mmHg systolic) — not a replacement for antihypertensives but contributes to better control. Larger BP reductions seen in patients with: severe OSA, high AHI, excessive daytime sleepiness, longer CPAP usage (>4 hours/night). Other OSA-CV risks: atrial fibrillation (2-4x increased), coronary artery disease, stroke, heart failure, pulmonary hypertension."}
];

const N = QUESTIONS.length;
let idx = 0;
let answers = new Array(N).fill(null); // selected option index
const LETTERS = ["A","B","C","D"];

const strip = document.getElementById("strip");
const qcard = document.getElementById("qcard");
const resultsCard = document.getElementById("results");

function buildStrip(){
  strip.innerHTML = "";
  for(let i=0;i<N;i++){
    const t = document.createElement("div");
    t.className = "tick";
    t.title = "Question " + (i+1);
    t.addEventListener("click", ()=>{ idx = i; render(); });
    strip.appendChild(t);
  }
}
function paintStrip(){
  const ticks = strip.children;
  for(let i=0;i<N;i++){
    const t = ticks[i];
    t.className = "tick";
    if(answers[i] !== null){
      t.classList.add(answers[i] === QUESTIONS[i].a ? "ok" : "bad");
    }
    if(i === idx && !resultsVisible()) t.classList.add("cur");
  }
}
function resultsVisible(){ return !resultsCard.classList.contains("hide"); }

function counts(){
  let done=0, right=0;
  for(let i=0;i<N;i++){
    if(answers[i]!==null){ done++; if(answers[i]===QUESTIONS[i].a) right++; }
  }
  return {done,right};
}
function paintScore(){
  const {done,right} = counts();
  document.getElementById("sc-done").textContent = done;
  document.getElementById("sc-right").textContent = right;
}

function render(){
  resultsCard.classList.add("hide");
  qcard.classList.remove("hide");
  const Q = QUESTIONS[idx];
  const picked = answers[idx];
  let html = "";
  html += '<div class="meta"><span class="qnum">QUESTION ' + (idx+1) + ' / ' + N + '</span><span class="chip">' + Q.c + '</span></div>';
  html += '<p class="stem">' + Q.q + '</p>';
  Q.o.forEach((opt,i)=>{
    let cls = "opt";
    if(picked !== null){
      if(i === picked && picked === Q.a) cls += " sel-ok";
      else if(i === picked) cls += " sel-bad";
      else if(i === Q.a) cls += " reveal-ok";
    }
    html += '<button class="'+cls+'" data-i="'+i+'" '+(picked!==null?"disabled":"")+'><span class="ltr">'+LETTERS[i]+'</span><span>'+opt+'</span></button>';
  });
  if(picked !== null){
    const good = picked === Q.a;
    html += '<div class="verdict '+(good?"ok":"bad")+'">'+(good ? "Correct" : "Incorrect — answer is " + LETTERS[Q.a])+'</div>';
    html += '<div class="rationale">'+Q.r+'</div>';
  }
  html += '<div class="nav">';
  html += '<button class="btn ghost" id="prevBtn" '+(idx===0?"disabled":"")+'>Back</button>';
  if(idx < N-1){
    html += '<button class="btn" id="nextBtn">Next question</button>';
  } else {
    html += '<button class="btn" id="finishBtn">See results</button>';
  }
  html += '</div>';
  qcard.innerHTML = html;

  qcard.querySelectorAll(".opt").forEach(btn=>{
    btn.addEventListener("click", ()=>{
      if(answers[idx] !== null) return;
      answers[idx] = parseInt(btn.dataset.i,10);
      render();
    });
  });
  const prev = document.getElementById("prevBtn");
  if(prev) prev.addEventListener("click", ()=>{ idx--; render(); });
  const next = document.getElementById("nextBtn");
  if(next) next.addEventListener("click", ()=>{ idx++; render(); });
  const fin = document.getElementById("finishBtn");
  if(fin) fin.addEventListener("click", showResults);
  paintStrip(); paintScore();
}

function showResults(){
  const {done,right} = counts();
  const pct = done ? Math.round((right/done)*100) : 0;
  // category breakdown
  const cats = {};
  QUESTIONS.forEach((Q,i)=>{
    if(!cats[Q.c]) cats[Q.c] = {n:0, ok:0, ans:0};
    cats[Q.c].n++;
    if(answers[i]!==null){ cats[Q.c].ans++; if(answers[i]===Q.a) cats[Q.c].ok++; }
  });
  let html = '<div class="bigscore">'+right+' / '+done+' ('+pct+'%)</div>';
  html += '<p class="sub">'+(done<N ? (N-done)+' question'+(N-done===1?"":"s")+' unanswered — they are not counted against you. ' : '')+'A passing pace on the real ANCC is roughly the low-to-mid 70s percent range, so use this as a directional gauge, not a verdict.</p>';
  html += '<h2 style="font-size:.95rem;margin-bottom:6px">By category</h2>';
  Object.keys(cats).forEach(c=>{
    const o = cats[c];
    const p = o.ans ? Math.round((o.ok/o.ans)*100) : 0;
    html += '<div class="catrow"><span style="flex:0 0 44%">'+c+'</span><span class="bar"><i style="width:'+(o.ans? p:0)+'%"></i></span><span style="font-family:var(--mono);font-size:.8rem">'+o.ok+'/'+o.ans+(o.ans<o.n?' of '+o.n:'')+'</span></div>';
  });
  // missed list
  const missed = [];
  for(let i=0;i<N;i++) if(answers[i]!==null && answers[i]!==QUESTIONS[i].a) missed.push(i);
  if(missed.length){
    html += '<div class="missedlist"><h2 style="font-size:.95rem;margin-bottom:8px">Review missed questions</h2>';
    missed.forEach(i=>{ html += '<button data-jump="'+i+'">Q'+(i+1)+'</button>'; });
    html += '</div>';
  }
  html += '<div class="nav"><button class="btn ghost" id="backBtn">Back to questions</button><button class="btn" id="resetBtn">Start over</button></div>';
  resultsCard.innerHTML = html;
  resultsCard.classList.remove("hide");
  qcard.classList.add("hide");
  resultsCard.querySelectorAll("[data-jump]").forEach(b=>{
    b.addEventListener("click", ()=>{ idx = parseInt(b.dataset.jump,10); render(); });
  });
  document.getElementById("backBtn").addEventListener("click", ()=>{ render(); });
  document.getElementById("resetBtn").addEventListener("click", ()=>{
    if(confirm("Clear all answers and start over?")){
      answers = new Array(N).fill(null); idx = 0; render();
    }
  });
  paintStrip(); paintScore();
}

buildStrip();
render();
</script>
</body>
</html>
