<script>
const QUESTIONS = [
{c:"Diabetes — Diagnosis",q:"Which combination of findings meets the diagnostic criteria for type 2 diabetes mellitus?",o:["Fasting glucose 118 mg/dL on two separate occasions","A1c 6.2% confirmed on repeat testing","Fasting plasma glucose 130 mg/dL confirmed on a second day","Random glucose 195 mg/dL without symptoms"],a:2,r:"ADA diagnostic criteria for DM (any ONE confirmed, usually repeated on a different day): (1) Fasting plasma glucose ≥126 mg/dL; (2) 2-hour OGTT glucose ≥200 mg/dL; (3) A1c ≥6.5%; (4) Random glucose ≥200 mg/dL WITH classic hyperglycemic SYMPTOMS (polyuria, polydipsia, unexplained weight loss) — this last one does NOT need confirmation. Pre-diabetes: FPG 100-125, OGTT 140-199, A1c 5.7-6.4%. FPG 118 and A1c 6.2% are pre-diabetes values. Random 195 without symptoms is not diagnostic alone."},
{c:"Diabetes — Diagnosis",q:"A 45-year-old patient has a new diagnosis of diabetes. He is thin (BMI 21), has a 1-month history of polyuria and polydipsia, and his glucose was >400 with ketonuria. Which feature MOST suggests type 1 rather than type 2?",o:["His age — type 1 only occurs before 30","Obesity is required for type 2 diabetes","Acute presentation with ketosis in a lean adult — type 1 presents with absolute insulin deficiency and DKA-prone; anti-GAD antibodies and C-peptide help confirm","Fasting glucose level alone distinguishes the two types"],a:2,r:"Type 1 DM: autoimmune destruction of pancreatic beta cells → absolute insulin deficiency. Features suggesting T1DM: lean habitus, acute/severe presentation, ketonemia/DKA, younger age (but can present at ANY age — including adults). Confirmatory tests: positive anti-GAD65, anti-islet cell, or anti-IA-2 antibodies; low/undetectable C-peptide (reflects endogenous insulin production). Type 2: insulin resistance + relative deficiency; often obese, insidious onset, strong family history, acanthosis nigricans. LADA (latent autoimmune diabetes in adults) = slow-onset type 1 in adults, often misdiagnosed as type 2."},
{c:"Diabetes — Screening",q:"Per USPSTF guidelines, which asymptomatic adults should be screened for prediabetes and type 2 diabetes?",o:["All adults starting at age 45 regardless of weight","Adults ages 35-70 who are overweight or obese (BMI ≥25) — Grade B recommendation","Only adults with a first-degree relative with diabetes","Annual fasting glucose for all adults starting at age 21"],a:1,r:"USPSTF Grade B (2021): screen for prediabetes/T2DM in asymptomatic adults ages 35-70 who are OVERWEIGHT (BMI ≥25) or OBESE. Screening tests: fasting plasma glucose, A1c, or 75g OGTT. ADA recommends broader testing starting at age 35 (regardless of weight) and at any age with risk factors: physical inactivity, first-degree relative with DM, high-risk ethnicity, hypertension, dyslipidemia, gestational DM history, PCOS, prediabetes. Rescreen every 3 years if normal; annually if prediabetes."},
{c:"Diabetes — Monitoring",q:"A patient's A1c appears lower than expected given his home glucose readings, which are consistently elevated. He has sickle cell trait and recently donated blood. What best explains the discrepancy?",o:["A1c is always the most accurate monitoring tool — it cannot be artifactually low","Conditions that decrease RBC lifespan (hemolysis, sickle cell, recent blood transfusion) FALSELY LOWER A1c — use fructosamine or glucose monitoring instead","Donating blood raises A1c temporarily","Sickle cell trait always raises A1c"],a:1,r:"A1c measures glycation of hemoglobin over the lifespan of RBCs (~120 days). Conditions that SHORTEN RBC lifespan → fewer old glycated cells → falsely LOW A1c: hemolytic anemia, sickle cell disease, recent blood transfusion, recent blood loss. Conditions that LENGTHEN RBC lifespan → more time for glycation → falsely HIGH A1c: iron deficiency anemia, vitamin B12/folate deficiency. In these situations, use fructosamine (reflects ~2-3 weeks) or daily glucose monitoring instead of A1c. This is a classic ANCC statistics-in-practice question."},
{c:"Diabetes — Insulin",q:"A patient with T1DM takes insulin glargine (Lantus) once daily and insulin lispro (Humalog) with meals. He calls asking which insulin to use to correct a high glucose 2 hours after lunch. Which is correct?",o:["Insulin glargine — it works fastest","Both insulins can correct glucose at any time","Insulin lispro — rapid-acting (onset 5-15 min, peak 30-90 min); glargine is the basal/background insulin with no meaningful peak","Neither — call 911 immediately"],a:2,r:"Insulin types by action: Rapid-acting (lispro, aspart, glulisine): onset 5-15 min, peak 30-90 min, duration 3-5 hours — used with meals and for corrections. Regular (R): onset 30-60 min, peak 2-4 hours. NPH: intermediate. Long-acting (glargine, detemir, degludec): onset 1-4 hours, PEAKLESS (flat profile), duration 18-24+ hours — basal coverage only, NOT for corrections. A common patient error is using basal insulin to correct hyperglycemia — it is too slow and stacks unpredictably."},
{c:"Diabetes — Hypoglycemia",q:"A patient with T2DM on glipizide has a blood glucose of 54 mg/dL and feels shaky. She is alert and can swallow. Using the 15-15 rule, what is the correct treatment?",o:["Give 30 grams of carbohydrate and recheck in 30 minutes","Give 15 grams of fast-acting carbohydrate (e.g., 4 oz juice), recheck in 15 minutes, and repeat if still <70 mg/dL","Give IM glucagon immediately — any glucose below 60 requires glucagon","Hold her next meal and recheck in 1 hour"],a:1,r:"The 15-15 rule for symptomatic hypoglycemia in a conscious patient: 15 grams of FAST-ACTING carbohydrate (4 oz juice, 3-4 glucose tablets, 1 tablespoon sugar/honey, regular soda) → wait 15 minutes → recheck → if still <70, repeat. After resolution: eat a snack with protein and complex carbohydrate if the next meal is more than 1 hour away. Glucagon (IM/SC/intranasal) is reserved for unconscious or severely impaired patients who cannot swallow. Protein and fat do NOT treat hypoglycemia acutely (too slow)."},
{c:"Diabetes — DKA",q:"A 22-year-old with T1DM presents with nausea, vomiting, and fruity breath. Labs: glucose 385 mg/dL, pH 7.22, bicarbonate 11 mEq/L, anion gap 22, serum ketones positive. What is the FIRST priority in management?",o:["Start IV insulin infusion immediately","Administer IV sodium bicarbonate to correct acidosis","IV fluid resuscitation with normal saline — correct dehydration before insulin","Call endocrinology — no interventions until specialist arrives"],a:2,r:"DKA management sequence: (1) IV FLUIDS FIRST — aggressive normal saline (1-2L bolus) to correct dehydration and improve perfusion. (2) Check POTASSIUM — do NOT start insulin if K+ <3.5 mEq/L (insulin drives K+ intracellularly, causing life-threatening hypokalemia; replete K+ first). (3) IV regular insulin infusion once K+ is adequate. (4) Transition to SQ insulin when anion gap closes, patient eating, and glucose <200. Bicarbonate is NOT routinely given in DKA (pH must be <6.9 to consider it). The most common precipitant: infection — always look for and treat."},
{c:"Diabetes — DKA",q:"Which lab pattern best describes diabetic ketoacidosis (DKA)?",o:["Glucose >600 mg/dL, pH 7.38, bicarbonate 24, trace ketones, osmolality 340","Glucose 300 mg/dL, pH 7.22, bicarbonate 10, large serum ketones, anion gap 24","Glucose 180 mg/dL, pH 7.40, negative ketones, osmolality 290","Glucose 500 mg/dL, pH 7.30, bicarbonate 22, minimal ketones, osmolality 320"],a:1,r:"DKA: glucose typically 250-600 mg/dL (can be lower with 'euglycemic DKA' — especially SGLT-2i use), pH <7.30, bicarbonate <18 mEq/L, elevated anion gap (>12), POSITIVE serum/urine ketones. HHS (hyperosmolar hyperglycemic state): glucose VERY HIGH (>600 mg/dL), minimal ketones, pH >7.30, bicarbonate >18, osmolality >320 mOsm/kg — occurs in T2DM, elderly. Option A describes HHS. Option D has inadequate ketonemia for DKA. Understanding this distinction is a high-yield board comparison."},
{c:"Diabetes — Complications",q:"A 52-year-old with T2DM has urine albumin:creatinine ratio (UACR) of 85 mg/g and eGFR 62 mL/min. BP is 138/88. Which intervention MOST specifically reduces progression of diabetic nephropathy?",o:["Aggressive glucose control alone is sufficient","ACE inhibitor or ARB — reduces intraglomerular pressure and proteinuria, independent of blood pressure effect","Avoid all antihypertensives — they reduce renal blood flow","Loop diuretics to reduce proteinuria"],a:1,r:"ACE inhibitors or ARBs are the FIRST-LINE antihypertensives for diabetic nephropathy because they reduce intraglomerular pressure (by dilating the efferent arteriole) and proteinuria beyond their BP-lowering effect — slowing CKD progression. SGLT-2 inhibitors (empagliflozin, canagliflozin) also have proven renal protection and are now recommended add-on therapy. Screen annually: UACR (microalbuminuria = 30-300 mg/g) and eGFR starting at T2DM diagnosis and 5 years after T1DM diagnosis. Do NOT combine ACE inhibitor + ARB (increases risk of AKI and hyperkalemia without added benefit)."},
{c:"Diabetes — Complications",q:"A patient with 15-year history of T2DM reports burning pain and numbness in both feet in a stocking-glove distribution. Monofilament testing shows reduced sensation. Which is the most appropriate first-line pharmacologic treatment for the neuropathic pain?",o:["Opioids — best for neuropathic pain","Aspirin — anti-inflammatory effect","Pregabalin (Lyrica) or duloxetine (Cymbalta) — first-line for diabetic peripheral neuropathy","Metformin dose adjustment"],a:2,r:"Diabetic peripheral neuropathy (DPN): distal symmetric polyneuropathy, stocking-glove pattern, burning/tingling/numbness/pain, worse at night. First-line pharmacologic: pregabalin (Lyrica) — FDA-approved for DPN; duloxetine (Cymbalta) — also FDA-approved; gabapentin (off-label but widely used). Opioids are NOT first-line for neuropathic pain and carry addiction risk. Also: optimize glucose control (slows progression), foot care education (daily inspection, proper footwear). Annual comprehensive foot exam: monofilament, pulses, inspection."},
{c:"Thyroid — Hypothyroidism",q:"A 38-year-old woman presents with fatigue, cold intolerance, constipation, weight gain, and dry skin over 6 months. TSH is 14.2 mIU/L and free T4 is 0.6 ng/dL. Anti-TPO antibodies are elevated. Diagnosis and treatment?",o:["Hashimoto's thyroiditis with subclinical hypothyroidism — observe only","Hashimoto's thyroiditis with overt hypothyroidism — levothyroxine started at full weight-based dose (1.6 mcg/kg/day) with TSH recheck in 6-8 weeks","Central hypothyroidism — MRI pituitary now","Normal thyroid function — these symptoms are non-specific"],a:1,r:"Hashimoto's thyroiditis (chronic lymphocytic thyroiditis): most common cause of hypothyroidism in the US. Autoimmune — elevated anti-TPO antibodies (most sensitive marker). TSH >10 with low free T4 = overt primary hypothyroidism — treat with levothyroxine. Start at 1.6 mcg/kg/day in healthy adults (lower in elderly/cardiac patients). Recheck TSH in 6-8 weeks after starting or any dose change; once stable, annually. Central hypothyroidism: LOW TSH + LOW free T4 (pituitary/hypothalamic failure) — TSH is not a reliable guide; treat based on free T4."},
{c:"Thyroid — Hypothyroidism",q:"A 52-year-old woman has TSH 7.8 mIU/L with a normal free T4. She has no symptoms. Anti-TPO antibodies are positive. This pattern is called:",o:["Overt hypothyroidism — must treat immediately","Subclinical hypothyroidism — treat if TSH >10, symptomatic, pregnant, or planning pregnancy; monitor if asymptomatic with TSH 4.5-10","Euthyroid — TSH up to 10 is always normal","Graves disease — refer to endocrinology"],a:1,r:"Subclinical hypothyroidism: elevated TSH (typically 4.5-10 mIU/L) with NORMAL free T4. Management: treat with levothyroxine if (1) TSH >10 regardless of symptoms, (2) symptomatic, (3) pregnant or trying to conceive, (4) positive anti-TPO antibodies with TSH >4.5 (increased risk of progression). Observe and recheck in 6-12 months if asymptomatic with TSH 4.5-10 and negative antibodies. Positive anti-TPO antibodies predict 4-5% annual risk of progression to overt hypothyroidism."},
{c:"Thyroid — Hyperthyroidism",q:"A 30-year-old woman has palpitations, heat intolerance, weight loss, and tremor. TSH is undetectable (<0.01) and free T4 is 3.8 ng/dL. Exam shows a diffuse smooth goiter, bilateral proptosis, and pretibial non-pitting edema. Diagnosis?",o:["Toxic multinodular goiter — radioactive iodine treatment","Thyroiditis — NSAIDs and beta-blocker","Graves disease — autoimmune hyperthyroidism; exophthalmos and pretibial myxedema are pathognomonic","Subacute thyroiditis — painful goiter expected"],a:2,r:"Graves disease: autoimmune hyperthyroidism caused by TSH receptor stimulating antibodies (TRAb/TSI). Features SPECIFIC TO GRAVES (not other causes): exophthalmos/proptosis (Graves ophthalmopathy), pretibial myxedema (orange-peel skin over shins), thyroid acropachy, diffuse smooth goiter. Treatment options: (1) Antithyroid drugs (methimazole — first-line in non-pregnant; PTU in first trimester); (2) Radioactive iodine (I-131) — definitive, causes hypothyroidism, contraindicated in pregnancy and severe ophthalmopathy; (3) Surgery — large goiter, suspicious nodule, failed medical therapy. Beta-blockers (propranolol) for rapid symptom control."},
{c:"Thyroid — Hyperthyroidism",q:"A patient with Graves disease on methimazole develops a fever of 39.5°C and sore throat. Most important next step?",o:["Prescribe antibiotics and continue methimazole","Reassure — sore throat is a known minor side effect","STOP methimazole immediately and check CBC — fever/sore throat may indicate agranulocytosis (absolute neutrophil count <500 cells/mcL)","Increase the methimazole dose to suppress immune reaction"],a:2,r:"Agranulocytosis is the most feared side effect of antithyroid drugs (methimazole and PTU), occurring in 0.1-0.5% of patients. It is potentially fatal — the patient is defenseless against infection. STOP the drug immediately upon ANY fever or sore throat and check CBC with differential. If ANC <500: hospitalize, consult hematology, do NOT rechallenge with any antithyroid drug. Counsel ALL patients starting methimazole or PTU to stop the drug and seek immediate evaluation for fever or sore throat — do not call first, stop first."},
{c:"Thyroid — Crisis",q:"A patient with known hyperthyroidism undergoes emergency surgery. Postoperatively he develops hyperpyrexia (41°C), severe tachycardia, agitation, and delirium. Diagnosis and most important initial medication?",o:["Sepsis — blood cultures and broad-spectrum antibiotics","Malignant hyperthermia — dantrolene IV","Thyroid storm — propylthiouracil (PTU) + propranolol + hydrocortisone + SSKI (iodine)","Neuroleptic malignant syndrome — stop antipsychotics"],a:2,r:"Thyroid storm: life-threatening exacerbation of hyperthyroidism. Precipitants: surgery, infection, trauma, iodine load, parturition. Presents with hyperpyrexia, extreme tachycardia, agitation/delirium/psychosis, heart failure. Treatment (given in order): (1) PTU (preferred in storm — also blocks peripheral T4→T3 conversion); (2) Propranolol (controls sympathetic symptoms); (3) Hydrocortisone (blocks T4→T3 conversion, treats relative adrenal insufficiency); (4) SSKI or Lugol's solution (iodine — given 1 hour AFTER PTU to block thyroid hormone release — the Wolff-Chaikoff effect). IV fluids, antipyretics (avoid aspirin — displaces T4 from proteins)."},
{c:"Thyroid — Nodule",q:"A 48-year-old woman has a 1.8 cm thyroid nodule found on ultrasound. The nodule is hypoechoic with microcalcifications and irregular margins (ACR TI-RADS 5). TSH is normal. Most appropriate next step?",o:["Repeat ultrasound in 12 months — all nodules under 2 cm can be observed","Empiric levothyroxine to suppress the nodule","Fine needle aspiration (FNA) biopsy — high-suspicion ultrasound features warrant biopsy regardless of size above the threshold","Radioactive iodine uptake scan"],a:2,r:"Thyroid nodule FNA indications: high-suspicion ultrasound features (microcalcifications, irregular margins, hypoechoic, taller-than-wide, extrathyroidal extension) at ≥1 cm warrant FNA. ACR TI-RADS 5 (highly suspicious): FNA at ≥1 cm. Low-suspicion nodules: biopsy at larger sizes or observe. Risk factors for malignancy: prior radiation exposure, family history of thyroid cancer, MEN syndrome history. Most common thyroid cancer: papillary thyroid carcinoma (80%, best prognosis). Suppressive levothyroxine is no longer recommended for nodule management."},
{c:"Thyroid — Cancer",q:"Pathology from a thyroidectomy shows papillary thyroid carcinoma with psammoma bodies and orphan Annie eye nuclei. Which statement about this cancer type is most accurate?",o:["This is the rarest and most aggressive thyroid cancer","Papillary thyroid carcinoma is the MOST COMMON thyroid cancer (80%); it has the BEST prognosis, spreads mainly to lymph nodes, and is treated with thyroidectomy ± radioactive iodine","This cancer produces calcitonin — a serum marker used for monitoring","This type is caused by RET proto-oncogene mutations and is associated with MEN2"],a:1,r:"Thyroid cancers by type: Papillary (80%) — best prognosis, lymph node spread, treatment thyroidectomy ± RAI, follow with thyroglobulin levels; Follicular (10-15%) — hematogenous spread (lung, bone), FNA often non-diagnostic (need capsular invasion for diagnosis); Medullary (5%) — from C cells, produces CALCITONIN, associated with MEN2A/2B, RET mutation; Anaplastic (<1%) — most aggressive, worst prognosis, often rapidly fatal. Medullary thyroid cancer (calcitonin marker, RET) are classic distinguishing facts."},
{c:"Adrenal — Cushing's",q:"A 42-year-old woman has centripetal obesity, purple abdominal striae >1 cm wide, proximal muscle weakness, easy bruising, and new-onset diabetes. Blood pressure is 158/96. Screening test of choice?",o:["Random serum cortisol at any time of day","Fasting insulin level","1 mg overnight dexamethasone suppression test (DST) or late-night salivary cortisol or 24-hour urine free cortisol","ACTH stimulation test (cosyntropin)"],a:2,r:"Cushing's syndrome clinical features: central obesity, moon face, buffalo hump, purple striae (wide, >1 cm), proximal muscle weakness, easy bruising, osteoporosis, HTN, hyperglycemia, hirsutism, amenorrhea, depression. Screening tests (any one of three): (1) 1 mg overnight DST (most used); (2) late-night salivary cortisol (cortisol normally nadirs at midnight — stays elevated in Cushing's); (3) 24-hour urine free cortisol. ACTH stimulation test is for ADRENAL INSUFFICIENCY (Addison's), not Cushing's. Most common cause: EXOGENOUS corticosteroids (iatrogenic). Endogenous: pituitary adenoma (Cushing's disease, 70%), ectopic ACTH (SCLC), adrenal adenoma."},
{c:"Adrenal — Addison's",q:"A 35-year-old presents with 6 months of fatigue, weight loss, nausea, and hypotension. Exam reveals hyperpigmentation of the palmar creases and buccal mucosa. Labs: sodium 126, potassium 5.8, glucose 62. Most likely diagnosis?",o:["Cushing's syndrome — high cortisol causes these electrolyte changes","Primary adrenal insufficiency (Addison's disease) — hyperpigmentation is caused by elevated ACTH stimulating melanocortin receptors","Secondary adrenal insufficiency — hyperpigmentation is a key feature","SIADH — explains the hyponatremia"],a:1,r:"Primary adrenal insufficiency (Addison's): destruction of the adrenal cortex (autoimmune most common in developed countries; TB, malignancy, hemorrhage as causes). Features: fatigue, anorexia, weight loss, postural hypotension, hyponatremia (aldosterone deficiency), hyperkalemia, hypoglycemia. HYPERPIGMENTATION (bronze/brown skin, mucous membranes, palmar creases) is unique to PRIMARY adrenal insufficiency — caused by elevated ACTH stimulating melanocortin-1 receptors (POMC-derived). Secondary adrenal insufficiency (pituitary failure): low ACTH → NO hyperpigmentation. Diagnosis: morning cortisol + ACTH (cosyntropin) stimulation test. Treatment: hydrocortisone + fludrocortisone."},
{c:"Adrenal — Crisis",q:"An Addison's disease patient presents to the ED with severe hypotension (BP 78/50), vomiting, abdominal pain, and confusion. He ran out of his medications 3 days ago and had a URI. What is the immediate treatment?",o:["Order an ACTH stimulation test before giving any steroids","IV hydrocortisone 100 mg bolus, then 50 mg IV q6-8h + aggressive IV normal saline + treat precipitating infection","Oral fludrocortisone and discharge with increased home dose","Vasopressors only — steroids are contraindicated in acute infection"],a:1,r:"Adrenal crisis is a life-threatening emergency. DO NOT delay treatment waiting for test results if the clinical suspicion is high. Treatment: (1) IV hydrocortisone 100 mg bolus immediately (then 50-100 mg q6-8h or continuous infusion); (2) Aggressive IV normal saline (1-2L rapid bolus); (3) Treat the precipitating illness (infection here). Stress dosing rule for known adrenal insufficiency: double or triple home steroid dose for fever/illness, major surgery. Sick day rule: patients must be counseled to never stop their steroids without medical guidance and to have injectable hydrocortisone available for emergencies."},
{c:"Adrenal — Hyperaldosteronism",q:"A 48-year-old has resistant hypertension despite 3 antihypertensives, and repeated potassium levels of 3.0-3.2 mEq/L despite supplementation. Which diagnosis should be suspected, and what is the screening test?",o:["Essential hypertension — no further workup needed","Primary hyperaldosteronism (Conn's syndrome) — screen with aldosterone:renin ratio (high aldosterone, suppressed renin)","Pheochromocytoma — screen with 24-hour urine catecholamines","Renovascular hypertension — renal Doppler ultrasound first"],a:1,r:"Primary hyperaldosteronism: most common cause of secondary (correctable) hypertension. Adrenal adenoma (Conn's) or bilateral hyperplasia secretes excess aldosterone. Classic: resistant hypertension + spontaneous hypokalemia (though up to 50% are normokalemic). Screening: ALDOSTERONE:RENIN RATIO (ARR) — elevated (aldosterone high, renin LOW/suppressed because aldosterone suppresses renin via feedback). Confirmation: salt-loading test or fludrocortisone suppression test. Treatment: unilateral adenoma → adrenalectomy; bilateral hyperplasia → spironolactone or eplerenone. ARR is the most important screening test to know."},
{c:"Adrenal — Pheochromocytoma",q:"A 38-year-old has episodic severe headaches, palpitations, profuse sweating, and paroxysmal hypertension (BP spikes to 210/120). Between episodes she is normotensive. Diagnosis and screening test?",o:["Migraine with aura — prophylaxis with propranolol","Panic disorder — SSRI and CBT","Pheochromocytoma — screen with plasma free metanephrines or 24-hour urine fractionated metanephrines","Primary hyperaldosteronism — aldosterone:renin ratio"],a:2,r:"Pheochromocytoma: catecholamine-secreting tumor of adrenal medulla. Classic '5 Ps': Pressure (hypertension, often paroxysmal), Palpitations, Perspiration (diaphoresis), Pain (headache — most common triad symptom), Pallor. Paroxysmal episodic HTN is highly characteristic. Screen with: PLASMA FREE METANEPHRINES (highest sensitivity) or 24-hour urine fractionated metanephrines and catecholamines. Pre-operative: alpha-blocker FIRST (phenoxybenzamine), then beta-blocker — NEVER give beta-blocker alone first (blocks vasodilatory beta-2 → unopposed alpha-1 → hypertensive crisis). Associated with MEN2A, MEN2B, Von Hippel-Lindau, neurofibromatosis."},
{c:"Calcium — Hypercalcemia",q:"An 82-year-old with known small cell lung cancer presents with confusion, constipation, nausea, and diffuse bone pain. Labs: calcium 13.8 mg/dL, PTH <5 pg/mL (suppressed). Which best explains the hypercalcemia?",o:["Primary hyperparathyroidism — elevated PTH","Milk-alkali syndrome from antacid overuse","Hypercalcemia of malignancy — either PTHrP secretion (most common) or osteolytic bone metastases","Vitamin D toxicity from supplements"],a:2,r:"Hypercalcemia of malignancy: most common cause of hypercalcemia in HOSPITALIZED patients. Two mechanisms: (1) PTHrP (parathyroid hormone-related protein) — a PTH-like molecule secreted by squamous cell carcinoma, renal cell, breast cancer → HIGH calcium, LOW PTH (suppressed); (2) Osteolytic bone metastases (breast, myeloma). Primary hyperparathyroidism is the most common cause in OUTPATIENT settings — PTH is ELEVATED. Key: low PTH with high calcium = NON-PTH-mediated cause (malignancy, vitamin D toxicity, granulomatous disease like sarcoidosis). Symptoms: 'bones, stones, groans, and psychic moans.'"},
{c:"Calcium — Hyperparathyroidism",q:"A 55-year-old woman has an incidental finding of calcium 10.9 mg/dL on routine labs. PTH is 98 pg/mL (elevated). She is asymptomatic with no kidney stones. eGFR is 72 and DEXA T-score is -1.8. Most likely diagnosis and management?",o:["Hypercalcemia of malignancy — urgent oncology referral","Primary hyperparathyroidism — most likely a single parathyroid adenoma; surgical parathyroidectomy if criteria are met","Familial hypocalciuric hypercalcemia — benign, no treatment","Secondary hyperparathyroidism from CKD — treat with vitamin D"],a:1,r:"Primary hyperparathyroidism: most common cause of asymptomatic hypercalcemia in outpatients. Single parathyroid adenoma (85%). Elevated PTH + elevated calcium confirms the diagnosis. Surgery indications: age <50, symptomatic, calcium >1 mg/dL above ULN, eGFR <60, T-score ≤-2.5 or fragility fracture, 24-hour urine calcium >400 mg/day. This patient at 55 has no surgical criteria — MONITOR with annual labs, DEXA, renal imaging. Secondary hyperparathyroidism (response to low calcium in CKD): PTH elevated, but calcium is LOW or normal."},
{c:"Calcium — Hypocalcemia",q:"A patient develops muscle cramps, perioral tingling, and carpopedal spasm 24 hours after a total thyroidectomy. What is the cause and treatment?",o:["Normal postoperative pain — NSAIDs","Hypocalcemia from inadvertent removal or devascularization of parathyroid glands — treat with IV calcium gluconate (severe) or oral calcium + vitamin D (mild)","Hypercalcemia from parathyroid hormone rebound","Laryngospasm — emergency intubation"],a:1,r:"Hypoparathyroidism after thyroidectomy: parathyroid glands (4 glands, each ~40 mg, embedded in thyroid capsule) may be inadvertently removed or devascularized during surgery. Without PTH: calcium falls, phosphorus rises. Signs of hypocalcemia: perioral numbness/tingling, muscle cramps, Chvostek's sign (facial twitching when tapping facial nerve), Trousseau's sign (carpal spasm with BP cuff inflated above systolic for 3 minutes), tetany, seizures, QT prolongation. Severe/symptomatic: IV calcium gluconate. Mild: oral calcium carbonate + calcitriol. This is the most common cause of acquired hypoparathyroidism."},
{c:"Electrolytes — SIADH",q:"A 65-year-old with small cell lung cancer has sodium 121 mEq/L, serum osmolality 248 mOsm/kg, urine osmolality 520 mOsm/kg, urine sodium 55 mEq/L, and no edema or dehydration. Diagnosis?",o:["Hypervolemic hyponatremia from heart failure","Hypovolemic hyponatremia from diarrhea","SIADH — concentrated urine + euvolemia + low serum osmolality confirms","Hypothyroidism alone"],a:2,r:"SIADH criteria: (1) Hyponatremia (serum Na <135); (2) Serum osmolality <275 mOsm/kg; (3) Inappropriately CONCENTRATED urine (Uosm >100, usually >300); (4) Elevated urine sodium (>40 mEq/L — kidneys excrete sodium despite low serum Na); (5) EUVOLEMIA (no edema, no dehydration). Causes: malignancy (SCLC — paraneoplastic ADH), CNS disorders, pulmonary disease, SSRIs, carbamazepine, antipsychotics. Treatment: fluid restriction (first-line); hypertonic saline (3% NaCl) for severe symptoms (seizing, coma) — correct Na slowly (<8-12 mEq/L per 24 hours to prevent osmotic demyelination syndrome)."},
{c:"Electrolytes — Diabetes Insipidus",q:"A 28-year-old with a recent traumatic brain injury produces 8 liters of dilute urine daily, is severely thirsty, and has serum sodium of 152 mEq/L. Serum osmolality is 310 mOsm/kg and urine osmolality is 85 mOsm/kg. Most likely diagnosis?",o:["SIADH — concentrated urine would be expected","Psychogenic polydipsia — serum sodium would be low","Central diabetes insipidus — deficient ADH production after TBI; treat with DDAVP (desmopressin)","Nephrogenic DI — requires thiazide diuretics and salt restriction"],a:2,r:"Diabetes insipidus (DI): inability to concentrate urine → massive dilute urine output, polydipsia, HYPERNATREMIA (if inadequate fluid intake). Central DI: deficient ADH production — causes: TBI, neurosurgery, pituitary tumors, idiopathic. Nephrogenic DI: kidneys don't respond to ADH — causes: lithium (most common drug cause), hypercalcemia, hypokalemia. Water deprivation test followed by DDAVP: response to DDAVP = central DI; no response = nephrogenic DI. Treatment: Central = DDAVP (intranasal, oral, or IV); Nephrogenic = treat cause + thiazides + low-sodium diet (counterintuitive but reduces urine volume)."},
{c:"Pituitary — Acromegaly",q:"A 44-year-old complains of enlarging shoe and ring size over 3 years, jaw protrusion, frontal bossing, and increased sweating. He also has hypertension, T2DM, and sleep apnea. Diagnosis and most appropriate diagnostic test?",o:["Hypothyroidism — check TSH","Cushing's syndrome — 24-hour urine cortisol","Acromegaly from GH excess — screen with IGF-1 level, confirm with oral glucose tolerance test (GH fails to suppress)","Paget's disease — bone-specific alkaline phosphatase"],a:2,r:"Acromegaly: excess growth hormone in ADULTS (after epiphyseal closure). Pituitary adenoma in 99%. Features: progressive enlargement of hands, feet, jaw (macrognathia), forehead (frontal bossing), nose, tongue; coarsening facial features, voice deepening, ring/shoe size increase, carpal tunnel, hyperhidrosis. Complications: T2DM, HTN, cardiomegaly, sleep apnea, colon polyps. Screening: IGF-1 (stable, reflects average GH). Confirmation: oral GTT — in acromegaly, GH is NOT suppressed by glucose (should fall <0.4 mcg/L normally). Treatment: pituitary surgery (first-line), then somatostatin analogs (octreotide), radiation, or pegvisomant."},
{c:"Osteoporosis — T-scores",q:"A 68-year-old woman's DEXA scan shows lumbar spine T-score of -2.8 and femoral neck T-score of -2.6. She has had no fractures. How are these values interpreted and what does T-score measure?",o:["Both are osteopenia — treatment not yet indicated","T-score compares to age-matched peers; both values indicate normal bone loss for her age","Both values indicate osteoporosis (T-score ≤-2.5) — T-score compares to young healthy adult PEAK bone mass; treatment is indicated","T-score <-1.0 is diagnostic of severe osteoporosis"],a:2,r:"DEXA T-score: comparison to young healthy adult peak bone mass. Normal ≥-1.0; Osteopenia -1.0 to -2.5; Osteoporosis ≤-2.5; Severe osteoporosis ≤-2.5 + fragility fracture. Z-score compares to age-matched peers — Z-score <-2.0 suggests secondary cause of bone loss. T-score is the standard for postmenopausal women and men ≥50. Treatment indication: T-score ≤-2.5, or T-score -1.0 to -2.5 with FRAX 10-year major osteoporotic fracture risk ≥20% OR hip fracture risk ≥3%. First-line treatment: bisphosphonate (alendronate oral weekly, zoledronic acid IV annually)."},
{c:"Osteoporosis — Treatment",q:"A patient has been on alendronate for 5 years for osteoporosis. Her current T-score is -2.2 (improved from -2.9 at start), no fractures. What is the recommended approach after 5 years of bisphosphonate therapy?",o:["Continue indefinitely without reassessment","Consider a bisphosphonate holiday (drug pause) — reassess fracture risk; continue if high-risk (hip/vertebral fracture, T-score <-2.5 after treatment)","Switch to a different bisphosphonate immediately","Discontinue permanently — 5 years is the maximum safe duration for all patients"],a:1,r:"Bisphosphonate holiday: after 5 years of oral bisphosphonate (or 3 years of IV zoledronic acid), reassess fracture risk. Consider a drug pause if the patient is now lower-risk (T-score >-2.5, no hip/spine fractures). Rationale: bisphosphonates accumulate in bone and have prolonged residual effect after stopping. Long-term use risks: atypical femur fractures (stress fractures of femoral shaft), osteonecrosis of the jaw. CONTINUE without holiday if: prior hip or vertebral fracture, T-score still ≤-2.5, or very high FRAX risk. Resume after 2-3 years of holiday if needed."},
{c:"Diabetes — Sick Day",q:"A patient with T2DM on metformin, empagliflozin (SGLT-2i), and glipizide develops gastroenteritis with vomiting and cannot eat or drink. Which medications should be HELD?",o:["Hold all three medications until gastroenteritis resolves","Hold metformin and empagliflozin; reduce or hold glipizide; stay hydrated; check glucose frequently","Continue all medications — stopping creates rebound hyperglycemia","Hold only insulin — oral agents are always safe"],a:1,r:"Sick day rules for diabetes: HOLD metformin (risk of lactic acidosis with dehydration/AKI); HOLD SGLT-2 inhibitors (risk of euglycemic DKA — especially with reduced carbohydrate intake and volume depletion); REDUCE or HOLD sulfonylureas when not eating (hypoglycemia risk). CONTINUE basal insulin (may reduce by 10-20% if not eating); monitor glucose frequently. Push clear fluids. Seek care if unable to keep fluids down, glucose >300, or signs of DKA. This 'sick day rule' question is a clinical application favorite on ANCC boards."},
{c:"MEN Syndromes",q:"A 32-year-old is found to have medullary thyroid cancer. After surgery, workup also reveals a pheochromocytoma and mild hypercalcemia from a parathyroid adenoma. Which genetic syndrome is most likely?",o:["MEN 1 — Pituitary, Parathyroid, Pancreatic tumors","MEN 2A — Medullary thyroid cancer + Pheochromocytoma + Parathyroid hyperplasia (RET proto-oncogene mutation)","MEN 2B — Medullary thyroid cancer + Pheochromocytoma + Marfanoid habitus + Mucosal neuromas","Von Hippel-Lindau syndrome"],a:1,r:"Multiple Endocrine Neoplasia (MEN): MEN 1 — '3 Ps': Pituitary adenoma, Parathyroid hyperplasia (hypercalcemia), Pancreatic tumors (insulinoma, gastrinoma/Zollinger-Ellison, glucagonoma); MEN1 gene (menin protein). MEN 2A — Medullary thyroid cancer + Pheochromocytoma + Parathyroid hyperplasia; RET proto-oncogene mutation. MEN 2B — MTC + Pheo + Marfanoid habitus + Mucosal/intestinal neuromas (NO parathyroid); RET mutation. Key: ANY patient with pheochromocytoma or medullary thyroid cancer should be screened for MEN2 with RET mutation testing and family evaluation. Prophylactic thyroidectomy in RET mutation carriers."},
{c:"Diabetes — Prevention",q:"A 46-year-old has pre-diabetes (A1c 6.1%, FPG 112 mg/dL). He is overweight (BMI 28) with no contraindications to medication. Which intervention has the STRONGEST evidence for preventing progression to type 2 diabetes?",o:["Metformin alone","No intervention needed until diabetes is diagnosed","Intensive lifestyle modification (≥7% weight loss + 150 min/week of moderate exercise) — reduces progression by 58%; metformin is second-line (reduces by 31%)","Low-dose aspirin for vascular protection"],a:2,r:"Diabetes Prevention Program (DPP) trial: in pre-diabetes, intensive lifestyle modification (≥7% weight loss + 150 min/week moderate exercise) reduced progression to T2DM by 58% — MORE effective than metformin (31% reduction). Lifestyle is FIRST-LINE for all pre-diabetes patients. Metformin is recommended as an adjunct for: high-risk pre-diabetes (A1c ≥6.0%, age <60, BMI ≥35, prior GDM, progressive A1c rise). Annual A1c monitoring. Goals: lose 5-7% body weight, 150 min/week exercise. Lifestyle modification is the most evidence-based prevention strategy — and a common ANCC board point."}
,
{c:"Diabetes — Complications",q:"A patient with 20-year T1DM reports blurry vision. Ophthalmology finds new vessels growing on the retinal surface. What stage is this and what is the main treatment risk?",o:["Background retinopathy — no treatment needed","Preproliferative retinopathy — observe every 6 months","Proliferative diabetic retinopathy — new vessel growth (neovascularization) risks vitreous hemorrhage and tractional retinal detachment; treated with laser photocoagulation or anti-VEGF injections","Cataracts only — lens replacement is curative"],a:2,r:"Diabetic retinopathy progression: Background (mild nonproliferative) → Moderate/Severe nonproliferative → Proliferative. Proliferative DR: retinal ischemia drives neovascularization (VEGF-stimulated new vessel growth). These fragile new vessels bleed (vitreous hemorrhage) and scar (tractional retinal detachment) — leading causes of blindness. Treatment: pan-retinal photocoagulation (laser) or intravitreal anti-VEGF injections (ranibizumab, bevacizumab, aflibercept). Screening: T1DM — annual dilated exam starting 5 years after diagnosis; T2DM — at diagnosis then annually. Most common cause of new blindness in US adults ages 20-74."},
{c:"Thyroid — Interpretation",q:"A critically ill ICU patient on vasopressors has TSH 0.3 mIU/L and free T4 1.0 ng/dL (normal). He has no prior thyroid history. Most likely explanation?",o:["Subclinical hyperthyroidism — start methimazole","Graves disease — order thyroid antibodies immediately","Euthyroid sick syndrome (nonthyroidal illness) — low T3 and sometimes low TSH during severe illness; NOT true thyroid disease; no thyroid treatment indicated","Central hypothyroidism from ICU stress"],a:2,r:"Euthyroid sick syndrome (nonthyroidal illness syndrome): in severe systemic illness, thyroid function tests are abnormal WITHOUT true thyroid disease. Most common pattern: LOW T3 (decreased peripheral conversion of T4→T3), normal or low T4, TSH may be low, normal, or briefly elevated during recovery. Mechanism: cytokines inhibit deiodinase. Key point: do NOT treat with thyroid hormones — this reflects appropriate adaptation to illness. Thyroid function tests are unreliable in the ICU. Check TSH only if thyroid disease is specifically suspected and treat based on clinical context, not lab values alone."},
{c:"Diabetes — Monitoring",q:"Which A1c goal is most appropriate for an 80-year-old with T2DM, moderate dementia, limited life expectancy, and multiple comorbidities?",o:["Less than 6.5% — tighter control is always better","Less than 7.0% — standard target for all diabetics","Less than 8.0% to 8.5% — looser targets are appropriate to avoid hypoglycemia and maintain quality of life","No A1c monitoring — too complex in elderly"],a:2,r:"ADA A1c targets by patient profile: Generally healthy older adults (good functional status, long life expectancy): <7.0-7.5%; Complex/intermediate (multiple chronic conditions, mild-moderate cognitive impairment): <8.0%; Very complex/poor health (end-stage disease, severe dementia, short life expectancy): <8.5% or even less stringent. Rationale: hypoglycemia in elderly causes falls, fractures, cardiac events, and is life-threatening. Avoid sulfonylureas and long-acting insulin in frail elderly when possible. Quality of life and symptom avoidance take priority over tight glucose control in very complex patients."},
{c:"Thyroid — Subacute",q:"A 35-year-old woman has a painful, tender thyroid gland, fever, and elevated ESR following a URI 3 weeks ago. TSH is low, free T4 is high, and radioactive iodine uptake (RAIU) is very low. Diagnosis and management?",o:["Graves disease — start methimazole","Hashimoto's thyroiditis — levothyroxine now","Subacute (de Quervain's) granulomatous thyroiditis — NSAIDs for pain; beta-blocker for symptoms; no antithyroid drugs; most cases self-resolve","Toxic multinodular goiter — radioactive iodine treatment"],a:2,r:"Subacute thyroiditis (de Quervain's): post-viral inflammatory thyroiditis. Key features: painful/tender goiter (distinguishes from Graves), elevated ESR, LOW RAIU (pre-formed hormone leaking, not new production), transient hyperthyroid phase → hypothyroid phase → usually recovery. Treatment: NSAIDs (mild) or corticosteroids (severe pain); beta-blocker for sympathetic symptoms. NO antithyroid drugs (not overproduction). Radioactive iodine is contraindicated (low uptake). Follow TFTs: most patients recover thyroid function in 6-12 months; 5-15% develop permanent hypothyroidism."},
{c:"Adrenal — Exogenous Steroids",q:"A patient on prednisone 40 mg daily for 4 months for rheumatoid arthritis is recovering well. The rheumatologist wants to discontinue the prednisone. Why must the dose be tapered gradually rather than stopped abruptly?",o:["Prednisone causes rebound rheumatoid arthritis if stopped abruptly","Exogenous glucocorticoids suppress the HPA axis — abrupt discontinuation causes ADRENAL INSUFFICIENCY; the adrenal glands need time to recover endogenous cortisol production","Prednisone accumulates in fat and must be slowly released","It prevents weight gain only"],a:1,r:"Hypothalamic-pituitary-adrenal (HPA) axis suppression: exogenous corticosteroids provide negative feedback → pituitary ACTH production decreases → adrenal glands atrophy. After >3-4 weeks of supraphysiologic steroids, abrupt discontinuation leaves the patient without cortisol — adrenal crisis risk. Taper guideline: reduce slowly (e.g., 10% per week at doses near physiologic level). Physiologic cortisol production ≈ 5-7.5 mg/day of prednisone equivalent. HPA axis recovery may take 9-12 months. Patients on long-term steroids should carry a steroid alert card and have injectable hydrocortisone available for emergencies."},
{c:"Diabetes — GLP-1 Benefits",q:"A 58-year-old with T2DM, established ASCVD, and A1c of 7.8% on metformin alone needs an additional glucose-lowering agent. Per ADA guidelines, which class is preferred SPECIFICALLY for its cardiovascular mortality benefit?",o:["Sulfonylurea — proven mortality benefit in ASCVD","DPP-4 inhibitor — best cardiovascular safety","GLP-1 receptor agonist (liraglutide, semaglutide, dulaglutide) OR SGLT-2 inhibitor — both have landmark cardiovascular outcome trial data showing mortality reduction in established ASCVD","Thiazolidinedione (pioglitazone) — first choice in ASCVD"],a:2,r:"ADA 2024 guidelines: in T2DM with established ASCVD (or high ASCVD risk), after metformin — add a GLP-1 agonist or SGLT-2 inhibitor regardless of A1c level. CARDIOVASCULAR BENEFIT trials: LEADER (liraglutide), SUSTAIN-6 (semaglutide), DECLARE-TIMI (dapagliflozin), EMPA-REG (empagliflozin). SGLT-2i are preferred when HEART FAILURE or CKD is also present (strongest renal protection). GLP-1s are preferred when ASCVD predominates and/or weight loss is a priority. These are not just glucose-lowering drugs — they are cardiometabolic medicines."},
{c:"Parathyroid — Secondary",q:"A 60-year-old with CKD stage 4 (eGFR 22) has calcium 8.0 mg/dL, phosphorus 6.2 mg/dL, and PTH 385 pg/mL. How does this differ from primary hyperparathyroidism?",o:["It is identical — both are managed with parathyroidectomy","Secondary hyperparathyroidism in CKD: PTH is elevated but CALCIUM is LOW or NORMAL (compensatory response to low calcium due to impaired vitamin D activation and phosphate retention); primary HPT has HIGH calcium","CKD never causes elevated PTH","No treatment is needed in CKD"],a:1,r:"Secondary hyperparathyroidism in CKD: impaired renal 1-alpha hydroxylase → less active vitamin D (calcitriol) → decreased gut calcium absorption → LOW calcium → PTH secreted to raise calcium (compensatory). Also: phosphate retention in CKD directly suppresses calcitriol and stimulates PTH. Calcium is LOW or NORMAL (opposite of primary HPT). Treatment: dietary phosphate restriction, phosphate binders (calcium carbonate, sevelamer), active vitamin D (calcitriol or paricalcitol), and cinacalcet (calcimimetic — reduces PTH). Tertiary HPT: autonomous PTH secretion after prolonged secondary HPT (may need surgery)."},
{c:"Diabetes — Foot",q:"A patient with 15-year T2DM and peripheral neuropathy presents with a painless plantar foot ulcer that has been present for 3 weeks. He didn't notice it until his wife pointed it out. Which component of the annual diabetic foot exam detected loss of protective sensation in this patient?",o:["Ankle-brachial index (ABI)","10-gram monofilament testing","Serum glucose","Ankle reflexes only"],a:1,r:"10-gram Semmes-Weinstein monofilament testing: the standard method to assess protective sensation in diabetic feet. A monofilament is pressed against designated plantar foot sites — if the patient cannot feel the 10g force, protective sensation is LOST. Loss of protective sensation means the patient cannot feel minor trauma (tight shoes, foreign bodies) → injury occurs without pain awareness → ulcer forms. Annual comprehensive foot exam: monofilament + vibration sense (128 Hz tuning fork) + pedal pulses + visual inspection (skin, nails, deformities) + footwear check. Teach patients: daily self-inspection, appropriate footwear, no barefoot walking."},
{c:"Thyroid — TSH Screening",q:"A 35-year-old woman presents for an annual wellness exam and requests thyroid screening. She has no symptoms. Per USPSTF, what is the recommendation for screening asymptomatic adults for thyroid dysfunction?",o:["TSH should be checked annually in all women starting at age 35","USPSTF finds insufficient evidence (Grade I) to recommend for or against routine TSH screening in non-pregnant asymptomatic adults — clinical judgment applies","TSH screening is recommended every 5 years for all adults","Universal TSH screening is strongly recommended starting at age 50"],a:1,r:"USPSTF 2015: Grade I (Insufficient Evidence) for screening asymptomatic non-pregnant adults for thyroid dysfunction — neither for nor against routine screening. However, many clinical guidelines (ATA, AAFP) recommend case-finding (testing symptomatic patients and high-risk groups): women >60, family history of thyroid disease, prior radiation, autoimmune disease, lithium use, amiodarone use. TSH is the most sensitive single test for primary thyroid dysfunction. In practice, TSH is widely obtained during wellness visits even though population-wide screening is not formally recommended."},
{c:"Diabetes — SGLT2 Benefits",q:"A 62-year-old with T2DM, CKD (eGFR 42, UACR 380 mg/g), and heart failure with reduced EF is on metformin. Which add-on therapy has the STRONGEST evidence for BOTH kidney protection AND heart failure benefit?",o:["Sulfonylurea — proven renal protection","DPP-4 inhibitor (sitagliptin)","SGLT-2 inhibitor (empagliflozin or dapagliflozin) — CREDENCE, DAPA-CKD, EMPEROR-Reduced trials show renal and HFrEF mortality benefit","GLP-1 agonist — best renal choice in this scenario"],a:2,r:"SGLT-2 inhibitors have become standard of care in T2DM with CKD and/or HFrEF due to landmark trial evidence: CREDENCE (canagliflozin — reduced renal failure and CV events in CKD), DAPA-CKD (dapagliflozin — renal outcomes even in non-diabetic CKD), EMPEROR-Reduced (empagliflozin — HFrEF mortality). Can be used down to eGFR 20 for renal protection (lower threshold than glucose-lowering use). Mechanism: glycosuria reduces intraglomerular pressure (reduces UACR), improves cardiac preload/afterload. ADA guidelines: GLP-1 agonist preferred if ASCVD predominates; SGLT-2i preferred if HF or CKD predominates."},
{c:"Endocrine — Screening",q:"A 55-year-old with obesity presents for a well visit. Per ADA guidelines, which of the following endocrine screening tests should be routinely offered?",o:["Annual GH level and IGF-1","Cortisol level and aldosterone:renin ratio","Fasting plasma glucose or A1c for prediabetes/T2DM screening","Annual TSH AND adrenal function panel"],a:2,r:"ADA recommends screening for T2DM/prediabetes in: adults ≥35 with overweight/obesity, or any age with additional risk factors (HTN, dyslipidemia, PCOS, prior GDM, physical inactivity, first-degree relative with DM, high-risk ethnicity). Tests: fasting glucose, A1c, or 75g OGTT. TSH testing is appropriate if thyroid symptoms are present but is not part of a universal metabolic screening panel. GH/cortisol/aldosterone testing is reserved for specific clinical indications (symptoms, signs of endocrine excess). Routine comprehensive endocrine panels are not evidence-based in asymptomatic adults."},
{c:"Adrenal — Incidentaloma",q:"A 50-year-old has an adrenal mass found incidentally on CT scan done for kidney stones. The mass is 2.2 cm with Hounsfield units of 8 (lipid-rich, benign-appearing). What are the two most important questions to answer?",o:["Is it cancerous and does it need immediate surgery","Is it hormonally active AND is it possibly malignant — functional workup includes screening for cortisol excess, pheochromocytoma, and aldosterone excess","Only surgery can determine benignity — all adrenal incidentalomas require adrenalectomy","CT alone is sufficient — no further workup needed if small"],a:1,r:"Adrenal incidentaloma workup: (1) HORMONAL FUNCTION — screen ALL incidentalomas for: subclinical Cushing's (overnight DST), pheochromocytoma (plasma free metanephrines), and primary hyperaldosteronism if hypertensive (aldosterone:renin ratio). (2) MALIGNANCY risk — CT attenuation (HU <10 = lipid-rich = likely benign adenoma; HU >20 = suspicious), size (>4 cm = higher malignancy risk), washout characteristics. This mass is lipid-rich (low HU) and small — likely benign adenoma. If non-functional and benign appearing: repeat imaging in 3-6 months then annually for 2 years; if functional or suspicious: adrenalectomy."},
{c:"Calcium — Vitamin D",q:"A 72-year-old woman taking alendronate for osteoporosis is found to have vitamin D level of 14 ng/mL (deficient). She is prescribed vitamin D supplementation. What is the target 25-OH vitamin D level for optimal bone health?",o:["10-20 ng/mL is sufficient","Greater than 20 ng/mL (Endocrine Society recommends 30-50 ng/mL for bone health)","Greater than 80 ng/mL — higher is always better","Vitamin D level does not need to be checked in patients on bisphosphonates"],a:1,r:"Vitamin D targets: IOM/USPSTF: ≥20 ng/mL sufficient for bone health; Endocrine Society: 30-50 ng/mL for optimal bone health, especially in high-risk patients (elderly, osteoporosis, malabsorption). Deficiency <20 ng/mL warrants supplementation. Toxicity: rare, but possible with >150 ng/mL (hypercalcemia). Combined calcium (1200 mg/day for women ≥51) + vitamin D (800-1000 IU/day) is foundational for osteoporosis prevention and treatment alongside bisphosphonates. Check 25-OH vitamin D level — this is the storage form and reflects total body stores (not 1,25-OH which is active form and affected by PTH)."},
{c:"Thyroid — Nodule Followup",q:"A 50-year-old has a thyroid nodule FNA result of 'benign' (Bethesda II). Ultrasound shows no high-risk features. How is a benign FNA result managed?",o:["No further follow-up needed — benign FNA ends the workup","Immediate thyroidectomy — FNA has false-negative rates","Ultrasound surveillance in 12-24 months; repeat FNA if significant growth (>20% in 2 dimensions or >4 mm in solid component) is noted","Empiric radioactive iodine therapy"],a:2,r:"Benign FNA (Bethesda II): false-negative rate ~1-3%. Management: surveillance ultrasound at 12-24 months; repeat FNA is NOT routinely recommended unless significant interval growth occurs. Growth criteria for repeat FNA: ≥20% increase in 2 or more dimensions with minimum 2 mm absolute increase, OR development of suspicious ultrasound features. After 2 consecutive stable ultrasounds, surveillance intervals can be extended. No treatment needed for confirmed benign nodules. Patient factors (anxiety, symptoms) may influence clinical decision-making."},
{c:"Diabetes — Technology",q:"A 28-year-old with T1DM asks about a continuous glucose monitor (CGM). Which statement accurately describes CGM?",o:["CGM replaces the need for any A1c testing","CGM measures interstitial glucose (slightly lags behind blood glucose) — provides real-time values, trends, and alerts for hypo/hyperglycemia; recommended for all T1DM patients","CGM is only approved for T2DM on insulin","CGM measures blood glucose identical to fingerstick values"],a:1,r:"Continuous glucose monitors (CGM): measure interstitial fluid glucose (lags ~5-15 minutes behind blood glucose). Provides: real-time glucose values, trend arrows (rising/falling rapidly), customizable alerts for high/low glucose. Benefits: better hypoglycemia detection (especially nocturnal), reduced A1c, improved time-in-range (TIR 70-180 mg/dL, goal >70%). ADA recommends CGM for all people with T1DM and those with T2DM on insulin. Time-in-range is increasingly used alongside A1c as a measure of glycemic control. CGM does NOT eliminate A1c — both provide complementary information."},
{c:"Endocrine — Hypercalcemia Treatment",q:"A 78-year-old presents with confusion, constipation, and calcium of 14.2 mg/dL. She has breast cancer with bone metastases. What is the FIRST treatment for symptomatic hypercalcemia of malignancy?",o:["Oral calcium restriction alone","Furosemide as the first intervention","Aggressive IV normal saline hydration — corrects volume depletion and promotes calciuresis; add IV bisphosphonate (zoledronic acid) once hydrated","Calcitonin alone for long-term control"],a:2,r:"Treatment of hypercalcemic crisis: (1) IV normal saline hydration aggressively (corrects dehydration from polyuria/nausea and promotes renal calcium excretion); (2) IV bisphosphonate — zoledronic acid (most potent) or pamidronate — onset 2-4 days, lasts weeks to months (inhibit osteoclast-mediated bone resorption); (3) Calcitonin (4-8 IU/kg IM/SC q6-12h) — fastest onset (hours) but tachyphylaxis within 48-72 hours; use as bridge while awaiting bisphosphonate effect; (4) Denosumab for bisphosphonate-refractory or CKD patients. Furosemide is NO LONGER routinely recommended (historical practice — only after adequate hydration and only in volume-overloaded patients)."}
,
{c:"Diabetes — Neuropathy",q:"A patient with diabetic peripheral neuropathy fails to respond to gabapentin after 8 weeks at a therapeutic dose. Which is the next appropriate medication option?",o:["Opioids — second-line for all neuropathic pain","Acetaminophen scheduled TID","Duloxetine (Cymbalta) — also FDA-approved for DPN; both gabapentin and duloxetine are first-line, can try the other class if one fails","High-dose NSAIDs long-term"],a:2,r:"Diabetic peripheral neuropathy pharmacotherapy: two FDA-approved first-line agents — pregabalin (Lyrica) and duloxetine (Cymbalta). Gabapentin is widely used off-label and equally effective. If one agent fails: try the other class (e.g., SNRIs if gabapentin failed, or vice versa). Tricyclic antidepressants (amitriptyline, nortriptyline) are effective but have higher side effect profiles, especially in elderly (Beers list). Opioids are NOT first-line for neuropathic pain. Topical capsaicin and lidocaine patches are useful adjuncts. Optimize glucose control — most important modifiable factor in preventing and slowing progression."}
];

const N = QUESTIONS.length;
let idx = 0;
let answers = new Array(N).fill(null); // selected option index
const LETTERS = ["A","B","C","D"];

const strip = document.getElementById("strip");
const qcard = document.getElementById("qcard");
const resultsCard = document.getElementById("results");

function buildStrip(){
  strip.innerHTML = "";
  for(let i=0;i<N;i++){
    const t = document.createElement("div");
    t.className = "tick";
    t.title = "Question " + (i+1);
    t.addEventListener("click", ()=>{ idx = i; render(); });
    strip.appendChild(t);
  }
}
function paintStrip(){
  const ticks = strip.children;
  for(let i=0;i<N;i++){
    const t = ticks[i];
    t.className = "tick";
    if(answers[i] !== null){
      t.classList.add(answers[i] === QUESTIONS[i].a ? "ok" : "bad");
    }
    if(i === idx && !resultsVisible()) t.classList.add("cur");
  }
}
function resultsVisible(){ return !resultsCard.classList.contains("hide"); }

function counts(){
  let done=0, right=0;
  for(let i=0;i<N;i++){
    if(answers[i]!==null){ done++; if(answers[i]===QUESTIONS[i].a) right++; }
  }
  return {done,right};
}
function paintScore(){
  const {done,right} = counts();
  document.getElementById("sc-done").textContent = done;
  document.getElementById("sc-right").textContent = right;
}

function render(){
  resultsCard.classList.add("hide");
  qcard.classList.remove("hide");
  const Q = QUESTIONS[idx];
  const picked = answers[idx];
  let html = "";
  html += '<div class="meta"><span class="qnum">QUESTION ' + (idx+1) + ' / ' + N + '</span><span class="chip">' + Q.c + '</span></div>';
  html += '<p class="stem">' + Q.q + '</p>';
  Q.o.forEach((opt,i)=>{
    let cls = "opt";
    if(picked !== null){
      if(i === picked && picked === Q.a) cls += " sel-ok";
      else if(i === picked) cls += " sel-bad";
      else if(i === Q.a) cls += " reveal-ok";
    }
    html += '<button class="'+cls+'" data-i="'+i+'" '+(picked!==null?"disabled":"")+'><span class="ltr">'+LETTERS[i]+'</span><span>'+opt+'</span></button>';
  });
  if(picked !== null){
    const good = picked === Q.a;
    html += '<div class="verdict '+(good?"ok":"bad")+'">'+(good ? "Correct" : "Incorrect — answer is " + LETTERS[Q.a])+'</div>';
    html += '<div class="rationale">'+Q.r+'</div>';
  }
  html += '<div class="nav">';
  html += '<button class="btn ghost" id="prevBtn" '+(idx===0?"disabled":"")+'>Back</button>';
  if(idx < N-1){
    html += '<button class="btn" id="nextBtn">Next question</button>';
  } else {
    html += '<button class="btn" id="finishBtn">See results</button>';
  }
  html += '</div>';
  qcard.innerHTML = html;

  qcard.querySelectorAll(".opt").forEach(btn=>{
    btn.addEventListener("click", ()=>{
      if(answers[idx] !== null) return;
      answers[idx] = parseInt(btn.dataset.i,10);
      render();
    });
  });
  const prev = document.getElementById("prevBtn");
  if(prev) prev.addEventListener("click", ()=>{ idx--; render(); });
  const next = document.getElementById("nextBtn");
  if(next) next.addEventListener("click", ()=>{ idx++; render(); });
  const fin = document.getElementById("finishBtn");
  if(fin) fin.addEventListener("click", showResults);
  paintStrip(); paintScore();
}

function showResults(){
  const {done,right} = counts();
  const pct = done ? Math.round((right/done)*100) : 0;
  // category breakdown
  const cats = {};
  QUESTIONS.forEach((Q,i)=>{
    if(!cats[Q.c]) cats[Q.c] = {n:0, ok:0, ans:0};
    cats[Q.c].n++;
    if(answers[i]!==null){ cats[Q.c].ans++; if(answers[i]===Q.a) cats[Q.c].ok++; }
  });
  let html = '<div class="bigscore">'+right+' / '+done+' ('+pct+'%)</div>';
  html += '<p class="sub">'+(done<N ? (N-done)+' question'+(N-done===1?"":"s")+' unanswered — they are not counted against you. ' : '')+'A passing pace on the real ANCC is roughly the low-to-mid 70s percent range, so use this as a directional gauge, not a verdict.</p>';
  html += '<h2 style="font-size:.95rem;margin-bottom:6px">By category</h2>';
  Object.keys(cats).forEach(c=>{
    const o = cats[c];
    const p = o.ans ? Math.round((o.ok/o.ans)*100) : 0;
    html += '<div class="catrow"><span style="flex:0 0 44%">'+c+'</span><span class="bar"><i style="width:'+(o.ans? p:0)+'%"></i></span><span style="font-family:var(--mono);font-size:.8rem">'+o.ok+'/'+o.ans+(o.ans<o.n?' of '+o.n:'')+'</span></div>';
  });
  // missed list
  const missed = [];
  for(let i=0;i<N;i++) if(answers[i]!==null && answers[i]!==QUESTIONS[i].a) missed.push(i);
  if(missed.length){
    html += '<div class="missedlist"><h2 style="font-size:.95rem;margin-bottom:8px">Review missed questions</h2>';
    missed.forEach(i=>{ html += '<button data-jump="'+i+'">Q'+(i+1)+'</button>'; });
    html += '</div>';
  }
  html += '<div class="nav"><button class="btn ghost" id="backBtn">Back to questions</button><button class="btn" id="resetBtn">Start over</button></div>';
  resultsCard.innerHTML = html;
  resultsCard.classList.remove("hide");
  qcard.classList.add("hide");
  resultsCard.querySelectorAll("[data-jump]").forEach(b=>{
    b.addEventListener("click", ()=>{ idx = parseInt(b.dataset.jump,10); render(); });
  });
  document.getElementById("backBtn").addEventListener("click", ()=>{ render(); });
  document.getElementById("resetBtn").addEventListener("click", ()=>{
    if(confirm("Clear all answers and start over?")){
      answers = new Array(N).fill(null); idx = 0; render();
    }
  });
  paintStrip(); paintScore();
}

buildStrip();
render();
</script>
</body>
</html>
