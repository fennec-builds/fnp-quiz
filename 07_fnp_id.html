<style>
  :root{
    --bg:#F2F5F7; --card:#FFFFFF; --ink:#14283A; --muted:#5B6B7A;
    --teal:#0E7C86; --teal-dk:#0A5A62; --line:#DEE6EB;

  body{
    background:var(--bg); color:var(--ink);

  header{display:flex;justify-content:space-between;align-items:baseline;gap:10px;margin-bottom:6px;flex-wrap:wrap}

  .qnum{font-family:var(--mono);font-size:.8rem;color:var(--muted)}
  .chip{font-size:.68rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--teal-dk);background:#E3F1F2;border-radius:999px;padding:3px 10px}
  .stem{font-size:1.02rem;margin-bottom:18px}

    display:flex;gap:12px;align-items:flex-start;width:100%;text-align:left;

  .btn.ghost:hover{background:#E3F1F2}

  /* results */

<script>
const QUESTIONS = [
{c:"Upper Respiratory",q:"A 28-year-old presents with 10 days of purulent nasal discharge, facial pressure over the maxillary sinuses, and worsening symptoms after initial improvement (double-worsening). Temperature is 38.3°C. Per IDSA guidelines, treatment is:",o:["Nasal saline irrigation and watchful waiting — all sinusitis is viral","Amoxicillin-clavulanate for 5-7 days — bacterial acute rhinosinusitis is indicated by 10+ days of symptoms, severe onset, or double-worsening","Decongestants only — antibiotics increase resistance","Levofloxacin for 14 days — first-line for all sinusitis"],a:1,r:"Bacterial ARS criteria (IDSA): symptoms persisting ≥10 days WITHOUT improvement, severe onset (fever ≥39°C + purulent discharge for ≥3 consecutive days), or double-worsening (improvement then new worsening after 5-6 days). First-line: amoxicillin-clavulanate 5-7 days (covers S. pneumoniae, H. influenzae, M. catarrhalis, including beta-lactamase producers). Penicillin-allergic: doxycycline or respiratory fluoroquinolone. Viral sinusitis (most cases): symptoms <10 days, improving — treat with saline irrigation, nasal steroids, analgesics only. Antibiotic overuse in viral sinusitis is a major driver of resistance."},
{c:"Upper Respiratory",q:"A 35-year-old has been hoarse with a dry cough for 14 days following a URI. Exam reveals mild posterior pharyngeal erythema and no exudates. Rapid strep is negative. What is the most appropriate management?",o:["Azithromycin Z-pack — covers atypical organisms","Amoxicillin for 10 days — likely bacterial","Supportive care — acute laryngitis is almost always viral; antibiotics are not indicated","Prednisone burst to reduce laryngeal inflammation"],a:2,r:"Acute laryngitis is viral in the vast majority of cases (rhinovirus, influenza, parainfluenza). No antibiotic is indicated for uncomplicated viral laryngitis, regardless of symptom duration up to 2-3 weeks. Treatment: voice rest, hydration, humidified air, analgesics. Hoarseness persisting beyond 2-3 weeks warrants laryngoscopy to rule out vocal cord pathology (polyps, malignancy, paralysis). Atypical organisms (Mycoplasma) cause prolonged cough but not typically isolated laryngitis; azithromycin is not routinely warranted without confirmed atypical pneumonia."},
{c:"Pneumonia",q:"A 68-year-old with COPD and type 2 diabetes has fever, productive cough, and right lower lobe infiltrate on chest X-ray. She is treated as an outpatient. Which regimen is appropriate?",o:["Amoxicillin alone — covers S. pneumoniae only","High-dose amoxicillin — same as healthy adults","Respiratory fluoroquinolone (levofloxacin or moxifloxacin) alone, OR amoxicillin-clavulanate + azithromycin/doxycycline — comorbidities require broader coverage","Azithromycin alone — macrolide monotherapy is adequate"],a:2,r:"IDSA/ATS CAP guidelines: Outpatient treatment by group: Healthy, no antibiotics in past 3 months → amoxicillin (or doxycycline/macrolide if low-resistance area). Comorbidities (COPD, diabetes, heart disease, alcoholism, CKD, asplenia, immunosuppression, recent antibiotic use) → COMBINATION: amoxicillin-clavulanate + macrolide/doxycycline OR monotherapy with a respiratory fluoroquinolone (levofloxacin, moxifloxacin). This patient has two comorbidities — she needs broader coverage. Macrolide monotherapy is inadequate when pneumococcal macrolide resistance >25% or with comorbidities."},
{c:"Pneumonia",q:"Which criteria are used to decide whether a pneumonia patient should be hospitalized vs. treated as an outpatient?",o:["Only the chest X-ray findings — bilateral infiltrates always require admission","The patient's preference alone","PSI (Pneumonia Severity Index) or CURB-65 score — assessing confusion, BUN, respiratory rate, BP, and age ≥65 to estimate mortality risk","Only oxygen saturation — if >90% treat outpatient"],a:2,r:"CURB-65 score (1 point each): Confusion (new), BUN >19 mg/dL, Respiratory rate ≥30/min, Blood pressure (SBP <90 or DBP ≤60 mmHg), Age ≥65. Score 0-1 = outpatient; score 2 = consider hospitalization; score 3-5 = hospitalize (ICU if score 4-5). PSI (Pneumonia Severity Index) is more detailed but more complex. Clinical judgment always supplements scores — other factors: hypoxia, inability to take oral meds, social support, rapid progression, multilobar disease. These tools guide (not replace) clinical decision-making."},
{c:"Pneumonia",q:"A 45-year-old is diagnosed with Legionella pneumonia after returning from a hotel stay. He is hospitalized with O2 sat 88% on room air. Which antibiotic class is the treatment of choice?",o:["Amoxicillin — first-line for all CAP","Ceftriaxone alone — covers atypical organisms","Azithromycin or a respiratory fluoroquinolone — Legionella is an atypical organism that does NOT respond to beta-lactams (no cell wall)","Vancomycin — for gram-positive coverage"],a:2,r:"Legionella pneumophila: atypical intracellular organism, NOT covered by beta-lactams (penicillins, cephalosporins). Requires an antibiotic that penetrates intracellular compartments: macrolides (azithromycin — preferred), or respiratory fluoroquinolones (levofloxacin, moxifloxacin). Diagnosis: Legionella urinary antigen (fastest, most sensitive for L. pneumophila serogroup 1 — responsible for 70% of cases). Epidemiology: hotel/hospital water systems, cooling towers, cruise ships, hot tubs. Classic features: high fever, hyponatremia (SIADH), elevated LDH, GI symptoms, relative bradycardia."},
{c:"STIs",q:"A 24-year-old male is diagnosed with gonorrhea (N. gonorrhoeae). Per 2021 CDC guidelines, what is the recommended treatment regimen?",o:["Azithromycin 1 g orally once","Ceftriaxone 250 mg IM once","Ceftriaxone 500 mg IM once (1g if weight ≥150 kg) — no longer combined routinely with azithromycin due to azithromycin resistance","Ciprofloxacin 500 mg orally once"],a:2,r:"CDC 2021 STI Treatment Guidelines updated gonorrhea treatment: ceftriaxone 500 mg IM ONCE (or 1g if weight ≥150 kg) — monotherapy. Dual therapy with azithromycin is NO LONGER routinely recommended (2015 guidelines) due to rising azithromycin resistance. If concurrent chlamydia has NOT been excluded: add doxycycline 100 mg BID x7 days. Test of cure: not routinely needed for uncomplicated urogenital gonorrhea; DO retest in 1-2 weeks for pharyngeal gonorrhea (harder to treat). Fluoroquinolones are NOT recommended due to widespread resistance. Partner treatment and PDMP review are required."},
{c:"STIs",q:"A 19-year-old woman tests positive for Trichomonas vaginalis. Her partner should also be treated. What is the first-line treatment for BOTH partners?",o:["Metronidazole 500 mg BID x7 days for women; no treatment needed for male partners","Fluconazole 150 mg orally once for both","Metronidazole 2g orally once (or tinidazole 2g once) for both partners simultaneously","Doxycycline 100 mg BID x7 days for both"],a:2,r:"Trichomoniasis (Trichomonas vaginalis): sexually transmitted protozoan. Treatment: metronidazole 2g orally ONCE (preferred in non-pregnant women) OR tinidazole 2g orally once. Tinidazole has higher cure rates. Both sexual partners must be treated simultaneously to prevent reinfection. Counsel about avoiding sex until both partners complete treatment and are asymptomatic. In PREGNANCY: metronidazole is safe throughout (preferred); tinidazole is Category C — avoid in first trimester. Metronidazole 500 mg BID x7 days is an alternative (preferred in pregnancy and for recurrent/persistent cases)."},
{c:"STIs",q:"A 32-year-old male has painless penile ulcer with indurated (hardened) edges and a positive RPR with confirmatory FTA-ABS. He has never been treated for syphilis. Treatment?",o:["Doxycycline 100 mg BID x14 days — preferred over penicillin","Benzathine penicillin G 2.4 million units IM once — first-line for primary syphilis","Azithromycin 1g orally once — appropriate alternative","Ceftriaxone 1g IM daily x10 days — equivalent to penicillin"],a:1,r:"Primary syphilis (Treponema pallidum): chancre (painless, indurated, single ulcer) + positive serology (RPR/VDRL confirmed by FTA-ABS or TPPA). Treatment: benzathine penicillin G 2.4 million units IM ONCE for primary, secondary, and early latent (<1 year) syphilis. Penicillin-allergic (non-pregnant): doxycycline 100 mg BID x14 days is the alternative. Penicillin-allergic PREGNANT patients MUST be desensitized — penicillin is the ONLY proven treatment to prevent congenital syphilis; no acceptable alternative in pregnancy. Azithromycin resistance is emerging — not reliable. Jarisch-Herxheimer reaction (fever, chills, myalgia) may occur 2-8 hours after first penicillin dose — treat with NSAIDs, not anaphylaxis protocol."},
{c:"STIs",q:"A 26-year-old HIV-positive patient on antiretroviral therapy has a CD4 count of 140 cells/mcL. Which opportunistic infection prophylaxis is indicated at this CD4 level?",o:["No prophylaxis needed until CD4 <50","MAC (Mycobacterium avium complex) prophylaxis with azithromycin weekly","PCP (Pneumocystis jirovecii pneumonia) prophylaxis with TMP-SMX — indicated when CD4 <200","Toxoplasmosis prophylaxis only if IgG-seropositive"],a:2,r:"HIV opportunistic infection prophylaxis by CD4 count: CD4 <200: PCP prophylaxis — TMP-SMX DS daily (first-line); alternatives: dapsone, atovaquone, or inhaled pentamidine. CD4 <100: add toxoplasmosis prophylaxis IF toxoplasma IgG-seropositive — TMP-SMX DS already covers this. CD4 <50: MAC prophylaxis — azithromycin 1200 mg weekly (or clarithromycin or rifabutin). Prophylaxis can be DISCONTINUED when CD4 rises above threshold on ART for ≥3 months. CD4 140 → PCP prophylaxis is indicated; MAC prophylaxis not yet needed."},
{c:"HIV",q:"Which combination antiretroviral therapy (ART) regimen is recommended for most HIV-naive patients starting treatment today?",o:["AZT + lamivudine (old HAART backbone)","Ritonavir-boosted lopinavir","Bictegravir/tenofovir alafenamide/emtricitabine (Biktarvy) — preferred single-tablet regimen; high barrier to resistance, excellent tolerability","Efavirenz-based regimen — still first-line"],a:2,r:"Current preferred ART for treatment-naive HIV patients (DHHS 2024): integrase strand transfer inhibitor (INSTI)-based regimens are first-line. Preferred regimens: bictegravir/TAF/FTC (Biktarvy) — single tablet daily, high genetic barrier to resistance, no food requirements, minimal drug interactions; OR dolutegravir/abacavir/lamivudine (Triumeq) — requires HLA-B*5701 testing before abacavir; OR dolutegravir + TAF/FTC (Dovato or TLD). Goals of ART: viral suppression (HIV RNA <50 copies/mL), CD4 recovery, prevent transmission. ART is recommended for ALL HIV-positive patients regardless of CD4 count."},
{c:"HIV",q:"A healthcare worker has a needlestick exposure from an HIV-positive patient with a detectable viral load. What is the recommended post-exposure prophylaxis (PEP) regimen?",o:["Wait for the exposed worker's HIV test result before starting PEP","Start tenofovir/emtricitabine + dolutegravir within 72 hours — continue for 28 days","Azidothymidine (AZT) monotherapy for 4 weeks","No PEP needed — needlestick risk is too low to justify treatment"],a:1,r:"HIV PEP: must be started within 72 HOURS of exposure (sooner is better — ideally within 2 hours). Recommended regimen: tenofovir DF/emtricitabine (TDF/FTC) + dolutegravir (DTG) for 28 days. Alternative: raltegravir instead of dolutegravir. Source patient status: known HIV positive = start PEP; unknown status = assess risk and consider PEP. Baseline labs: HIV test (source and exposed), HBV, HCV. Follow-up HIV testing at 6 weeks, 12 weeks, and 6 months. PEP reduces HIV transmission risk by approximately 80%. Occupational HIV transmission risk from needlestick: ~0.3% without PEP."},
{c:"Tuberculosis",q:"A 38-year-old refugee from a high-TB-prevalence country has a tuberculin skin test (TST) with 12 mm of induration. He has no symptoms and a normal chest X-ray. He has never been treated for TB. Diagnosis and management?",o:["Negative TST — 15 mm cutoff applies to all populations","Active TB — start 4-drug therapy immediately","Latent TB infection (LTBI) — treat with isoniazid 9 months OR rifampin 4 months OR rifapentine + INH (3HP) once weekly x12 weeks","No treatment needed — normal chest X-ray rules out TB"],a:2,r:"TST interpretation cutoffs: 5 mm (HIV, recent contact, fibrotic changes on CXR, immunosuppressed); 10 mm (healthcare workers, recent immigrants from high-prevalence countries, IV drug users, prisoners, children <4 years, high-risk medical conditions); 15 mm (no risk factors). This patient (recent immigrant): 10 mm cutoff — 12 mm is POSITIVE = LTBI. Normal CXR + no symptoms = latent (not active). LTBI treatment options: INH daily x9 months (preferred, monitor LFTs), rifampin daily x4 months, or 3HP (rifapentine + INH once weekly x12 weeks — highly effective, shorter course). ALL LTBI cases should be treated to prevent reactivation."},
{c:"Tuberculosis",q:"A patient started on RIPE therapy (rifampin, isoniazid, pyrazinamide, ethambutol) for active pulmonary TB develops blurry vision and loss of red-green color discrimination. Which drug is responsible and what is the action?",o:["Rifampin — discontinue and switch to levofloxacin","Isoniazid — add pyridoxine and continue","Ethambutol — optic neuritis is the classic side effect; STOP ethambutol and refer to ophthalmology immediately","Pyrazinamide — causes uveitis in TB patients"],a:2,r:"Ethambutol optic toxicity: dose-dependent retrobulbar optic neuritis causing decreased visual acuity, loss of red-green color discrimination, and visual field defects. Can be irreversible if not caught early. Baseline and monthly visual acuity and color vision testing are recommended. STOP ethambutol immediately if visual changes occur. Other TB drug side effects: INH = peripheral neuropathy (prevent with pyridoxine/B6) + hepatotoxicity; Rifampin = orange body fluids, CYP450 inducer, drug interactions; Pyrazinamide = hyperuricemia + hepatotoxicity; Rifampin + INH = most hepatotoxic combination."},
{c:"Skin/Soft Tissue",q:"A 55-year-old diabetic patient has a warm, erythematous, swollen lower leg with a well-defined raised border. Temperature is 38.8°C. The lesion is tender and has a sharply demarcated edge. Most likely diagnosis and treatment?",o:["Cellulitis — amoxicillin-clavulanate orally","Erysipelas (St. Anthony's fire) — sharply demarcated raised border indicates dermis + upper lymphatics involvement; first-line is penicillin VK or amoxicillin","Necrotizing fasciitis — immediate surgical debridement","Deep vein thrombosis — anticoagulation immediately"],a:1,r:"Erysipelas vs cellulitis: Erysipelas involves the DERMIS and upper lymphatics — sharply demarcated, raised, shiny, bright red border (the classic distinguishing feature). Almost exclusively caused by Group A Streptococcus (occasionally Group C/G). Treatment: penicillin VK or amoxicillin (excellent strep coverage); IV penicillin if severe. Cellulitis: deeper dermis + subcutaneous tissue, POORLY demarcated, not raised — more commonly MSSA. Treat cellulitis with: non-purulent (most cases) → cephalexin or dicloxacillin; MRSA risk/purulent → TMP-SMX or doxycycline. Necrotizing fasciitis: rapidly spreading, pain out of proportion, crepitus, systemic toxicity — surgical emergency."},
{c:"Skin/Soft Tissue",q:"A 42-year-old presents with an abscess in her right axilla — 3 cm fluctuant, tender collection with surrounding erythema. She is afebrile with no systemic symptoms. Best management?",o:["Oral TMP-SMX alone without drainage","Incision and drainage (I&D) alone — curative for most uncomplicated abscesses; antibiotics added for systemic symptoms, immunocompromise, or severe surrounding cellulitis","IV vancomycin in the hospital","Oral clindamycin alone without drainage"],a:1,r:"Uncomplicated skin abscess: INCISION AND DRAINAGE (I&D) is the primary and often only treatment needed. Evidence (NEJM 2017, NEJM 2020): adjunct TMP-SMX after I&D improves cure rates for uncomplicated abscesses (reduces recurrence and new lesions). Current approach: I&D PLUS TMP-SMX DS BID x5-7 days for all abscesses ≥2 cm. Antibiotics ALONE (without drainage) are inadequate — pus needs to be drained. Add systemic antibiotics (oral or IV) for: fever, extensive surrounding cellulitis >2 cm, immunocompromise, failure to respond to I&D, or multiple lesions. MRSA is the most common cause of community-acquired abscesses."},
{c:"Skin/Soft Tissue",q:"A patient develops a rapidly expanding, extremely painful wound infection after a minor cut. The surrounding skin is dusky/gray with crepitus on palpation. He appears toxic with high fever. CT shows gas tracking along fascial planes. Diagnosis?",o:["Cellulitis — treat with oral amoxicillin","Abscess — needs I&D only","Necrotizing fasciitis — surgical emergency; immediate surgical debridement is life-saving; delay increases mortality","Deep tissue bruising — observation and ice"],a:2,r:"Necrotizing fasciitis (NF): rapidly spreading deep soft tissue infection tracking along fascial planes. KEY FEATURES: pain disproportionate to appearance (early), rapid progression, skin color changes (erythema → gray/purple → frank necrosis), crepitus (gas-forming organisms), bullae, and systemic toxicity. CT: gas along fascial planes (pathognomonic). Most common types: Type 1 = polymicrobial (mixed aerobes + anaerobes, diabetics, elderly); Type 2 = Group A Streptococcus (any age, dramatic). Treatment: IMMEDIATE SURGICAL DEBRIDEMENT (life-saving, cannot be delayed) + broad-spectrum IV antibiotics (piperacillin-tazobactam or carbapenems + clindamycin for toxin suppression). Mortality ~20-40% even with treatment."},
{c:"GI Infections",q:"A 45-year-old develops profuse watery diarrhea after completing a course of clindamycin for a dental abscess. C. difficile toxin assay is positive. This is her first episode and symptoms are mild. First-line treatment?",o:["Metronidazole orally — first-line for all C. diff","Continue clindamycin — diarrhea is a known side effect","Oral vancomycin 125 mg QID x10 days OR fidaxomicin 200 mg BID x10 days — first-line per updated IDSA guidelines","IV metronidazole — oral agents don't reach the colon"],a:2,r:"IDSA/SHEA 2021 updated guidelines: oral vancomycin (125 mg QID x10 days) or fidaxomicin (200 mg BID x10 days) are first-line for ALL C. diff infections (initial episode, any severity). Metronidazole is NO LONGER first-line — inferior cure rates and higher recurrence. Fidaxomicin has the lowest recurrence rates and is preferred when cost allows. STOP the offending antibiotic (clindamycin here) whenever clinically feasible. Vancomycin ORAL does not absorb systemically — high colonic concentrations are achieved. IV metronidazole is used only when oral route is not possible."},
{c:"GI Infections",q:"A 22-year-old who returned from Mexico 5 days ago has crampy abdominal pain and profuse watery diarrhea (10 episodes/day). No blood, no fever. Stool O&P shows Giardia lamblia cysts. Treatment?",o:["No treatment — Giardia self-resolves","Ciprofloxacin 500 mg BID x3 days","Metronidazole 250 mg TID x5-7 days OR tinidazole 2g orally once","TMP-SMX DS BID x3 days"],a:2,r:"Giardia lamblia (intestinal): most common intestinal parasite in developed countries, waterborne (camping/travel). Classic: foul-smelling, greasy, floating stools (fat malabsorption), bloating, flatulence, NO blood or fever (not invasive). Diagnosis: stool antigen test (most sensitive) or O&P (oval cysts). Treatment: metronidazole 250 mg TID x5-7 days OR tinidazole 2g once (preferred — single dose, better compliance, equal efficacy). Treat symptomatic patients and household contacts. Traveler's diarrhea (bacterial — ETEC): ciprofloxacin or azithromycin x1-3 days; TMP-SMX is no longer reliable due to resistance in most travel destinations."},
{c:"Vector-Borne",q:"A 35-year-old hiker develops a macular rash on his wrists and palms spreading centrally after a tick exposure. He has fever, severe headache, and myalgia 6 days after the bite. Diagnosis and treatment?",o:["Lyme disease — amoxicillin 3 weeks","Ehrlichiosis — TMP-SMX for 7 days","Rocky Mountain Spotted Fever (Rickettsia rickettsii) — start DOXYCYCLINE immediately; do NOT wait for lab confirmation","Babesiosis — atovaquone + azithromycin"],a:2,r:"RMSF: classic triad — fever, headache, rash (centripetal — starts wrists/ankles/palms/soles, spreads centrally; appears day 2-5). Caused by Rickettsia rickettsii; Dermacentor tick. RMSF can be rapidly fatal — do NOT wait for serology (takes weeks). Start DOXYCYCLINE immediately on clinical suspicion. Safe in children (benefits outweigh dental risk in life-threatening infection). Lyme disease: erythema migrans (bulls-eye), northeastern/midwest US, Ixodes tick, amoxicillin or doxycycline. Ehrlichiosis: leukopenia, thrombocytopenia, elevated LFTs, no early rash, doxycycline. RMSF vs Lyme: rash distribution (wrists/palms for RMSF vs expanding EM for Lyme) is the key distinguisher."},
{c:"Vector-Borne",q:"A 28-year-old presents with erythema migrans — an expanding 6 cm annular rash with central clearing at a tick bite site on her thigh. She is in her first trimester of pregnancy. What is the treatment?",o:["Doxycycline 100 mg BID x10-14 days — first-line Lyme treatment","Azithromycin 500 mg daily x7 days","Amoxicillin 500 mg TID x14 days — doxycycline is contraindicated in pregnancy","No treatment — Lyme disease is self-limited"],a:2,r:"Lyme disease (Borrelia burgdorferi, Ixodes tick): erythema migrans (EM) is pathognomonic — no lab confirmation needed when EM is present (serologic testing is unreliable in early disease). Treatment of early localized Lyme: doxycycline 100 mg BID x10 days (first-line in non-pregnant adults, excellent tissue penetration). PREGNANCY: doxycycline is CONTRAINDICATED — use amoxicillin 500 mg TID x14-21 days (Category B). Alternative: cefuroxime 500 mg BID x14 days. Untreated Lyme in pregnancy: risk of spirochetemia and fetal infection (though congenital Lyme is not well-established). Treat promptly."},
{c:"Fungal",q:"A 45-year-old from Arizona has chronic cough, fatigue, and night sweats for 2 months. He works as a construction worker and has hilar lymphadenopathy on chest X-ray. Serum coccidioidomycosis IgM is positive. Most likely diagnosis and management for mild disease?",o:["Tuberculosis — start RIPE therapy immediately","Sarcoidosis — oral prednisone","Coccidioidomycosis — mild to moderate pulmonary disease in an immunocompetent patient; often self-limited; treat with fluconazole if symptoms persist or high-risk","Histoplasma — itraconazole"],a:2,r:"Coccidioidomycosis (Valley Fever): Coccidioides immitis/posadasii, endemic to Southwest US (Arizona, California San Joaquin Valley), Latin America. Exposure: disturbing soil (construction, farming, excavation, dust storms). Mild pulmonary: often self-limited in immunocompetent patients; treat if symptoms >6 weeks, severe, or high-risk (immunocompromised, diabetic, pregnancy, non-white race). Treatment: fluconazole 400 mg daily (mild-moderate) or itraconazole; meningitis requires lifelong fluconazole. Histoplasmosis: Ohio/Mississippi River Valley, bird/bat droppings — treated with itraconazole. Blastomycosis: Southeast/Midwest — itraconazole."},
{c:"Fungal",q:"An immunocompromised transplant patient develops fever, headache, and neck stiffness. CSF India ink prep shows encapsulated yeast with a thick polysaccharide capsule. Cryptococcal antigen is positive. First-line treatment for cryptococcal meningitis?",o:["Fluconazole 400 mg orally daily","Amphotericin B deoxycholate + flucytosine for induction (2 weeks), then fluconazole for consolidation and maintenance","Voriconazole for 6-12 months","Caspofungin IV for 4 weeks"],a:1,r:"Cryptococcal meningitis: Cryptococcus neoformans, most common in HIV (CD4 <100), transplant recipients. Diagnosis: CSF India ink (encapsulated budding yeast), serum and CSF cryptococcal antigen (very sensitive). Treatment (HIV-associated): INDUCTION — liposomal amphotericin B + flucytosine x2 weeks; CONSOLIDATION — fluconazole 400 mg daily x8 weeks; MAINTENANCE — fluconazole 200 mg daily (until immune reconstitution). Elevated ICP: serial LPs to drain CSF (critical for survival). Fluconazole monotherapy is NOT adequate for CNS disease (too slow fungicidal effect). Measure opening pressure at every LP — ICP often elevated."},
{c:"Urinary Tract",q:"A 28-year-old woman has her third UTI this year. Her urinalysis shows >100,000 CFU E. coli sensitive to all antibiotics. She wants to prevent recurrences. Which strategy has the BEST evidence?",o:["Cranberry juice indefinitely","Prophylactic antibiotics (low-dose TMP-SMX or nitrofurantoin daily or post-coital) have the strongest evidence for reducing recurrent UTI in women","Vitamin C supplementation daily","Vaginal estrogen is never helpful"],a:1,r:"Recurrent UTI (≥3 in 12 months or ≥2 in 6 months) in women: prevention strategies WITH evidence: (1) Continuous prophylaxis — low-dose TMP-SMX, nitrofurantoin, or cephalexin nightly x6-12 months (most effective); (2) Post-coital prophylaxis — single dose after sex if UTIs are intercourse-related; (3) Patient-initiated therapy (self-start antibiotics with symptoms — good for motivated, reliable patients); (4) Vaginal estrogen in postmenopausal women (restores Lactobacillus flora, most effective non-antibiotic option in that group); (5) D-mannose (some evidence, prevents E. coli adherence). Cranberry has weak/inconsistent evidence. Not all recurrences need prophylaxis — if infrequent, treat individual episodes."},
{c:"Urinary Tract",q:"A 70-year-old man in a nursing home has a urine culture growing 200,000 CFU of E. coli. He has no fever, dysuria, flank pain, or change in mental status. His urine was sent because it appeared cloudy. Should he be treated?",o:["Yes — any positive urine culture in an elderly patient requires antibiotics","Yes — cloudy urine always indicates infection","No — this is asymptomatic bacteriuria; USPSTF and IDSA recommend AGAINST treating asymptomatic bacteriuria in non-pregnant adults, including elderly nursing home residents","Only treat if resistant organism is found"],a:2,r:"Asymptomatic bacteriuria (ASB): bacteria in urine without symptoms. TREAT ASB only in: PREGNANT women (reduces preterm birth and pyelonephritis) and patients undergoing UROLOGIC PROCEDURES. Do NOT treat ASB in: elderly (men or women), nursing home residents, diabetics, catheterized patients, patients with spinal cord injury, pre-renal transplant (unless high-titer). Overtreating ASB: causes antibiotic resistance, adverse effects, C. diff risk, and does NOT reduce UTI incidence or mortality. 'Cloudy' or 'malodorous' urine WITHOUT symptoms is NOT an indication for antibiotics — this is a very common clinical error in long-term care settings."},
{c:"Meningitis",q:"A 20-year-old college student is brought to the ED with fever, severe headache, photophobia, and neck stiffness. CSF results: WBC 850 (90% PMNs), glucose 28 mg/dL (serum glucose 90), protein 280 mg/dL. Gram stain: diplococci. Diagnosis and empiric treatment?",o:["Viral meningitis — IV acyclovir","Tuberculous meningitis — RIPE therapy","Bacterial meningitis (Neisseria meningitidis) — ceftriaxone 2g IV q12h + dexamethasone; do NOT delay antibiotic for additional workup","Fungal meningitis — amphotericin B"],a:2,r:"Bacterial meningitis CSF: elevated WBC (PMN predominance), low glucose (<40 mg/dL or CSF:serum ratio <0.6), high protein (>100 mg/dL), gram stain may show organisms. N. meningitidis: gram-negative diplococci, classic in college students/asplenic patients. Empiric treatment: ceftriaxone 2g IV q12h + vancomycin (MRSP coverage) + dexamethasone 0.15 mg/kg q6h x4 days (BEFORE or with first antibiotic dose — reduces hearing loss and neurologic complications). Do NOT delay antibiotics for CT or LP if clinical picture is clear and patient is deteriorating. Viral meningitis CSF: lymphocytes, normal/mildly low glucose, mildly elevated protein."},
{c:"Endocarditis",q:"A 35-year-old IV drug user has fever, a new murmur (tricuspid regurgitation), and multiple pulmonary septic emboli on CT. Blood cultures grow Staphylococcus aureus. Which statement about this presentation is most accurate?",o:["Left-sided endocarditis — most common in IV drug users","Right-sided endocarditis is more common in IV drug users (tricuspid valve); S. aureus is the most common organism; IV drug use and bacteremia are the key risk factors","Streptococcal viridans is the most common cause in IV drug users","Empiric ampicillin alone is appropriate initial treatment"],a:1,r:"Infective endocarditis (IE) in IV drug users: RIGHT-SIDED (tricuspid valve) predominates — contaminated needles inject organisms directly into venous circulation. Most common organism: S. aureus (MRSA increasingly common). Presenting features: fever + new murmur + septic pulmonary emboli (right-sided) or stroke/emboli to brain/spleen/kidneys (left-sided). Empiric treatment: vancomycin (covers MRSA) until sensitivities available; MSSA → nafcillin or oxacillin preferred over vancomycin. Duke criteria for diagnosis. Complications: CHF (most common cause of death), emboli, abscess, fistula. Indications for surgery: heart failure, uncontrolled infection, recurrent emboli."},
{c:"Vaccines — Adults",q:"A 67-year-old asks about shingles prevention. He has never had the varicella vaccine and had chickenpox as a child. Per CDC recommendations, which vaccine should he receive?",o:["Zostavax (live attenuated) — one dose at age 60","No vaccine needed — prior chickenpox infection provides lifelong protection against shingles","Recombinant zoster vaccine (Shingrix) — two doses 2-6 months apart; recommended for ALL immunocompetent adults ≥50 regardless of prior chickenpox or Zostavax","Varicella vaccine (Varivax) — two doses if not previously vaccinated"],a:2,r:"Shingrix (RZV): recombinant zoster vaccine (NOT live); CDC recommends for ALL adults ≥50, including those who: previously had shingles, previously received Zostavax (live), have a history of chickenpox. Two-dose series 2-6 months apart (or 1-2 months apart if immunocompromised). Efficacy: >90% effective in preventing shingles, >90% effective in preventing postherpetic neuralgia. Shingrix is preferred over Zostavax — superior efficacy and safe in immunocompromised patients (non-live). Prior chickenpox does NOT protect against reactivation as shingles; shingles incidence increases with age and reduced cell-mediated immunity."},
{c:"Vaccines — Adults",q:"A 65-year-old presents for his first pneumococcal vaccine. He has never received any pneumococcal vaccine. Per ACIP 2021 updated recommendations, what should he receive?",o:["PPSV23 only — one dose at age 65","PCV13 only — one dose","PCV15 followed by PPSV23 at least 1 year later — this is the preferred sequence for adults ≥65 never previously vaccinated","PCV20 (Prevnar 20) alone — single dose covers all serotypes, eliminating need for PPSV23 sequence"],a:3,r:"ACIP 2021 pneumococcal vaccine update: For adults ≥65 never previously vaccinated: PCV15 + PPSV23 (1 year later) OR PCV20 ALONE (covers 20 serotypes — simplifies the schedule by eliminating need for PPSV23). PCV20 was approved in 2021 and is now an acceptable single-agent alternative. PCV15 + PPSV23 provides slightly broader serotype coverage. The older PCV13 + PPSV23 sequence is less preferred. For HIGH-RISK adults (immunocompromised, asplenia, CSF leak): consider PCV15/PCV20 + PPSV23 regardless of age. PPSV23 alone is no longer the sole recommendation for naïve adults ≥65."},
{c:"Sepsis",q:"A 72-year-old is brought in with confusion, fever 39.8°C, HR 118, BP 88/54 on 2L of IV normal saline, and WBC 22. Lactate is 4.2 mmol/L. She appears to have a UTI as the source. Per Surviving Sepsis Campaign, which intervention is MOST time-sensitive?",o:["Wait for urine culture results before starting antibiotics","Broad-spectrum IV antibiotics within 1 hour of septic shock recognition — delay in antibiotics significantly increases mortality","Vasopressors must precede antibiotics","CT scan to confirm source before any treatment"],a:1,r:"Septic shock: life-threatening organ dysfunction + vasopressor requirement to maintain MAP ≥65 + serum lactate >2 despite adequate fluid resuscitation. Surviving Sepsis Campaign Hour-1 Bundle: (1) Measure lactate (repeat if >2); (2) Blood cultures BEFORE antibiotics; (3) Broad-spectrum antibiotics within 1 HOUR; (4) 30 mL/kg IV crystalloid for hypotension or lactate ≥4; (5) Vasopressors (norepinephrine first-line) if not responding to fluids to maintain MAP ≥65. Each hour of delay in antibiotics in septic shock increases mortality by 7-10%. Cultures should never delay antibiotics — draw cultures quickly and start antibiotics."},
{c:"Antimicrobial Stewardship",q:"An NP prescribes azithromycin for a patient with viral bronchitis, unchanged symptoms after 5 days. Three weeks later the patient develops C. difficile diarrhea. What principle does this illustrate?",o:["Azithromycin specifically causes C. diff more than other antibiotics","Antibiotics are always safe for bronchitis — this is coincidental","Inappropriate antibiotic use (for viral illness) disrupts the gut microbiome and selects for resistant and opportunistic organisms like C. diff — antimicrobial stewardship is essential","C. diff can only occur with clindamycin or broad-spectrum antibiotics"],a:2,r:"Antimicrobial stewardship: using antibiotics only when indicated, at the right dose, route, and duration. ANY antibiotic can cause C. diff by disrupting gut flora, though clindamycin, fluoroquinolones, and cephalosporins carry the highest risk (azithromycin risk is lower but real). Viral bronchitis does NOT require antibiotics regardless of duration (up to 3 weeks of cough is normal). Key consequences of overuse: C. diff, resistance selection (MRSA, VRE, ESBL organisms), adverse drug effects, and healthcare costs. Antibiotic resistance is a public health emergency — NPs play a critical stewardship role in primary care by educating patients and prescribing only when indicated."},
{c:"Infection Control",q:"A patient is admitted with active pulmonary tuberculosis. Which type of isolation precautions is required?",o:["Standard precautions only — TB is droplet-spread, not airborne","Contact precautions — gown and gloves only","Airborne infection isolation — negative pressure room, N95 respirator for healthcare workers entering the room, surgical mask on the patient when transported","Droplet precautions — surgical mask within 3 feet is sufficient"],a:2,r:"Transmission-based precautions: Airborne (droplet nuclei <5 micrometers, remain suspended): TB, measles, varicella, disseminated zoster → negative pressure room + N95 respirator. Droplet (large droplets >5 micrometers, travel <3 feet): influenza, pertussis, meningococcus, COVID-19 → surgical mask, private room preferred. Contact (direct/indirect skin contact): MRSA, VRE, C. diff, norovirus, RSV in children → gown + gloves. N95 respirators must be fit-tested; surgical masks are NOT adequate for airborne precautions. Standard precautions (hand hygiene, PPE when exposure to body fluids expected) apply to ALL patients regardless of diagnosis."},
{c:"Influenza",q:"A 72-year-old with COPD presents within 24 hours of influenza symptom onset with fever, myalgia, and cough. She is positive on rapid influenza test. Which statement about antiviral treatment is correct?",o:["Antivirals are only beneficial if started within 48 hours, so start immediately","Antivirals are not recommended for elderly patients due to renal toxicity","Oseltamivir (Tamiflu) 75 mg BID x5 days should be started immediately — high-risk patients benefit even when started >48 hours from symptom onset","Influenza is self-limited — no treatment is needed in outpatient settings"],a:0,r:"Antiviral treatment for influenza: oseltamivir (Tamiflu) 75 mg BID x5 days is first-line. Treatment is MOST effective when started within 48 hours of symptom onset — reduces duration by ~1-2 days and severity of illness. HIGH-RISK patients (age ≥65, COPD, asthma, heart disease, pregnancy, immunocompromised, obesity, nursing home residents): treat even when presenting beyond 48 hours — benefit continues for reducing hospitalization and mortality. Do NOT wait for lab confirmation in high-risk patients — treat empirically based on clinical picture during flu season. Alternative: baloxavir marboxil (Xofluza) — single dose option."},
{c:"COVID-19",q:"A 68-year-old with diabetes and hypertension tests positive for COVID-19 with mild symptoms (no hospitalization needed) within 5 days of symptom onset. He has no contraindications to antivirals. Per current guidelines, which treatment should be offered?",o:["Supportive care only — no antivirals are indicated for mild COVID","Hydroxychloroquine — proven in clinical trials","Nirmatrelvir-ritonavir (Paxlovid) — oral antiviral started within 5 days of symptom onset; reduces hospitalization and death by ~85% in high-risk patients","Ivermectin — FDA-approved for COVID-19"],a:2,r:"COVID-19 treatment for non-hospitalized high-risk patients: nirmatrelvir-ritonavir (Paxlovid) is the preferred oral antiviral — started within 5 days of symptom onset, reduces hospitalization/death by ~85% in high-risk unvaccinated adults. Major caution: significant drug-drug interactions via CYP3A4 inhibition (contraindicated with many cardiac, psychiatric, and transplant medications). Alternative if contraindicated: remdesivir (IV x3 days outpatient) or molnupiravir (less effective, reserve for when others not available). High-risk criteria: age ≥65, obesity, immunocompromise, diabetes, heart/lung disease, CKD. Hydroxychloroquine and ivermectin were NOT proven effective in rigorous clinical trials."}
,
{c:"STIs",q:"A 22-year-old woman is diagnosed with genital herpes (HSV-2) after her first outbreak with multiple painful vesicles and ulcers. She asks if this will happen every month. What is the most accurate counseling?",o:["Herpes cannot recur after the first outbreak is treated","Herpes simplex is curable with a full course of acyclovir","HSV establishes latency in dorsal root ganglia and can reactivate; recurrences are usually milder and less frequent over time; suppressive antiviral therapy reduces frequency and transmission risk","She will need lifelong IV acyclovir"],a:2,r:"Herpes simplex virus (HSV) establishes latency in sensory dorsal root ganglia — it CANNOT be cured. Recurrences are triggered by stress, illness, UV exposure, immunosuppression. HSV-2 recurs more often than HSV-1 genitally (~4x/year average). Management options: (1) Episodic therapy: valacyclovir 500 mg BID x3 days at prodrome onset; (2) Suppressive therapy: valacyclovir 500-1000 mg daily — reduces recurrences by 70-80% AND reduces transmission to partners by 50%. Counsel: asymptomatic shedding occurs — transmission possible even without visible lesions. Condoms reduce but do not eliminate transmission risk. Neonatal herpes risk: most important complication — C-section for active genital lesions at delivery."},
{c:"STIs",q:"A 19-year-old male is found to have non-gonococcal urethritis (NGU) on exam with urethral discharge and WBC on urethral swab. NAAT for chlamydia and gonorrhea are both negative. Most likely causative organism and treatment?",o:["Bacterial vaginosis — metronidazole","Syphilis — benzathine penicillin","Mycoplasma genitalium or Ureaplasma urealyticum — treat with doxycycline 100 mg BID x7 days (first-line for NGU); azithromycin 1g once is alternative but increasing resistance","Herpes simplex — valacyclovir"],a:2,r:"Non-gonococcal urethritis (NGU): urethritis with negative GC cultures/NAAT. Most common causes: Chlamydia trachomatis (40-50% — tested separately), Mycoplasma genitalium (15-20%), Ureaplasma urealyticum, Trichomonas (in men). First-line: doxycycline 100 mg BID x7 days (covers most NGU pathogens). Azithromycin 1g once is alternative but M. genitalium resistance to azithromycin is increasing. Treat partners. If persistent/recurrent NGU after doxycycline: test for M. genitalium (NAAT if available) and consider moxifloxacin (covers resistant M. genitalium)."},
{c:"Pneumonia",q:"A 72-year-old nursing home resident develops fever, productive cough, and a new infiltrate 5 days after admission. Which pneumonia classification applies and how does this change treatment?",o:["Community-acquired pneumonia — treat with amoxicillin","Aspiration pneumonia — metronidazole alone","Healthcare-associated or hospital-acquired pneumonia — requires broader coverage for gram-negative organisms and MRSA; empiric regimens include piperacillin-tazobactam or cefepime ± vancomycin","Viral pneumonia — no antibiotics needed"],a:2,r:"Hospital-acquired pneumonia (HAP): develops ≥48 hours after admission. Nursing home residents (healthcare-associated) may also have HAP pathogens. Key organisms: gram-negative rods (Pseudomonas, Klebsiella, Acinetobacter, E. coli), MRSA — NOT typical CAP organisms. Empiric treatment: antipseudomonal beta-lactam (piperacillin-tazobactam, cefepime, or meropenem) + vancomycin (if MRSA risk: prior MRSA, septic shock, structural lung disease). Duration: 7 days (if no Pseudomonas, good response). HCAP as a separate category has been eliminated from recent guidelines — risk-stratify individually based on prior cultures, local antibiogram, and host factors."},
{c:"Upper Respiratory",q:"A mother asks about her 8-year-old who has had a runny nose, sore throat, and mild fever for 3 days. Rapid strep is negative. She demands antibiotics. Best approach?",o:["Prescribe amoxicillin — parents know their children best","Prescribe azithromycin to avoid return visits","Explain that most URIs are viral and antibiotics do not shorten viral illness; they cause side effects and contribute to resistance; recommend symptomatic care (saline rinse, analgesics, hydration)","Order a throat culture and prescribe antibiotics pending results"],a:2,r:"Viral upper respiratory infections account for 90%+ of acute URIs. Antibiotics: do NOT shorten illness duration, do NOT prevent complications (otitis, sinusitis), DO cause side effects (diarrhea, rash, C. diff), and DO contribute to antibiotic resistance. Key counseling: most colds last 7-10 days (cough can persist 2-3 weeks). Symptom management: analgesics/antipyretics (ibuprofen or acetaminophen), saline nasal rinse, honey for cough (age >1 year), adequate hydration. Anticipatory guidance reduces repeat visits. Shared decision-making empowers families. Prescribing antibiotics for viral illness is a patient safety and stewardship failure — validate the parent's concern while explaining why antibiotics are not appropriate."},
{c:"Hepatitis",q:"A 32-year-old has fatigue, jaundice, and nausea for 2 weeks. Labs: HBsAg positive, anti-HBc IgM positive, HBeAg positive, anti-HBs negative. Interpretation?",o:["Chronic hepatitis B — prior infection","Resolved hepatitis B — no further treatment","Acute hepatitis B infection — IgM anti-HBc confirms acute infection; HBeAg positive = high infectivity; counsel on sexual transmission, household contacts, vaccination of contacts","Vaccine-induced immunity — anti-HBs should be checked"],a:2,r:"Hepatitis B serology interpretation: HBsAg (+) = current infection (acute or chronic); Anti-HBc IgM (+) = ACUTE infection (most reliable marker); Anti-HBc IgG (+) = prior exposure (acute or resolved); HBeAg (+) = active viral replication, HIGH INFECTIVITY; Anti-HBs (+) = immunity (vaccine or resolved infection). This pattern: acute HBV with high infectivity. Most adults (95%) clear acute HBV spontaneously. Chronic HBV if HBsAg persists >6 months. Counsel: abstain from alcohol, avoid hepatotoxic drugs, use barrier contraception, vaccinate household/sexual contacts, mandatory report to health department."},
{c:"Hepatitis",q:"A 45-year-old injection drug user is incidentally found to have HCV antibody positive on screening. HCV RNA is also positive. Which patients should be treated for hepatitis C?",o:["Only those with cirrhosis or severe fibrosis","Treatment is not available — HCV is incurable","All patients with chronic HCV and detectable RNA — direct-acting antivirals (DAAs) achieve cure (sustained virologic response) in >95%; treatment is recommended for virtually all","Only patients with elevated ALT/AST"],a:2,r:"Hepatitis C treatment revolution: direct-acting antivirals (DAAs) achieve SVR (sustained virologic response = cure) in >95% of patients regardless of genotype, liver disease stage, or prior treatment. Current preferred regimens: sofosbuvir/velpatasvir (Epclusa) x12 weeks (pangenotypic) or glecaprevir/pibrentasvir (Mavyret) x8 weeks (non-cirrhotic). Treatment is NOW recommended for virtually ALL patients with chronic HCV and detectable RNA, regardless of fibrosis stage. USPSTF: screen all adults 18-79 once, and all pregnant women. Treatment prevents cirrhosis, hepatocellular carcinoma, and liver-related death."},
{c:"Vector-Borne",q:"A 45-year-old presents with fever, severe headache, confusion, and neck stiffness after a camping trip in wooded areas of the upper Midwest. CBC: WBC 2,800 (leukopenia), platelets 68,000, ALT 3x normal. Peripheral smear shows morulae in neutrophils. Diagnosis and treatment?",o:["Lyme disease — amoxicillin","Rocky Mountain Spotted Fever — doxycycline for rash","Anaplasmosis (Anaplasma phagocytophilum) — doxycycline; responds within 24-48 hours and is diagnostic; morulae in neutrophils are pathognomonic","Malaria — chloroquine or artemether-lumefantrine"],a:2,r:"Human granulocytic anaplasmosis (HGA): Anaplasma phagocytophilum, transmitted by Ixodes tick (same as Lyme), upper Midwest and Northeast. Classic triad: fever + leukopenia + thrombocytopenia + elevated LFTs. Morulae (intracytoplasmic inclusions) in NEUTROPHILS — pathognomonic (vs Ehrlichia, which infects monocytes — morulae in monocytes). Treatment: doxycycline — response within 24-48 hours (diagnostic AND therapeutic). Do not wait for serology. Compare: Ehrlichiosis (HME): monocytes, SE/South-central US, Amblyomma tick. Both: treat with doxycycline empirically during tick season with compatible presentation."},
{c:"Infection Control",q:"A nurse discovers she accidentally stuck herself with a used needle from a patient with unknown HIV, HBV, and HCV status. The patient refuses testing. What is the appropriate action regarding PEP?",o:["PEP is only indicated when the source is known HIV-positive","Wait 24 hours — if no symptoms develop, PEP is not needed","Assess the risk of the source being HIV-positive (prevalence in the setting/patient population); if risk is elevated, offer 3-drug PEP within 72 hours; ideally determine source status via medical records or legal consent","No action — needlestick transmission risk is negligible"],a:2,r:"Occupational needlestick with unknown source HIV status: do NOT dismiss. Assess risk: Is the source from a high-prevalence population (IVDU, MSM, high-prevalence area)? Can source HIV status be determined from medical records (does not require patient consent for employee protection in many jurisdictions)? If cannot rule out HIV-positive source and risk is elevated: OFFER PEP within 72 hours — do not wait. PEP must START within 72 hours (sooner = better). HIV transmission risk from hollow-bore needlestick: ~0.3% from known HIV+ source. HCV: ~1.8%; HBV: up to 30% if source HBeAg+. Baseline labs: HIV, HBV, HCV serology."},
{c:"Antimicrobials",q:"A 45-year-old develops a severe allergic reaction (anaphylaxis) to amoxicillin. She now needs treatment for a community-acquired pneumonia with comorbidities. Which antibiotic is safest?",o:["Cephalexin — only 1% cross-reactivity so it is fine","Ceftriaxone — same beta-lactam ring, high cross-reactivity","Respiratory fluoroquinolone (levofloxacin) — completely different antibiotic class, NO cross-reactivity with penicillins","Meropenem — carbapenems are safe in severe penicillin allergy"],a:2,r:"True severe IgE-mediated penicillin allergy (anaphylaxis): avoid all penicillins and use with caution for cephalosporins. Cross-reactivity between penicillins and cephalosporins: ~1-2% (not the historically cited 10%). For documented anaphylaxis: SAFEST is a completely different class — respiratory fluoroquinolone (levofloxacin, moxifloxacin) for CAP. No cross-reactivity with non-beta-lactam classes. Carbapenems share the beta-lactam ring — some cross-reactivity possible (lower than cephalosporins, ~1%). Azithromycin alone may be inadequate for complicated CAP. Important: most 'penicillin allergies' are not true IgE-mediated — allergy testing/de-labeling is important to expand antibiotic options."},
{c:"HIV",q:"A 28-year-old HIV-negative man who has sex with men asks about HIV prevention. His partner is HIV-positive with a detectable viral load. Which pre-exposure prophylaxis (PrEP) regimen is recommended?",o:["Condoms alone are sufficient — PrEP is only for high-risk injection drug users","PrEP is only effective when started after known exposure (post-exposure)","Daily tenofovir/emtricitabine (Truvada or generic) OR tenofovir alafenamide/emtricitabine (Descovy) — reduces HIV acquisition risk by >99% with consistent daily use in high-risk individuals","Injectable PrEP is not yet approved — oral only"],a:2,r:"HIV PrEP (pre-exposure prophylaxis): daily TDF/FTC (Truvada or generic) or TAF/FTC (Descovy — preferred in those with bone/kidney concerns, but NOT approved for receptive vaginal sex/transgender women assigned male at birth) reduces HIV risk by >99% with daily adherence in high-risk MSM. Also approved: cabotegravir injectable (Apretude) q2 months — approved 2021, highly effective, may improve adherence. PrEP indications: HIV-negative + high-risk (partner with unsuppressed HIV, inconsistent condom use, multiple partners, STI in past 6 months, IVDU). Screen for HIV, STIs, renal function every 3 months. PrEP does NOT protect against other STIs — counsel condom use."},
{c:"Sepsis",q:"In a patient with septic shock, blood cultures are drawn and IV broad-spectrum antibiotics are started. BP remains 68/40 despite 30 mL/kg IV fluid resuscitation. What is the first-line vasopressor?",o:["Dopamine","Epinephrine","Norepinephrine — first-line vasopressor in septic shock; targets mean arterial pressure (MAP) ≥65 mmHg","Phenylephrine — preferred over norepinephrine"],a:2,r:"Surviving Sepsis Campaign vasopressor guidance: NOREPINEPHRINE is the first-line vasopressor for septic shock — primarily alpha-1 adrenergic (vasoconstriction) with some beta-1 (mild inotropy). Targets: MAP ≥65 mmHg (individualized — may target higher in chronic hypertension). Vasopressin 0.03 units/min can be added as a second agent to reduce norepinephrine dose. Epinephrine is an alternative or add-on. Dopamine: not recommended as first-line (more arrhythmias than norepinephrine per SOAP II trial). Phenylephrine: pure alpha — may reduce cardiac output, used in specific situations (tachycardia-induced hypotension, norepinephrine shortage). Central or intraosseous access preferred for vasopressors; peripheral access is acceptable temporarily."},
{c:"Fungal",q:"A 26-year-old woman on oral contraceptives and a recent course of amoxicillin-clavulanate for sinusitis now has thick white vaginal discharge, intense pruritus, and negative wet prep for clue cells and trichomonads. KOH prep shows pseudohyphae. This is her SECOND episode in 6 months. How should this be managed differently from a first episode?",o:["Same as first episode — fluconazole 150 mg once","Treat with metronidazole instead — recurrent episodes suggest BV","Recurrent vulvovaginal candidiasis (RVVC) — treat acute episode with fluconazole 150 mg every 72 hours x3 doses, then weekly maintenance fluconazole for 6 months","No treatment — recurrences are self-limited"],a:2,r:"Recurrent VVC (RVVC): ≥4 symptomatic episodes/year. Treatment protocol: INITIAL INTENSIVE THERAPY — fluconazole 150 mg orally x3 doses at 72-hour intervals; MAINTENANCE — fluconazole 150 mg weekly x6 months (reduces recurrence by ~50%). Risk factors: diabetes, oral contraceptives, antibiotics, immunosuppression, C. glabrata (non-albicans species — may not respond to fluconazole; consider boric acid vaginal suppositories for azole-resistant species). After 6 months of maintenance, reassess — 30-50% relapse when maintenance is stopped. Culture for speciation if refractory."},
{c:"Meningitis",q:"A patient is found to have bacterial meningitis. Adjunct dexamethasone is administered with the first dose of antibiotics. What is the PRIMARY benefit of corticosteroids in this context?",o:["Dexamethasone treats the bacteria directly","Dexamethasone reduces fever and shortens hospitalization","Dexamethasone reduces inflammation-mediated hearing loss and neurologic complications — evidence strongest for S. pneumoniae meningitis","Dexamethasone prevents antibiotic resistance"],a:2,r:"Dexamethasone in bacterial meningitis: given BEFORE or with the first antibiotic dose (0.15 mg/kg IV q6h x4 days). Mechanism: reduces inflammatory cytokine release from bacterial lysis, decreasing cerebral edema and subarachnoid space inflammation. Primary benefit: reduces hearing loss (especially S. pneumoniae) and other neurologic complications. Evidence: strongest for S. pneumoniae meningitis in adults; less clear benefit for N. meningitidis. Stop dexamethasone if the organism is found NOT to be pneumococcus (no benefit shown for other bacteria). If antibiotic was given before dexamethasone: little/no benefit from delayed steroid administration."},
{c:"Antimicrobials",q:"A 78-year-old with a history of MRSA wound infection 2 years ago is admitted with pneumonia. Which antibiotic choice raises the most concern for MRSA coverage?",o:["Vancomycin — covers MRSA but not gram-negatives","Linezolid — covers MRSA and is an oral option","Ceftriaxone alone — a 3rd-generation cephalosporin with excellent pneumococcal coverage but NO activity against MRSA","Piperacillin-tazobactam plus vancomycin — broad coverage"],a:2,r:"MRSA coverage: methicillin-resistant S. aureus is resistant to ALL beta-lactams (penicillins, cephalosporins, carbapenems). Ceftriaxone has NO anti-MRSA activity. For confirmed or suspected MRSA pneumonia: vancomycin IV (first-line, dose adjusted by AUC/MIC monitoring) or linezolid (excellent lung penetration, oral bioavailability). Ceftaroline is a unique cephalosporin with MRSA activity. Hospital-acquired pneumonia with MRSA risk factors (prior MRSA, ICU, structural lung disease): always include MRSA coverage in empiric regimen. Community-acquired pneumonia: MRSA is an uncommon cause unless post-influenza or in high-risk patients (IVDU, chronic skin conditions, recent hospitalization)."},
{c:"GI Infections",q:"A 55-year-old traveler returning from Southeast Asia develops bloody diarrhea, fever, and abdominal cramps. Stool culture grows Shigella sonnei resistant to ciprofloxacin (based on local resistance data). Best treatment?",o:["No antibiotics — Shigella is self-limited","Continue ciprofloxacin regardless of resistance data — clinical cure is what matters","Azithromycin — preferred for fluoroquinolone-resistant Shigella and for pediatric shigellosis; also appropriate for traveler's diarrhea in regions with high fluoroquinolone resistance","TMP-SMX — first-line for all Shigella worldwide"],a:2,r:"Shigellosis (bacillary dysentery): bloody diarrhea + fever, highly communicable (low inoculum). Treatment shortens illness and reduces transmission. First-line in US: fluoroquinolone (ciprofloxacin) x3 days, BUT resistance is increasing (especially in travel-associated strains from SE Asia, Africa). Fluoroquinolone-resistant Shigella: AZITHROMYCIN (1g once or 500 mg daily x3 days). TMP-SMX: widespread resistance globally (>50% in many regions). Ceftriaxone: for severe cases or multi-drug resistant strains. Azithromycin is also preferred for children and pregnant women regardless of resistance pattern. Key: ALWAYS check local/travel-associated resistance patterns when treating enteric infections."}
,
{c:"Vaccines — Adults",q:"A 25-year-old healthcare worker has no documentation of prior varicella vaccination or chickenpox infection, and her varicella IgG is negative (non-immune). What is the recommended action?",o:["No vaccination needed — adults rarely get severe chickenpox","Give one dose of varicella vaccine and recheck IgG in 4 weeks","Two doses of varicella vaccine (Varivax) 4-8 weeks apart — non-immune healthcare workers are a significant transmission risk to vulnerable patients; restrict from patient care until immune","One dose is sufficient for adults — two doses is only for children"],a:2,r:"Non-immune adults: varicella vaccine is a 2-DOSE series (doses given 4-8 weeks apart) for all adults without evidence of immunity. Evidence of immunity: (1) US-born before 1980 (presumed immune by natural infection — NOT for healthcare workers, pregnant women, or immunocompromised); (2) Documentation of 2 varicella vaccine doses; (3) Diagnosis by healthcare provider; (4) Laboratory evidence of immunity. HEALTHCARE WORKERS: must have documented immunity — 'born before 1980' presumption does NOT apply. Non-immune HCW restricted from caring for high-risk patients (immunocompromised, pregnant, newborns) until vaccinated. Varicella vaccine is live — contraindicated in pregnancy; counsel to avoid pregnancy for 4 weeks."},
{c:"Sepsis",q:"A 58-year-old develops septic shock from a perforated appendix. After fluid resuscitation and vasopressors, mean arterial pressure is now 66 mmHg. Blood cultures are drawn. Broad-spectrum antibiotics are started. What target MAP guides vasopressor dosing?",o:["MAP ≥80 mmHg — higher is safer","MAP ≥65 mmHg — target associated with best outcomes in most patients without pre-existing hypertension","MAP ≥55 mmHg is acceptable to minimize vasopressor doses","MAP is irrelevant — systolic BP is the only meaningful target"],a:1,r:"MAP target in septic shock: MAP ≥65 mmHg is the standard Surviving Sepsis Campaign target — associated with optimal organ perfusion without excessive vasopressor toxicity. INDIVIDUALIZE: patients with pre-existing hypertension may benefit from MAP ≥70-75 to maintain cerebral and renal perfusion. ANDROMEDA-SHOCK trial: targeting MAP ≥65 mmHg improved microcirculatory perfusion vs. higher targets. Norepinephrine is titrated to achieve MAP goal. Resuscitation endpoints beyond MAP: ScvO2 ≥70%, lactate clearance ≥10-20% per 2 hours, urine output ≥0.5 mL/kg/hour. Reassess fluid responsiveness throughout — avoid fluid overload."}
];

const N = QUESTIONS.length;
let idx = 0;
let answers = new Array(N).fill(null); // selected option index
const LETTERS = ["A","B","C","D"];

const strip = document.getElementById("strip");
const qcard = document.getElementById("qcard");
const resultsCard = document.getElementById("results");

function buildStrip(){
  strip.innerHTML = "";
  for(let i=0;i<N;i++){
    const t = document.createElement("div");
    t.className = "tick";
    t.title = "Question " + (i+1);
    t.addEventListener("click", ()=>{ idx = i; render(); });
    strip.appendChild(t);
  }
}
function paintStrip(){
  const ticks = strip.children;
  for(let i=0;i<N;i++){
    const t = ticks[i];
    t.className = "tick";
    if(answers[i] !== null){
      t.classList.add(answers[i] === QUESTIONS[i].a ? "ok" : "bad");
    }
    if(i === idx && !resultsVisible()) t.classList.add("cur");
  }
}
function resultsVisible(){ return !resultsCard.classList.contains("hide"); }

function counts(){
  let done=0, right=0;
  for(let i=0;i<N;i++){
    if(answers[i]!==null){ done++; if(answers[i]===QUESTIONS[i].a) right++; }
  }
  return {done,right};
}
function paintScore(){
  const {done,right} = counts();
  document.getElementById("sc-done").textContent = done;
  document.getElementById("sc-right").textContent = right;
}

function render(){
  resultsCard.classList.add("hide");
  qcard.classList.remove("hide");
  const Q = QUESTIONS[idx];
  const picked = answers[idx];
  let html = "";
  html += '<div class="meta"><span class="qnum">QUESTION ' + (idx+1) + ' / ' + N + '</span><span class="chip">' + Q.c + '</span></div>';
  html += '<p class="stem">' + Q.q + '</p>';
  Q.o.forEach((opt,i)=>{
    let cls = "opt";
    if(picked !== null){
      if(i === picked && picked === Q.a) cls += " sel-ok";
      else if(i === picked) cls += " sel-bad";
      else if(i === Q.a) cls += " reveal-ok";
    }
    html += '<button class="'+cls+'" data-i="'+i+'" '+(picked!==null?"disabled":"")+'><span class="ltr">'+LETTERS[i]+'</span><span>'+opt+'</span></button>';
  });
  if(picked !== null){
    const good = picked === Q.a;
    html += '<div class="verdict '+(good?"ok":"bad")+'">'+(good ? "Correct" : "Incorrect — answer is " + LETTERS[Q.a])+'</div>';
    html += '<div class="rationale">'+Q.r+'</div>';
  }
  html += '<div class="nav">';
  html += '<button class="btn ghost" id="prevBtn" '+(idx===0?"disabled":"")+'>Back</button>';
  if(idx < N-1){
    html += '<button class="btn" id="nextBtn">Next question</button>';
  } else {
    html += '<button class="btn" id="finishBtn">See results</button>';
  }
  html += '</div>';
  qcard.innerHTML = html;

  qcard.querySelectorAll(".opt").forEach(btn=>{
    btn.addEventListener("click", ()=>{
      if(answers[idx] !== null) return;
      answers[idx] = parseInt(btn.dataset.i,10);
      render();
    });
  });
  const prev = document.getElementById("prevBtn");
  if(prev) prev.addEventListener("click", ()=>{ idx--; render(); });
  const next = document.getElementById("nextBtn");
  if(next) next.addEventListener("click", ()=>{ idx++; render(); });
  const fin = document.getElementById("finishBtn");
  if(fin) fin.addEventListener("click", showResults);
  paintStrip(); paintScore();
}

function showResults(){
  const {done,right} = counts();
  const pct = done ? Math.round((right/done)*100) : 0;
  // category breakdown
  const cats = {};
  QUESTIONS.forEach((Q,i)=>{
    if(!cats[Q.c]) cats[Q.c] = {n:0, ok:0, ans:0};
    cats[Q.c].n++;
    if(answers[i]!==null){ cats[Q.c].ans++; if(answers[i]===Q.a) cats[Q.c].ok++; }
  });
  let html = '<div class="bigscore">'+right+' / '+done+' ('+pct+'%)</div>';
  html += '<p class="sub">'+(done<N ? (N-done)+' question'+(N-done===1?"":"s")+' unanswered — they are not counted against you. ' : '')+'A passing pace on the real ANCC is roughly the low-to-mid 70s percent range, so use this as a directional gauge, not a verdict.</p>';
  html += '<h2 style="font-size:.95rem;margin-bottom:6px">By category</h2>';
  Object.keys(cats).forEach(c=>{
    const o = cats[c];
    const p = o.ans ? Math.round((o.ok/o.ans)*100) : 0;
    html += '<div class="catrow"><span style="flex:0 0 44%">'+c+'</span><span class="bar"><i style="width:'+(o.ans? p:0)+'%"></i></span><span style="font-family:var(--mono);font-size:.8rem">'+o.ok+'/'+o.ans+(o.ans<o.n?' of '+o.n:'')+'</span></div>';
  });
  // missed list
  const missed = [];
  for(let i=0;i<N;i++) if(answers[i]!==null && answers[i]!==QUESTIONS[i].a) missed.push(i);
  if(missed.length){
    html += '<div class="missedlist"><h2 style="font-size:.95rem;margin-bottom:8px">Review missed questions</h2>';
    missed.forEach(i=>{ html += '<button data-jump="'+i+'">Q'+(i+1)+'</button>'; });
    html += '</div>';
  }
  html += '<div class="nav"><button class="btn ghost" id="backBtn">Back to questions</button><button class="btn" id="resetBtn">Start over</button></div>';
  resultsCard.innerHTML = html;
  resultsCard.classList.remove("hide");
  qcard.classList.add("hide");
  resultsCard.querySelectorAll("[data-jump]").forEach(b=>{
    b.addEventListener("click", ()=>{ idx = parseInt(b.dataset.jump,10); render(); });
  });
  document.getElementById("backBtn").addEventListener("click", ()=>{ render(); });
  document.getElementById("resetBtn").addEventListener("click", ()=>{
    if(confirm("Clear all answers and start over?")){
      answers = new Array(N).fill(null); idx = 0; render();
    }
  });
  paintStrip(); paintScore();
}

buildStrip();
render();
</script>
</body>
</html>
