<script>
const QUESTIONS = [
{c:"Low Back Pain",q:"A 45-year-old has acute low back pain for 5 days after lifting. No red flags. Neuro exam is normal. What is the MOST appropriate initial management?",o:["Bed rest for 2 weeks and opioid analgesia","Immediate lumbar MRI","Reassurance that most acute LBP resolves in 4-6 weeks, NSAIDs or acetaminophen, encourage activity as tolerated, and heat therapy","Lumbar X-ray and physical therapy referral today"],a:2,r:"Acute non-specific low back pain (no red flags): 90% resolves within 4-6 weeks without specific intervention. First-line: NSAIDs (superior to acetaminophen for LBP), superficial heat, reassurance, and encouragement to stay active (avoid bed rest — worsens outcomes). Imaging (X-ray or MRI) is NOT indicated in the first 4-6 weeks without red flags (red flags: age >50 or <18, trauma, unexplained weight loss, fever, immunosuppression, IV drug use, cancer history, saddle anesthesia, bowel/bladder dysfunction, progressive neuro deficits). Opioids: not first-line; reserve for severe pain not responding to NSAIDs, and use shortest duration/lowest dose. Exercise and early return to activity are beneficial."},
{c:"Low Back Pain",q:"Red flag symptoms in a patient with back pain that MANDATE urgent evaluation include:",o:["Back pain worse in the morning lasting >30 minutes — classic for inflammatory arthritis","Back pain for more than 6 weeks — chronicity alone is a red flag","New saddle anesthesia (perineal numbness), bladder/bowel dysfunction, and bilateral leg weakness — signs of cauda equina syndrome requiring emergent MRI and surgical evaluation","Back pain radiating to the buttock only — piriformis syndrome"],a:2,r:"Cauda equina syndrome red flags: saddle anesthesia (perineal/inner thigh numbness), urinary retention or incontinence, fecal incontinence, bilateral leg weakness. This is a SURGICAL EMERGENCY — delayed treatment risks permanent bowel, bladder, and motor deficits. Requires emergent MRI and neurosurgical consultation. Other back pain red flags: fever + back pain (infection/epidural abscess), unexplained weight loss (malignancy), history of cancer (metastatic disease), severe trauma (fracture), age >50 with new LBP (higher malignancy and fracture risk), progressive neurological deficits. Morning stiffness >30 minutes suggests inflammatory arthropathy (not a red flag but prompts different workup)."},
{c:"Low Back Pain",q:"A 52-year-old has right leg pain radiating from the buttock to the foot in an L5 dermatomal distribution, with numbness over the lateral foot and great toe. Straight leg raise is positive at 40 degrees. Diagnosis?",o:["Piriformis syndrome — positive SLR is typical","Lumbar spinal stenosis — neurogenic claudication is the classic presentation","Lumbar disc herniation with L5 radiculopathy — positive SLR (pain radiating below the knee at <60 degrees) is sensitive for nerve root compression","Peripheral arterial disease — ABI should be ordered"],a:2,r:"Lumbar disc herniation with radiculopathy: pain radiating below the knee in a dermatomal pattern + positive straight leg raise (SLR — pain radiating below the knee at lift angle <60 degrees, sensitivity ~80% for herniation). L5 dermatome: dorsum of the foot, great toe, lateral leg (foot drop from L5 nerve compression → weakness of great toe extension and ankle dorsiflexion). S1 radiculopathy: heel and lateral foot, diminished ankle reflex. Neurogenic claudication (lumbar stenosis): bilateral leg pain/weakness worse with walking/standing, relieved by sitting/leaning forward. MRI is the imaging of choice for radiculopathy not improving with conservative care after 4-6 weeks."},
{c:"Neck Pain",q:"A 40-year-old office worker has 3 months of neck pain with numbness radiating to the right thumb and index finger, and weakness of wrist extension. Which cervical level is most likely involved?",o:["C3-4 — radicular pain to the shoulder only","C5-6 — thumb/index finger numbness + wrist extension weakness (brachioradialis reflex diminished) is the classic C6 radiculopathy","C7 — middle finger and triceps weakness","C8-T1 — ring/small finger and intrinsic hand muscles"],a:1,r:"Cervical radiculopathy by level: C5: lateral deltoid, shoulder abduction weakness, deltoid reflex diminished. C6: thumb and index finger numbness, wrist EXTENSION weakness, brachioradialis reflex diminished. C7: middle finger, triceps weakness (extension), triceps reflex diminished. C8: ring/small finger, grip strength, no reliable reflex. T1: small finger, intrinsic hand muscles (abduction/adduction). Neck pain + arm symptoms following a dermatomal pattern = radiculopathy. Spurling's test: neck lateral flexion toward affected side + axial compression reproduces arm symptoms (sensitive and specific for cervical radiculopathy). MRI cervical spine if symptoms persist beyond 4-6 weeks."},
{c:"Osteoarthritis",q:"A 65-year-old obese woman has bilateral knee pain, worse with weight bearing and at end of the day, with bony enlargement, crepitus, and loss of motion. X-ray shows joint space narrowing and osteophytes. Diagnosis and first-line pharmacologic treatment?",o:["Rheumatoid arthritis — methotrexate is first-line","Gout — colchicine is indicated","Osteoarthritis — acetaminophen (limited evidence) or topical NSAIDs (diclofenac gel); oral NSAIDs are effective but GI/cardiovascular risk must be weighed; weight loss and exercise are the most evidence-based interventions","Septic arthritis — joint aspiration and IV antibiotics"],a:2,r:"Osteoarthritis (OA): degenerative joint disease, older age, mechanical pain (worse with activity, better with rest), bony enlargement (Heberden nodes at DIP, Bouchard at PIP), crepitus, no morning stiffness >30 min, no systemic symptoms. Pharmacologic treatment (ACR 2019): topical NSAIDs (diclofenac 1% gel — preferred in elderly, less systemic absorption), oral NSAIDs (effective but GI/CV risk), acetaminophen (limited evidence for OA pain but safer profile), duloxetine (for chronic OA pain). Non-pharmacologic (MOST evidence-based): weight loss (each pound lost = 4 pounds less knee load), land and aquatic exercise. Intra-articular corticosteroids for flares. Hyaluronic acid: not recommended (ACR 2019 conditionally against for knee OA). Joint replacement for refractory disease."},
{c:"Rheumatoid Arthritis",q:"A 38-year-old woman has 6 weeks of symmetric swelling and pain in MCPs, PIPs, and wrists, with 2 hours of morning stiffness. Anti-CCP is positive (260 U/mL), RF is positive, ESR 78. Diagnosis and first-line DMARD?",o:["Osteoarthritis — no DMARD needed, NSAIDs only","Reactive arthritis — antibiotics to treat the trigger","Rheumatoid arthritis — methotrexate is first-line DMARD; initiated with folic acid and combined with short-term low-dose corticosteroids for symptom relief while awaiting DMARD effect","Systemic lupus — hydroxychloroquine only"],a:2,r:"Rheumatoid arthritis: symmetric small joint polyarthritis, morning stiffness >30-60 minutes, RF and anti-CCP antibodies (anti-CCP most specific ~95%), elevated acute phase reactants. ACR/EULAR 2010 criteria. Treatment: 'Treat to target' strategy — goal is remission or low disease activity (DAS28 <2.6). DMARD therapy started within 3 months of diagnosis: methotrexate is anchor DMARD (folic acid 1 mg daily to reduce side effects, check CBC and LFTs regularly). Bridge therapy: low-dose prednisone or NSAIDs while DMARD takes effect (methotrexate onset 4-8 weeks). If inadequate response to methotrexate at adequate dose: add biologic (TNF inhibitor — adalimumab, etanercept) or JAK inhibitor. Hydroxychloroquine: used for mild RA or combination therapy."},
{c:"Rheumatoid Arthritis",q:"A patient with RA on methotrexate 20 mg weekly develops a persistent cough, dyspnea, and new bilateral ground-glass opacities on CT. Labs show elevated LFTs. What should be considered?",o:["Community-acquired pneumonia — add azithromycin and continue methotrexate","This is the expected RA lung involvement — no change in treatment","Methotrexate-induced pneumonitis — stop methotrexate immediately, refer to pulmonology; may require corticosteroids","Add an inhaled corticosteroid — methotrexate and ICS are compatible"],a:2,r:"Methotrexate pulmonary toxicity (methotrexate pneumonitis): a rare but serious complication — diffuse interstitial pneumonitis presenting with cough, dyspnea, fever, bilateral ground-glass opacities on CT. Can occur at any dose or duration. Diagnosis: exclusion of infection and RA-associated ILD. Management: STOP methotrexate immediately; systemic corticosteroids; most cases improve with discontinuation. Re-challenge is generally avoided. Other MTX monitoring: CBC (myelosuppression), LFTs (hepatotoxicity — baseline and every 4-12 weeks); avoid in pregnancy (Category X); avoid excessive alcohol; avoid trimethoprim-sulfamethoxazole (additive folate antagonism)."},
{c:"Gout",q:"A 55-year-old male with first gout flare has a swollen, red, exquisitely tender first MTP joint. Uric acid level is 9.8 mg/dL. He has normal renal function and no peptic ulcer history. Best immediate treatment?",o:["Start allopurinol 300 mg now — lowers uric acid and treats the flare","Corticosteroid injection only — NSAIDs worsen gout","Oral NSAIDs at full anti-inflammatory dose (naproxen 500 mg BID or indomethacin) OR colchicine OR systemic corticosteroids — all are first-line; do NOT start urate-lowering therapy during an acute attack","Aspirin — lowers uric acid and reduces inflammation simultaneously"],a:2,r:"Acute gout treatment: NSAIDs (full anti-inflammatory dose), colchicine (1.2 mg then 0.6 mg one hour later, then 0.6 mg BID until resolved), or systemic corticosteroids — all are equally effective first-line options. Choose based on comorbidities: CKD/anticoagulants → avoid NSAIDs; colchicine with P-glycoprotein/CYP3A4 inhibitors → dose adjust. NEVER start allopurinol or other urate-lowering therapy (ULT) DURING an acute flare — rapid uric acid changes can prolong or worsen the attack. Aspirin in low doses RAISES uric acid levels (competes with urate excretion) — should be avoided. Serum uric acid during a flare can be normal — false reassurance."},
{c:"Gout",q:"A 48-year-old has had 3 gout flares in the past year and has visible tophi on his ears. Uric acid is 10.4 mg/dL. His last flare resolved 6 weeks ago. What is the appropriate next step?",o:["Continue dietary purine restriction only — medications are not needed for prevention","Start allopurinol immediately — wait at least 4 weeks after flare resolution, with prophylactic colchicine or NSAID coverage for the first 3-6 months of ULT","Repeat uric acid in 6 months before deciding on therapy","Recommend weight loss only"],a:1,r:"Urate-lowering therapy (ULT) indications: ≥2 flares/year, tophi, uric acid nephrolithiasis, or gouty arthropathy on imaging. Start allopurinol (preferred) AFTER the acute flare has resolved (at least 2-4 weeks). Start LOW (100 mg/day in patients with normal renal function) and TITRATE UP every 2-4 weeks to reach uric acid goal <6 mg/dL (or <5 in tophaceous disease). Key: co-prescribe prophylactic colchicine 0.6 mg daily or low-dose NSAID for the FIRST 3-6 months of ULT to prevent mobilization flares. Febuxostat is an alternative. Target uric acid <6 mg/dL (dissolves tophi over time). Dietary counseling: reduce red meat, shellfish, beer, fructose — but diet alone rarely achieves target uric acid."},
{c:"Fibromyalgia",q:"A 42-year-old woman has widespread musculoskeletal pain, fatigue, non-restorative sleep, cognitive difficulties ('fibro fog'), and heightened sensitivity to pressure for more than 3 months. Labs: CBC, CMP, TSH, ESR all normal. Diagnosis and first-line management?",o:["Systemic lupus — ANA testing needed urgently","Hypothyroidism — TSH was likely incorrect","Fibromyalgia — aerobic exercise is the single most evidence-based treatment; multimodal approach includes sleep hygiene, cognitive behavioral therapy, low-dose tricyclic antidepressant (amitriptyline) or duloxetine or pregabalin","Rheumatoid arthritis — anti-CCP testing and DMARD therapy"],a:2,r:"Fibromyalgia: central sensitization syndrome — widespread pain ≥3 months, fatigue, cognitive symptoms, sleep disturbance, normal labs and imaging. 2016 ACR diagnostic criteria based on Widespread Pain Index (WPI) and Symptom Severity Score (SSS) — not a diagnosis of exclusion. Treatment pyramid: (1) Exercise (aerobic, aquatic, resistance) — most evidence, reduces pain and fatigue, improves function; (2) Cognitive behavioral therapy (CBT) — addresses pain catastrophizing; (3) Sleep hygiene; (4) Pharmacotherapy: duloxetine (Cymbalta), milnacipran (Savella), pregabalin (Lyrica) — all FDA-approved for fibromyalgia; low-dose amitriptyline for sleep. Avoid opioids — worsen central sensitization. Validate the patient — fibromyalgia is real and not 'all in their head.'"},
{c:"Shoulder",q:"A 58-year-old painter has shoulder pain and weakness with overhead activities. O'Brien's test and Hawkins-Kennedy test are positive. Empty can test reproduces pain. Which diagnosis is most likely?",o:["Acromioclavicular (AC) joint injury","Adhesive capsulitis — frozen shoulder","Rotator cuff pathology (impingement or tear) — O'Brien's (SLAP), Hawkins-Kennedy (impingement), and empty can (supraspinatus) all point to rotator cuff/subacromial space","Bicep tendon rupture — 'Popeye' sign"],a:2,r:"Rotator cuff pathology: supraspinatus most commonly affected (responsible for abduction 0-90 degrees). Special tests: Hawkins-Kennedy (internal rotation with forward flexion → impingement); Empty can/Jobe test (resisted abduction in the scapular plane with thumbs down → supraspinatus weakness); Drop arm test positive = large full-thickness tear; O'Brien's (active compression test) → AC joint or SLAP lesion. Painters, overhead workers, swimmers — classic occupational risk. MRI is gold standard for rotator cuff tear diagnosis. Initial treatment: rest, NSAIDs, physical therapy (rotator cuff strengthening); corticosteroid injection for persistent impingement; surgery for full-thickness tears or failed conservative treatment."},
{c:"Shoulder",q:"A 55-year-old woman with type 2 diabetes has progressively worsening shoulder pain over 4 months with marked loss of both active AND passive range of motion in all planes. What is this condition?",o:["Rotator cuff tear — weakness with specific movements","Shoulder impingement — loss of motion is only with abduction","Adhesive capsulitis (frozen shoulder) — global loss of passive AND active ROM is the hallmark; diabetes is the strongest risk factor","Subacromial bursitis — localized lateral pain only"],a:2,r:"Adhesive capsulitis (frozen shoulder): inflammation and fibrosis of the glenohumeral joint capsule. Hallmark: global loss of BOTH active and passive ROM in all planes (especially external rotation). Three stages: freezing (worsening pain, ROM loss), frozen (stiffness, less pain), thawing (gradual ROM recovery). Lasts 18-24+ months if untreated. Risk factors: female, age 40-60, diabetes (most significant — 10-38% incidence), thyroid disease, stroke, mastectomy, prolonged immobility. Treatment: NSAIDs, PT focusing on stretching, intra-articular corticosteroid injection (early stages), hydrodilatation (injection of large saline volume), manipulation under anesthesia (frozen stage), arthroscopic capsular release (refractory cases). Distinguish from rotator cuff tear (passive ROM preserved in cuff tears)."},
{c:"Knee",q:"A 28-year-old soccer player hears a 'pop' and feels the knee give way during a pivot. Exam reveals a positive anterior drawer test and Lachman test. The McMurray test is negative. MRI confirms anterior cruciate ligament (ACL) tear. Most appropriate management for an active athlete?",o:["Knee immobilization in a cast for 6 weeks — sufficient for all ACL tears","Immediate surgery is mandatory for all ACL tears","Conservative management (physical therapy only) is preferred for all patients with ACL tear","Surgical reconstruction is generally recommended for active young patients who wish to return to pivoting/cutting sports; conservative management is appropriate for older, less active patients"],a:3,r:"ACL tear management: the ACTIVITY LEVEL and GOALS drive the decision. Surgical reconstruction (arthroscopic, usually patellar tendon or hamstring autograft): indicated for active patients who want to return to cutting/pivoting sports (soccer, basketball, skiing), young athletes, patients with combined meniscal/collateral ligament injuries. Conservative management (PT, bracing, activity modification): appropriate for older/sedentary patients, isolated ACL tears with low athletic demand, skeletally immature patients. Lachman test: most sensitive for ACL tear (anterior tibial translation with knee flexed at 30 degrees). Anterior drawer: knee at 90 degrees. McMurray: meniscal pathology (popping with knee extension from flexed position + rotation)."},
{c:"Knee",q:"A 72-year-old male has medial knee pain worsened by weight-bearing, medial joint line tenderness, and a positive McMurray test with a palpable click. X-ray shows medial compartment joint space narrowing. MRI confirms a medial meniscus tear. Conservative first-line management?",o:["Immediate arthroscopic meniscectomy","ACL reconstruction — meniscal tears indicate ligament instability","Physical therapy (quadriceps/hamstring strengthening), NSAIDs, activity modification, and possible corticosteroid injection — most degenerative meniscal tears respond to conservative care as well as surgery (per METEOR and FINISH trials)","Complete non-weight bearing for 6 weeks with crutches"],a:2,r:"Degenerative meniscal tears (common in OA, >50 years): METEOR trial (2013) and FINISH trial showed arthroscopic partial meniscectomy was NOT superior to sham surgery or physical therapy for degenerative meniscal tears in patients with and without OA. Conservative management first: supervised PT (strengthening, ROM), NSAIDs, intra-articular corticosteroid injection. Indications for surgery: locked knee (bucket-handle tear causing inability to extend), failure of 3-6 months of conservative therapy, acute traumatic tears in young active patients. Arthroscopic surgery for degenerative tears in OA is no longer routinely recommended."},
{c:"Ankle / Foot",q:"A 25-year-old basketball player rolls his ankle inward. Ottawa Ankle Rules: no bony tenderness at the posterior tip of either malleolus, able to weight-bear 4 steps immediately. What do the Ottawa Ankle Rules indicate?",o:["X-ray is required — any ankle sprain needs imaging","No X-ray needed — Ottawa Ankle Rules show low fracture probability; treat as grade I or II ankle sprain with RICE (rest, ice, compression, elevation), early mobilization, and physical therapy","MRI is required to rule out ligament tear","Refer to orthopedics immediately"],a:1,r:"Ottawa Ankle Rules (sensitivity ~97-99% for fractures): X-ray needed if ANY of: posterior 6cm of fibula bony tenderness, posterior 6cm of tibia bony tenderness, OR unable to weight-bear 4 steps both immediately and in the ED. This patient: no bony tenderness, able to bear weight → Ottawa rules NEGATIVE → fracture very unlikely, no X-ray needed. Lateral ankle sprains (inversion mechanism): most common = anterior talofibular ligament (ATFL). Management: PRICE (Protection, Rest, Ice, Compression, Elevation) → early mobilization → rehabilitation exercises → functional training. Grade III tear (complete rupture): surgical consultation may be needed if conservative care fails."},
{c:"Hip",q:"A 78-year-old woman falls and is unable to bear weight. Exam: right leg is shortened and externally rotated. X-ray confirms a right femoral neck fracture. Most appropriate management?",o:["Bed rest and traction for 6 weeks — avoid surgery in elderly","Oral bisphosphonate only — fracture will heal spontaneously","Surgical fixation or hip arthroplasty within 24-48 hours — prolonged bed rest in elderly leads to DVT, pneumonia, pressure ulcers, deconditioning, and significantly increased mortality","Physical therapy only — elderly patients are poor surgical candidates"],a:2,r:"Hip fracture in the elderly: femoral neck fractures (often displaced) → total hip arthroplasty; intertrochanteric fractures → intramedullary nail or hip screw fixation. Surgical intervention within 24-48 hours reduces mortality (delayed surgery >48 hours increases 30-day mortality by ~41%). Prolonged immobility risks: DVT/PE (leading cause of post-hip-fracture death), pneumonia, pressure ulcers, delirium, muscle atrophy. Post-op: early mobilization (POD 1), DVT prophylaxis, fall risk reduction, osteoporosis evaluation (all hip fracture patients should be started on bisphosphonate and calcium/vitamin D), nutritional support. The NP's role: recognize, stabilize, refer urgently."},
{c:"Osteoporosis — Fracture Risk",q:"A 70-year-old woman fractures her wrist after slipping on ice — a low-energy fall from standing height. She has never had a DEXA scan. Why is this event clinically significant beyond the fracture itself?",o:["Falls in elderly are expected — no additional workup is warranted","This is a FRAGILITY FRACTURE — a fracture from low-energy trauma strongly indicates underlying osteoporosis; DEXA should be ordered, and bisphosphonate therapy initiated if T-score confirms osteoporosis or based on FRAX risk calculation","Wrist fractures are always due to the fall mechanism, not bone quality","Only hip and vertebral fractures indicate osteoporosis"],a:1,r:"Fragility fracture: fracture from a force that would not normally cause a fracture in healthy bone — fall from standing height or less. Clinical significance: a fragility fracture at the wrist, hip, or vertebra is itself a major risk factor for FUTURE fractures and effectively diagnoses severe osteoporosis regardless of T-score. Any fragility fracture = indication for osteoporosis workup AND treatment. Post-fracture care gap: only ~20% of women with fragility fractures receive appropriate osteoporosis treatment. Secondary fracture prevention programs (FLS — Fracture Liaison Services) identify and treat patients post-fracture. Initiate bisphosphonate therapy if DEXA confirms T-score ≤-2.5 OR if FRAX risk threshold is met."},
{c:"Plantar Fasciitis",q:"A 42-year-old runner has sharp heel pain that is WORST with the first steps in the morning and after prolonged sitting, improving after a few minutes of walking. Tenderness is at the medial calcaneal tubercle. Diagnosis and first-line treatment?",o:["Achilles tendinopathy — tender at the tendon insertion","Stress fracture of the calcaneus — X-ray is needed immediately","Plantar fasciitis — first-line: calf/plantar fascia stretching exercises, supportive footwear, night splints to maintain dorsiflexion during sleep, NSAIDs; over 90% resolve with conservative management","Morton's neuroma — burning/tingling between the 3rd and 4th toes"],a:2,r:"Plantar fasciitis: most common cause of heel pain in adults. Classic: WORST with first steps after rest (post-static dyskinesia), medial calcaneal tubercle tenderness, pain with passive dorsiflexion of the toes (stretches the plantar fascia). Risk factors: pes planus, obesity, sudden increase in running mileage, poor footwear. First-line: (1) Stretching (plantar fascia and calf/Achilles) — most evidence; (2) Supportive footwear with cushioned heel; (3) Night splints; (4) NSAIDs; (5) Orthotics. Second-line: corticosteroid injection (provides short-term relief, repeated injections increase plantar fascia rupture risk). Extracorporeal shockwave therapy for refractory cases (>6 months). Surgery (plantar fascia release): last resort."},
{c:"Carpal Tunnel Syndrome",q:"A 45-year-old woman has hand numbness in the thumb, index, and middle fingers that wakes her at night. Symptoms worsen with wrist flexion. Tinel's sign is positive. EMG confirms median nerve compression. First-line treatment before considering surgery?",o:["Carpal tunnel release surgery immediately — the definitive treatment","Corticosteroid injection is always the first step","Wrist splinting in neutral position especially at night, NSAIDs, activity modification — first-line conservative management; surgery reserved for failed conservative care or severe motor weakness/thenar atrophy","Physical therapy targeting shoulder strengthening"],a:2,r:"Carpal tunnel syndrome (CTS): median nerve compression at the carpal tunnel. Symptoms: numbness/tingling in thumb, index, middle fingers and radial half of ring finger (median nerve distribution); worse at night and with wrist flexion. Tests: Phalen's (wrist flexion 60 seconds reproduces symptoms), Tinel's (tapping carpal tunnel → tingling). Confirmation: nerve conduction studies/EMG. First-line: neutral wrist SPLINT especially at night, NSAIDs, activity/ergonomic modification. Corticosteroid injection: effective short-term, appropriate if splinting fails. Surgery (carpal tunnel release — median nerve decompression): indicated for: failed conservative management, severe symptoms, thenar muscle atrophy, motor weakness — excellent outcomes."},
{c:"Lateral Epicondylitis",q:"A 40-year-old tennis player has lateral elbow pain worsened by gripping and wrist extension. Tenderness over the lateral epicondyle reproduces with resisted wrist extension. Diagnosis and first-line management?",o:["Medial epicondylitis (golfer's elbow) — pain is on the lateral side","Ulnar nerve entrapment — treated with nerve transposition","Lateral epicondylitis (tennis elbow) — degenerative tendinopathy of the ECRB origin; first-line: activity modification, counterforce bracing, physical therapy (eccentric strengthening), NSAIDs; avoid repetitive corticosteroid injections","De Quervain's tenosynovitis — at the radial styloid"],a:2,r:"Lateral epicondylitis (tennis elbow): tendinopathy of the extensor carpi radialis brevis (ECRB) origin at the lateral epicondyle. Pain with resisted wrist extension and gripping (Cozen's test). NOT a true inflammatory 'itis' — it's degenerative tendinosis. First-line: activity modification, counterforce (elbow) brace, eccentric stretching/strengthening PT, topical NSAIDs. Corticosteroid injection: short-term benefit but may increase long-term recurrence — avoid repeated injections. Second-line: platelet-rich plasma (PRP) — growing evidence. Surgery (ECRB debridement): refractory cases >6 months. Medial epicondylitis (golfer's elbow): same pathology at medial epicondyle, pain with resisted wrist flexion."},
{c:"Spondyloarthropathy",q:"A 28-year-old male has low back pain for 4 months, worse in the morning for >1 hour, improving with exercise and NOT with rest. HLA-B27 is positive. Sacroiliac joint tenderness is present. X-ray shows sacroiliac joint sclerosis bilaterally. Diagnosis?",o:["Mechanical low back pain — treat with NSAIDs and activity","Lumbar disc herniation — positive SLR expected","Ankylosing spondylitis (axial spondyloarthropathy) — inflammatory back pain: young male, prolonged morning stiffness >45 min, improves with exercise (not rest), HLA-B27 positive, sacroiliitis on imaging","Reactive arthritis — would expect history of preceding infection"],a:2,r:"Ankylosing spondylitis (AS)/Axial spondyloarthropathy (axSpA): Inflammatory back pain criteria (4 of 5): onset <45 years, insidious onset, improves with exercise, does NOT improve with rest, nighttime pain with awakening. HLA-B27 positive in >90% of AS patients (but also present in 8% of the general population — not diagnostic alone). Imaging: sacroiliitis on X-ray (late finding), MRI detects earlier bone marrow edema. Extra-articular: uveitis (most common — anterior uveitis), psoriasis, IBD. Treatment: NSAIDs (first-line for axial disease), physical therapy, TNF inhibitors or IL-17 inhibitors (secukinumab) for inadequate NSAID response. Unlike RA — conventional DMARDs (methotrexate) do NOT work for axial disease."},
{c:"Crystal Arthropathies",q:"A 65-year-old woman with chronic renal failure presents with acute knee pain and swelling. Aspiration shows positively birefringent rhomboid-shaped crystals. Diagnosis and treatment?",o:["Gout — negatively birefringent needle-shaped urate crystals — treat with colchicine","Septic arthritis — gram stain and IV antibiotics","Pseudogout (calcium pyrophosphate deposition, CPPD) — positively birefringent rhomboid crystals; treat like acute gout: NSAIDs, colchicine, or corticosteroids; allopurinol has NO role in CPPD","Rheumatoid arthritis — no crystals expected in RA"],a:2,r:"Crystal arthropathy comparison: Gout: MONOSODIUM URATE crystals → NEGATIVELY birefringent (yellow when parallel to compensator axis), NEEDLE-shaped, yellow-red under polarized light. CPPD/Pseudogout: CALCIUM PYROPHOSPHATE crystals → POSITIVELY birefringent (blue when parallel), RHOMBOID-shaped. Pseudogout: affects large joints (knee most common), associated with hemochromatosis, hyperparathyroidism, hypomagnesemia, hypothyroidism, aging, renal failure. Chondrocalcinosis on X-ray (calcification of cartilage). Treatment: same as acute gout (NSAIDs, colchicine, corticosteroids). Allopurinol does NOT lower calcium pyrophosphate — no role in CPPD. Chronic CPPD: colchicine 0.6 mg BID for prophylaxis."},
{c:"Osteoporosis — Treatment",q:"A 68-year-old woman has a DEXA T-score of -2.8 at the lumbar spine. She has no prior fractures. Per USPSTF and NOF guidelines, which is the most appropriate first-line treatment?",o:["Calcium and vitamin D supplementation alone — sufficient for moderate osteoporosis","Hormone replacement therapy — most effective for osteoporosis","Bisphosphonate (alendronate weekly or zoledronic acid annually) plus calcium and vitamin D — first-line pharmacotherapy for osteoporosis reduces fracture risk by ~50%","Teriparatide — first-line anabolic agent"],a:2,r:"Osteoporosis treatment: T-score ≤-2.5 = pharmacotherapy indicated (plus calcium 1200 mg/day and vitamin D 800-1000 IU/day as foundation). First-line: bisphosphonates — alendronate 70 mg weekly PO (most studied, least expensive); risedronate 35 mg weekly; zoledronic acid 5 mg IV annually (preferred if GI intolerance, adherence issues). Reduce vertebral fracture risk by ~40-70%, hip fracture by ~40%. Bisphosphonate holiday after 5 years: reassess — continue in high-risk (prior hip/vertebral fracture, T-score still ≤-2.5). Anabolic agents (teriparatide, abaloparatide, romosozumab): reserved for severe osteoporosis, multiple prior fractures, or bisphosphonate failure — not first-line. Denosumab: biologic option for those who cannot tolerate bisphosphonates."},
{c:"Tendinopathy",q:"A 35-year-old runner has pain at the patellar tendon that worsens going down stairs and jumping. Tenderness is over the inferior pole of the patella. What is the most evidence-based treatment?",o:["Complete rest and casting for 6 weeks","NSAIDs long-term — resolve tendon degeneration","Eccentric quadriceps exercises (decline squat program) — the most evidence-based treatment for patellar tendinopathy; treats underlying tendon degeneration rather than suppressing inflammation","Corticosteroid injection into the tendon — standard first-line"],a:2,r:"Patellar tendinopathy (jumper's knee): degenerative tendinosis at the patellar tendon, common in running and jumping sports. Worse with loading activities (stairs, jumping, squatting). Eccentric exercise (the 'decline squat' or Alfredson protocol): tendon-specific loading in the eccentric (lengthening) phase promotes collagen remodeling — the most evidence-based treatment. Complete rest is COUNTERPRODUCTIVE (tendons need loading to heal). NSAIDs: short-term pain relief only — do not treat underlying degeneration. Corticosteroid injection INTO tendon: associated with tendon rupture and should be AVOIDED in patellar tendinopathy (unlike bursitis, where peritendinous injection can be useful). Also: isometric exercises for pain relief during rehabilitation."},
{c:"Septic Arthritis",q:"A 32-year-old IV drug user presents with a hot, swollen, exquisitely tender right knee with fever. WBC is 22,000. The joint is held in slight flexion. Which is the MOST important immediate intervention?",o:["NSAIDs and elevation — treat as gout empirically","Uric acid level before any treatment — must rule out gout","Urgent joint aspiration for Gram stain, culture, and cell count — septic arthritis requires immediate diagnosis and treatment; >50,000 WBC with >90% PMNs in joint fluid strongly suggests infection; empiric IV antibiotics after aspiration","X-ray only — imaging before invasive procedures"],a:2,r:"Septic (infectious) arthritis: medical emergency — delayed treatment leads to irreversible joint destruction within days. Immediate joint aspiration (arthrocentesis): mandatory before antibiotics for culture. Septic joint fluid: WBC >50,000 (often >100,000), >90% PMNs, turbid/purulent, low glucose, high protein. Gram stain helps guide empiric therapy. Empiric antibiotics: vancomycin (covers MRSA/MSSA) + ceftriaxone (covers GN organisms including N. gonorrhoeae) pending cultures. Most common organisms: MSSA/MRSA (most common overall), N. gonorrhoeae (young sexually active adults — most common bacterial arthritis in adults <30). Serial joint drainage (arthrocentesis or surgical washout for most large joints) is essential for source control. Do NOT give NSAIDs empirically when septic arthritis is possible."},
{c:"Polymyalgia Rheumatica",q:"A 72-year-old woman has 6 weeks of bilateral shoulder and hip girdle aching with morning stiffness for >45 minutes. ESR is 88 mm/hr and CRP is elevated. Muscle enzymes are normal. She is tender over shoulder and hip girdles but has no actual muscle weakness. Diagnosis and treatment?",o:["Fibromyalgia — prednisone is not indicated","Polymyositis — elevated muscle enzymes expected","Polymyalgia Rheumatica (PMR) — treat with low-dose prednisone 15-20 mg/day; dramatic improvement within 24-72 hours is both therapeutic and diagnostic; taper slowly over 12-24 months","Giant cell arteritis — treat with high-dose prednisone 40-60 mg/day and urgent temporal artery biopsy"],a:2,r:"Polymyalgia Rheumatica: bilateral shoulder + hip girdle pain/stiffness, age >50 (almost always >60), elevated ESR/CRP, normal CK (no actual muscle inflammation — differentiates from polymyositis), no synovitis on imaging. Treatment: LOW-DOSE prednisone 15-20 mg/day → dramatic improvement within 24-72 hours (this rapid response is almost diagnostic). Taper slowly over 12-24 months — most patients require at least 1-2 years. Key association: 15-30% have concurrent GIANT CELL ARTERITIS (GCA). Screen ALL PMR patients for GCA symptoms: new headache, temporal tenderness, jaw claudication, vision changes, scalp tenderness. GCA → HIGH-DOSE prednisone 40-60 mg/day + urgent temporal artery biopsy (to prevent permanent vision loss)."},
{c:"Systemic Lupus",q:"A 28-year-old Black woman has a malar rash, mouth ulcers, pleuritis, leukopenia, and positive ANA (titer 1:640). Anti-dsDNA is positive. Urine shows 3+ protein. Which system involvement makes this case most serious?",o:["Malar rash — cosmetic concern only","Mouth ulcers — benign mucosal involvement","Lupus nephritis — renal involvement is the major predictor of morbidity and mortality in SLE; all SLE patients should have annual urinalysis and urine protein:creatinine ratio","Positive ANA — highest ANA titers indicate worst prognosis"],a:2,r:"Systemic lupus erythematosus (SLE): chronic autoimmune disease, female-predominant (9:1), Black women highest incidence/severity. ACR/EULAR 2019 classification criteria. Most specific antibodies: anti-dsDNA (also tracks disease activity) and anti-Smith (most specific). ANA: very sensitive (>95%) but not specific. Organ systems by severity: RENAL (lupus nephritis) and NEUROPSYCHIATRIC lupus = worst prognostic implications. Screen all SLE: annual UA, urine protein:creatinine ratio, creatinine. Lupus nephritis: Class III/IV require immunosuppression (hydroxychloroquine + mycophenolate or cyclophosphamide + corticosteroids). Hydroxychloroquine: recommended for ALL SLE patients — reduces flares, organ damage, and mortality. Annual ophthalmologic exam (bull's-eye maculopathy from HCQ)."},
{c:"De Quervain's Tenosynovitis",q:"A new mother has radial-sided wrist pain for 3 weeks, worse when lifting her baby. Finkelstein test is positive. What is this condition and what is first-line treatment?",o:["Carpal tunnel syndrome — wrist splinting is first-line","Scaphoid fracture — X-ray and thumb spica cast required","De Quervain's tenosynovitis — stenosing tenosynovitis of the APL and EPB tendons; first-line: thumb spica splint and NSAIDs; corticosteroid injection has excellent success rate if conservative treatment fails","Rheumatoid arthritis — RF and anti-CCP testing needed"],a:2,r:"De Quervain's tenosynovitis: inflammation of the abductor pollicis longus (APL) and extensor pollicis brevis (EPB) tendons at the radial styloid. Classic in new mothers (repetitive baby-lifting with ulnar deviation and thumb abduction). Finkelstein test: thumb tucked in fist → ulnar deviation → pain at radial styloid (highly sensitive). Treatment: thumb spica splint, NSAIDs, activity modification. Corticosteroid injection directly into the first dorsal compartment: 80-90% success rate — excellent for persistent cases. Surgery (first compartment release): reserved for failed injection therapy. Distinguish from scaphoid fracture (anatomical snuffbox tenderness after trauma) and basilar thumb OA (CMC grind test positive)."},
{c:"MSK — Examination",q:"When examining a patient's knee, the Lachman test is performed with the knee at 30 degrees of flexion. An anterior translocation of the tibia relative to the femur is positive. For which structure is this the most sensitive test?",o:["Posterior cruciate ligament — tests posterior tibial sag","Medial collateral ligament — valgus stress test is standard","Anterior cruciate ligament (ACL) — Lachman test has the highest sensitivity (~86%) of any physical examination test for ACL injury","Lateral meniscus — McMurray test is used instead"],a:2,r:"Key knee examination tests: ACL: Lachman (knee at 30 degrees, anterior tibial pull — most sensitive ~86%), anterior drawer (knee at 90 degrees, less sensitive). PCL: posterior drawer, tibial sag sign. MCL: valgus stress test at 30 degrees. LCL: varus stress test at 30 degrees. Meniscus: McMurray (flexion/extension with rotation, palpable click), Thessaly test (standing on one leg, rotating at 20-30 degrees). Patellofemoral: Clarke's test (patellar grind). For the ANCC: knowing which test corresponds to which structure is frequently tested. Lachman = ACL (gold standard physical exam test). Positive = more anterior tibial translation compared to contralateral knee with a soft or absent endpoint."},
{c:"Bursitis",q:"A 50-year-old carpet layer has anterior knee pain and swelling directly over the patella, worsened by kneeling. Exam shows a fluctuant collection over the patella with warmth but no joint effusion. Temperature is 37.2°C. Most likely diagnosis and management?",o:["Septic arthritis — aspirate and start IV vancomycin","Patellar tendinopathy — eccentric exercise program","Prepatellar bursitis (housemaid's knee) from repetitive kneeling — if non-infectious: NSAIDs, activity modification, knee pads; if infected (septic bursitis): aspirate for culture, oral antibiotics covering MSSA (dicloxacillin or cephalexin)","Meniscal tear — MRI is needed immediately"],a:2,r:"Prepatellar bursitis: inflammation of the prepatellar bursa directly overlying the patella. Caused by repetitive kneeling (carpet layers, roofers, gardeners, wrestlers). Swelling is anterior to and separate from the joint — no true joint effusion (distinguishes from septic arthritis). If afebrile and no systemic signs: non-septic bursitis → NSAIDs, activity modification, aspiration for symptomatic relief, protective padding. Septic bursitis (fever, erythema, warmth, elevated WBC): aspirate fluid for culture (usually MSSA) → oral antibiotics (dicloxacillin) if uncomplicated; IV if systemic toxicity. Aspiration fluid: >2000 WBC with >75% PMNs suggests septic bursitis. Other bursitis: olecranon (elbow, same concept), trochanteric (lateral hip pain, worse with side-lying)."},
{c:"MSK — Pediatric",q:"A 4-year-old boy suddenly stops using his right arm after being pulled up by his wrist. He holds the arm slightly pronated and refuses to supinate. X-ray is normal. Diagnosis and treatment?",o:["Supracondylar fracture — urgent orthopedic referral","Nursemaid's elbow (radial head subluxation) — reduce with hyperpronation or supination/flexion maneuver; successful reduction is confirmed by the child spontaneously using the arm within minutes","Brachial plexus injury — requires MRI","Septic arthritis of the elbow — aspiration needed"],a:1,r:"Nursemaid's elbow (pulled elbow/radial head subluxation): most common elbow injury in children 1-4 years. Mechanism: longitudinal traction on the outstretched arm (being swung, lifted, or pulled) → annular ligament slips over the radial head. Presentation: child holds arm slightly flexed and pronated, refuses to supinate or use the arm, no bony tenderness, normal X-ray (subluxation is not visible). Reduction: hyperpronation technique (forearm fully pronated with simultaneous pressure over radial head — most effective, less painful) OR supination/flexion (supinate forearm then flex elbow). Successful reduction: palpable/audible click + child using the arm within 5-15 minutes. No immobilization needed. Recurrence is common — counsel parents to avoid traction on the arm."},
{c:"MSK — Examination",q:"A 58-year-old has lateral hip pain that is worse lying on the affected side at night and with walking. Tenderness is directly over the greater trochanter. Hip internal and external ROM is preserved. Diagnosis?",o:["Hip osteoarthritis — groin pain and restricted ROM are classic","Meralgia paresthetica — lateral thigh NUMBNESS from lateral femoral cutaneous nerve compression","Greater trochanteric pain syndrome (trochanteric bursitis) — lateral hip pain with direct tenderness over the greater trochanter; hip ROM is preserved (distinguishes from OA)","Avascular necrosis of the femoral head"],a:2,r:"Greater trochanteric pain syndrome (GTPS, formerly trochanteric bursitis): lateral hip pain at the greater trochanter, worse lying on the affected side, sitting with legs crossed, climbing stairs. Tenderness directly over the greater trochanter. KEY DISTINGUISHING FEATURE: hip RANGE OF MOTION IS PRESERVED — internal/external rotation and flexion are normal. Hip OA: groin pain + progressive ROM loss + crepitus. Treatment: activity modification, NSAIDs, physical therapy (hip abductor strengthening — tensor fasciae latae, gluteus medius), corticosteroid injection for refractory pain, avoid aggravating positions. Contributing factors: IT band tightness, leg length discrepancy, obesity, excessive hill walking."}
,
{c:"MSK — Pediatric",q:"An 8-year-old boy with sickle cell disease has a 2-day history of fever and right tibial pain with point tenderness and marked swelling. WBC is 16,000. Most likely diagnosis and treatment?",o:["Growing pains — ibuprofen and reassurance","Osteosarcoma — urgent MRI and oncology referral","Osteomyelitis — most common organism is Salmonella in sickle cell disease; IV antibiotics (cover both Salmonella and Staphylococcus); MRI is the gold standard imaging","Fracture — X-ray and casting"],a:2,r:"Osteomyelitis in sickle cell disease: SALMONELLA is the classic organism (functionally asplenic patients lose ability to clear encapsulated and intracellular organisms); however Staphylococcus aureus is STILL the most common organism even in sickle cell (slightly higher Salmonella rate than normal population). Empiric treatment: cover both — antistaphylococcal agent (oxacillin or vancomycin if MRSA concern) + third-generation cephalosporin (ceftriaxone — covers Salmonella). MRI with and without contrast: gold standard for osteomyelitis (detects marrow edema and soft tissue extension earlier than X-ray). Blood cultures before antibiotics. Surgical debridement if abscess or failed medical therapy."},
{c:"Muscle Disorders",q:"A 55-year-old woman taking atorvastatin for 3 years develops progressive proximal muscle weakness (difficulty rising from a chair, climbing stairs) without muscle pain. CK is 4,200 U/L (10x normal). Aldolase is elevated. ANA is positive. EMG shows myopathic changes. What should be considered?",o:["Statin myopathy — stop statin and all is resolved","Fibromyalgia — weakness is subjective, not measurable","Inflammatory myopathy (polymyositis or dermatomyositis) — or statin-associated immune-mediated necrotizing myopathy (IMNM); needs muscle biopsy; statins can trigger autoimmune myopathy requiring immunosuppression even after stopping the drug","ALS — motor neuron disease causes this pattern"],a:2,r:"Inflammatory myopathy vs statin myopathy: classic statin myopathy resolves after stopping the statin (within 4-12 weeks). Statin-associated immune-mediated necrotizing myopathy (IMNM): triggered by statins but does NOT resolve after stopping — anti-HMGCR antibodies (anti-200/100 kDa). Also consider polymyositis (anti-Jo-1) or dermatomyositis (anti-MDA5, Mi-2 — with skin findings: heliotrope rash, Gottron's papules). All inflammatory myopathies: proximal > distal weakness, elevated CK/aldolase, myopathic EMG, abnormal muscle biopsy. Treatment: systemic corticosteroids + IVIG or immunosuppressants. Key: do NOT dismiss persistent high CK after statin discontinuation — muscle biopsy is needed."},
{c:"Reactive Arthritis",q:"A 26-year-old man develops urethritis, conjunctivitis, and asymmetric oligoarthritis of the knees and ankles 2 weeks after an episode of diarrhea (Salmonella confirmed). He is HLA-B27 positive. Diagnosis?",o:["Septic arthritis — requires joint aspiration and IV antibiotics","Rheumatoid arthritis — symmetric small joint involvement","Reactive arthritis (formerly Reiter's syndrome) — follows GI or GU infection; classic triad: arthritis, urethritis, conjunctivitis; treatment is NSAIDs and antibiotics for the triggering infection if still active; HLA-B27 increases risk","Ankylosing spondylitis — involves sacroiliac joints primarily"],a:2,r:"Reactive arthritis: sterile inflammatory arthritis triggered by a preceding infection (GI: Salmonella, Shigella, Campylobacter, Yersinia; GU: Chlamydia trachomatis). Classic triad: arthritis + urethritis/cervicitis + conjunctivitis/uveitis ('can't see, can't pee, can't climb a tree'). Asymmetric oligoarthritis affecting large joints (knees, ankles, heels). Extra-articular: skin (keratoderma blennorrhagica — hyperkeratotic rash on palms/soles), circinate balanitis (painless ulcers on penis), oral ulcers. HLA-B27 positive in ~60-80% of patients with reactive arthritis. Treatment: NSAIDs for arthritis; antibiotics (doxycycline 3 months) if Chlamydia-triggered; sulfasalazine for persistent disease."},
{c:"Psoriatic Arthritis",q:"A 38-year-old with longstanding plaque psoriasis develops sausage-like swelling of an entire digit (dactylitis) in the right index finger, nail pitting, and asymmetric joint pain affecting PIPs and DIPs. Diagnosis?",o:["Rheumatoid arthritis — affects MCPs and PIPs symmetrically, spares DIPs","Gout — asymmetric, but DIP involvement typical","Psoriatic arthritis — DIP involvement and dactylitis (sausage digit) are hallmarks; nail changes (pitting, onycholysis) are pathognomonic of the psoriasis-arthritis connection","Reactive arthritis — follows infection with conjunctivitis"],a:2,r:"Psoriatic arthritis (PsA): inflammatory arthritis in 30% of psoriasis patients. Five patterns: DIP predominant (classic), asymmetric oligoarthritis, symmetric polyarthritis (RA-like), axial (sacroiliitis), arthritis mutilans (severe destructive). HALLMARKS: dactylitis (sausage digit — entire digit swelling from tendon sheath inflammation), nail changes (pitting, onycholysis, oil-drop sign), DIP joint involvement. RF and anti-CCP negative (seronegative). Psoriasis may precede, coincide with, or follow the arthritis. Treatment: NSAIDs for mild; methotrexate or sulfasalazine for moderate; biologic (TNF inhibitor, IL-17 inhibitor, IL-12/23 inhibitor) for severe or non-responsive disease. PDE4 inhibitor (apremilast): oral option for skin and joints."},
{c:"Rotator Cuff",q:"A 70-year-old cannot actively abduct her right shoulder past 30 degrees, though passive range of motion is preserved. There is no pain with passive movement. The arm falls to the side when released from passive abduction (positive drop arm test). Most likely diagnosis?",o:["Adhesive capsulitis — passive ROM is preserved","Glenohumeral arthritis — passive ROM would also be limited","Large full-thickness rotator cuff tear — inability to maintain active abduction despite preserved passive ROM; positive drop arm test strongly suggests complete supraspinatus tear","Impingement syndrome — pain limits active range, but strength is preserved"],a:2,r:"Large rotator cuff tear (complete/full-thickness): the tear disrupts the force-coupling mechanism — the patient cannot initiate or maintain active abduction despite passive movement being possible (the joint itself is intact). Positive DROP ARM TEST: arm passively abducted to 90 degrees, then released — arm falls to the side without the patient being able to control it. Distinguishes large tears from partial tears or impingement (pain limits function but some strength remains). MRI confirms size, location, and degree of retraction/fatty infiltration. Treatment: for large symptomatic tears — surgical repair (especially in younger, active patients); physical therapy for cuff strengthening in older/less active patients; corticosteroid injection for pain."},
{c:"Osteoporosis — Secondary",q:"A 45-year-old man is found to have a DEXA T-score of -2.8. He has no risk factors for primary osteoporosis. Per best practice, what should be done?",o:["Start bisphosphonate immediately — T-score alone is sufficient to treat","No treatment needed — osteoporosis is a women's disease","Evaluate for SECONDARY causes of osteoporosis: hypogonadism, hypercortisolism, hyperparathyroidism, vitamin D deficiency, malabsorption (celiac), multiple myeloma, medications (corticosteroids, aromatase inhibitors, anticonvulsants, PPIs)","Reassure — T-scores in men are never meaningful"],a:2,r:"Secondary osteoporosis: in younger patients (especially men), osteoporosis is more likely due to a secondary cause than primary age-related bone loss. Evaluation: CBC, CMP (calcium, phosphate, alkaline phosphatase), 25-OH vitamin D, 24-hour urine calcium, TSH, testosterone (men), PTH, SPEP (rule out myeloma). Common secondary causes: glucocorticoid use (most common drug-related), hypogonadism (testosterone/estrogen deficiency), hyperparathyroidism, hyperthyroidism, vitamin D deficiency, celiac disease (malabsorption), chronic alcohol use, anorexia, IBD, renal disease. Treat the underlying cause + standard osteoporosis therapy. Do not simply start bisphosphonate without identifying the cause in an atypical patient."},
{c:"Shoulder",q:"A 65-year-old male presents with sudden severe shoulder pain and cannot actively abduct the shoulder. Passive ROM is full and painless. Plain X-ray shows calcific deposits within the supraspinatus tendon. Likely diagnosis?",o:["Adhesive capsulitis — calcification is incidental","Septic arthritis of the glenohumeral joint","Calcific tendinitis — calcium hydroxyapatite deposition within the rotator cuff tendon; acute presentations are extremely painful; treatment: NSAIDs and PT; needling/lavage or corticosteroid injection for refractory cases","Osteosarcoma of the proximal humerus — urgent biopsy"],a:2,r:"Calcific tendinitis: calcium hydroxyapatite crystal deposition within the rotator cuff tendons (supraspinatus most common). Acute resorptive phase: exquisitely painful (calcium transforms to a toothpaste-like consistency and causes intense local inflammatory reaction). X-ray: calcific deposits within the rotator cuff (may be incidental if calcification is in chronic/dormant phase). Treatment: acute phase = NSAIDs, rest, ice, PT; if inadequate: ultrasound-guided needling and lavage (barbotage — breaking up the calcification) with or without corticosteroid injection; extracorporeal shockwave therapy; surgical removal rarely needed. Most resolve spontaneously over months to years."},
{c:"Neck Pain",q:"A 45-year-old rear-end collision victim has neck pain and headaches since the accident 3 days ago. Neurological exam is normal. Cervical spine X-ray shows no fracture. Diagnosis and first-line management?",o:["Cervical fracture — CT scan urgently","Whiplash-associated disorder — collar immobilization for 6 weeks","Whiplash-associated disorder — EARLY MOBILIZATION and active physical therapy; cervical collars are NOT recommended for more than a brief period; prognosis is generally good but delayed recovery risk with prolonged immobilization","Malingering — no objective findings on exam"],a:2,r:"Whiplash-associated disorder (WAD): soft tissue neck injury from rapid acceleration-deceleration. Symptoms: neck pain, stiffness, headache, dizziness, arm pain/tingling. Management: contrary to older practice, prolonged cervical collar use is HARMFUL — it leads to muscle weakness, fear-avoidance behavior, and delayed recovery. Current evidence-based management: EARLY ACTIVE MOBILIZATION + physical therapy (stretching, strengthening, ROM exercises), NSAIDs for pain, gradual return to normal activities. Most WAD patients (WAD grades I-II) recover within 3-6 months. Identify red flags: neurological deficits, fracture on imaging, severe pain — warrant advanced imaging and orthopedic/neurosurgical consultation."},
{c:"MSK — Medications",q:"A patient with severe RA has failed methotrexate. She is started on adalimumab (a TNF inhibitor). Prior to initiating biologic therapy, which screening test is MANDATORY?",o:["Annual mammogram — biologics increase breast cancer risk","Renal function panel — TNF inhibitors are nephrotoxic","Tuberculosis screening (TST or IGRA) — TNF inhibitors reactivate latent TB; if positive latent TB is identified, treat with INH for 9 months before starting the biologic","Bone marrow biopsy — myelosuppression risk"],a:2,r:"Pre-biologic screening is MANDATORY before initiating TNF inhibitors (adalimumab, etanercept, infliximab, certolizumab, golimumab): (1) TB screening: TST or interferon-gamma release assay (IGRA — preferred in BCG-vaccinated patients); if positive LTBI: treat with 9 months INH (or rifampin 4 months) and begin biologic after at least 1-2 months of LTBI treatment; (2) Hepatitis B surface antigen (HBsAg) and antibody: biologics can reactivate chronic HBV; (3) Hepatitis C: screen; (4) Assess for active infections; (5) Update vaccines BEFORE starting biologic (live vaccines contraindicated DURING biologic therapy). Patients on TNF inhibitors have significantly increased risk of TB, fungal infections, and bacterial infections — counsel accordingly."},
{c:"MSK — Imaging",q:"A 30-year-old presents with chronic low back pain for 6 months, no neurological deficits, and no red flags. She requests an MRI to 'see what's wrong.' Which response is most appropriate?",o:["Order MRI immediately — all chronic LBP requires imaging","Order X-ray first, then MRI if abnormal","MRI is not indicated for non-specific chronic LBP without red flags — imaging findings frequently do NOT correlate with symptoms; 60-80% of asymptomatic adults have disc bulges or degenerative changes on MRI; reassure, continue active rehabilitation","CT scan first — MRI is too expensive for initial evaluation"],a:2,r:"Imaging in chronic low back pain: guidelines consistently recommend AGAINST routine imaging for non-specific LBP without red flags. Reason: 60-80% of asymptomatic adults have disc bulges, herniations, or degenerative changes on MRI — 'incidentalomas' that lead to overtreatment, unnecessary procedures, and disability behavior. Imaging is indicated for: red flags (cancer, infection, fracture, cauda equina, progressive neuro deficit), consideration of surgical or interventional treatment, or after 4-6 weeks of failed conservative treatment with progressive symptoms. Active rehabilitation (PT, exercise, CBT) is superior to passive treatment (rest, imaging-driven treatment). Discussing the 'MRI paradox' with patients builds trust and guides appropriate care."},
{c:"Knee",q:"A 16-year-old basketball player has anterior knee pain that is worse going up/down stairs and after prolonged sitting. The pain is reproduced by compressing the patella against the femur with downward pressure (positive Clarke's test). There is no effusion. Diagnosis?",o:["ACL tear — most common in teenage athletes","Meniscal tear — McMurray test would be positive","Patellofemoral pain syndrome (PFPS) — anterior knee pain with activity, worse on stairs and prolonged sitting, positive patella compression test; treat with quadriceps (especially VMO) and hip abductor strengthening","Osgood-Schlatter disease — tibial tubercle tenderness is the hallmark"],a:2,r:"Patellofemoral pain syndrome (PFPS): most common cause of anterior knee pain in adolescents and young adults, especially females. Mechanism: malalignment of the patella → abnormal contact forces on articular cartilage. Positive Clarke's test (patellar grind). Symptoms worse with stairs, squatting, prolonged sitting ('movie-goer's sign'). NO effusion (distinguishes from true intra-articular pathology). Treatment: PT focusing on quadriceps strengthening (especially VMO — vastus medialis obliquus) and hip abductor/external rotator strengthening, patellar taping or bracing, activity modification. Osgood-Schlatter: tibial tubercle tenderness + apophyseal swelling in adolescent growth spurts."},
{c:"MSK — Red Flags",q:"A 68-year-old male with a history of prostate cancer presents with new thoracic back pain that is constant, unrelenting, worse at night, and not relieved by position change. He denies trauma. Which is the MOST important next step?",o:["Prescribe muscle relaxants and heat — back pain is common in elderly","Schedule routine follow-up in 4 weeks","Urgent MRI spine — cancer history + new constant back pain unrelieved by rest/position = spinal metastasis until proven otherwise; consider also CBC, ESR, alkaline phosphatase, PSA","Full-course physiotherapy first — imaging is not needed for 3 months"],a:2,r:"Metastatic spinal disease red flags: constant back pain that is WORSE AT NIGHT, UNRELIEVED BY REST (mechanical pain is relieved by rest), history of malignancy (any cancer can metastasize to spine — lung, breast, prostate, kidney, and thyroid most common). Other red flags: unexplained weight loss, fever, immunosuppression, IV drug use (infection), age >50 with new LBP. Urgent MRI spine is the standard for suspected spinal metastasis. Prostate cancer specifically: bony metastases are osteoblastic (sclerotic on X-ray, 'hot' on bone scan). PSA, alkaline phosphatase, CBC, and bone scan may help but MRI detects cord compression earliest. Cord compression = neurosurgical emergency."},
{c:"MSK — Injections",q:"A patient with knee OA has moderate pain despite NSAIDs and physical therapy. Intra-articular corticosteroid injection is offered. Which counseling point is MOST important?",o:["Injections can be given indefinitely without limitation","Corticosteroid injections cure knee OA permanently","Intra-articular corticosteroids provide SHORT-TERM pain relief (weeks to 3 months); no more than 3-4 injections per joint per year; repeated injections may accelerate cartilage loss and increase infection risk","Pain relief begins within minutes — activity should resume immediately after injection"],a:2,r:"Intra-articular corticosteroid injections for knee OA: short-term pain and inflammation relief — typically 4-12 weeks of benefit. Limitations: no long-term disease modification; more than 3-4 injections per year in the same joint may accelerate cartilage loss (ACR 2019: conditionally recommends for knee OA but acknowledges cartilage concerns with repeated use). Post-injection: rest the joint for 24-48 hours, avoid strenuous activity same day. Infection risk: very low (~1 in 15,000) but real — use sterile technique, avoid injecting infected skin. Glucose: corticosteroid injections can transiently raise blood glucose (up to 72 hours) — counsel diabetic patients and advise blood glucose monitoring. Hyaluronic acid: ACR conditionally recommends AGAINST (insufficient evidence for meaningful benefit)."},
{c:"MSK — Special Populations",q:"A 75-year-old woman on prednisone 10 mg daily for 3 years for polymyalgia rheumatica develops back pain. X-ray shows compression fractures at T10 and L1. What is the most important preventive measure that should have been implemented when prednisone was started?",o:["Aspirin — prevents cardiovascular complications of steroids","Calcium and vitamin D supplementation only — sufficient for fracture prevention","Calcium + vitamin D + bisphosphonate therapy — glucocorticoid-induced osteoporosis (GIOP) is the most common secondary osteoporosis; bisphosphonate started with any patient taking ≥2.5 mg/day prednisone for ≥3 months who has a fracture risk (FRAX ≥10% or any prior fracture)","No prevention needed — these fractures are from PMR itself, not prednisone"],a:2,r:"Glucocorticoid-induced osteoporosis (GIOP): most common cause of secondary osteoporosis. Mechanism: glucocorticoids suppress osteoblasts, increase osteoclast activity, decrease calcium absorption, and reduce sex hormones. Prevention: START bisphosphonate therapy for ANY patient requiring ≥2.5 mg/day prednisone for ≥3 months who has moderate-high fracture risk (FRAX ≥10% or prior fragility fracture, or DEXA T-score ≤-2.5). ALL patients on chronic steroids: calcium 1000-1200 mg/day + vitamin D 600-800 IU/day. DEXA at baseline and every 1-2 years. Antiresorptive therapy significantly reduces vertebral fracture risk in GIOP. This is a major, preventable cause of morbidity."},
{c:"MSK — Hand",q:"A 62-year-old has pain and bony enlargement at the DIP joints of both hands. Exam shows Heberden's nodes. X-ray shows joint space narrowing and osteophytes at the DIPs. Which joints are typically spared in osteoarthritis of the hand?",o:["DIP joints — these are the most protected in OA","MCP joints — OA of the hand classically SPARES the MCPs; this helps distinguish it from RA (which affects MCPs and PIPs, sparing DIPs)","Wrist joints — OA never affects the wrist","CMC joints of the thumb — basal thumb OA never occurs"],a:1,r:"Hand OA joint pattern: DIP joints (Heberden's nodes) and PIP joints (Bouchard's nodes) are classically affected. The FIRST CMC joint (basal thumb OA — trapeziometacarpal) is also very commonly affected and is often the most functionally limiting. MCPs are typically SPARED in primary hand OA. This is a key distinguishing feature: RA = MCPs + PIPs (symmetric), spares DIPs; OA = DIPs + PIPs + first CMC, spares MCPs. Radiographic OA: joint space narrowing + osteophytes (bone spurs) + subchondral sclerosis + subchondral cysts. Treatment: topical diclofenac, hand PT, splinting the first CMC, ergonomic adaptations, corticosteroid injection for CMC OA; surgical joint fusion or arthroplasty for severe CMC OA."},
{c:"MSK — Emergencies",q:"A 22-year-old skateboarder has a painful, swollen knee after a fall. Aspiration yields frank blood (hemarthrosis). What diagnoses should be considered, and what is the next step?",o:["Hemarthrosis only occurs in hemophilia — order clotting studies only","This is always from a ruptured baker's cyst — no further workup needed","Traumatic hemarthrosis strongly suggests intra-articular injury: ACL tear (most common cause), peripheral meniscal tear, osteochondral fracture, or tibial plateau fracture — MRI is indicated for further evaluation; drain the joint for symptomatic relief","Aspirate and start IV antibiotics immediately"],a:2,r:"Traumatic hemarthrosis: blood in the joint space after trauma. In the knee, hemarthrosis after acute injury is strongly suggestive of significant intra-articular damage: ACL tear (~70% of traumatic hemarthroses), peripheral meniscal tear with vascular supply, osteochondral fracture, tibial plateau fracture, or patellar dislocation. Aspiration provides diagnostic information (fat droplets in blood = intra-articular fracture) and symptomatic relief. MRI is the gold standard for evaluating all intra-articular structures — indicated for traumatic knee hemarthrosis to guide management. Non-traumatic hemarthrosis: consider hemophilia, anticoagulation, pigmented villonodular synovitis (PVNS), or septic arthritis with bleeding."},
{c:"MSK — Imaging",q:"Which MSK imaging modality is most sensitive and specific for detecting early osteomyelitis before X-ray changes appear (X-ray changes take 7-14 days)?",o:["Plain X-ray — always the first test","CT scan — superior to MRI for soft tissue detail","MRI with and without gadolinium contrast — most sensitive (90%+) and specific for osteomyelitis; detects bone marrow edema within 24-48 hours of infection","Bone scan — preferred over MRI in all cases"],a:2,r:"Osteomyelitis imaging: Plain X-ray: insensitive early — changes (periosteal elevation, lytic lesions) take 7-14 days to appear. MRI with gadolinium: GOLD STANDARD — most sensitive and specific; detects marrow edema and soft tissue involvement within 24-48 hours; also differentiates osteomyelitis from Charcot arthropathy and cellulitis. Technetium bone scan: highly sensitive but not specific (positive in fracture, malignancy, normal bone turnover); useful when MRI is contraindicated (pacemaker, severe claustrophobia). CT: better for evaluating cortical destruction and sequestrum; lower soft tissue contrast than MRI. Indium-labeled WBC scan: useful for chronic or post-surgical osteomyelitis. PET scan: emerging role in chronic osteomyelitis."}
,
{c:"MSK — Pharmacology",q:"A 70-year-old with knee OA, CKD stage 3 (eGFR 42), and hypertension has pain inadequately controlled with acetaminophen. NSAIDs are relatively contraindicated. Which is the MOST appropriate next pharmacologic option?",o:["Full-dose ibuprofen — most effective for OA pain","Opioids — safest option in CKD","Topical diclofenac 1% gel — minimal systemic absorption, effective for knee OA pain, avoids systemic NSAID risks in CKD and cardiovascular disease","Celecoxib — always safe in CKD"],a:2,r:"OA pain management in CKD: Topical NSAIDs (diclofenac 1% gel — Voltaren) are ACR preferred for knee and hand OA — highly effective for superficial joints with minimal systemic absorption (<5% vs oral), negligible renal/cardiovascular effects, and no GI risk. This is the optimal choice for patients with CKD, hypertension, or GI risk where oral NSAIDs are problematic. Oral NSAIDs (including COX-2 inhibitors like celecoxib): cause sodium retention, reduce renal prostaglandins → AKI risk in CKD, worsen hypertension — use with caution or avoid when eGFR <30. Duloxetine: effective for chronic OA pain as a non-NSAID alternative. Opioids: significant risks (falls, constipation, dependence) — avoid in elderly OA if possible. Intra-articular corticosteroids: useful adjunct."}
];

const N = QUESTIONS.length;
let idx = 0;
let answers = new Array(N).fill(null); // selected option index
const LETTERS = ["A","B","C","D"];

const strip = document.getElementById("strip");
const qcard = document.getElementById("qcard");
const resultsCard = document.getElementById("results");

function buildStrip(){
  strip.innerHTML = "";
  for(let i=0;i<N;i++){
    const t = document.createElement("div");
    t.className = "tick";
    t.title = "Question " + (i+1);
    t.addEventListener("click", ()=>{ idx = i; render(); });
    strip.appendChild(t);
  }
}
function paintStrip(){
  const ticks = strip.children;
  for(let i=0;i<N;i++){
    const t = ticks[i];
    t.className = "tick";
    if(answers[i] !== null){
      t.classList.add(answers[i] === QUESTIONS[i].a ? "ok" : "bad");
    }
    if(i === idx && !resultsVisible()) t.classList.add("cur");
  }
}
function resultsVisible(){ return !resultsCard.classList.contains("hide"); }

function counts(){
  let done=0, right=0;
  for(let i=0;i<N;i++){
    if(answers[i]!==null){ done++; if(answers[i]===QUESTIONS[i].a) right++; }
  }
  return {done,right};
}
function paintScore(){
  const {done,right} = counts();
  document.getElementById("sc-done").textContent = done;
  document.getElementById("sc-right").textContent = right;
}

function render(){
  resultsCard.classList.add("hide");
  qcard.classList.remove("hide");
  const Q = QUESTIONS[idx];
  const picked = answers[idx];
  let html = "";
  html += '<div class="meta"><span class="qnum">QUESTION ' + (idx+1) + ' / ' + N + '</span><span class="chip">' + Q.c + '</span></div>';
  html += '<p class="stem">' + Q.q + '</p>';
  Q.o.forEach((opt,i)=>{
    let cls = "opt";
    if(picked !== null){
      if(i === picked && picked === Q.a) cls += " sel-ok";
      else if(i === picked) cls += " sel-bad";
      else if(i === Q.a) cls += " reveal-ok";
    }
    html += '<button class="'+cls+'" data-i="'+i+'" '+(picked!==null?"disabled":"")+'><span class="ltr">'+LETTERS[i]+'</span><span>'+opt+'</span></button>';
  });
  if(picked !== null){
    const good = picked === Q.a;
    html += '<div class="verdict '+(good?"ok":"bad")+'">'+(good ? "Correct" : "Incorrect — answer is " + LETTERS[Q.a])+'</div>';
    html += '<div class="rationale">'+Q.r+'</div>';
  }
  html += '<div class="nav">';
  html += '<button class="btn ghost" id="prevBtn" '+(idx===0?"disabled":"")+'>Back</button>';
  if(idx < N-1){
    html += '<button class="btn" id="nextBtn">Next question</button>';
  } else {
    html += '<button class="btn" id="finishBtn">See results</button>';
  }
  html += '</div>';
  qcard.innerHTML = html;

  qcard.querySelectorAll(".opt").forEach(btn=>{
    btn.addEventListener("click", ()=>{
      if(answers[idx] !== null) return;
      answers[idx] = parseInt(btn.dataset.i,10);
      render();
    });
  });
  const prev = document.getElementById("prevBtn");
  if(prev) prev.addEventListener("click", ()=>{ idx--; render(); });
  const next = document.getElementById("nextBtn");
  if(next) next.addEventListener("click", ()=>{ idx++; render(); });
  const fin = document.getElementById("finishBtn");
  if(fin) fin.addEventListener("click", showResults);
  paintStrip(); paintScore();
}

function showResults(){
  const {done,right} = counts();
  const pct = done ? Math.round((right/done)*100) : 0;
  // category breakdown
  const cats = {};
  QUESTIONS.forEach((Q,i)=>{
    if(!cats[Q.c]) cats[Q.c] = {n:0, ok:0, ans:0};
    cats[Q.c].n++;
    if(answers[i]!==null){ cats[Q.c].ans++; if(answers[i]===Q.a) cats[Q.c].ok++; }
  });
  let html = '<div class="bigscore">'+right+' / '+done+' ('+pct+'%)</div>';
  html += '<p class="sub">'+(done<N ? (N-done)+' question'+(N-done===1?"":"s")+' unanswered — they are not counted against you. ' : '')+'A passing pace on the real ANCC is roughly the low-to-mid 70s percent range, so use this as a directional gauge, not a verdict.</p>';
  html += '<h2 style="font-size:.95rem;margin-bottom:6px">By category</h2>';
  Object.keys(cats).forEach(c=>{
    const o = cats[c];
    const p = o.ans ? Math.round((o.ok/o.ans)*100) : 0;
    html += '<div class="catrow"><span style="flex:0 0 44%">'+c+'</span><span class="bar"><i style="width:'+(o.ans? p:0)+'%"></i></span><span style="font-family:var(--mono);font-size:.8rem">'+o.ok+'/'+o.ans+(o.ans<o.n?' of '+o.n:'')+'</span></div>';
  });
  // missed list
  const missed = [];
  for(let i=0;i<N;i++) if(answers[i]!==null && answers[i]!==QUESTIONS[i].a) missed.push(i);
  if(missed.length){
    html += '<div class="missedlist"><h2 style="font-size:.95rem;margin-bottom:8px">Review missed questions</h2>';
    missed.forEach(i=>{ html += '<button data-jump="'+i+'">Q'+(i+1)+'</button>'; });
    html += '</div>';
  }
  html += '<div class="nav"><button class="btn ghost" id="backBtn">Back to questions</button><button class="btn" id="resetBtn">Start over</button></div>';
  resultsCard.innerHTML = html;
  resultsCard.classList.remove("hide");
  qcard.classList.add("hide");
  resultsCard.querySelectorAll("[data-jump]").forEach(b=>{
    b.addEventListener("click", ()=>{ idx = parseInt(b.dataset.jump,10); render(); });
  });
  document.getElementById("backBtn").addEventListener("click", ()=>{ render(); });
  document.getElementById("resetBtn").addEventListener("click", ()=>{
    if(confirm("Clear all answers and start over?")){
      answers = new Array(N).fill(null); idx = 0; render();
    }
  });
  paintStrip(); paintScore();
}

buildStrip();
render();
</script>
