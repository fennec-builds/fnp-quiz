{c:"Eye — Allergic Conjunctivitis",q:"A 22-year-old with seasonal allergies has bilateral itchy, red, watery eyes with stringy mucoid discharge during pollen season. There is no pain or vision change. Diagnosis and first-line treatment?",o:["Bacterial conjunctivitis — topical antibiotics","Viral conjunctivitis — supportive care, highly contagious","Allergic conjunctivitis — bilateral, ITCHY (the hallmark), watery eyes with allergic history; first-line: topical antihistamine/mast-cell stabilizer drops (e.g., olopatadine, ketotifen); allergen avoidance, cool compresses, artificial tears; oral antihistamines for systemic allergy symptoms","Anterior uveitis — topical steroids and cycloplegics"],a:2,r:"Allergic conjunctivitis: IgE-mediated hypersensitivity (often seasonal — pollen, or perennial — dust mites, dander). Hallmark: ITCHING (the most distinguishing symptom — 'if it itches, think allergy'), BILATERAL involvement, watery/stringy mucoid discharge, conjunctival redness and chemosis (swelling), often with other allergic symptoms (allergic rhinitis, atopy history). No pain, no vision change, normal pupils. First-line treatment: topical OCULAR ANTIHISTAMINE/MAST CELL STABILIZER drops (dual-action agents — olopatadine, ketotifen, azelastine — preferred for both immediate and preventive effect); allergen avoidance; COOL compresses; artificial tears (dilute/wash out allergens). Add oral antihistamines (cetirizine, loratadine) for concurrent systemic allergy symptoms. Avoid topical decongestant/vasoconstrictor drops long-term (rebound). Topical corticosteroids only for severe cases under ophthalmology guidance (cataract/glaucoma/infection risks). Key differentiators: ITCHING + BILATERAL + allergic history = allergic; PURULENT discharge = bacterial; WATERY + URI + contagious + preauricular node = viral."},
{c:"Throat — Laryngopharyngeal Reflux",q:"A 50-year-old has chronic throat clearing, a globus sensation ('lump in the throat'), hoarseness, and a chronic cough, but NO classic heartburn. Laryngoscopy shows posterior laryngeal erythema and edema. Diagnosis and management?",o:["Asthma — inhaled corticosteroids","Allergic rhinitis with postnasal drip — intranasal steroids only","Laryngopharyngeal reflux (LPR, 'silent reflux') — extraesophageal reflux causing throat symptoms often WITHOUT heartburn; management: lifestyle/dietary modification and a trial of PPIs (often twice daily for a longer course than typical GERD); address vocal hygiene","Vocal cord cancer — biopsy first-line for all hoarseness"],a:2,r:"Laryngopharyngeal reflux (LPR, 'silent reflux' or extraesophageal reflux): retrograde flow of gastric contents reaching the larynx/pharynx. KEY FEATURE: causes throat/laryngeal symptoms often WITHOUT the classic heartburn of GERD (hence 'silent'). Symptoms: chronic THROAT CLEARING, GLOBUS sensation ('lump in the throat'), HOARSENESS/dysphonia, chronic COUGH, postnasal drip sensation, sore throat, mild dysphagia. Laryngoscopy: posterior laryngeal erythema, edema, and 'cobblestoning.' Management: (1) LIFESTYLE/DIETARY modification — weight loss, avoid late meals (no eating 2-3 hours before bed), elevate the head of the bed, reduce caffeine/alcohol/acidic/fatty/spicy foods, smoking cessation; (2) Empiric trial of PPIs — often TWICE DAILY and for a LONGER course (2-3+ months) than typical GERD, as laryngeal tissue is more sensitive and slower to heal; (3) Vocal hygiene (hydration, reduce throat clearing). NOTE: persistent hoarseness >2-3 weeks (especially in smokers/drinkers) still warrants laryngoscopy to exclude malignancy before attributing solely to LPR."}
];

const N = QUESTIONS.length;
let idx = 0;
let answers = new Array(N).fill(null); // selected option index
const LETTERS = ["A","B","C","D"];

const strip = document.getElementById("strip");
const qcard = document.getElementById("qcard");
const resultsCard = document.getElementById("results");

function buildStrip(){
  strip.innerHTML = "";
  for(let i=0;i<N;i++){
    const t = document.createElement("div");
    t.className = "tick";
    t.title = "Question " + (i+1);
    t.addEventListener("click", ()=>{ idx = i; render(); });
    strip.appendChild(t);
  }
}
function paintStrip(){
  const ticks = strip.children;
  for(let i=0;i<N;i++){
    const t = ticks[i];
    t.className = "tick";
    if(answers[i] !== null){
      t.classList.add(answers[i] === QUESTIONS[i].a ? "ok" : "bad");
    }
    if(i === idx && !resultsVisible()) t.classList.add("cur");
  }
}
function resultsVisible(){ return !resultsCard.classList.contains("hide"); }

function counts(){
  let done=0, right=0;
  for(let i=0;i<N;i++){
    if(answers[i]!==null){ done++; if(answers[i]===QUESTIONS[i].a) right++; }
  }
  return {done,right};
}
function paintScore(){
  const {done,right} = counts();
  document.getElementById("sc-done").textContent = done;
  document.getElementById("sc-right").textContent = right;
}

function render(){
  resultsCard.classList.add("hide");
  qcard.classList.remove("hide");
  const Q = QUESTIONS[idx];
  const picked = answers[idx];
  let html = "";
  html += '<div class="meta"><span class="qnum">QUESTION ' + (idx+1) + ' / ' + N + '</span><span class="chip">' + Q.c + '</span></div>';
  html += '<p class="stem">' + Q.q + '</p>';
  Q.o.forEach((opt,i)=>{
    let cls = "opt";
    if(picked !== null){
      if(i === picked && picked === Q.a) cls += " sel-ok";
      else if(i === picked) cls += " sel-bad";
      else if(i === Q.a) cls += " reveal-ok";
    }
    html += '<button class="'+cls+'" data-i="'+i+'" '+(picked!==null?"disabled":"")+'><span class="ltr">'+LETTERS[i]+'</span><span>'+opt+'</span></button>';
  });
  if(picked !== null){
    const good = picked === Q.a;
    html += '<div class="verdict '+(good?"ok":"bad")+'">'+(good ? "Correct" : "Incorrect — answer is " + LETTERS[Q.a])+'</div>';
    html += '<div class="rationale">'+Q.r+'</div>';
  }
  html += '<div class="nav">';
  html += '<button class="btn ghost" id="prevBtn" '+(idx===0?"disabled":"")+'>Back</button>';
  if(idx < N-1){
    html += '<button class="btn" id="nextBtn">Next question</button>';
  } else {
    html += '<button class="btn" id="finishBtn">See results</button>';
  }
  html += '</div>';
  qcard.innerHTML = html;

  qcard.querySelectorAll(".opt").forEach(btn=>{
    btn.addEventListener("click", ()=>{
      if(answers[idx] !== null) return;
      answers[idx] = parseInt(btn.dataset.i,10);
      render();
    });
  });
  const prev = document.getElementById("prevBtn");
  if(prev) prev.addEventListener("click", ()=>{ idx--; render(); });
  const next = document.getElementById("nextBtn");
  if(next) next.addEventListener("click", ()=>{ idx++; render(); });
  const fin = document.getElementById("finishBtn");
  if(fin) fin.addEventListener("click", showResults);
  paintStrip(); paintScore();
}

function showResults(){
  const {done,right} = counts();
  const pct = done ? Math.round((right/done)*100) : 0;
  // category breakdown
  const cats = {};
  QUESTIONS.forEach((Q,i)=>{
    if(!cats[Q.c]) cats[Q.c] = {n:0, ok:0, ans:0};
    cats[Q.c].n++;
    if(answers[i]!==null){ cats[Q.c].ans++; if(answers[i]===Q.a) cats[Q.c].ok++; }
  });
  let html = '<div class="bigscore">'+right+' / '+done+' ('+pct+'%)</div>';
  html += '<p class="sub">'+(done<N ? (N-done)+' question'+(N-done===1?"":"s")+' unanswered — they are not counted against you. ' : '')+'A passing pace on the real ANCC is roughly the low-to-mid 70s percent range, so use this as a directional gauge, not a verdict.</p>';
  html += '<h2 style="font-size:.95rem;margin-bottom:6px">By category</h2>';
  Object.keys(cats).forEach(c=>{
    const o = cats[c];
    const p = o.ans ? Math.round((o.ok/o.ans)*100) : 0;
    html += '<div class="catrow"><span style="flex:0 0 44%">'+c+'</span><span class="bar"><i style="width:'+(o.ans? p:0)+'%"></i></span><span style="font-family:var(--mono);font-size:.8rem">'+o.ok+'/'+o.ans+(o.ans<o.n?' of '+o.n:'')+'</span></div>';
  });
  // missed list
  const missed = [];
  for(let i=0;i<N;i++) if(answers[i]!==null && answers[i]!==QUESTIONS[i].a) missed.push(i);
  if(missed.length){
    html += '<div class="missedlist"><h2 style="font-size:.95rem;margin-bottom:8px">Review missed questions</h2>';
    missed.forEach(i=>{ html += '<button data-jump="'+i+'">Q'+(i+1)+'</button>'; });
    html += '</div>';
  }
  html += '<div class="nav"><button class="btn ghost" id="backBtn">Back to questions</button><button class="btn" id="resetBtn">Start over</button></div>';
  resultsCard.innerHTML = html;
  resultsCard.classList.remove("hide");
  qcard.classList.add("hide");
  resultsCard.querySelectorAll("[data-jump]").forEach(b=>{
    b.addEventListener("click", ()=>{ idx = parseInt(b.dataset.jump,10); render(); });
  });
  document.getElementById("backBtn").addEventListener("click", ()=>{ render(); });
  document.getElementById("resetBtn").addEventListener("click", ()=>{
    if(confirm("Clear all answers and start over?")){
      answers = new Array(N).fill(null); idx = 0; render();
    }
  });
  paintStrip(); paintScore();
}

buildStrip();
render();
</script>
</body>
</html>
