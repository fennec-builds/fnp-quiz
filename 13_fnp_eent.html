<style>
  :root{
    --bg:#F2F5F7; --card:#FFFFFF; --ink:#14283A; --muted:#5B6B7A;
    --teal:#0E7C86; --teal-dk:#0A5A62; --line:#DEE6EB;

  *{box-sizing:border-box;margin:0;padding:0}

    background:var(--bg); color:var(--ink);

  .score{font-family:var(--mono);font-size:.85rem;color:var(--muted)}

  .striplabel{font-family:var(--mono);font-size:.62rem;letter-spacing:.14em;color:var(--muted);margin:14px 0 5px}
  .strip{display:flex;gap:2px;flex-wrap:nowrap;border-bottom:1px solid var(--line);padding-bottom:10px}

  .chip{font-size:.68rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--teal-dk);background:#E3F1F2;border-radius:999px;padding:3px 10px}
  .stem{font-size:1.02rem;margin-bottom:18px}
  .opt{
    display:flex;gap:12px;align-items:flex-start;width:100%;text-align:left;
    background:#FAFCFD;border:1.5px solid var(--line);border-radius:10px;

  /* results */

    border:1px solid #E8C2BE;border-radius:8px;padding:6px 10px;margin:0 6px 6px 0;cursor:pointer;
  }

  @media (prefers-reduced-motion: reduce){ *{transition:none !important} }
  @media (max-width:480px){ .card{padding:16px} .strip{gap:1px} }

<script>
const QUESTIONS = [
{c:"Eye — Red Eye",q:"A 25-year-old has a unilateral red eye with watery discharge, a gritty sensation, and a recent upper respiratory infection. Vision is normal, no photophobia, and the other eye became involved 2 days later. Diagnosis and management?",o:["Bacterial conjunctivitis — topical antibiotics required","Acute angle-closure glaucoma — emergent referral","Viral conjunctivitis — most common cause of infectious conjunctivitis; supportive care (cool compresses, artificial tears); highly contagious — emphasize hand hygiene; usually self-limited in 1-2 weeks; antibiotics are NOT indicated","Anterior uveitis — topical steroids"],a:2,r:"Viral conjunctivitis: most common cause of infectious conjunctivitis (usually adenovirus). Features: WATERY discharge, gritty/burning sensation, often follows or accompanies a URI, frequently starts unilateral then spreads to the other eye, preauricular lymphadenopathy may be present. Normal vision, no significant photophobia. Highly CONTAGIOUS — meticulous hand hygiene, avoid sharing towels, stay home from work/school during the acute phase. Treatment: supportive only — cool compresses, artificial tears, antihistamine drops if itchy. Antibiotics are NOT indicated (it's viral). Bacterial conjunctivitis: PURULENT (thick, colored) discharge, eyelids stuck shut in the morning → topical antibiotics (erythromycin, trimethoprim-polymyxin). Allergic: bilateral, ITCHY, watery, with allergic history → antihistamine/mast cell stabilizer drops."},
{c:"Eye — Emergencies",q:"A 62-year-old presents with sudden severe right eye pain, blurred vision with halos around lights, a fixed mid-dilated pupil, a 'steamy' cornea, headache, and nausea/vomiting. Diagnosis and immediate action?",o:["Conjunctivitis — topical antibiotics","Migraine — sumatriptan","Acute angle-closure glaucoma — OPHTHALMOLOGIC EMERGENCY; sudden rise in intraocular pressure; emergent referral for IOP-lowering treatment (topical beta-blocker, alpha-agonist, pilocarpine, oral/IV acetazolamide, hyperosmotics) and definitive laser peripheral iridotomy; delay risks permanent vision loss","Cluster headache — high-flow oxygen"],a:2,r:"Acute angle-closure glaucoma: ophthalmologic EMERGENCY — sudden blockage of aqueous outflow → rapid rise in intraocular pressure (IOP). Presentation: acute severe unilateral eye pain, blurred vision, HALOS around lights, a fixed MID-DILATED non-reactive pupil, 'steamy'/hazy cornea, conjunctival injection, headache, nausea/vomiting (may mimic GI or neuro emergency). Often precipitated by dim light (pupil dilation), stress, or certain medications (anticholinergics, sympathomimetics, decongestants). Immediate management: emergent ophthalmology referral; IOP-lowering: topical timolol (beta-blocker), apraclonidine/brimonidine (alpha-agonist), pilocarpine (miotic), oral/IV acetazolamide (reduces aqueous production), IV mannitol (hyperosmotic). Definitive treatment: laser peripheral iridotomy. Delay → permanent optic nerve damage and vision loss. Contrast with open-angle glaucoma (chronic, painless, gradual peripheral vision loss)."},
{c:"Eye — Vision Loss",q:"A 70-year-old with atrial fibrillation has sudden, painless, complete vision loss in one eye. Fundoscopy shows a pale retina with a 'cherry-red spot' at the macula. Diagnosis?",o:["Retinal detachment — flashes and floaters precede","Open-angle glaucoma — gradual peripheral loss","Central retinal artery occlusion (CRAO) — sudden painless monocular vision loss, pale retina with cherry-red spot; an ocular 'stroke' — emergent ophthalmology; evaluate for embolic source (carotid, cardiac); time-sensitive (irreversible after ~90-240 minutes)","Cataract — gradual clouding of vision"],a:2,r:"Central retinal artery occlusion (CRAO): an ocular emergency — the 'stroke of the eye.' SUDDEN, PAINLESS, complete (or severe) monocular vision loss. Fundoscopy: pale/whitened retina (ischemia) with a CHERRY-RED SPOT at the macula (the fovea is supplied by the choroid and retains color against the pale background). Causes: embolism (carotid atherosclerosis, cardiac — atrial fibrillation), giant cell arteritis (must check ESR/CRP in older patients — vision in the OTHER eye is at risk), thrombosis. Time-sensitive: retinal damage becomes irreversible after ~90-240 minutes. Emergent ophthalmology. Acute attempts (limited evidence): ocular massage, IOP-lowering, high-flow oxygen, anterior chamber paracentesis. Critical: workup the embolic source (carotid ultrasound, echo, ECG) and manage stroke risk — CRAO is a stroke-equivalent. Central retinal VEIN occlusion (CRVO): 'blood and thunder' fundus (diffuse hemorrhages), less acute, variable vision loss."},
{c:"Eye — Sudden",q:"A 60-year-old myopic patient reports sudden onset of floaters, flashes of light (photopsia), and then a 'curtain or shadow' descending over part of the visual field. Diagnosis and action?",o:["Migraine aura — observe and reassure","Vitreous floaters — benign, no action needed","Retinal detachment — flashes (photopsia) + new floaters + a curtain/shadow over the visual field; URGENT ophthalmology referral for evaluation and surgical repair; risk factors include high myopia, prior cataract surgery, trauma, and age","Dry eye syndrome — artificial tears"],a:2,r:"Retinal detachment: separation of the neurosensory retina from the underlying retinal pigment epithelium. Classic symptoms: sudden onset of FLASHES of light (photopsia — from retinal traction), a shower of new FLOATERS, and a 'CURTAIN' or shadow progressing across the visual field (as detachment extends). Painless. Risk factors: high MYOPIA (most important), increasing age, prior cataract surgery, eye trauma, family history, prior detachment in the other eye. URGENT ophthalmology referral — a 'macula-on' detachment (central vision still intact) requires emergent repair to save central vision; surgical options include laser, cryopexy, pneumatic retinopexy, scleral buckle, or vitrectomy. Any patient with new flashes + floaters needs a dilated retinal exam to rule out a tear/detachment. New floaters alone (posterior vitreous detachment) still warrant prompt exam to exclude a retinal tear."},
{c:"Eye — Inflammation",q:"A 35-year-old with a history of ankylosing spondylitis presents with a painful red eye, photophobia, blurred vision, and a small, irregular pupil. The redness is most prominent around the cornea (ciliary flush). Diagnosis?",o:["Bacterial conjunctivitis — purulent discharge","Acute angle-closure glaucoma — fixed mid-dilated pupil","Anterior uveitis (iritis) — painful red eye with photophobia, ciliary flush (perilimbal injection), and a small/irregular pupil; associated with HLA-B27 conditions (ankylosing spondylitis, IBD, reactive arthritis); requires prompt ophthalmology referral and topical steroids + cycloplegics","Subconjunctival hemorrhage — painless"],a:2,r:"Anterior uveitis (iritis): inflammation of the iris/anterior chamber. Features: painful red eye, PHOTOPHOBIA (often the predominant complaint), blurred vision, CILIARY FLUSH (perilimbal injection — redness concentrated around the cornea), a small/constricted or irregular pupil, and cells/flare in the anterior chamber on slit-lamp exam. Associations: HLA-B27-related conditions (ankylosing spondylitis, reactive arthritis, IBD, psoriatic arthritis), sarcoidosis, infections (herpes, syphilis, TB), trauma. Management: urgent ophthalmology referral; topical corticosteroids (reduce inflammation) and cycloplegic/mydriatic drops (cyclopentolate — relieve pain from ciliary spasm and prevent synechiae). Workup for systemic association if recurrent/bilateral. The painful red eye with photophobia + ciliary flush + small pupil distinguishes uveitis from conjunctivitis (painless, discharge, normal pupil) and angle-closure glaucoma (mid-dilated pupil, very high IOP)."},
{c:"Eye — Eyelid",q:"A 45-year-old has a tender, red, swollen lump at the eyelid margin that developed over a few days, pointing toward a hair follicle. Vision and eye movements are normal. Diagnosis and first-line management?",o:["Chalazion — requires surgical excision immediately","Orbital cellulitis — IV antibiotics and CT","Hordeolum (stye) — acute localized infection of an eyelid gland (usually Staphylococcus); first-line: warm compresses several times daily; most resolve spontaneously; topical antibiotics if draining or conjunctivitis; incision and drainage if it does not resolve","Basal cell carcinoma — biopsy"],a:2,r:"Hordeolum (stye): acute, painful, localized infection (usually Staphylococcus aureus) of an eyelid gland. External hordeolum: at the lid margin (infected eyelash follicle / gland of Zeis or Moll). Internal hordeolum: meibomian gland (points toward the conjunctival surface). Tender, red, swollen, may point/drain. First-line: WARM COMPRESSES several times daily (promotes drainage) — most resolve spontaneously within 1-2 weeks. Topical antibiotics if associated conjunctivitis or active drainage; incision and drainage if persistent. Chalazion: a CHRONIC, NON-tender, firm granulomatous nodule from a blocked meibomian gland (the painless, indolent counterpart) — warm compresses first-line; intralesional steroid or incision/curettage if persistent. Distinguish both from periorbital/orbital cellulitis (diffuse lid swelling, erythema; orbital = pain with eye movement, proptosis, vision changes — emergency)."},
{c:"Eye — Orbital",q:"A 7-year-old with recent sinusitis develops eyelid swelling, redness, PAIN WITH EYE MOVEMENT, proptosis (bulging eye), and double vision. There is fever. Which diagnosis requires emergent intervention and how does it differ from the milder form?",o:["Preseptal (periorbital) cellulitis — oral antibiotics outpatient","Conjunctivitis — topical antibiotics","Orbital (postseptal) cellulitis — EMERGENCY; pain with eye movement, proptosis, ophthalmoplegia, and vision changes distinguish it from preseptal cellulitis; requires CT orbits, IV antibiotics, and possible surgical drainage; risk of vision loss, cavernous sinus thrombosis, and intracranial spread","Allergic reaction — antihistamines"],a:2,r:"Orbital (postseptal) cellulitis vs preseptal (periorbital) cellulitis — a critical distinction: PRESEPTAL: infection ANTERIOR to the orbital septum (eyelid/skin only) — eyelid swelling and erythema, but NORMAL eye movement, NO proptosis, NO pain with movement, NORMAL vision. Treat with oral antibiotics (outpatient) in most cases. ORBITAL (postseptal): infection POSTERIOR to the septum (within the orbit) — EMERGENCY. Signs: PAIN WITH EYE MOVEMENT, PROPTOSIS (bulging), OPHTHALMOPLEGIA (restricted/painful eye movements), DIPLOPIA, decreased VISION, more systemic toxicity. Most common source: ethmoid SINUSITIS (especially in children). Management: CT orbits/sinuses with contrast, admission, IV broad-spectrum antibiotics (cover S. aureus including MRSA, Streptococcus, H. influenzae, anaerobes), ophthalmology + ENT consult, surgical drainage for abscess. Complications: vision loss, cavernous sinus thrombosis, subperiosteal/orbital abscess, intracranial extension (meningitis, brain abscess)."},
{c:"Eye — Diabetic",q:"A 58-year-old with poorly controlled type 2 diabetes for 15 years should be referred for which routine eye screening, and how often?",o:["No eye screening needed unless vision changes occur","Annual screening only after age 65","Dilated comprehensive eye exam at the time of type 2 diabetes diagnosis, then at least annually — to detect diabetic retinopathy early (the leading cause of new blindness in working-age adults); more frequent if retinopathy is present","Eye screening every 5 years for diabetics"],a:2,r:"Diabetic retinopathy screening (ADA guidelines): Type 2 DM: comprehensive dilated eye exam at the TIME of diagnosis (hyperglycemia may have been present for years before diagnosis), then at least annually. Type 1 DM: within 5 years of diagnosis, then annually. Pregnancy with pre-existing DM: exam before or early in pregnancy and monitored each trimester (retinopathy can progress rapidly). If no retinopathy and good glucose control, exams every 1-2 years may be acceptable. Diabetic retinopathy is the leading cause of new blindness in working-age adults (20-74). Stages: nonproliferative (microaneurysms, hemorrhages, exudates) → proliferative (neovascularization — risk of vitreous hemorrhage, tractional retinal detachment). Diabetic macular edema is the most common cause of vision loss in diabetics. Early detection allows laser photocoagulation and anti-VEGF therapy. Glycemic, BP, and lipid control slow progression."},
{c:"Eye — Refraction",q:"A 50-year-old reports increasing difficulty reading small print and needing to hold material farther away ('I need longer arms'). Distance vision is fine. Diagnosis?",o:["Myopia (nearsightedness) — distant objects are blurry","Cataract — clouding of the lens","Presbyopia — age-related loss of lens accommodation (typically begins around age 40); difficulty with NEAR vision; corrected with reading glasses, bifocals, or progressive lenses","Glaucoma — peripheral vision loss"],a:2,r:"Presbyopia: age-related, progressive loss of the lens's ability to accommodate (focus on near objects) due to lens stiffening and weakening of the ciliary muscle. Begins around age 40 and progresses. Symptom: difficulty with NEAR vision/reading — holding material farther away to focus, eye strain, headaches with near work. Distance vision is unaffected (if no other refractive error). Correction: reading glasses, bifocals, progressive lenses, or multifocal contact lenses. Other refractive errors: Myopia (nearsightedness) — distant objects blurry, eyeball too long, corrected with concave (minus) lenses. Hyperopia (farsightedness) — eyeball too short, near vision affected more, corrected with convex (plus) lenses. Astigmatism — irregular corneal curvature, blurred vision at all distances. Cataract: progressive lens CLOUDING — gradual blurring, glare, halos — corrected by surgery."},
{c:"Ear — Otitis Media",q:"A 2-year-old has fever, ear pain, and tugging at the right ear. Otoscopy shows a bulging, erythematous tympanic membrane with decreased mobility. Per AAP guidelines, what is the first-line antibiotic for acute otitis media?",o:["Azithromycin — first-line for all ear infections","Ciprofloxacin oral suspension","High-dose amoxicillin (80-90 mg/kg/day) — first-line for acute otitis media; amoxicillin-clavulanate if recent amoxicillin use, concurrent purulent conjunctivitis, or treatment failure","Topical antibiotic ear drops only"],a:2,r:"Acute otitis media (AOM) — AAP diagnostic criteria: moderate-severe bulging of the tympanic membrane (TM), OR new otorrhea not from otitis externa, OR mild bulging + recent ear pain or intense erythema. A bulging, erythematous TM with decreased mobility (on pneumatic otoscopy) supports AOM. First-line antibiotic: HIGH-DOSE AMOXICILLIN (80-90 mg/kg/day divided BID) — covers S. pneumoniae (most common), H. influenzae, M. catarrhalis. Use amoxicillin-CLAVULANATE if: amoxicillin in the past 30 days, concurrent purulent conjunctivitis (suggests H. influenzae), or failure of amoxicillin after 48-72 hours. Penicillin allergy: cefdinir, cefuroxime, or azithromycin (less ideal — pneumococcal resistance). Observation option (watchful waiting with analgesia, no immediate antibiotics): appropriate for non-severe AOM in children ≥6 months with reliable follow-up. Always treat pain (acetaminophen/ibuprofen)."},
{c:"Ear — Otitis Externa",q:"A 19-year-old swimmer has ear pain, itching, and drainage. Manipulation of the tragus/pinna is very painful. The ear canal is erythematous and swollen with debris; the tympanic membrane is normal where visible. Diagnosis and treatment?",o:["Acute otitis media — oral amoxicillin","Cerumen impaction — irrigation","Otitis externa (swimmer's ear) — pain with tragus/pinna manipulation, canal edema/erythema; treat with TOPICAL antibiotic drops (e.g., ciprofloxacin-dexamethasone or neomycin-polymyxin-hydrocortisone); keep the ear dry; oral antibiotics only if infection spreads beyond the canal","Mastoiditis — IV antibiotics"],a:2,r:"Otitis externa (OE, 'swimmer's ear'): infection/inflammation of the external auditory canal. Risk factors: water exposure (swimming), trauma (cotton swabs, scratching), humidity. Hallmark: PAIN with manipulation of the TRAGUS or PINNA (traction), canal erythema/edema, debris/discharge, itching; the tympanic membrane is normal (distinguishing from otitis media). Most common organisms: Pseudomonas aeruginosa and Staphylococcus aureus. Treatment: TOPICAL antibiotic drops — ciprofloxacin/dexamethasone, ofloxacin, or neomycin-polymyxin B-hydrocortisone (avoid neomycin and aminoglycosides if TM perforation is suspected — ototoxicity risk). Keep the ear DRY; remove debris; analgesics. Oral antibiotics ONLY if the infection extends beyond the canal or in immunocompromised/diabetic patients. Malignant (necrotizing) otitis externa: a serious Pseudomonas osteomyelitis of the skull base in elderly diabetics or immunocompromised — requires systemic antipseudomonal antibiotics and urgent ENT referral."},
{c:"Ear — Hearing Loss",q:"During a Weber test, the tuning fork is placed on the patient's forehead and the sound lateralizes to the RIGHT ear. The Rinne test in the right ear shows bone conduction GREATER than air conduction. What type of hearing loss is in the right ear?",o:["Sensorineural hearing loss in the right ear","Normal hearing bilaterally","Conductive hearing loss in the right ear — Weber lateralizes TO the affected ear, and Rinne shows bone conduction > air conduction (abnormal) on the affected side; causes include cerumen impaction, otitis media/effusion, otosclerosis, TM perforation","Sensorineural hearing loss in the left ear"],a:2,r:"Weber and Rinne tests interpretation: WEBER (fork on the forehead/vertex): Normal = midline. CONDUCTIVE loss → lateralizes TO the AFFECTED ear (the bad ear hears bone conduction better because background/masking noise is reduced). SENSORINEURAL loss → lateralizes AWAY from the affected ear (toward the better ear). RINNE (fork on mastoid then beside ear): Normal/Sensorineural = air conduction > bone conduction (AC > BC, 'positive Rinne'). CONDUCTIVE loss → bone conduction > air conduction (BC > AC, 'negative Rinne') in the affected ear. This patient: Weber lateralizes to the RIGHT + right Rinne shows BC > AC = CONDUCTIVE hearing loss in the right ear. Conductive causes: cerumen impaction, otitis media/effusion, TM perforation, otosclerosis, cholesteatoma. Sensorineural causes: presbycusis, noise-induced, ototoxic drugs, Meniere's, acoustic neuroma."},
{c:"Ear — Cerumen",q:"An 80-year-old reports gradual hearing decline and a sensation of fullness in one ear. Otoscopy reveals the canal is completely occluded by impacted cerumen. What is the appropriate first-line management?",o:["Refer to ENT for surgical removal","Insert a cotton swab to remove the wax","Cerumen softening with cerumenolytic drops (e.g., carbamide peroxide, mineral oil), followed by irrigation or manual removal; avoid cotton swabs (push wax deeper); avoid irrigation if there is a suspected perforation, tympanostomy tubes, or prior ear surgery","Antibiotic ear drops"],a:2,r:"Cerumen impaction: accumulated earwax causing symptoms (hearing loss, fullness, itching, tinnitus) or preventing exam. Common in elderly, hearing aid users, and those who use cotton swabs (which push wax deeper). First-line management: (1) Cerumenolytics (softening agents) — carbamide peroxide, mineral oil, hydrogen peroxide, or saline drops; (2) Irrigation (lukewarm water/saline) after softening; (3) Manual removal with a curette/loop by a trained provider. AVOID cotton swabs (impact wax further, risk TM trauma). CONTRAINDICATIONS to irrigation: known or suspected TM perforation, tympanostomy tubes, prior ear surgery, or only-hearing ear — use manual removal or refer to ENT instead. Ear candling: ineffective and dangerous — do NOT recommend. Recurrent impaction: periodic cerumenolytic use for prevention."},
{c:"Ear — Meniere's",q:"A 45-year-old has recurrent episodes of vertigo lasting 2-4 hours, accompanied by fluctuating hearing loss, tinnitus, and a sensation of ear fullness. Between episodes she is relatively well. Diagnosis and first-line management?",o:["BPPV — Epley maneuver","Vestibular neuritis — corticosteroids","Meniere's disease — episodic vertigo (20 min to hours) + sensorineural hearing loss + tinnitus + aural fullness; first-line: dietary SODIUM RESTRICTION and diuretics; betahistine and vestibular rehabilitation; severe cases may need intratympanic steroids or gentamicin","Acoustic neuroma — MRI internal auditory canal"],a:2,r:"Meniere's disease: idiopathic disorder of inner ear fluid (endolymphatic hydrops). Classic tetrad: (1) Episodic VERTIGO (lasting 20 minutes to several hours — longer than BPPV's seconds); (2) Fluctuating SENSORINEURAL hearing loss (low frequencies first); (3) TINNITUS; (4) Aural FULLNESS/pressure. Episodes cluster, with relatively well intervals; progressive hearing loss over years. First-line management: dietary SODIUM RESTRICTION (<1500-2000 mg/day) + diuretics (hydrochlorothiazide) to reduce endolymph volume; limit caffeine, alcohol, and nicotine. Acute attacks: vestibular suppressants (meclizine, benzodiazepines) and antiemetics. Refractory: betahistine, intratympanic corticosteroids, intratympanic gentamicin (chemical ablation), or surgery. Vestibular rehabilitation therapy. Distinguish from BPPV (brief positional vertigo, no hearing loss), vestibular neuritis (single prolonged episode, no hearing loss), and acoustic neuroma (progressive unilateral hearing loss — MRI)."},
{c:"Nose — Rhinitis",q:"A 28-year-old has recurrent sneezing, clear rhinorrhea, nasal congestion, and itchy, watery eyes every spring. Exam shows pale, boggy, bluish nasal turbinates. Diagnosis and first-line treatment?",o:["Bacterial sinusitis — amoxicillin-clavulanate","Viral URI — supportive care only","Allergic rhinitis — first-line treatment is an intranasal corticosteroid (e.g., fluticasone) — most effective single agent; oral/intranasal antihistamines for itching/sneezing; allergen avoidance; consider immunotherapy for refractory cases","Nonallergic vasomotor rhinitis — ipratropium only"],a:2,r:"Allergic rhinitis: IgE-mediated response to allergens (pollen — seasonal; dust mites, pet dander, mold — perennial). Features: sneezing, clear rhinorrhea, nasal congestion, nasal/ocular itching, watery eyes; PALE, BOGGY, bluish nasal turbinates on exam; 'allergic shiners' (infraorbital darkening), 'allergic salute' (transverse nasal crease). First-line and MOST EFFECTIVE treatment: INTRANASAL CORTICOSTEROIDS (fluticasone, mometasone, budesonide) — superior to antihistamines for nasal symptoms; take regularly for best effect. Add: second-generation oral antihistamines (loratadine, cetirizine, fexofenadine — non-sedating) or intranasal antihistamines (azelastine) for itching/sneezing; intranasal cromolyn; leukotriene antagonists. Allergen avoidance. Allergen immunotherapy (subcutaneous or sublingual) for refractory/severe cases. Avoid first-generation antihistamines (diphenhydramine — sedating, anticholinergic) when possible."},
{c:"Nose — Epistaxis",q:"A 30-year-old has a nosebleed from the anterior nasal septum. He is hemodynamically stable. What is the appropriate INITIAL management?",o:["Pack the posterior nasopharynx immediately","Cauterize without any prior measures","Have the patient sit upright, lean FORWARD, and pinch the soft part of the nose (over Kiesselbach's plexus) firmly for 10-15 minutes continuously; a topical vasoconstrictor (oxymetazoline) may help; if bleeding persists, consider cautery or anterior packing","Lie the patient flat and tilt the head back"],a:2,r:"Epistaxis (nosebleed) management: ~90% are ANTERIOR, from KIESSELBACH'S PLEXUS (Little's area) on the anterior nasal septum. Initial management: (1) Sit upright, lean FORWARD (NOT back — leaning back causes blood to flow down the throat → swallowing, aspiration, nausea); (2) PINCH the soft cartilaginous part of the nose (not the bony bridge) firmly and CONTINUOUSLY for 10-15 minutes; (3) Apply a topical vasoconstrictor (oxymetazoline) on a cotton pledget. If bleeding persists: chemical cautery (silver nitrate) of the visualized bleeding site, or anterior nasal packing. POSTERIOR epistaxis (less common, more severe — often elderly, hypertensive, anticoagulated): bleeding from the sphenopalatine artery, harder to control, may cause significant blood loss/airway concern — requires posterior packing and ENT involvement. Address underlying factors: hypertension, anticoagulation, nasal trauma/digital manipulation, dryness, cocaine use."},
{c:"Throat — Pharyngitis",q:"A 12-year-old has a sore throat, fever, tonsillar exudates, tender anterior cervical lymphadenopathy, and NO cough. Using the Centor criteria, what is the appropriate next step?",o:["Prescribe antibiotics empirically without testing for all sore throats","Treat with antibiotics only if a throat culture grows bacteria in 48 hours","Calculate Centor/McIsaac score; with multiple criteria met, perform a rapid antigen detection test (RADT) for group A Streptococcus; treat with penicillin or amoxicillin if positive; in children, a negative RADT should be confirmed with throat culture","No testing or treatment — all pharyngitis is viral"],a:2,r:"Streptococcal pharyngitis (Group A Strep, GAS): Centor criteria (modified McIsaac with age): tonsillar Exudates, tender anterior cervical Adenopathy, Fever (>38°C), absence of Cough (each +1); age 3-14 (+1), 15-44 (0), ≥45 (−1). Higher scores increase GAS likelihood. Management: with elevated score → rapid antigen detection test (RADT). Treat if positive: PENICILLIN V or AMOXICILLIN (first-line — narrow spectrum, effective, cheap); penicillin allergy → cephalexin, azithromycin, or clindamycin. In CHILDREN, a NEGATIVE RADT should be confirmed with throat culture (higher GAS prevalence and rheumatic fever risk; RADT sensitivity ~85%). In adults, negative RADT generally does not require culture confirmation. Why treat GAS: prevent acute rheumatic fever (the main reason), suppurative complications (peritonsillar abscess), and reduce transmission/symptom duration. Viral pharyngitis (cough, rhinorrhea, conjunctivitis, hoarseness): no antibiotics."},
{c:"Throat — Mononucleosis",q:"A 19-year-old college student has severe sore throat, fever, marked fatigue, posterior cervical lymphadenopathy, tonsillar exudates, and splenomegaly. A rapid strep test is negative. He develops a diffuse rash after being given amoxicillin. Diagnosis and key counseling point?",o:["Streptococcal pharyngitis — repeat the strep test","Acute HIV — start antiretroviral therapy","Infectious mononucleosis (EBV) — heterophile antibody (Monospot) or EBV serologies confirm; AVOID CONTACT SPORTS for at least 3-4 weeks due to splenic rupture risk; the amoxicillin-induced rash is characteristic of EBV mono","Diphtheria — antitoxin and antibiotics"],a:2,r:"Infectious mononucleosis (Epstein-Barr virus, EBV): common in adolescents/young adults ('kissing disease'). Features: severe sore throat, fever, profound FATIGUE, POSTERIOR cervical (and generalized) lymphadenopathy, tonsillar exudates, SPLENOMEGALY (~50%), hepatomegaly, palatal petechiae. A diffuse maculopapular RASH after AMOXICILLIN/ampicillin is characteristic (not a true penicillin allergy). Diagnosis: heterophile antibody test (Monospot — may be falsely negative in the first week), EBV-specific serologies (VCA IgM/IgG), atypical lymphocytosis on CBC. KEY COUNSELING: AVOID CONTACT/COLLISION SPORTS and heavy lifting for at least 3-4 weeks (some say until splenomegaly resolves) due to risk of SPLENIC RUPTURE (a rare but life-threatening complication). Treatment: supportive (rest, hydration, analgesics); corticosteroids only for airway compromise from tonsillar swelling. Fatigue can last weeks-months. Avoid amoxicillin/ampicillin when mono is suspected."},
{c:"Throat — Peritonsillar Abscess",q:"A 20-year-old with worsening sore throat now has severe unilateral throat pain, trismus (difficulty opening the mouth), a muffled 'hot potato' voice, and uvular deviation away from a swollen, bulging tonsil. Diagnosis and management?",o:["Viral pharyngitis — supportive care","Streptococcal pharyngitis — oral penicillin","Peritonsillar abscess (quinsy) — unilateral bulging, uvular deviation, trismus, muffled voice; requires drainage (needle aspiration or incision and drainage) plus antibiotics; urgent ENT referral; monitor airway","Epiglottitis — emergent airway management"],a:2,r:"Peritonsillar abscess (PTA, 'quinsy'): a collection of pus between the tonsillar capsule and pharyngeal muscles — the most common deep neck infection in young adults, often a complication of tonsillitis/pharyngitis. Features: severe UNILATERAL throat pain, TRISMUS (difficulty opening the mouth — pterygoid muscle irritation), muffled 'HOT POTATO' VOICE, drooling, UVULAR DEVIATION away from the swollen, bulging peritonsillar area, fever. Management: DRAINAGE (needle aspiration or incision and drainage) — the key intervention; antibiotics (cover GAS and anaerobes — amoxicillin-clavulanate, or ampicillin-sulbactam/clindamycin IV); analgesia; hydration; urgent ENT referral; monitor airway. Complications: airway obstruction, spread to deep neck spaces, aspiration if it ruptures. Distinguish from epiglottitis (more rapid, toxic, stridor, tripod positioning — airway emergency) and retropharyngeal abscess (neck stiffness, more common in young children)."},
{c:"Throat — Epiglottitis",q:"An unvaccinated 4-year-old has rapid onset of high fever, severe sore throat, drooling, muffled voice, and is sitting upright leaning forward in a tripod position with inspiratory stridor and respiratory distress. What is the diagnosis and the FIRST priority?",o:["Croup — racemic epinephrine and steroids","Peritonsillar abscess — needle drainage","Acute epiglottitis — AIRWAY is the first priority; do NOT examine the throat or place the child supine (can precipitate complete obstruction); keep the child calm; prepare for controlled airway management in the OR with anesthesia/ENT; then IV antibiotics (ceftriaxone)","Viral pharyngitis — supportive care"],a:2,r:"Acute epiglottitis: life-threatening inflammation of the epiglottis — an AIRWAY EMERGENCY. Classic in unvaccinated children (historically H. influenzae type b — now rare due to Hib vaccine; also Strep, Staph). The 4 D's: Drooling, Dysphagia, Dysphonia (muffled 'hot potato' voice), Distress. Rapid onset of high fever, severe sore throat, TRIPOD POSITIONING (sitting upright, leaning forward), inspiratory STRIDOR, toxic appearance. FIRST PRIORITY: AIRWAY. Do NOT: examine the throat with a tongue depressor, lay the child supine, or perform anxiety-provoking procedures — any of these can precipitate complete airway obstruction. Keep the child calm (often on a parent's lap). Definitive: controlled intubation in the OR with anesthesia and ENT/surgical backup (be prepared for emergency tracheostomy). After airway secured: IV antibiotics (ceftriaxone or cefotaxime). Lateral neck X-ray (if stable): 'thumbprint sign' (swollen epiglottis). Croup (laryngotracheobronchitis): viral, gradual, barky 'seal-like' cough, 'steeple sign' — treat with steroids ± racemic epinephrine."},
{c:"Nose — Sinusitis",q:"A 35-year-old has nasal congestion, facial pressure, and purulent discharge for 6 days that is improving. There is no high fever. What is the most appropriate management?",o:["Amoxicillin-clavulanate immediately","CT sinuses to confirm bacterial sinusitis","Symptomatic treatment (saline irrigation, intranasal corticosteroids, analgesics, decongestants) — most acute rhinosinusitis is VIRAL; antibiotics are reserved for symptoms ≥10 days without improvement, severe onset (high fever + purulent discharge ≥3-4 days), or 'double worsening'","Oral corticosteroids for all sinusitis"],a:2,r:"Acute rhinosinusitis: VIRAL in the vast majority (>90-98%). Viral ARS: symptoms peak at 3-5 days and improve by 7-10 days. BACTERIAL ARS is suggested by: (1) symptoms persisting ≥10 days WITHOUT improvement; (2) SEVERE onset — high fever (≥39°C) + purulent nasal discharge or facial pain for ≥3-4 consecutive days at illness onset; (3) 'DOUBLE WORSENING' — initial improvement then worsening (new fever, headache, increased discharge). This patient (6 days, improving, no high fever) → likely viral → SYMPTOMATIC treatment: saline irrigation, intranasal corticosteroids, analgesics, short-term decongestants (limit to <3-5 days to avoid rebound congestion/rhinitis medicamentosa). First-line antibiotic when bacterial ARS criteria are met: amoxicillin-clavulanate (NOT amoxicillin alone, due to beta-lactamase-producing organisms); doxycycline or respiratory fluoroquinolone for penicillin allergy. Avoid unnecessary antibiotics (stewardship)."},
{c:"Eye — Subconjunctival",q:"A 55-year-old on aspirin notices a bright red patch on the white of one eye after a coughing fit. There is no pain, no vision change, and no discharge. Diagnosis and management?",o:["Conjunctivitis — topical antibiotics","Acute angle-closure glaucoma — emergent referral","Subconjunctival hemorrhage — a benign, painless collection of blood under the conjunctiva from a ruptured small vessel (cough, strain, Valsalva, minor trauma, anticoagulants); reassurance only — resolves spontaneously in 1-2 weeks; check BP and review anticoagulation if recurrent","Corneal abrasion — fluorescein staining and patching"],a:2,r:"Subconjunctival hemorrhage: a flat, bright-red patch of blood under the conjunctiva (over the white sclera) from a ruptured conjunctival capillary. PAINLESS, no vision change, no discharge, normal pupil — entirely benign. Common precipitants: coughing, sneezing, straining/Valsalva, vomiting, minor trauma/eye rubbing, anticoagulants/antiplatelets, hypertension. Management: REASSURANCE — it resolves spontaneously over 1-2 weeks (color fades like a bruise: red → yellow → clears). No treatment needed; artificial tears for mild irritation. Evaluate for underlying causes if RECURRENT or spontaneous: check blood pressure, review anticoagulation/antiplatelet therapy, consider a bleeding disorder. Red flags requiring referral (suggesting it is NOT a simple subconjunctival hemorrhage): pain, vision change, photophobia, history of significant trauma (rule out globe rupture/foreign body), or involvement extending to the cornea."},
{c:"Eye — Corneal Abrasion",q:"A 30-year-old felt something fly into her eye while gardening. She now has severe eye pain, foreign body sensation, tearing, and photophobia. Fluorescein staining under cobalt blue light shows a linear uptake on the cornea. Diagnosis and management?",o:["Bacterial conjunctivitis — topical antibiotics, no other steps","Corneal abrasion — fluorescein confirms an epithelial defect; evert the eyelid to check for/remove a retained foreign body; topical antibiotic (e.g., erythromycin ointment, or a fluoroquinolone for contact lens wearers to cover Pseudomonas); do NOT patch contact-lens-related abrasions; pain control; no topical anesthetics for home use","Acute angle-closure glaucoma — IOP-lowering drops","Anterior uveitis — topical steroids"],a:1,r:"Corneal abrasion: a defect in the corneal epithelium, often from trauma, foreign bodies, or contact lenses. Symptoms: severe eye pain, FOREIGN BODY sensation, tearing, PHOTOPHOBIA, blepharospasm, blurred vision. Diagnosis: FLUORESCEIN staining under cobalt blue light shows the epithelial defect (linear abrasions suggest a foreign body under the upper lid — EVERT the eyelid to find and remove it). Management: remove any foreign body; topical antibiotic prophylaxis — erythromycin ointment for simple abrasions; a topical FLUOROQUINOLONE (ciprofloxacin, ofloxacin) for CONTACT LENS wearers to cover PSEUDOMONAS; oral analgesics; consider a short course of topical NSAID drops. Do NOT patch contact-lens-related abrasions (increases infection risk). Do NOT prescribe topical anesthetics for home use (impair healing, mask worsening, cause corneal toxicity). Most heal in 24-72 hours. Reassess in 24 hours; refer for vision loss, large/central abrasions, infiltrates, or no improvement."},
{c:"Throat — Hoarseness",q:"A 58-year-old man with a 40 pack-year smoking history and heavy alcohol use has had progressive hoarseness for 5 weeks. What is the most appropriate next step?",o:["Reassurance — hoarseness is always benign and self-limited","Empiric PPI for 3 months without further evaluation","Refer for laryngoscopy — hoarseness persisting >2-3 weeks, especially in a smoker/drinker, warrants visualization of the vocal cords to rule out laryngeal cancer; risk factors here are significant","Voice rest and antibiotics"],a:2,r:"Hoarseness (dysphonia): Acute hoarseness (most common — viral laryngitis, voice overuse) is usually self-limited (resolves in 1-2 weeks). PERSISTENT hoarseness (>2-3 weeks) requires evaluation with LARYNGOSCOPY to visualize the vocal cords — especially with RED FLAGS: smoking, heavy alcohol use (synergistic risk for laryngeal cancer), age >50, hemoptysis, dysphagia, odynophagia, neck mass, otalgia, or stridor. This patient (5 weeks, 40 pack-years, heavy alcohol) is high-risk for LARYNGEAL CANCER (squamous cell carcinoma) → prompt ENT referral for laryngoscopy. Other causes of chronic hoarseness: vocal cord nodules/polyps (voice overuse — teachers, singers), GERD/laryngopharyngeal reflux, vocal cord paralysis (recurrent laryngeal nerve injury — thyroid surgery, lung cancer compressing the nerve), hypothyroidism, neurologic disorders. Do NOT simply reassure or treat empirically when red flags or prolonged symptoms are present — visualize the cords."},
{c:"Eye — Glaucoma Chronic",q:"A 65-year-old African American man with a family history of glaucoma is found on routine exam to have elevated intraocular pressure, increased optic disc cupping, and peripheral visual field loss. He has no pain or acute symptoms. Diagnosis and treatment?",o:["Acute angle-closure glaucoma — emergent referral","Cataract — surgical lens replacement","Primary open-angle glaucoma — chronic, painless, progressive optic neuropathy with peripheral (then central) visual field loss; first-line treatment is a topical prostaglandin analog (e.g., latanoprost) to lower intraocular pressure; lifelong monitoring","Diabetic retinopathy — anti-VEGF injections"],a:2,r:"Primary open-angle glaucoma (POAG): the most common type of glaucoma — a chronic, PAINLESS, progressive optic neuropathy associated with elevated intraocular pressure (IOP), causing gradual PERIPHERAL visual field loss first (central vision/acuity preserved until late — patients often unaware until significant damage). Risk factors: increased age, African American race, family history, elevated IOP, thin central cornea, diabetes, myopia. Exam: increased optic disc CUPPING (increased cup-to-disc ratio), peripheral field defects on perimetry, elevated IOP (though normal-tension glaucoma exists). First-line treatment: topical PROSTAGLANDIN ANALOGS (latanoprost, bimatoprost — increase aqueous outflow, once daily, very effective) to lower IOP and slow progression. Other agents: topical beta-blockers (timolol), alpha-agonists, carbonic anhydrase inhibitors. Laser trabeculoplasty or surgery for refractory cases. Lifelong monitoring. Screening important in high-risk groups — vision loss is IRREVERSIBLE. Contrast with acute angle-closure (painful, emergent)."},
{c:"Ear — Tinnitus",q:"A 55-year-old reports ringing in both ears for several months. He has a long history of occupational noise exposure (factory work without hearing protection). Audiometry shows bilateral high-frequency sensorineural hearing loss. What is the most likely cause and key intervention?",o:["Acoustic neuroma — MRI for all tinnitus","Meniere's disease — sodium restriction","Noise-induced hearing loss with associated tinnitus — bilateral high-frequency sensorineural loss is the classic pattern; the key intervention is PREVENTION (hearing protection, reduce exposure); the existing loss is irreversible; manage with hearing aids and tinnitus coping strategies","Cerumen impaction — irrigation"],a:2,r:"Noise-induced hearing loss (NIHL): one of the most common causes of sensorineural hearing loss, from chronic loud noise exposure (occupational — factory, construction; recreational — concerts, firearms, music). Damages cochlear hair cells. Pattern: bilateral, symmetric, HIGH-FREQUENCY sensorineural hearing loss — a characteristic 'notch' at 4000 Hz on audiometry. Often accompanied by TINNITUS (ringing). The hearing loss is IRREVERSIBLE — therefore PREVENTION is paramount: hearing protection (earplugs, earmuffs), limit exposure duration and intensity, workplace noise controls (OSHA standards). Management of existing loss: hearing aids, tinnitus retraining/coping strategies (sound therapy, cognitive behavioral therapy), avoid further noise. Evaluate ASYMMETRIC sensorineural hearing loss or UNILATERAL tinnitus with MRI to rule out acoustic neuroma (vestibular schwannoma). Counsel all patients with noise exposure on protection. Other SNHL causes: presbycusis (age-related, also high-frequency), ototoxic drugs (aminoglycosides, loop diuretics, cisplatin, high-dose aspirin)."},
,
{c:"Eye — Pediatric",q:"A pediatrician notices that a 3-year-old's eyes appear misaligned — one eye turns inward. The cover test confirms strabismus. Why is early detection and treatment critical?",o:["Strabismus always resolves on its own by school age","It is purely cosmetic with no functional consequences","Untreated strabismus in young children can cause AMBLYOPIA (permanent vision loss in the deviating eye from cortical suppression); treat during the critical period of visual development (before ~7-8 years) with patching/atropine of the better eye, correction of refractive errors, and possible surgery","Strabismus only requires treatment in adulthood"],a:2,r:"Strabismus: misalignment of the eyes (esotropia = inward, exotropia = outward, hyper/hypotropia = vertical). Detection: corneal light reflex (Hirschberg test — asymmetric reflex), cover/uncover test (the deviating eye moves to fixate when the other is covered). Critical concern: untreated strabismus → AMBLYOPIA ('lazy eye') — the brain SUPPRESSES the image from the misaligned eye to avoid diplopia, causing permanent vision loss in that eye if not corrected during the critical period of visual development (before ~7-8 years). Treatment of amblyopia: PATCHING (or atropine penalization) of the BETTER eye to force use of the weaker eye, correct refractive errors with glasses, and surgery to align the eyes if needed. Early detection (vision screening at well-child visits) is essential — amblyopia is the leading cause of preventable monocular vision loss in children. Constant strabismus or any strabismus after ~4 months of age warrants ophthalmology referral. Always evaluate new strabismus to rule out serious causes (retinoblastoma, cranial nerve palsy)."},
{c:"Eye — Leukocoria",q:"A pediatric nurse practitioner notes an absent (white) red reflex in one eye of a 14-month-old during a well-child exam. The parent mentions the eye 'looks white' in flash photographs. What is the most urgent concern?",o:["Cataract — elective surgery","Refractive error — prescribe glasses","Leukocoria (white pupillary reflex) must be urgently evaluated to rule out RETINOBLASTOMA (the most common intraocular malignancy in children) — emergent ophthalmology referral; also consider congenital cataract and other serious causes","Conjunctivitis — topical antibiotics"],a:2,r:"Leukocoria (white pupillary reflex): an abnormal WHITE reflection instead of the normal red reflex — a critical 'do-not-miss' finding. The most urgent concern is RETINOBLASTOMA — the most common primary intraocular malignancy of childhood (often diagnosed before age 2-3). Other causes of leukocoria: congenital cataract, retinopathy of prematurity, persistent fetal vasculature, Coats disease, ocular toxocariasis. Detection: the red reflex test (direct ophthalmoscope) at every well-child visit — an asymmetric, absent, or white reflex is abnormal. Parents may notice the white reflex in flash photographs. Management: EMERGENT ophthalmology referral — retinoblastoma is life-threatening and vision-threatening but highly treatable when caught early (treatments: chemotherapy, laser, cryotherapy, radiation, enucleation for advanced disease). May be hereditary (RB1 gene, bilateral cases) — genetic counseling. Never dismiss leukocoria or an abnormal red reflex."},
{c:"Ear — Tympanic Perforation",q:"A patient is struck on the ear and now has ear pain, hearing loss, and a small amount of bloody drainage. Otoscopy reveals a perforation of the tympanic membrane. What is the appropriate management?",o:["Immediate surgical repair for all perforations","Irrigate the ear canal vigorously to clean it","Keep the ear DRY (water precautions), avoid ototopical aminoglycosides, provide analgesia; most traumatic perforations heal spontaneously within weeks; ENT referral if it does not heal, if hearing loss is significant, or if there are signs of infection","Antibiotic ear drops containing neomycin"],a:2,r:"Tympanic membrane (TM) perforation: causes include trauma (direct blow, barotrauma, penetrating injury — cotton swab, water/diving injury, blast), or infection (acute otitis media rupture). Symptoms: ear pain, hearing loss (conductive), possible bloody otorrhea, tinnitus, vertigo. Management of traumatic perforation: KEEP THE EAR DRY (strict water precautions — no swimming, earplugs when showering) to prevent infection; AVOID ototopical AMINOGLYCOSIDES (neomycin, gentamicin drops) when the TM is perforated — risk of OTOTOXICITY reaching the middle/inner ear; analgesia; do NOT irrigate. Most traumatic perforations heal SPONTANEOUSLY within weeks to a couple of months. ENT referral if: the perforation does not heal, significant/persistent hearing loss, vertigo (suggests inner ear involvement), signs of infection, or large perforations (may need tympanoplasty). If infection is present and a perforation exists, use a fluoroquinolone otic drop (ofloxacin, ciprofloxacin) which is safe for the middle ear."},
{c:"Nose — Foreign Body",q:"A 3-year-old presents with a unilateral, foul-smelling, purulent nasal discharge for several days. There is no fever. What is the most likely cause?",o:["Bacterial sinusitis — antibiotics","Allergic rhinitis — intranasal steroids","Nasal foreign body — unilateral, foul-smelling, purulent nasal discharge in a young child is a classic presentation; examine and remove the object (positive pressure technique, instruments, or ENT referral); button batteries and magnets require URGENT removal","Viral URI — supportive care"],a:2,r:"Nasal foreign body: common in toddlers/young children (curiosity — beads, food, toys, button batteries). Classic presentation: UNILATERAL, FOUL-SMELLING, purulent (sometimes bloody) nasal discharge — the unilateral and malodorous nature is the key clue (bilateral discharge suggests infection/allergy). Often no fever. Management: examine the nose (anterior rhinoscopy with good lighting); removal techniques — positive pressure ('parent's kiss' — blow into the mouth while occluding the unaffected nostril), instruments (forceps, suction, balloon catheter, ear curette/loop), or ENT referral if not easily removed or the child is uncooperative. URGENT removal for: BUTTON/DISC BATTERIES (cause rapid liquefactive necrosis and septal perforation within hours — a true emergency) and PAIRED MAGNETS (pressure necrosis). Avoid pushing the object posteriorly (aspiration risk). Always consider a foreign body with unilateral nasal symptoms in a child."},
{c:"Throat — Oral Lesions",q:"A 60-year-old smoker who chews tobacco has a white patch on the lateral tongue that cannot be scraped off and has been present for several weeks. It is not painful. What is the appropriate action?",o:["Reassurance — all white oral patches are benign","Antifungal therapy — this is oral candidiasis","Refer for biopsy — leukoplakia (a white patch that cannot be wiped off) is a potentially premalignant lesion; persistent oral lesions in a tobacco/alcohol user must be biopsied to rule out dysplasia or squamous cell carcinoma","Topical corticosteroids"],a:2,r:"Leukoplakia: a white patch/plaque on the oral mucosa that CANNOT be scraped/wiped off (distinguishing it from oral candidiasis/thrush, which wipes off leaving an erythematous base). Leukoplakia is a clinical diagnosis of exclusion and a POTENTIALLY PREMALIGNANT lesion — a percentage harbor dysplasia or progress to squamous cell carcinoma. Risk factors: tobacco (smoked and smokeless/chewing), alcohol, HPV. Any persistent oral leukoplakia (especially in a tobacco/alcohol user, on the lateral tongue or floor of mouth — high-risk sites) requires BIOPSY to evaluate for dysplasia or carcinoma. Erythroplakia (a red patch) has an even higher malignant potential and also requires biopsy. Counsel tobacco/alcohol cessation. Distinguish from: oral candidiasis (wipes off, treat with antifungal), oral hairy leukoplakia (EBV, on lateral tongue in HIV — does not wipe off but is not premalignant), lichen planus. Do NOT dismiss or treat empirically — biopsy persistent lesions."},
{c:"Eye — Chalazion",q:"A 40-year-old has a firm, painless, slowly enlarging nodule in the mid-portion of the upper eyelid that has been present for several weeks. There is no significant redness or tenderness. Diagnosis and first-line management?",o:["Hordeolum (stye) — warm compresses for an acute infection","Basal cell carcinoma — biopsy","Chalazion — a chronic, painless granuloma from a blocked meibomian gland; first-line: warm compresses and eyelid massage/hygiene; intralesional corticosteroid injection or incision and curettage if it persists","Orbital cellulitis — IV antibiotics"],a:2,r:"Chalazion: a chronic, sterile, granulomatous inflammation of a blocked MEIBOMIAN gland (oil gland) in the eyelid. Presentation: a FIRM, PAINLESS, slowly enlarging nodule in the mid-portion of the eyelid (away from the lid margin), without significant redness or tenderness (the indolent, chronic counterpart to the acute, painful hordeolum/stye). First-line management: WARM COMPRESSES (several times daily) + eyelid massage and lid hygiene — promotes drainage; most resolve over weeks. Persistent chalazia: intralesional corticosteroid injection or incision and curettage by an ophthalmologist. Recurrent chalazia at the same site in an adult: consider biopsy to rule out sebaceous gland carcinoma (rare but important). Associated with blepharitis and rosacea — treat underlying lid disease. Hordeolum (stye): acute, painful, tender, often at the lid margin — warm compresses, may need topical antibiotics."},
{c:"Eye — Blepharitis",q:"A 55-year-old has chronic bilateral eyelid irritation, burning, crusting/flaking at the eyelid margins and base of the eyelashes, and morning eyelid stickiness. Diagnosis and cornerstone of treatment?",o:["Allergic conjunctivitis — antihistamine drops","Bacterial conjunctivitis — topical antibiotics","Blepharitis — chronic inflammation of the eyelid margins; the cornerstone of treatment is EYELID HYGIENE (warm compresses, lid scrubs/massage) done regularly; topical antibiotics (erythromycin) for staphylococcal blepharitis; manage associated rosacea/seborrhea","Dacryocystitis — systemic antibiotics"],a:2,r:"Blepharitis: chronic inflammation of the EYELID MARGINS — one of the most common ocular conditions. Anterior blepharitis: at the base of the eyelashes (staphylococcal or seborrheic). Posterior blepharitis: meibomian gland dysfunction (often associated with rosacea). Symptoms: bilateral chronic eyelid burning, itching, irritation, crusting/flaking at the lash bases, 'morning stickiness,' redness of lid margins, foreign body sensation; may cause secondary dry eye, styes, and chalazia. Cornerstone of treatment: EYELID HYGIENE — regular WARM COMPRESSES (loosen oils/crusts) + eyelid margin scrubs (dilute baby shampoo or commercial lid cleansers) + lid massage — done consistently/long-term (chronic condition requiring maintenance). Topical antibiotics (erythromycin or bacitracin ointment) for staphylococcal blepharitis; oral doxycycline/tetracycline for meibomian gland dysfunction/ocular rosacea; artificial tears for associated dry eye. Manage underlying rosacea/seborrheic dermatitis. It is chronic — set expectations for ongoing lid hygiene."},
{c:"Eye — Dry Eye",q:"A 60-year-old woman reports a chronic gritty, burning sensation in both eyes, worse with screen use and in dry environments. She also has dry mouth and joint pain. What condition should be considered, and what is first-line management of the dry eye?",o:["Allergic conjunctivitis — antihistamines","Acute angle-closure glaucoma — emergent referral","Dry eye disease (keratoconjunctivitis sicca); given dry mouth and arthralgia, evaluate for SJOGREN'S SYNDROME (autoimmune); first-line dry eye management: ARTIFICIAL TEARS (lubricating drops), environmental modification, and lid hygiene; topical cyclosporine or lifitegrast for moderate-severe disease","Bacterial conjunctivitis — topical antibiotics"],a:2,r:"Dry eye disease (keratoconjunctivitis sicca): from decreased tear production or increased tear evaporation. Symptoms: chronic GRITTY/burning/foreign body sensation, fluctuating vision, worse with screen use (reduced blink rate), wind, low humidity, and contact lenses. Paradoxically, reflex TEARING may occur. First-line management: ARTIFICIAL TEARS (lubricating eye drops — preservative-free if used frequently), environmental modification (humidifier, screen breaks/20-20-20 rule, avoid direct air drafts), warm compresses/lid hygiene for meibomian gland dysfunction, omega-3 supplements. Moderate-severe: topical anti-inflammatory drops (cyclosporine — Restasis, or lifitegrast — Xiidra), punctal plugs (reduce tear drainage), autologous serum drops. IMPORTANT: dry eye + DRY MOUTH (xerostomia) + arthralgia/arthritis → evaluate for SJOGREN'S SYNDROME (autoimmune exocrine gland destruction — check anti-Ro/SSA, anti-La/SSB antibodies, ANA, RF; Schirmer test). Other contributors to dry eye: medications (anticholinergics, antihistamines), aging, post-menopausal, LASIK, contact lens use."},
{c:"Ear — Acoustic Neuroma",q:"A 50-year-old reports gradual, progressive UNILATERAL hearing loss with tinnitus in the same ear and occasional imbalance. Audiometry confirms asymmetric sensorineural hearing loss. What is the most important next step?",o:["Reassurance — unilateral hearing loss is a normal variant","Cerumen disimpaction and recheck","MRI of the internal auditory canal with contrast — asymmetric/unilateral sensorineural hearing loss with tinnitus must be evaluated to rule out ACOUSTIC NEUROMA (vestibular schwannoma), a benign tumor of cranial nerve VIII","Start a diuretic for presumed Meniere's disease"],a:2,r:"Acoustic neuroma (vestibular schwannoma): a benign tumor of the Schwann cells of cranial nerve VIII (vestibulocochlear nerve), typically in the cerebellopontine angle/internal auditory canal. Classic presentation: gradual, progressive UNILATERAL (asymmetric) SENSORINEURAL hearing loss + ipsilateral TINNITUS + imbalance/disequilibrium (vertigo is less common because the slow growth allows compensation). Large tumors: can compress CN V (facial numbness), CN VII (facial weakness), brainstem, and cause hydrocephalus. KEY POINT: any ASYMMETRIC or UNILATERAL sensorineural hearing loss or unilateral tinnitus warrants MRI of the internal auditory canals WITH CONTRAST (gold standard) to exclude acoustic neuroma — do not attribute unilateral SNHL to presbycusis (which is symmetric). Management: observation (small, slow-growing), stereotactic radiosurgery, or microsurgical resection depending on size, symptoms, and patient factors. Bilateral acoustic neuromas → neurofibromatosis type 2 (NF2)."},
{c:"Throat — Thyroid",q:"A 45-year-old woman has a painless anterior neck mass that moves up with swallowing. There are no compressive symptoms, no hoarseness, and she is clinically euthyroid. What is the appropriate initial workup for this thyroid nodule?",o:["Immediate thyroidectomy for all thyroid nodules","Start levothyroxine to suppress the nodule","Check serum TSH and obtain a thyroid/neck ULTRASOUND; if TSH is low, obtain a radioactive iodine uptake scan (hot nodules are rarely malignant); fine-needle aspiration (FNA) based on ultrasound features and size","Antibiotics for thyroiditis"],a:2,r:"Thyroid nodule workup: a neck mass that moves UP WITH SWALLOWING suggests thyroid origin (thyroid is attached to the larynx/trachea). Initial workup: (1) Serum TSH — assess thyroid function; (2) Thyroid/neck ULTRASOUND — characterizes the nodule (size, composition, echogenicity, margins, microcalcifications, vascularity) and assesses lymph nodes; risk-stratified by TI-RADS or ATA sonographic patterns. If TSH is LOW → radioactive iodine uptake scan (a 'HOT'/hyperfunctioning nodule is rarely malignant — may not need FNA). If TSH is normal/high → proceed based on ultrasound. FINE-NEEDLE ASPIRATION (FNA) biopsy: the definitive test for malignancy risk — indicated based on ultrasound features and size (e.g., high-suspicion features ≥1 cm, intermediate ≥1-1.5 cm, low-suspicion ≥1.5-2 cm). Most thyroid nodules are BENIGN (~95%). Red flags for malignancy: rapid growth, hoarseness (recurrent laryngeal nerve), fixed/hard nodule, lymphadenopathy, history of head/neck radiation, family history of thyroid cancer. Do NOT routinely suppress nodules with levothyroxine."},
{c:"Nose — Rhinitis Medicamentosa",q:"A 35-year-old has used over-the-counter oxymetazoline (Afrin) nasal spray daily for 3 weeks for congestion. His congestion is now worse and constant, requiring more frequent spraying. Diagnosis and management?",o:["Worsening allergic rhinitis — increase the decongestant spray frequency","Bacterial sinusitis — start antibiotics","Rhinitis medicamentosa (rebound congestion) — from prolonged use (>3-5 days) of topical decongestants; management: STOP the topical decongestant; bridge with intranasal corticosteroids (and short oral steroid or oral decongestant if needed) to manage rebound congestion during withdrawal","Nasal polyps — surgical removal"],a:2,r:"Rhinitis medicamentosa (rebound congestion): paradoxical worsening of nasal congestion from OVERUSE of topical/intranasal DECONGESTANTS (oxymetazoline/Afrin, phenylephrine) beyond the recommended 3-5 DAYS. Mechanism: prolonged alpha-adrenergic vasoconstriction leads to receptor downregulation and rebound vasodilation/congestion when the drug wears off → the patient sprays more frequently → a vicious cycle of dependence. Management: (1) STOP the topical decongestant (the essential step — counsel the patient); (2) Bridge therapy to manage rebound congestion during withdrawal: INTRANASAL CORTICOSTEROIDS (fluticasone — reduces inflammation and eases the transition), saline irrigation; a short course of oral corticosteroids or an oral decongestant may help in severe cases; (3) Treat the underlying cause of the original congestion (e.g., allergic rhinitis with intranasal steroids/antihistamines). PREVENTION: counsel all patients that topical decongestant sprays should be limited to ≤3-5 days. Congestion improves over 1-2 weeks after stopping."},
{c:"Eye — Hyphema",q:"A 22-year-old is hit in the eye with a baseball. Examination reveals blood layering in the anterior chamber of the eye (between the cornea and iris). Diagnosis and management priorities?",o:["Subconjunctival hemorrhage — reassurance only","Conjunctivitis — topical antibiotics","Hyphema (blood in the anterior chamber from trauma) — urgent ophthalmology referral; elevate the head of the bed (~30-45 degrees), limit activity, shield the eye, control intraocular pressure and pain; monitor for rebleeding and elevated IOP; screen for sickle cell (higher complication risk)","Corneal abrasion — patch the eye and discharge"],a:2,r:"Hyphema: blood in the ANTERIOR CHAMBER (between the cornea and iris), usually from blunt or penetrating eye trauma (sports injuries common). Visible as layering blood, often with a fluid level. Management priorities: (1) Urgent OPHTHALMOLOGY referral; (2) Elevate the head of the bed (~30-45 degrees — allows blood to settle inferiorly, away from the visual axis, and aids resorption); (3) Limit activity / bed rest, place a rigid eye SHIELD (not a patch) to protect the eye; (4) Control INTRAOCULAR PRESSURE (hyphema can block trabecular outflow → acute glaucoma) and pain; avoid NSAIDs/aspirin (bleeding risk); cycloplegics and topical steroids per ophthalmology; (5) Monitor for REBLEEDING (highest risk days 2-5 — worse prognosis) and elevated IOP. SCREEN FOR SICKLE CELL DISEASE/TRAIT — sickling in the anterior chamber dramatically increases the risk of IOP elevation and optic nerve damage, altering management. Complications: rebleeding, glaucoma, corneal blood staining, vision loss. Always rule out globe rupture in eye trauma."},
{c:"Ear — Mastoiditis",q:"A 5-year-old with a recent inadequately treated acute otitis media now has fever, posterior auricular pain, swelling and redness behind the ear, and a protruding/down-and-out displaced auricle. Diagnosis and management?",o:["Otitis externa — topical antibiotic drops","Cerumen impaction — irrigation","Acute mastoiditis — a suppurative complication of otitis media; postauricular swelling/erythema/tenderness with auricular protrusion; requires admission, IV antibiotics, CT temporal bone, and ENT consultation (possible myringotomy/mastoidectomy); risk of intracranial spread","Allergic reaction — antihistamines"],a:2,r:"Acute mastoiditis: a suppurative complication of acute otitis media (AOM) — infection spreads to the mastoid air cells. More common in young children, often after inadequately treated or severe AOM. Hallmark signs: fever, postauricular (behind-the-ear) PAIN, swelling, erythema, and TENDERNESS over the mastoid process; PROTRUSION of the auricle (pushed outward, down and forward); the postauricular crease may be obliterated. Management: ADMISSION, IV antibiotics (cover S. pneumoniae, S. pyogenes, S. aureus including MRSA — e.g., vancomycin + ceftriaxone), CT of the temporal bones (assess for abscess/bony destruction/intracranial extension), and ENT consultation; myringotomy (with or without tube) to drain the middle ear; mastoidectomy for abscess or failure of medical therapy. Complications (serious): subperiosteal abscess, facial nerve palsy, labyrinthitis, intracranial spread (meningitis, brain abscess, sinus thrombosis). Mastoiditis is the most common suppurative complication of AOM — recognize the postauricular findings."},
{c:"Throat — Aphthous Ulcers",q:"A 25-year-old has recurrent painful, shallow, round ulcers with a gray-white base and erythematous halo on the inner lip and buccal mucosa. They heal in 1-2 weeks without scarring. There are no genital lesions or systemic symptoms. Diagnosis and management?",o:["Oral herpes (HSV) — antiviral therapy; lesions are on the lips' vermilion border","Oral squamous cell carcinoma — biopsy","Recurrent aphthous stomatitis (canker sores) — common, idiopathic painful oral ulcers on non-keratinized mucosa; management is supportive (topical analgesics, topical corticosteroids to speed healing, avoid triggers); evaluate for underlying causes if severe/recurrent (nutritional deficiencies, celiac, IBD, Behcet's)","Hand-foot-mouth disease — supportive care only"],a:2,r:"Recurrent aphthous stomatitis (RAS, canker sores): common, idiopathic, painful oral ulcers. Features: round/oval ulcers with a GRAY-WHITE fibrinous base and an ERYTHEMATOUS HALO, on NON-KERATINIZED mucosa (inner lips, buccal mucosa, tongue, floor of mouth — NOT the hard palate or gums); heal in 1-2 weeks WITHOUT scarring (minor type, most common). NOT contagious; distinct from herpes. Management: usually supportive — topical analgesics (viscous lidocaine, benzocaine), topical corticosteroids (triamcinolone dental paste — speeds healing), protective barriers; avoid triggers (acidic/spicy foods, trauma, stress, sodium lauryl sulfate toothpaste). Evaluate for UNDERLYING causes if severe, frequent, or major: nutritional deficiencies (iron, folate, B12, zinc), CELIAC disease, INFLAMMATORY BOWEL DISEASE, HIV, BEHCET'S disease (oral + genital ulcers + uveitis). Distinguish from herpes labialis (HSV — vesicles on the vermilion border/keratinized tissue, recurrent at the same site, contagious) and oral cancer (persistent, non-healing ulcer — biopsy)."},
{c:"Eye — Diplopia",q:"A 65-year-old diabetic presents with sudden binocular horizontal double vision. The right eye is deviated inward (cannot abduct/turn outward) but the PUPIL is normal and there is no ptosis. Which cranial nerve is most likely affected and what is the likely cause?",o:["CN III with pupil involvement — likely a compressive aneurysm","CN IV (trochlear) — causes vertical diplopia","CN VI (abducens) palsy — inability to abduct the eye, horizontal diplopia; an isolated CN VI palsy in a diabetic/hypertensive patient is most often due to MICROVASCULAR ISCHEMIA (mononeuropathy) and usually resolves over weeks to months","CN VII (facial) — causes facial droop, not diplopia"],a:2,r:"Cranial nerve VI (abducens) palsy: the abducens nerve innervates the LATERAL RECTUS (eye abduction). Palsy → inability to abduct the affected eye, esotropia (inward deviation), and binocular HORIZONTAL diplopia worse on gaze toward the affected side. In a patient with DIABETES or HYPERTENSION, an isolated CN VI palsy is most commonly due to MICROVASCULAR ISCHEMIA (ischemic mononeuropathy) — it typically resolves spontaneously over weeks to ~3 months. (CN VI has a long intracranial course, making it vulnerable to ischemia and increased intracranial pressure.) Workup: control glucose/BP, observe; if it does not resolve, is accompanied by other neuro signs, or there are red flags (papilledema, multiple cranial nerves, young patient) → neuroimaging to exclude tumor, increased ICP, or other causes. IMPORTANT CONTRAST: a CN III (oculomotor) palsy WITH PUPIL INVOLVEMENT (dilated, non-reactive pupil) suggests a COMPRESSIVE lesion (posterior communicating artery aneurysm) — a neurosurgical emergency; a pupil-SPARING CN III palsy in a diabetic suggests microvascular ischemia. Pupillary involvement is the key triage feature for CN III palsies."},
{c:"Eye — Pinguecula/Pterygium",q:"A 50-year-old who works outdoors has a fleshy, triangular, vascular growth of conjunctival tissue extending from the nasal corner ONTO the cornea. It occasionally becomes red and irritated. Diagnosis and management?",o:["Pinguecula — never extends onto the cornea","Conjunctival melanoma — urgent biopsy","Pterygium — a wing-shaped fibrovascular conjunctival growth extending onto the cornea, associated with chronic UV/wind/dust exposure; management: UV protection (sunglasses), lubricants for irritation; surgical excision if it threatens the visual axis, causes significant astigmatism, or is severely symptomatic","Cataract — surgical removal"],a:2,r:"Pterygium: a wing-shaped (triangular) fibrovascular growth of CONJUNCTIVAL tissue that extends ONTO the CORNEA — usually from the nasal side. Associated with chronic UV light exposure, wind, and dust (common in outdoor workers and sunny climates — 'surfer's eye'). Can cause irritation, redness, foreign body sensation, and — if it grows over the visual axis or distorts the cornea — astigmatism and vision changes. Management: UV PROTECTION (sunglasses, hat) to slow progression; LUBRICATING drops and short-term topical decongestant/NSAID/steroid for inflammation episodes. Surgical EXCISION is indicated if: it encroaches on the visual axis, causes significant astigmatism/vision changes, is severely symptomatic, or for cosmetic reasons (recurrence is possible — often with conjunctival autograft to reduce recurrence). PINGUECULA: a related but distinct yellowish, raised conjunctival deposit that does NOT cross onto the cornea (stays on the conjunctiva) — also UV-related, usually asymptomatic, treated with lubricants/UV protection only. The key distinction: pterygium crosses onto the cornea; pinguecula does not."},
{c:"Eye — Dacryocystitis",q:"A 60-year-old has acute onset of pain, redness, and swelling over the medial canthus (inner corner near the nose), with tearing and purulent discharge expressible from the punctum when the area is pressed. Diagnosis and management?",o:["Conjunctivitis — topical antibiotics only","Hordeolum — warm compresses","Dacryocystitis — infection of the lacrimal sac (usually from nasolacrimal duct obstruction); presents with medial canthal swelling/erythema/tenderness and purulent reflux from the punctum; treat with systemic (oral) antibiotics, warm compresses; refer for definitive nasolacrimal duct surgery (dacryocystorhinostomy) for recurrent cases","Orbital cellulitis — IV antibiotics and CT for all cases"],a:2,r:"Dacryocystitis: infection of the LACRIMAL SAC, usually secondary to NASOLACRIMAL DUCT OBSTRUCTION (stasis of tears → infection). Acute presentation: PAIN, redness, and swelling over the MEDIAL CANTHUS (inner corner of the eye, near the nose — over the lacrimal sac), excessive tearing (epiphora), and PURULENT material that can be expressed from the punctum when the sac is pressed. Common organisms: Staphylococcus, Streptococcus. Management: SYSTEMIC (oral) antibiotics (e.g., amoxicillin-clavulanate or cephalexin; IV if severe/preseptal-orbital spread), warm compresses, analgesia; gentle massage; do NOT probe/irrigate during acute infection. Refer to ophthalmology — definitive treatment for recurrent dacryocystitis is DACRYOCYSTORHINOSTOMY (DCR — surgically creates a new drainage pathway) once the acute infection resolves. Watch for spread to PRESEPTAL/ORBITAL cellulitis. In INFANTS: congenital nasolacrimal duct obstruction is common (causes chronic tearing/discharge) — usually managed with massage and resolves by 12 months; probing if persistent."},
{c:"Ear — Sudden SNHL",q:"A 48-year-old wakes up with sudden hearing loss in one ear over a few hours, with a feeling of fullness and tinnitus, but no vertigo and no pain. Weber lateralizes to the opposite (good) ear and Rinne is normal (AC>BC) in the affected ear. What is this, and why is it urgent?",o:["Cerumen impaction — irrigate and reassess at next visit","Otitis media — oral antibiotics","Sudden sensorineural hearing loss (SSNHL) — an OTOLOGIC EMERGENCY; rapid SNHL over 72 hours; urgent audiometry and ENT referral; treat promptly with systemic (and/or intratympanic) corticosteroids — early treatment improves recovery; MRI to evaluate for retrocochlear pathology (acoustic neuroma)","Eustachian tube dysfunction — decongestants and observation"],a:2,r:"Sudden sensorineural hearing loss (SSNHL): rapid-onset SNHL (≥30 dB across 3 contiguous frequencies developing within 72 hours) — an OTOLOGIC EMERGENCY. Often idiopathic (presumed viral or vascular); other causes include acoustic neuroma, autoimmune, Meniere's, ototoxicity. Findings indicating SENSORINEURAL (not conductive) loss: Weber lateralizes to the GOOD (opposite) ear, Rinne normal (AC > BC) in the affected ear. WHY URGENT: prompt treatment improves the chance of hearing recovery — the window is days to ~2 weeks. Management: urgent AUDIOMETRY to confirm and quantify SNHL; URGENT ENT referral; systemic CORTICOSTEROIDS (oral prednisone) started as soon as possible, with intratympanic steroid injections as an option/salvage; MRI of the internal auditory canals to evaluate for retrocochlear pathology (acoustic neuroma). Do NOT mistake SSNHL for cerumen impaction or eustachian tube dysfunction (those are conductive and non-urgent) — a tuning fork exam helps differentiate, and any sudden SNHL warrants emergent evaluation. Time is critical for steroid efficacy."},
{c:"Throat — Oral Candidiasis",q:"An 80-year-old who recently completed a course of broad-spectrum antibiotics and uses an inhaled corticosteroid has white, curd-like plaques on the tongue and buccal mucosa that WIPE OFF, leaving an erythematous, sometimes bleeding base. Diagnosis and management?",o:["Leukoplakia — biopsy, as it cannot be wiped off","Oral hairy leukoplakia — does not wipe off","Oral candidiasis (thrush) — white plaques that WIPE OFF leaving an erythematous base; risk factors include antibiotics, inhaled corticosteroids, immunosuppression, dentures, and diabetes; treat with topical antifungals (nystatin suspension, clotrimazole troches) or oral fluconazole; counsel rinsing the mouth after steroid inhaler use","Aphthous ulcers — topical corticosteroids"],a:2,r:"Oral candidiasis (thrush): Candida albicans overgrowth of the oral mucosa. Hallmark: white, curd-like/cottage-cheese plaques on the tongue, buccal mucosa, and palate that WIPE OFF (scrape off) leaving an ERYTHEMATOUS, sometimes bleeding base (this distinguishes it from leukoplakia and oral hairy leukoplakia, which do NOT wipe off). Risk factors: recent broad-spectrum ANTIBIOTICS (disrupts normal flora), INHALED CORTICOSTEROIDS (without rinsing), immunosuppression (HIV, chemotherapy, diabetes — consider HIV testing in an otherwise healthy adult with unexplained thrush), dentures, xerostomia, extremes of age. Management: topical antifungals first-line for mild disease — NYSTATIN suspension ('swish and swallow') or CLOTRIMAZOLE troches; oral FLUCONAZOLE for moderate-severe, refractory, or immunocompromised patients. PREVENTION/counseling: rinse the mouth with water after using a corticosteroid inhaler and use a spacer; treat underlying causes; denture hygiene. Esophageal candidiasis (dysphagia/odynophagia) → systemic fluconazole and consider immunodeficiency workup."},
{c:"Eye — Papilledema",q:"A patient with chronic headaches is found on fundoscopic exam to have bilateral optic disc swelling with blurred disc margins. What does papilledema specifically indicate and what is the appropriate workup?",o:["Normal optic disc variant — no action needed","Glaucoma — start topical pressure-lowering drops","Papilledema = optic disc swelling due to INCREASED INTRACRANIAL PRESSURE (it is BILATERAL); requires urgent NEUROIMAGING (CT/MRI) to exclude a mass/hydrocephalus/venous thrombosis, followed by lumbar puncture (measuring opening pressure) if imaging is negative — to evaluate for idiopathic intracranial hypertension","Diabetic retinopathy — refer for laser treatment"],a:2,r:"Papilledema: optic disc swelling specifically caused by INCREASED INTRACRANIAL PRESSURE (ICP) — by definition it is BILATERAL (because elevated ICP is transmitted to both optic nerves). Fundoscopic findings: blurred/indistinct optic disc margins, elevated disc, obscured vessels, loss of spontaneous venous pulsations, hemorrhages in severe cases. Symptoms of elevated ICP: headache (worse in the morning, with lying down or Valsalva), nausea/vomiting, transient visual obscurations, pulsatile tinnitus, diplopia (CN VI palsy). Workup: URGENT NEUROIMAGING FIRST (CT or MRI brain, often with venography/MRV) to exclude a space-occupying lesion (tumor, abscess), hydrocephalus, or cerebral venous sinus thrombosis. If imaging is normal → LUMBAR PUNCTURE measuring OPENING PRESSURE (elevated) with normal CSF composition → diagnose idiopathic intracranial hypertension (IIH). Do NOT perform LP before imaging if a mass lesion is possible (herniation risk). Distinguish 'papilledema' (specifically from raised ICP, bilateral) from 'optic disc edema/swelling' from other causes (e.g., optic neuritis, ischemic optic neuropathy — often unilateral)."},
{c:"Nose — Nasal Polyps",q:"A 40-year-old with asthma and aspirin sensitivity has chronic nasal congestion, reduced sense of smell (hyposmia), and rhinorrhea. Exam reveals pale, glistening, grape-like masses in both nasal cavities. Diagnosis and first-line treatment?",o:["Nasal foreign body — remove the object","Allergic rhinitis only — oral antihistamines","Nasal polyps — boggy, pale, glistening masses associated with chronic rhinosinusitis; the triad of asthma + aspirin sensitivity + nasal polyps is 'Samter's triad' (AERD); first-line treatment is INTRANASAL CORTICOSTEROIDS; oral steroids for severe disease; surgery (and aspirin desensitization or biologics) for refractory cases","Squamous cell carcinoma — urgent biopsy"],a:2,r:"Nasal polyps: benign, edematous outgrowths of inflamed sinonasal mucosa associated with chronic rhinosinusitis. Appearance: PALE, glistening, semi-translucent, 'grape-like' or 'boggy' masses in the nasal cavity (distinct from the pink, vascular turbinates). Symptoms: chronic nasal CONGESTION/obstruction, HYPOSMIA/anosmia (reduced smell — a prominent feature), rhinorrhea, postnasal drip. Important association — SAMTER'S TRIAD (aspirin-exacerbated respiratory disease, AERD): (1) ASTHMA + (2) ASPIRIN/NSAID SENSITIVITY + (3) NASAL POLYPS — these patients can have severe respiratory reactions to aspirin/NSAIDs (avoid them). First-line treatment: INTRANASAL CORTICOSTEROIDS (reduce polyp size and symptoms); oral corticosteroids for severe disease (short courses); saline irrigation. Refractory/severe: endoscopic sinus surgery (polypectomy), aspirin desensitization (for AERD), and biologics (anti-IL-4/IL-5/IgE — dupilumab, omalizumab, mepolizumab) for severe chronic rhinosinusitis with polyps. In CHILDREN with nasal polyps, evaluate for CYSTIC FIBROSIS."},
