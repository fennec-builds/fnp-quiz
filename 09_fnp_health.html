<style>
  :root{
    --bg:#F2F5F7; --card:#FFFFFF; --ink:#14283A; --muted:#5B6B7A;
    --teal:#0E7C86; --teal-dk:#0A5A62; --line:#DEE6EB;
    --ok:#1F7A4D; --ok-bg:#E6F4EC; --bad:#B3362E; --bad-bg:#FBEAE8;
    --mono:"SF Mono","Cascadia Code",Consolas,"Liberation Mono",monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    background:var(--bg); color:var(--ink);
    font-family:"Avenir Next","Segoe UI",-apple-system,BlinkMacSystemFont,Helvetica,Arial,sans-serif;
    line-height:1.55; padding:20px 14px 60px;
  }
  .wrap{max-width:760px;margin:0 auto}
  header{display:flex;justify-content:space-between;align-items:baseline;gap:10px;margin-bottom:6px;flex-wrap:wrap}
  h1{font-size:1.15rem;font-weight:700;letter-spacing:.01em}
  h1 span{color:var(--teal)}
  .score{font-family:var(--mono);font-size:.85rem;color:var(--muted)}
  .score b{color:var(--ink)}
  /* telemetry strip */
  .striplabel{font-family:var(--mono);font-size:.62rem;letter-spacing:.14em;color:var(--muted);margin:14px 0 5px}
  .strip{display:flex;gap:2px;flex-wrap:nowrap;border-bottom:1px solid var(--line);padding-bottom:10px}
  .tick{flex:1;height:16px;background:#E2E9EE;border-radius:2px;cursor:pointer;transition:height .15s}
  .tick.ok{background:var(--ok)} .tick.bad{background:var(--bad)}
  .tick.cur{height:24px;outline:2px solid var(--teal);outline-offset:1px}
  /* card */
  .card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:22px;margin-top:18px;box-shadow:0 1px 3px rgba(20,40,58,.06)}
  .meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;gap:8px;flex-wrap:wrap}
  .qnum{font-family:var(--mono);font-size:.8rem;color:var(--muted)}
  .chip{font-size:.68rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--teal-dk);background:#E3F1F2;border-radius:999px;padding:3px 10px}
  .stem{font-size:1.02rem;margin-bottom:18px}
  .opt{
    display:flex;gap:12px;align-items:flex-start;width:100%;text-align:left;
    background:#FAFCFD;border:1.5px solid var(--line);border-radius:10px;
    padding:13px 14px;margin-bottom:9px;cursor:pointer;font:inherit;color:inherit;
    transition:border-color .12s, background .12s;
  }
  .opt:hover:not(:disabled){border-color:var(--teal)}
  .opt:focus-visible{outline:3px solid var(--teal);outline-offset:2px}
  .opt:disabled{cursor:default}
  .opt .ltr{font-family:var(--mono);font-weight:700;color:var(--muted);flex:0 0 auto}
  .opt.sel-ok{border-color:var(--ok);background:var(--ok-bg)}
  .opt.sel-bad{border-color:var(--bad);background:var(--bad-bg)}
  .opt.reveal-ok{border-color:var(--ok);background:var(--ok-bg)}
  .verdict{font-weight:700;margin:10px 0 6px}
  .verdict.ok{color:var(--ok)} .verdict.bad{color:var(--bad)}
  .rationale{background:#F4F8FA;border-left:3px solid var(--teal);border-radius:0 8px 8px 0;padding:13px 15px;font-size:.93rem;margin-top:4px}
  .nav{display:flex;justify-content:space-between;gap:10px;margin-top:20px}
  .btn{
    font:inherit;font-weight:600;border:none;border-radius:10px;padding:11px 20px;cursor:pointer;
    background:var(--teal);color:#fff;transition:background .12s;
  }
  .btn:hover{background:var(--teal-dk)}
  .btn:disabled{background:#C4D0D8;cursor:default}
  .btn.ghost{background:transparent;color:var(--teal);border:1.5px solid var(--teal)}
  .btn.ghost:hover{background:#E3F1F2}
  .btn:focus-visible{outline:3px solid var(--ink);outline-offset:2px}
  /* results */
  .bigscore{font-family:var(--mono);font-size:2.6rem;font-weight:700;color:var(--teal-dk)}
  .sub{color:var(--muted);margin-bottom:18px}
  .catrow{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--line);font-size:.92rem}
  .bar{flex:1;height:8px;background:#E2E9EE;border-radius:99px;overflow:hidden;margin:0 12px}
  .bar i{display:block;height:100%;background:var(--teal)}
  .missedlist{margin-top:16px}
  .missedlist button{
    font-family:var(--mono);font-size:.8rem;background:var(--bad-bg);color:var(--bad);
    border:1px solid #E8C2BE;border-radius:8px;padding:6px 10px;margin:0 6px 6px 0;cursor:pointer;
  }
  .hide{display:none}
  @media (prefers-reduced-motion: reduce){ *{transition:none !important} }
  @media (max-width:480px){ .card{padding:16px} .strip{gap:1px} }

<script>
const QUESTIONS = [
{c:"Cancer Screening — Colorectal",q:"Per USPSTF 2021 guidelines, colorectal cancer screening should begin at which age for average-risk adults?",o:["Age 40 for everyone","Age 45 — Grade B for ages 45-49, Grade A for ages 50-75","Age 50 — the threshold has not changed","Age 55 — lower risk justifies later start"],a:1,r:"USPSTF 2021 update: colorectal cancer screening begins at age 45 (lowered from 50 in the 2016 guidelines). Grade B for ages 45-49; Grade A for ages 50-75. Screening modalities: stool-based tests (annual high-sensitivity FOBT or FIT, or multi-target stool DNA every 1-3 years), direct visualization (colonoscopy every 10 years, CT colonography every 5 years, flexible sigmoidoscopy every 5 years). Average-risk screening ends at 75 (Grade C: individualized decision 76-85; Grade D: against screening after 85). Higher-risk patients (family history of CRC, IBD, prior adenoma) begin earlier."},
{c:"Cancer Screening — Colorectal",q:"A 68-year-old has an annual FIT (fecal immunochemical test) that returns positive. She has no symptoms. What is the mandatory next step?",o:["Repeat FIT in 6 months — one positive result is not reliable","Prescribe empiric iron supplementation and recheck in 3 months","Diagnostic colonoscopy — a positive stool-based test ALWAYS requires colonoscopy to evaluate for polyps or cancer; failure to follow up is a common malpractice issue","CT abdomen/pelvis only — colonoscopy is too invasive"],a:2,r:"A positive stool-based test (FIT, FOBT, or Cologuard) mandates DIAGNOSTIC COLONOSCOPY — this is non-negotiable. Positive stool tests are not 'screening complete' — they are abnormal findings requiring workup. Failure to follow up a positive FIT with colonoscopy is a leading cause of delayed colorectal cancer diagnosis and a major malpractice exposure. Important: if a patient has a positive FIT but declines colonoscopy, document counseling thoroughly. A repeat FIT after a positive is NOT appropriate — it will not change the management."},
{c:"Cancer Screening — Breast",q:"Per USPSTF 2024 updated guidelines, at what age should mammography screening begin for average-risk women?",o:["Age 35 annually for all women","Age 40 biennially (every 2 years) — USPSTF 2024 updated from age 50 to age 40","Age 50 biennially — the 2016 recommendation still stands","Age 45 annually per ACS, and this is the USPSTF standard"],a:1,r:"USPSTF 2024 update: biennial mammography recommended starting at age 40 for all average-risk women (Grade B). This is a significant change from the 2016 USPSTF recommendation that gave individual choice at 40-49 and recommended screening at 50. Key distinction: USPSTF 2024 = age 40 biennial; ACS = age 45 annual (or age 40 with shared decision-making). Both recommend screening through at least age 74-75. High-risk women (BRCA mutation, prior chest radiation, first-degree relative with premenopausal breast cancer): annual MRI + mammogram starting at age 25-30."},
{c:"Cancer Screening — Cervical",q:"A 66-year-old woman with no history of high-grade cervical dysplasia and three consecutive negative co-tests in the past 10 years asks about cervical cancer screening. What should she be told?",o:["Continue Pap smears every 3 years indefinitely","Co-testing every 5 years should continue through age 75","Cervical cancer screening can be DISCONTINUED at age 65 with adequate prior screening history — she qualifies; no further Pap or HPV testing is needed","Switch to HPV testing only every 10 years after 65"],a:2,r:"USPSTF: discontinue cervical cancer screening at age 65 in women with adequate prior screening (3 consecutive negative Pap smears or 2 consecutive negative co-tests within the past 10 years, with the most recent within 5 years) AND no history of CIN2+, CIN3, or cervical cancer in the past 25 years. Women who never had adequate screening should continue to age 65 or beyond. Hysterectomy with cervix removal for a benign indication: no further cervical screening needed. This is a screening discontinuation question — a high-yield ANCC topic."},
{c:"Cancer Screening — Lung",q:"Which patient meets USPSTF 2021 criteria for annual low-dose CT lung cancer screening?",o:["A 48-year-old with a 25 pack-year history who currently smokes","A 52-year-old with a 22 pack-year history who quit 18 years ago","A 55-year-old with a 20 pack-year history who quit 10 years ago","A 45-year-old with a 30 pack-year history who currently smokes"],a:2,r:"USPSTF 2021 LDCT lung cancer screening criteria (ALL must be met): Age 50-80, ≥20 pack-year history, and currently smoking OR quit within the past 15 years. Patient A: age 48 (too young). Patient B: quit 18 years ago (exceeds 15-year quit threshold). Patient C: age 55 ✓, 20 pack-years ✓, quit 10 years ago ✓ — QUALIFIES. Patient D: age 45 (too young). Screening ends at age 81 or if quit >15 years ago, whichever comes first. Key change from 2013 USPSTF: lowered starting age from 55 to 50, and pack-year threshold from 30 to 20."},
{c:"Cancer Screening — Prostate",q:"A 58-year-old African American man asks about PSA screening for prostate cancer. Per USPSTF guidance, which statement is most accurate?",o:["USPSTF recommends against PSA testing in all men — Grade D for all ages","PSA screening is mandatory for all men starting at age 50","USPSTF recommends shared decision-making for men 55-69 (Grade C) — discuss benefits (potential early detection) and harms (false positives, overdiagnosis, unnecessary treatment with biopsy, incontinence, erectile dysfunction)","PSA screening is recommended annually after age 40 for Black men without discussion"],a:2,r:"USPSTF PSA screening: Grade C (2018) for men ages 55-69 — offer screening based on INDIVIDUAL INFORMED DECISION-MAKING after discussing benefits and harms. Grade D (recommend against) for men ≥70 — harms outweigh benefits. Shared decision-making includes: discussing the 0.1% absolute risk reduction in prostate cancer mortality vs ~12% false positive rate with downstream biopsy risks. High-risk groups (Black men, family history of prostate cancer) may benefit more from earlier/more aggressive screening — inform them specifically. ACS recommends the conversation at 50 for average risk, 45 for high risk, 40 for very high risk (multiple first-degree relatives)."},
{c:"Cancer Screening — Skin",q:"Which patients should have a full-body skin examination recommended by USPSTF for melanoma detection?",o:["All adults annually starting at age 40","USPSTF does NOT recommend routine skin examination — insufficient evidence (Grade I) in asymptomatic adults; counsel all patients about sun protection and to report new or changing lesions","Only patients who sunburn easily","Only patients with a family history of melanoma"],a:1,r:"USPSTF 2023: Grade I (Insufficient Evidence) for visual skin cancer screening in asymptomatic adults. This does NOT mean 'don't screen' — it means the evidence base is insufficient to make a universal recommendation. In practice: counsel all patients about sun-safe behaviors (SPF 30+, protective clothing, avoid tanning beds), perform targeted skin exams on high-risk individuals (prior skin cancer, atypical moles/dysplastic nevi, CDKN2A mutation, immunosuppression, fair skin, significant UV exposure history), and teach patients self-examination. Refer to dermatology for high-risk patients."},
{c:"Cardiovascular Screening",q:"USPSTF recommends that all adults 18 and older be screened for hypertension. Which statement about blood pressure measurement best reflects current guidelines?",o:["Single office measurement is sufficient for diagnosis","One elevated office reading always requires immediate treatment","Elevated office readings should be confirmed with repeat measurements or out-of-office monitoring (ambulatory or home BP monitoring) before diagnosing and treating — white coat HTN is common","BP should only be measured every 5 years in adults under 40"],a:2,r:"USPSTF Grade A: screen for high blood pressure in adults ≥18. Diagnosis: do NOT diagnose or treat based on a single reading. Confirm with: repeat office readings on ≥2 visits, ambulatory blood pressure monitoring (ABPM — gold standard, eliminates white coat effect), or validated home BP monitoring. ABPM is the most accurate method. ACC/AHA: ≥2 readings averaged on ≥2 occasions. White coat HTN (office elevated, home normal) affects ~15-30% of patients — overtreatment risks: falls, dizziness, syncope. Masked HTN (office normal, home elevated) = worse cardiovascular prognosis — requires ABPM to detect."},
{c:"Cardiovascular Screening",q:"USPSTF recommends lipid (cholesterol) screening beginning at what age for adults without cardiovascular risk factors?",o:["Age 20 for all adults","Age 35 for men without risk factors; age 45 for women without risk factors — or younger with risk factors","Age 50 for everyone","Annual lipid screening is recommended for all adults starting at age 18"],a:1,r:"USPSTF lipid screening recommendations: Men without CVD risk factors: begin at age 35; Men with CVD risk factors: begin at age 20-35 (based on risk). Women: USPSTF has insufficient evidence — Grade I for asymptomatic women without known risk factors; however, most guidelines (ACC/AHA) recommend risk assessment and lipid screening in women with risk factors starting at age 20. In practice: screen all adults with cardiovascular risk factors (diabetes, smoking, hypertension, family history of premature ASCVD, obesity) regardless of age. Use pooled cohort equation (PCE) to calculate 10-year ASCVD risk to guide statin therapy decisions."},
{c:"Diabetes Screening",q:"USPSTF recommends screening for prediabetes and type 2 diabetes in which asymptomatic adults?",o:["All adults over age 30 annually","Adults 35-70 who are overweight or obese (BMI ≥25 kg/m²) — Grade B","Only adults with a first-degree relative with diabetes","Only adults with symptoms of diabetes (polyuria, polydipsia)"],a:1,r:"USPSTF 2021 Grade B: screen for prediabetes and T2DM in asymptomatic adults ages 35-70 who are overweight (BMI 25-29.9) or obese (BMI ≥30). Screening tests: fasting plasma glucose, A1c, or 75g OGTT. If normal: rescreen every 3 years. ADA recommends broader screening: any adult ≥35, or any age with: physical inactivity, first-degree relative with DM, high-risk race/ethnicity, gestational DM, HTN, dyslipidemia, PCOS, pre-diabetes on prior testing. Pre-diabetes identified: lifestyle modification is the most effective intervention (58% reduction in progression per DPP trial)."},
{c:"Obesity Screening",q:"USPSTF recommends screening for obesity in all adults and referring those with BMI ≥30 to which type of intervention?",o:["Referral to a weight loss surgeon immediately","Diet counseling alone in the primary care office","Intensive behavioral intervention — multicomponent programs with ≥12 sessions in the first year, addressing diet, physical activity, and behavioral strategies; Grade B","Prescription weight loss medications only"],a:2,r:"USPSTF Grade B: screen all adults for obesity (BMI ≥30); refer to intensive behavioral counseling interventions. Intensive behavioral intervention criteria: ≥12 sessions in first year, multicomponent (dietary counseling + physical activity + behavioral change strategies), delivered by trained clinician or referral. Evidence: produces 5-10% weight loss, reduces progression to T2DM by 58% (DPP), improves cardiovascular risk factors. NPs should know: BMI ≥25 = overweight; BMI ≥30 = obese; BMI ≥40 = class III (severe). Weight loss medications (GLP-1 agonists, orlistat) are adjuncts to lifestyle. Bariatric surgery: BMI ≥40 or ≥35 with comorbidities, failed nonsurgical treatment."},
{c:"Mental Health Screening",q:"USPSTF recommends screening for depression in which populations?",o:["Only adults with a prior history of depression","Adults 18 and older (Grade B) AND adolescents 12-18 (Grade B) — when adequate systems are in place for diagnosis, treatment, and follow-up","Only pregnant and postpartum women","Only elderly adults in nursing homes"],a:1,r:"USPSTF depression screening: Grade B for adults ≥18 (including pregnant and postpartum women — screened specifically with Edinburgh Postnatal Depression Scale). Grade B for adolescents 12-18. Recommended screening tools: PHQ-2 (2-question initial screen), then PHQ-9 if positive. PHQ-9 scoring: 0-4 minimal, 5-9 mild, 10-14 moderate, 15-19 moderately severe, ≥20 severe. Key requirement: screening should be done when systems are in place for follow-up and treatment. Do not screen without a pathway for diagnosis and management."},
{c:"Mental Health Screening",q:"A 38-year-old woman scores 2 on the PHQ-2 (responding yes to feeling depressed and yes to anhedonia). What should happen next?",o:["Diagnose major depressive disorder and start an SSRI immediately","No further action — PHQ-2 score of 2 is not clinically significant","Administer the full PHQ-9 to assess symptom severity, duration, and functional impairment — PHQ-2 is a SCREENING tool, not a diagnostic tool","Refer directly to psychiatry without further assessment"],a:2,r:"PHQ-2 (Patient Health Questionnaire-2): screens with two questions (depressed mood + anhedonia in past 2 weeks). Score ≥3 = positive screen (sensitivity ~83%, specificity ~90% for MDD). Score 2 is lower risk but still warrants follow-up. Next step: administer PHQ-9 to quantify severity, duration, and functional impairment. PHQ-9 score guides management: mild (5-9) = watchful waiting, counseling; moderate (10-14) = psychotherapy and/or antidepressant; moderately-severe to severe (≥15) = pharmacotherapy + therapy, consider psychiatry referral. PHQ-2/9 are not diagnostic — diagnosis requires full clinical assessment meeting DSM-5 criteria."},
{c:"Substance Use Screening",q:"USPSTF recommends screening for unhealthy alcohol use in adults using which validated tool, and what constitutes a positive screen?",o:["Blood alcohol level (BAL) — screen annually","AUDIT-C questionnaire — score ≥3 in women or ≥4 in men suggests unhealthy alcohol use and warrants brief counseling intervention","CAGE questionnaire only — 2 or more positive answers indicate alcoholism","PHQ-9 — elevated scores indicate alcohol misuse"],a:1,r:"USPSTF Grade B: screen adults ≥18 for unhealthy alcohol use; provide brief behavioral counseling for those who screen positive. Tools: AUDIT (Alcohol Use Disorders Identification Test, 10 questions) or AUDIT-C (first 3 questions — quantity/frequency/binge). AUDIT-C positive: ≥3 women, ≥4 men. CAGE questionnaire (Cut down, Annoyed, Guilty, Eye-opener): ≥2 positive = likely AUD but less sensitive for risky drinking that does not meet AUD criteria. Brief interventions (FRAMES model: Feedback, Responsibility, Advice, Menu, Empathy, Self-efficacy) in primary care reduce unhealthy drinking. Unhealthy use = at-risk, harmful, or AUD — includes any use in pregnant women."},
{c:"Substance Use Screening",q:"USPSTF currently recommends screening for which substance in pregnant women?",o:["Alcohol only — illicit drug screening is not recommended","Tobacco only — most evidence-based intervention","Both tobacco and illicit drug use (including prescription opioid misuse) — ask all pregnant patients; refer to treatment; tobacco cessation intervention is Grade A","No substance use screening in pregnancy — women should self-report"],a:2,r:"USPSTF in pregnant women: Grade A — ask all patients about tobacco use and provide cessation interventions (counseling + pharmacotherapy if needed — nicotine replacement is acceptable; bupropion and varenicline require benefit-risk discussion). Grade B — screen for unhealthy drug use (ask about illicit drug use and prescription misuse). Also: Grade B — screen for unhealthy alcohol use. USPSTF: insufficient evidence on validated tools specifically for prenatal drug screening. In practice: universal screening with validated tools (AUDIT-C, 4Ps, SURP-P) is recommended. NRT in pregnancy: safer than continued smoking; consider patch or gum."},
{c:"Tobacco Screening",q:"USPSTF Grade A recommendation: what should every primary care clinician do regarding tobacco at EVERY patient visit?",o:["Only mention tobacco if the patient brings it up first","Ask patients if they smoke only during annual wellness visits","Ask ALL adult patients about tobacco use at every visit; advise all tobacco users to quit; offer or refer to cessation treatment — this is a Grade A recommendation","Tobacco screening and cessation counseling are not reimbursable and therefore optional"],a:2,r:"USPSTF Grade A (2021): ask all adults about tobacco use at every clinical encounter; advise all tobacco users to quit; provide effective cessation treatments. Effective interventions: (1) Behavioral counseling — even 3-5 minutes brief counseling increases quit rates; (2) Pharmacotherapy — first-line: varenicline (most effective), bupropion, NRT (patch, gum, lozenge, inhaler, spray); (3) Combination NRT (patch + short-acting) or NRT + bupropion are more effective than monotherapy. The 5As model: Ask, Advise, Assess readiness, Assist, Arrange follow-up. Tobacco cessation is the single most impactful preventive intervention for overall mortality reduction."},
{c:"STI Screening",q:"USPSTF recommends HIV screening for which population?",o:["Only patients with known risk factors","All adults ages 15-65 at least once (Grade A); higher-risk individuals should be screened more frequently","Annual HIV screening for everyone over age 13","Only IV drug users and men who have sex with men"],a:1,r:"USPSTF Grade A: screen all adolescents and adults ages 15-65 for HIV at least once. Adolescents younger than 15 and adults older than 65: screen if at increased risk. Higher-risk individuals (MSM, IVDU, multiple partners, sex work, known HIV-positive partner, certain geographic areas): screen at least annually or more frequently. Pregnancy: screen all pregnant women at first prenatal visit. Diagnosis: 4th-generation HIV-1/2 antigen/antibody combination immunoassay (detects both p24 antigen and antibodies). If positive: confirm with HIV-1/HIV-2 antibody differentiation immunoassay ± HIV-1 RNA. Early diagnosis allows treatment before CD4 decline and reduces transmission."},
{c:"STI Screening",q:"Which of the following STI screening recommendations for asymptomatic adults is a USPSTF Grade B recommendation?",o:["Annual syphilis screening for all adults over 30","Gonorrhea and chlamydia screening for all sexually active adults regardless of age","Annual chlamydia and gonorrhea screening for all sexually active women ≤24 and older women at increased risk","Hepatitis C screening for all adults annually"],a:2,r:"USPSTF Grade B STI screenings: (1) Chlamydia and gonorrhea: all sexually active women ≤24 AND older women at increased risk (new/multiple partners, inconsistent condom use, prior STI, sex work) — annual screening. (2) Syphilis: all adults at increased risk (MSM, sex workers, history of incarceration or STI, unprotected sex with multiple partners). (3) Hepatitis C: adults 18-79 at least once (Grade B). (4) HIV: all adults 15-65 at least once (Grade A). Note: USPSTF does not recommend universal gonorrhea/chlamydia screening for all adults — women ≤24 are universally screened regardless of other risk factors."},
{c:"Hepatitis Screening",q:"USPSTF recommends screening for hepatitis C virus (HCV) in which population?",o:["Only adults with a history of IV drug use","Only adults who received blood transfusions before 1992","All adults ages 18-79 at least once — Grade B; persons at increased risk should be screened periodically","Annual HCV screening for everyone over age 50"],a:2,r:"USPSTF 2020 Grade B: screen all adults ages 18-79 for HCV infection at least once, regardless of risk factors. Persons at increased risk (current or past IVDU, blood transfusion/organ transplant before 1992, HIV-positive, unexplained liver disease, hemodialysis, healthcare workers with needlestick exposure): screen more frequently. Screening test: anti-HCV antibody; if positive → confirm with HCV RNA. Why: chronic HCV affects ~3.5 million Americans, often asymptomatic for decades, leads to cirrhosis and HCC; cure rates >95% with DAA therapy. Early detection = cure opportunity before liver damage."},
{c:"Osteoporosis Screening",q:"Per USPSTF, which women should be screened for osteoporosis with a DEXA scan?",o:["All women starting at age 50","Women 65 and older (Grade B); younger postmenopausal women whose 10-year fracture risk equals or exceeds that of a 65-year-old white woman with no risk factors (per FRAX tool)","All postmenopausal women of any age","Only women with prior fractures"],a:1,r:"USPSTF Grade B: screen for osteoporosis with DEXA in: (1) Women ≥65 years; (2) Postmenopausal women <65 whose 10-year fracture probability (via FRAX tool) equals or exceeds that of a 65-year-old white woman with no additional risk factors (~9.3% major fracture, ~1% hip fracture). Risk factors for earlier screening: low body weight (<127 lbs), smoking, alcohol, family history of hip fracture, rheumatoid arthritis, corticosteroid use. USPSTF does NOT recommend routine screening in men (Grade I — insufficient evidence). Fracture prevention: calcium + vitamin D + bisphosphonate for T-score ≤-2.5 or FRAX threshold met."},
{c:"Vision & Hearing Screening",q:"USPSTF recommends vision screening for which pediatric age group to detect amblyopia?",o:["Only school-age children with reported vision problems","Annual Snellen chart testing beginning at birth","Vision screening for children ages 3-5 to detect amblyopia (lazy eye) and other visual impairment — Grade B; critical period for treatment","No vision screening until age 7 when children can reliably read an eye chart"],a:2,r:"USPSTF Grade B: vision screening at least once between ages 3-5 to detect amblyopia and risk factors. Screening methods: visual acuity testing (Snellen or HOTV at age 3), photoscreening/instrument-based screening (age 1-3). Amblyopia is the most common cause of preventable visual impairment in children — treatable only during the critical period of visual development (before age 7-8). Treatment: correct underlying cause (glasses, cataract) + patching/atropine of the better eye. AAP recommends vision screening at every well-child visit with objective methods starting at age 6 months."},
{c:"Immunizations — Adults",q:"Which adult immunization is a USPSTF Grade A recommendation for all adults 50 and older?",o:["Annual flu vaccine — Grade A for everyone over 50","Recombinant zoster vaccine (Shingrix) — Grade A; 2 doses 2-6 months apart for immunocompetent adults ≥50","Pneumococcal vaccine (PPSV23) — Grade A for age 50+","Annual COVID-19 booster — Grade A for all adults"],a:1,r:"USPSTF Grade A (2018): recombinant zoster vaccine (Shingrix) for immunocompetent adults ≥50 — 2-dose series 2-6 months apart. Efficacy: >90% for preventing shingles and postherpetic neuralgia. Recommended even for prior Zostavax recipients and those with prior shingles episode. Note: annual influenza vaccination is strongly recommended (Grade B for all adults) but may not be specifically Grade A. Pneumococcal vaccines (PCV15/PCV20 + PPSV23) are recommended for adults ≥65 and high-risk adults <65 but are not universally Grade A for age 50+. Know the grade distinctions — ANCC tests this."},
{c:"Well-Child Visits",q:"At which visit does the AAP recommend assessing for autism spectrum disorder using the M-CHAT-R/F, developmental surveillance, and universal developmental screening?",o:["Every well-child visit from birth to 18","Formal developmental screening at 9, 18, and 30 months; autism-specific screening (M-CHAT-R/F) at 18 and 24 months; surveillance at every visit","Only when a parent or teacher raises a developmental concern","At 24 months only — a single comprehensive assessment is sufficient"],a:1,r:"AAP Bright Futures developmental surveillance and screening schedule: Developmental SURVEILLANCE (systematic observation, eliciting parental concerns): every well-child visit. Formal developmental SCREENING (standardized validated tool — ASQ, PEDS): 9 months, 18 months, and 30 months. Autism-specific screening (M-CHAT-R/F): 18 months AND 24 months. Additional ASD screening at 36 months (some recommendations). Important: surveillance is NOT the same as screening — surveillance identifies children needing screening; screening uses validated tools. Any parental concern → screen immediately regardless of scheduled visit. Early identification enables earlier intervention = better outcomes."},
{c:"Health Promotion — Folic Acid",q:"USPSTF recommends folic acid supplementation for which group, and at what dose?",o:["All adults over age 18 regardless of reproductive plans","Folic acid 400-800 mcg daily for ALL women of reproductive capacity (who could become pregnant) — Grade A; reduces neural tube defect risk by 50-70%","Only women in the first trimester of confirmed pregnancy","Only women with prior neural tube defect pregnancy"],a:1,r:"USPSTF Grade A: all women who are planning or capable of pregnancy should take 400-800 mcg (0.4-0.8 mg) of folic acid daily to prevent neural tube defects. Start 1 month before conception (neural tube closes by day 28 — often before pregnancy is confirmed). High-dose 4 mg daily: prior pregnancy with NTD, maternal diabetes, use of certain antiepileptics (valproate, carbamazepine). Most multivitamins contain 400-800 mcg. Since 50% of pregnancies are unplanned, universal supplementation for reproductive-age women is recommended — not just those actively trying to conceive."},
{c:"Health Promotion — Aspirin",q:"USPSTF 2022 updated aspirin recommendations for primary prevention of cardiovascular disease: which group should NOT start low-dose aspirin?",o:["Adults aged 50-59 with ≥10% 10-year CVD risk","Adults aged 40-49 with ≥10% 10-year CVD risk after discussion","Adults 60 years and older initiating aspirin for primary prevention — USPSTF now recommends AGAINST initiating aspirin in adults ≥60 (Grade D) due to bleeding risk outweighing benefit","All adults with hypertension"],a:2,r:"USPSTF 2022 aspirin primary prevention update (significant change): Age 40-49 with ≥10% 10-year CVD risk: individualized decision (Grade C) — discuss bleeding risk vs potential benefit. Age 50-59 with ≥10% CVD risk: Grade B — aspirin recommended for those without increased bleeding risk who are willing to take it. Age ≥60: Grade D — recommend AGAINST initiating aspirin for primary prevention (bleeding risk — especially GI and intracranial hemorrhage — outweighs benefit). Important: this applies to PRIMARY PREVENTION only. Aspirin for SECONDARY prevention (established ASCVD, prior MI, stroke) remains strongly indicated and was NOT changed."},
{c:"Health Promotion — Exercise",q:"Current DHHS Physical Activity Guidelines recommend how much aerobic activity per week for adults to achieve substantial health benefits?",o:["30 minutes of moderate activity once a week","At least 150-300 minutes of moderate-intensity OR 75-150 minutes of vigorous-intensity aerobic activity per week, plus muscle-strengthening activities ≥2 days per week","Only 10 minutes of daily walking is sufficient for full health benefits","60 minutes of vigorous exercise daily, 7 days per week"],a:1,r:"DHHS 2018 Physical Activity Guidelines for Americans: Adults: 150-300 min/week of MODERATE-intensity activity (brisk walking, water aerobics, cycling <10 mph) OR 75-150 min/week of VIGOROUS-intensity (running, swimming laps, cycling >10 mph) OR equivalent combination. Plus muscle-strengthening (resistance training) ≥2 days/week (all major muscle groups). Additional benefits with more activity (up to 300 min moderate). For adults who cannot meet guidelines due to chronic conditions: be as active as ability and conditions allow. Benefits: reduces all-cause mortality, CVD, T2DM, depression, several cancers, dementia risk. Even small amounts help — 'some is better than none.'"},
{c:"Health Promotion — Domestic Violence",q:"USPSTF recommends screening for intimate partner violence (IPV) in which population, and what should happen when a positive screen occurs?",o:["Screen only women presenting with unexplained injuries or depression","Screen all men and women over age 50","Screen all women of reproductive age (approximately 14-46) — Grade B; refer women who screen positive to ongoing support services","No universal screening — privacy concerns outweigh benefits"],a:2,r:"USPSTF Grade B: screen women of reproductive age for intimate partner violence (IPV) and refer those who screen positive to intervention services. Validated tools: HITS (Hurt, Insult, Threaten, Scream) — most used in primary care; HARK (Humiliation, Afraid, Rape, Kick). Screen in PRIVATE — never with the partner present. Do NOT pressure disclosure; assess safety, document objectively, provide resources. Positive screen: provide supportive conversation, local DV hotline number (National DV Hotline: 1-800-799-7233), safety planning, and warm referral to advocacy services. Report: mandatory only for injuries from weapons or if the victim is a minor or vulnerable adult (state law varies)."},
{c:"Health Promotion — Vitamin D",q:"USPSTF current recommendation on vitamin D supplementation for prevention of cancer or cardiovascular disease in community-dwelling adults without deficiency?",o:["Vitamin D 2,000 IU daily is recommended for all adults over 50 to prevent cancer","USPSTF recommends AGAINST vitamin D supplementation specifically for primary prevention of cancer and cardiovascular disease in adults without deficiency (Grade D for cancer/CVD prevention)","Vitamin D supplementation is Grade A for all adults for fall prevention","Annual 25-OH vitamin D level check is recommended for all adults"],a:1,r:"USPSTF 2021 on vitamin D: Grade D — recommends AGAINST vitamin D supplementation to prevent cancer or cardiovascular disease in non-deficient community-dwelling adults. The evidence does NOT support supplementation for these outcomes. Important distinction: supplementing DEFICIENT patients (25-OH vitamin D <20 ng/mL) for bone health and fall prevention is appropriate — that is different from population-level cancer/CVD prevention supplementation. Calcium + vitamin D for osteoporosis prevention is still recommended in the right patients. This is a frequently misunderstood area — many patients take vitamin D believing it prevents cancer; evidence does not support this in non-deficient adults."},
{c:"Health Promotion — Falls",q:"A 70-year-old woman has had two falls in the past year without injury. USPSTF and CDC recommend which primary prevention approach?",o:["Restrict activity to prevent future falls","Prescribe a multivitamin only","Multifactorial intervention: exercise (balance training is most effective), medication review (deprescribe fall-risk medications), vision correction, home safety modifications — Grade B for community-dwelling adults ≥65 with fall risk","Immediately refer to a fall prevention specialist — primary care cannot address this"],a:2,r:"USPSTF Grade B: exercise interventions to prevent falls in community-dwelling adults ≥65 at increased fall risk. Multifactorial fall risk assessment and intervention (CDC STEADI program): (1) Exercise — balance + strength training is the most effective single intervention (Tai Chi, structured programs); (2) Medication review — deprescribe fall-risk drugs (Beers list: benzodiazepines, anticholinergics, opioids, sedating antihistamines, antihypertensives causing orthostasis); (3) Vision correction; (4) Home hazard modification (remove throw rugs, improve lighting, install grab bars); (5) Vitamin D supplementation if deficient. TUG (Timed Up and Go) test: ≥12 seconds = elevated fall risk."},
{c:"Health Promotion — Alcohol",q:"How many standard drinks per week defines low-risk alcohol use for adult women per NIAAA guidelines?",o:["More than 14 drinks per week is fine for women","No more than 7 drinks per week and no more than 3 drinks on any single day","No more than 14 drinks per week — the same as men","1 drink per day maximum — less than 7 per week"],a:1,r:"NIAAA low-risk drinking guidelines: Women: ≤7 drinks per week AND ≤3 drinks on any single occasion. Men: ≤14 drinks per week AND ≤4 drinks on any single occasion. One standard drink = 14g of alcohol = 12 oz regular beer (5%), 5 oz wine (12%), or 1.5 oz spirits (40%). Exceeding these limits = at-risk drinking. Alcohol use disorder (AUD): a spectrum — screen with AUDIT-C, then AUDIT for full assessment. Pregnant women: NO safe level of alcohol — complete abstinence recommended. Drinking above low-risk thresholds increases risk of: liver disease, cancers (liver, breast, colorectal, oropharyngeal), cardiovascular disease, injury."},
{c:"Well-Child — Lead Screening",q:"At which ages does the AAP and CDC recommend universal blood lead level (BLL) screening for children in high-risk areas?",o:["Once at age 5, before school entry","At 12 months and 24 months in high-risk areas; targeted screening based on risk assessment in lower-risk areas","Only when symptoms of lead poisoning appear","At 6 months and 9 months only"],a:1,r:"Lead screening guidelines: Universal blood lead testing: 12 months AND 24 months for all children in high-risk areas (pre-1978 housing, low-income communities, high prevalence of elevated BLLs). Targeted/risk-based screening: in lower-prevalence areas, use risk questionnaire — screen if positive risk factors (lives in or frequently visits older housing, recent immigration, use of traditional remedies, occupational exposure in home). CDC reference value: BLL ≥3.5 mcg/dL triggers case management and environmental investigation. Primary prevention (eliminate exposure) is the most important intervention. No safe blood lead level exists. Primary sources: lead paint dust (pre-1978 homes), contaminated soil."},
{c:"Health Promotion — Sun Safety",q:"Which sunscreen SPF and application pattern is recommended by the American Academy of Dermatology for adequate UV protection?",o:["SPF 15 applied once daily is sufficient","SPF 30 or higher, broad-spectrum (UVA + UVB), water-resistant; apply 1 oz to all exposed skin 15 minutes before sun exposure; reapply every 2 hours and after swimming/sweating","SPF 70 is required — lower SPF provides minimal protection","Sunscreen only needs to be applied when spending more than 4 hours outdoors"],a:1,r:"AAD sunscreen recommendations: SPF ≥30 (blocks ~97% of UVB), BROAD-SPECTRUM (covers both UVA and UVB — UVA causes photoaging/melanoma, UVB causes sunburn/skin cancer), water-resistant. Apply to ALL exposed skin 15-30 minutes before sun exposure — approximately 1 oz (a shot glass full) for full body. Reapply every 2 hours and immediately after swimming or heavy sweating. No sunscreen is truly 'waterproof.' Additional protection: UPF-rated clothing, wide-brim hat, UV-protective sunglasses, seek shade 10am-4pm (peak UV hours), avoid tanning beds (cause melanoma, basal cell, and squamous cell carcinoma). Sunscreen + protective clothing is superior to sunscreen alone."},
{c:"Preventive Immunization",q:"Which immunization does CDC/ACIP recommend for ALL adults ≥65 who have not previously received it, specifically to prevent community-acquired pneumonia hospitalization?",o:["Annual influenza vaccine only — pneumococcal vaccines are only for immunocompromised patients","Pneumococcal conjugate vaccine (PCV15 or PCV20) — with PCV15 followed by PPSV23 one year later OR PCV20 alone; a single pneumococcal vaccination is recommended for all adults ≥65","Pneumococcal vaccine every 5 years for all adults","PPSV23 alone — PCV has no additional benefit in adults ≥65"],a:1,r:"ACIP 2021 pneumococcal vaccine recommendations for adults ≥65 (never previously vaccinated): Option 1: PCV20 (Prevnar 20) alone — covers 20 serotypes, single injection, no further PPSV23 needed. Option 2: PCV15 (Vaxneuvance) followed by PPSV23 at least 1 year later. These replace the prior PCV13 + PPSV23 sequence (PCV13 is no longer recommended for routine adult immunization since PCV20 covers all PCV13 serotypes plus more). High-risk adults <65 (asplenia, immunocompromise, CKD, CSF leak, cochlear implant): vaccinate earlier using the same algorithm. Annual influenza vaccine: recommended for ALL adults ≥6 months — Grade B."},
{c:"Cancer Screening — AAA",q:"A 67-year-old male who smoked 1 pack per day for 20 years (20 pack-years) and quit at age 55 presents for a wellness visit. He has never had an abdominal ultrasound. What screening is indicated?",o:["No vascular screening — he quit smoking more than 10 years ago","CT angiography of the aorta — more sensitive than ultrasound","One-time abdominal ultrasound screening for abdominal aortic aneurysm — USPSTF Grade B for men 65-75 who have EVER smoked ≥100 cigarettes lifetime","Annual abdominal ultrasound for 10 years"],a:2,r:"USPSTF Grade B: one-time abdominal ultrasound (aortic ultrasound screening) for abdominal aortic aneurysm in men ages 65-75 who have EVER smoked ≥100 cigarettes in their lifetime (approximately 5 pack-years). Smoking history (not current smoking) is the key criterion. NOT recommended for women who never smoked (Grade D). This patient qualifies: male, 67, ≥100 lifetime cigarettes. AAA threshold for repair: ≥5.5 cm in men (or rapid growth >0.5 cm in 6 months). Surveillance ultrasound frequency for smaller aneurysms: 3.0-3.9 cm every 3 years; 4.0-5.4 cm every 6-12 months. AAA screening reduces AAA-related mortality by ~50%."},
{c:"Health Promotion — Carotid Stenosis",q:"USPSTF currently recommends which approach to screening for asymptomatic carotid artery stenosis in the general adult population?",o:["Annual carotid Doppler ultrasound for all adults over 60","Carotid ultrasound for adults with hypertension and diabetes","USPSTF recommends AGAINST screening for asymptomatic carotid artery stenosis (Grade D) — the harms of follow-up procedures (carotid endarterectomy, stenting) outweigh benefits in asymptomatic individuals","Carotid ultrasound every 5 years for adults with multiple CVD risk factors"],a:2,r:"USPSTF Grade D: recommends AGAINST routine screening for asymptomatic carotid artery stenosis. Rationale: the potential harms of carotid endarterectomy and carotid artery stenting (stroke, death from the procedure itself) outweigh the benefits for asymptomatic stenosis in the general population. Contrast with: SYMPTOMATIC carotid stenosis (TIA, minor stroke) → CAS is beneficial and strongly indicated. Key distinction: asymptomatic does NOT mean no treatment is ever appropriate — high-grade stenosis found incidentally may still be managed. This Grade D is a common ANCC distractor — many providers assume vascular screening is always helpful."},
{c:"Preventive Counseling",q:"The '5 As' model is used in primary care for which preventive counseling behavior?",o:["Alcohol screening — Audit, Assess, Advise, Act, Arrange","Tobacco cessation counseling — Ask, Advise, Assess readiness to quit, Assist with cessation plan/medications, Arrange follow-up","Dietary counseling — Assess, Advise, Agree, Assist, Arrange","Exercise counseling — Assess fitness, Advise on goals, Assist with barriers, Action plan, Arrange referral"],a:1,r:"The 5 As model for tobacco cessation: (1) ASK — ask every patient about tobacco use at every visit; (2) ADVISE — give a clear, strong recommendation to quit; (3) ASSESS — assess readiness and motivation to quit; (4) ASSIST — help with a quit plan, offer pharmacotherapy (varenicline, bupropion, NRT), provide counseling or referral to quitline (1-800-QUIT-NOW); (5) ARRANGE — follow-up contact within 1 week of quit date. Brief 3-5 minute counseling doubles quit rates. Even partial application (Ask + Advise alone) is more effective than doing nothing. Brief motivational interviewing for patients not yet ready to quit."},
{c:"Health Promotion — Obesity in Children",q:"Per AAP 2023 guidelines, at what BMI percentile is a child considered obese, and what is the recommended treatment approach for adolescents with obesity?",o:["BMI >25 (same adult cutoff) — lifestyle change only","BMI ≥85th percentile (overweight) or ≥95th percentile (obese) — lifestyle modification alone for all; medications only for BMI >40","BMI ≥95th percentile = obese; AAP 2023 recommends early intensive health behavior and lifestyle treatment (IHBLT) for all, with pharmacotherapy (orlistat age ≥12, topiramate/phentermine or GLP-1 agonists age ≥12-16) as adjunct for adolescents who meet criteria","BMI ≥97th percentile — watchful waiting is the recommended first approach"],a:2,r:"AAP 2023 Clinical Practice Guideline for Obesity: Overweight: BMI 85th-94th percentile. Obese: ≥95th percentile. Severe obesity: ≥120% of the 95th percentile. Recommendations shift away from 'watchful waiting' — the 2023 guideline recommends early, intensive, comprehensive treatment: Intensive Health Behavior and Lifestyle Treatment (IHBLT): ≥26 hours of comprehensive program over 3-12 months. Pharmacotherapy: FDA-approved options (orlistat ≥12, phentermine/topiramate extended-release ≥12, GLP-1 agonists — liraglutide ≥12, semaglutide ≥12). Bariatric surgery: adolescents with severe obesity + comorbidities. This is a major 2023 guideline shift — moved from watchful waiting to active treatment."},
{c:"Cancer Screening — Ovarian",q:"Per USPSTF, routine screening for ovarian cancer using CA-125 and/or transvaginal ultrasound is recommended for which women?",o:["All postmenopausal women annually","Women over 50 with a family history of ovarian cancer","USPSTF recommends AGAINST routine ovarian cancer screening in asymptomatic average-risk women (Grade D) — harms (false positives leading to invasive surgery) outweigh benefits","Women on hormone replacement therapy annually"],a:2,r:"USPSTF Grade D: recommends AGAINST routine ovarian cancer screening with CA-125 or transvaginal ultrasound in asymptomatic, average-risk women. Reasons: no mortality benefit demonstrated; false positive rates are high (CA-125 elevated in endometriosis, PID, fibroids, liver disease); follow-up requires invasive surgery with complication rates ~15%. High-risk women (BRCA1/2 mutation, Lynch syndrome, strong family history): referral to genetic counseling + specialized surveillance protocols. CA-125 is used for MONITORING treatment response in known ovarian cancer patients — NOT for population screening. Symptoms warranting evaluation (not screening): bloating, pelvic/abdominal pain, early satiety, urinary frequency/urgency persisting >2 weeks."},
{c:"Preventive Health — Adults",q:"During a wellness visit, a 45-year-old patient is found to have BMI 26 (overweight), BP 128/80, LDL 140, fasting glucose 106 (pre-diabetes). He does not smoke and drinks socially. Which ONE intervention has the greatest single overall health impact for this patient?",o:["Immediate metformin therapy for pre-diabetes","Start a statin — LDL reduction is the top priority","Intensive lifestyle modification (dietary improvement + ≥150 min/week exercise + 5-7% weight loss) — addresses pre-diabetes, BP, LDL, and weight simultaneously with the greatest evidence base and fewest side effects","Antihypertensive medication — stage 1 HTN needs immediate treatment"],a:2,r:"This patient has metabolic syndrome — each component improves with lifestyle modification. Evidence: DPP trial showed 58% reduction in progression from pre-diabetes to T2DM with lifestyle change (vs 31% for metformin). Lifestyle also lowers BP (~5-10 mmHg), LDL (~5-10%), and reduces cardiovascular risk across all components simultaneously. This is an ANCC-favorite 'most impactful intervention' question. Medication (statin, metformin, antihypertensive) may eventually be needed, but with BP 128/80, LDL 140, and fasting glucose 106, the first step is 3-6 months of structured lifestyle modification with close follow-up before adding medications — especially in a 45-year-old without established ASCVD."},
{c:"Health Promotion — Newborn",q:"The USPSTF recommends universal newborn screening for which condition as a Grade A recommendation?",o:["Developmental dysplasia of the hip — Ortolani and Barlow exam only","Hearing loss — universal newborn hearing screening with objective audiologic methods (OAE or ABR) before hospital discharge","Phenylketonuria only — the only validated newborn screening program","Congenital heart disease — echocardiogram in all newborns"],a:1,r:"USPSTF Grade B (2008, reaffirmed): screen all newborns for hearing loss using objective testing before discharge — otoacoustic emissions (OAE) and/or automated auditory brainstem response (AABR). Prevalence: ~2-3 per 1000 newborns have permanent bilateral hearing loss. Early identification (before 3 months) + intervention (before 6 months) significantly improves language, cognitive, and social development outcomes — the critical window for hearing and language development. Follow-up: any failed screen needs diagnostic ABR within 3 months. Most states mandate universal newborn hearing screening. Newborn metabolic screening (heel stick — PKU, congenital hypothyroidism, hemoglobinopathies, etc.) is a separate program from hearing screening."},
{c:"Cancer Screening — Skin Cancer Prevention",q:"USPSTF recommends which intervention to reduce skin cancer risk specifically in children, adolescents, and young adults up to age 24?",o:["Annual full-body skin examination by a dermatologist","Monthly self-skin examinations starting at age 12","Counseling about minimizing UV exposure — use of sunscreen, sun-protective clothing, avoiding tanning beds, seeking shade — Grade B for fair-skinned persons ages 6 months to 24 years","No preventive counseling is recommended — skin cancer risk is not modifiable"],a:2,r:"USPSTF Grade B: counsel children, adolescents, and young adults (fair-skinned, ages 6 months-24 years) about minimizing UV exposure to reduce risk of skin cancer. Components: SPF 30+ broad-spectrum sunscreen daily, protective clothing, wide-brim hat, UV-blocking sunglasses, seek shade especially 10am-4pm (peak UV), AVOID TANNING BEDS (strongly emphasized — indoor tanning before age 35 increases melanoma risk by 59-75%). Grade I (Insufficient Evidence) for adults ≥25 — not a recommendation against counseling, just insufficient data to support universal mandatory counseling. However, counseling all patients about sun safety remains good clinical practice."},
{c:"Health Promotion — Sleep",q:"The CDC considers short sleep duration (fewer than 7 hours per night) a public health problem linked to multiple chronic conditions. Which recommendation about sleep health is appropriate to discuss at a wellness visit?",o:["7-9 hours per night is the recommended sleep duration for most adults; poor sleep increases risk of obesity, diabetes, cardiovascular disease, depression, and injury — ask about sleep quality routinely and counsel on sleep hygiene","Adults need a minimum of only 5 hours to function normally","Prescription sleep aids should be offered at the first wellness visit complaint about sleep","Napping more than 2 hours per day compensates for short nighttime sleep"],a:0,r:"Sleep recommendations (National Sleep Foundation/CDC): Adults 18-64: 7-9 hours per night; Adults ≥65: 7-8 hours. Short sleep (<7 hours): associated with obesity, T2DM, hypertension, cardiovascular disease, depression, weakened immunity, cognitive impairment, increased motor vehicle accident risk. Sleep health assessment at wellness visits: ask about sleep duration, quality (difficulty falling/staying asleep, non-restorative sleep), and daytime function (Epworth Sleepiness Scale for excessive daytime sleepiness). Sleep hygiene counseling: consistent sleep/wake schedule, dark/cool/quiet environment, avoid screens 1 hour before bed, avoid caffeine after 2pm, limit alcohol (disrupts sleep architecture), regular physical activity. Screen for OSA (STOP-BANG), insomnia, restless leg syndrome."},
{c:"Preventive Care — LGBTQ+",q:"An NP sees a 28-year-old transgender woman (assigned male at birth, taking feminizing hormone therapy) for a wellness visit. Which preventive care element should NOT be overlooked?",o:["Transgender patients do not need any cancer screenings until after gender-affirming surgery","Only screenings based on current gender identity are appropriate — no organ-specific screenings based on birth anatomy","Preventive care should be based on ANATOMY (organs present) not solely on gender identity — prostate cancer screening discussion is still relevant; STI/HIV screening based on actual sexual practices; mental health screening is important given higher rates of depression/anxiety in this population","Hormone therapy eliminates all cancer risks, so no cancer screenings are needed"],a:2,r:"LGBTQ+ inclusive preventive care: preventive screenings should be based on ANATOMY (organs present) AND risk factors — not solely on gender identity. Transgender women: prostate cancer screening discussion (prostate is present even post-orchiectomy or with hormone therapy); STI/HIV screening based on actual sexual behaviors (high risk in MSM); colorectal cancer screening per standard guidelines. Mental health: significantly higher rates of depression, anxiety, suicidality in LGBTQ+ individuals — screen routinely. Inclusive care: use preferred name/pronouns, avoid assumptions, create affirming environments. HIV PrEP: offer to eligible transgender women. Hormone therapy does not eliminate organ-specific cancer risks."}
,
{c:"Cancer Screening — Testicular",q:"USPSTF recommends which approach to testicular cancer screening in asymptomatic adolescent and adult males?",o:["Annual testicular self-examination starting at age 15","Scrotal ultrasound every 5 years starting at age 25","USPSTF recommends AGAINST routine screening for testicular cancer (Grade D) — evidence does not show mortality benefit; males should seek care for symptoms (painless testicular mass, swelling, heaviness)","Annual serum AFP and beta-hCG as tumor markers for all males"],a:2,r:"USPSTF Grade D: recommends against screening for testicular cancer in asymptomatic adolescent and adult males. Rationale: testicular cancer is rare (peak ages 15-35), highly curable even at advanced stages (survival >95%), and benefits of routine screening do not outweigh harms (false positives leading to unnecessary procedures, anxiety). Clinical teaching point: testicular self-examination is not formally recommended by USPSTF, though the ACS acknowledges some clinicians teach it. Patients should seek evaluation for: painless testicular mass or swelling, dragging sensation, or heaviness. Early clinical evaluation when symptoms present leads to rapid diagnosis even without population screening."},
{c:"Health Promotion — Vitamin Supplements",q:"USPSTF currently recommends which approach to beta-carotene and vitamin E supplementation for cancer or cardiovascular disease prevention?",o:["Beta-carotene 25,000 IU daily — proven to reduce lung cancer risk","Vitamin E 400 IU daily — prevents cardiovascular events","USPSTF recommends AGAINST supplementation with beta-carotene or vitamin E for prevention of cancer or CVD (Grade D) — no benefit shown, and beta-carotene INCREASES lung cancer risk in smokers","Both supplements should be recommended to all adults over 50"],a:2,r:"USPSTF Grade D: recommends AGAINST using beta-carotene OR vitamin E supplements for cancer or CVD prevention in non-deficient adults. Beta-carotene: not only ineffective but INCREASES lung cancer mortality in smokers and asbestos workers (CARET and ATBC trials — shocking reversal of earlier observational data). Vitamin E: neutral at best, potential harms at high doses. This is a critical pharmacovigilance lesson: observational study findings (antioxidants appeared protective) did not hold up in RCTs — highlights why RCT evidence is the gold standard. Also: USPSTF Grade D against multivitamins for cancer/CVD prevention (insufficient evidence)."},
{c:"Preventive Services — Men",q:"A 55-year-old male with no symptoms presents for a wellness visit. Which preventive service does USPSTF recommend as a Grade A (strong recommendation) for this patient?",o:["Annual PSA prostate cancer screening","Annual ECG for cardiac screening","Colorectal cancer screening — Grade A for all adults 50-75 (Grade B for 45-49)","Annual chest X-ray for lung cancer detection"],a:2,r:"USPSTF Grade A screenings applicable to a 55-year-old male: Colorectal cancer screening (ages 50-75 = Grade A). Hypertension screening (all adults ≥18 = Grade A). If he has ≥20 pack-year smoking history and quit within 15 years: LDCT lung cancer screening (Grade B). Grade C applies to: PSA (individualized decision 55-69, Grade C). Annual ECG is NOT recommended (Grade D for asymptomatic adults). Annual chest X-ray is NOT recommended for lung cancer screening (Grade D). Annual LDCT, not CXR, is the only recommended lung cancer screen. Know the USPSTF grade letters: A=strongly recommend, B=recommend, C=offer selectively, D=recommend against, I=insufficient evidence."},
{c:"Preventive Services — Women",q:"A 55-year-old postmenopausal woman with no family history of breast or ovarian cancer is BRCA-negative. Per USPSTF, which additional genetic counseling service applies to her?",o:["She needs annual BRCA testing now that she is postmenopausal","USPSTF recommends primary care providers screen women for family history associated with BRCA1/2 mutations; if positive risk screen → refer for genetic counseling; if no relevant family history (like this patient) → no referral needed","All women over 50 should have BRCA genetic testing regardless of family history","BRCA testing should only be done after a cancer diagnosis"],a:1,r:"USPSTF Grade B: screen women with a personal or family history suggesting increased risk for BRCA1/2 mutations (breast, ovarian, tubal, or peritoneal cancer in close relatives, especially early-onset) → refer for genetic counseling and BRCA testing if appropriate. Risk stratification tools: Ontario Family History Assessment Tool, Manchester Scoring System, Family History Screen-7. Women WITHOUT relevant family history: do NOT refer for BRCA genetic counseling (Grade D for low-risk women — potential harms of false positives and unnecessary interventions). This patient's negative BRCA test + no family history: no further BRCA-related action needed."},
{c:"Health Literacy",q:"During a health promotion visit, an NP gives medication instructions to a patient and asks 'Do you understand?' The patient nods and says 'yes.' Which is the MOST effective strategy to confirm health literacy?",o:["Provide a written pamphlet to supplement the verbal instructions","Repeat the instructions twice — repetition ensures understanding","Use the teach-back method: ask the patient to explain the instructions back in their own words; if they cannot, rephrase and re-teach","Ask multiple choice questions about the material covered"],a:2,r:"Teach-back method: the gold standard for confirming understanding and health literacy. Patients with low health literacy often say 'yes' to understanding when they do not — to avoid embarrassment or conflict. Teach-back: 'I want to make sure I explained this clearly. Can you tell me in your own words how you'll take this medication?' If they cannot explain it correctly → NP rephrase and repeat (this is NOT testing the patient — it's testing the NP's communication). Additional strategies: plain language (5th-6th grade level), use of visuals, limit to 3 key messages per visit, teach-back on each message, universal health literacy precautions (assume all patients may have low literacy). Low health literacy is associated with worse health outcomes, higher hospitalization rates, and medication errors."},
{c:"Preventive Services — Hypertension",q:"The USPSTF recommends that blood pressure measurements be confirmed outside the clinical setting before starting antihypertensive treatment in adults without established CVD. Which method is the gold standard for diagnosing true hypertension?",o:["Repeated office measurements over 2 visits — the only valid method","A single reading above 130/80 is sufficient for diagnosis","Ambulatory blood pressure monitoring (ABPM) — the gold standard; eliminates white coat effect, detects masked HTN, and provides 24-hour BP profile","Wrist-based home BP monitors are equivalent to office measurement"],a:2,r:"Ambulatory blood pressure monitoring (ABPM): measures BP automatically every 15-30 minutes over 24 hours during normal daily activities and sleep. Gold standard because: eliminates white coat HTN, detects masked HTN (normal office BP but elevated at home/work — higher CV risk), provides nocturnal dipping information (non-dippers have higher CV risk), predicts target organ damage better than office BP. ABPM HTN thresholds: awake mean ≥135/85, sleep mean ≥120/70, 24-hour mean ≥130/80. Home BP monitoring: validated upper-arm monitors are acceptable for follow-up monitoring but less comprehensive than ABPM. Office measurements remain practical for most follow-up visits once diagnosis is established."},
{c:"Health Promotion — Immunization Catch-Up",q:"A 22-year-old college student never received hepatitis A vaccine. He is planning a trip to Southeast Asia in 6 weeks. He received 2 doses of hepatitis B vaccine as a child. What is most appropriate?",o:["No vaccines needed — natural immunity develops from travel exposure","Hepatitis A vaccine series can only be started if the full 2-dose series can be completed before travel — otherwise it's pointless","Start Hepatitis A vaccine series now; even one dose provides significant protection (94-100%) within 2-4 weeks — the second dose is given 6-12 months later for long-term protection; travel hepatitis prophylaxis is not complete until hepatitis A is addressed","Hepatitis B vaccine is also needed — 2 prior doses are insufficient"],a:2,r:"Hepatitis A vaccine: 2-dose series (given 6-12 months apart) for long-term immunity. For travelers with departure <4 weeks away: a single dose of hepatitis A vaccine provides 94-100% seroconversion and substantial immediate protection — administer at least 2 weeks before travel. Second dose is not needed before departure but should be completed later. Hep B: 3-dose series is standard; this patient completed 2 doses — verify the series was properly spaced; may need dose 3. Complete travel medicine evaluation: review all routine vaccines (MMR, Tdap, varicella), destination-specific vaccines (typhoid oral vs injectable, Japanese encephalitis, yellow fever for some regions), malaria prophylaxis, travelers' diarrhea plan, travel health kit."}
];

const N = QUESTIONS.length;
let idx = 0;
let answers = new Array(N).fill(null); // selected option index
const LETTERS = ["A","B","C","D"];

const strip = document.getElementById("strip");
const qcard = document.getElementById("qcard");
const resultsCard = document.getElementById("results");

function buildStrip(){
  strip.innerHTML = "";
  for(let i=0;i<N;i++){
    const t = document.createElement("div");
    t.className = "tick";
    t.title = "Question " + (i+1);
    t.addEventListener("click", ()=>{ idx = i; render(); });
    strip.appendChild(t);
  }
}
function paintStrip(){
  const ticks = strip.children;
  for(let i=0;i<N;i++){
    const t = ticks[i];
    t.className = "tick";
    if(answers[i] !== null){
      t.classList.add(answers[i] === QUESTIONS[i].a ? "ok" : "bad");
    }
    if(i === idx && !resultsVisible()) t.classList.add("cur");
  }
}
function resultsVisible(){ return !resultsCard.classList.contains("hide"); }

function counts(){
  let done=0, right=0;
  for(let i=0;i<N;i++){
    if(answers[i]!==null){ done++; if(answers[i]===QUESTIONS[i].a) right++; }
  }
  return {done,right};
}
function paintScore(){
  const {done,right} = counts();
  document.getElementById("sc-done").textContent = done;
  document.getElementById("sc-right").textContent = right;
}

function render(){
  resultsCard.classList.add("hide");
  qcard.classList.remove("hide");
  const Q = QUESTIONS[idx];
  const picked = answers[idx];
  let html = "";
  html += '<div class="meta"><span class="qnum">QUESTION ' + (idx+1) + ' / ' + N + '</span><span class="chip">' + Q.c + '</span></div>';
  html += '<p class="stem">' + Q.q + '</p>';
  Q.o.forEach((opt,i)=>{
    let cls = "opt";
    if(picked !== null){
      if(i === picked && picked === Q.a) cls += " sel-ok";
      else if(i === picked) cls += " sel-bad";
      else if(i === Q.a) cls += " reveal-ok";
    }
    html += '<button class="'+cls+'" data-i="'+i+'" '+(picked!==null?"disabled":"")+'><span class="ltr">'+LETTERS[i]+'</span><span>'+opt+'</span></button>';
  });
  if(picked !== null){
    const good = picked === Q.a;
    html += '<div class="verdict '+(good?"ok":"bad")+'">'+(good ? "Correct" : "Incorrect — answer is " + LETTERS[Q.a])+'</div>';
    html += '<div class="rationale">'+Q.r+'</div>';
  }
  html += '<div class="nav">';
  html += '<button class="btn ghost" id="prevBtn" '+(idx===0?"disabled":"")+'>Back</button>';
  if(idx < N-1){
    html += '<button class="btn" id="nextBtn">Next question</button>';
  } else {
    html += '<button class="btn" id="finishBtn">See results</button>';
  }
  html += '</div>';
  qcard.innerHTML = html;

  qcard.querySelectorAll(".opt").forEach(btn=>{
    btn.addEventListener("click", ()=>{
      if(answers[idx] !== null) return;
      answers[idx] = parseInt(btn.dataset.i,10);
      render();
    });
  });
  const prev = document.getElementById("prevBtn");
  if(prev) prev.addEventListener("click", ()=>{ idx--; render(); });
  const next = document.getElementById("nextBtn");
  if(next) next.addEventListener("click", ()=>{ idx++; render(); });
  const fin = document.getElementById("finishBtn");
  if(fin) fin.addEventListener("click", showResults);
  paintStrip(); paintScore();
}

function showResults(){
  const {done,right} = counts();
  const pct = done ? Math.round((right/done)*100) : 0;
  // category breakdown
  const cats = {};
  QUESTIONS.forEach((Q,i)=>{
    if(!cats[Q.c]) cats[Q.c] = {n:0, ok:0, ans:0};
    cats[Q.c].n++;
    if(answers[i]!==null){ cats[Q.c].ans++; if(answers[i]===Q.a) cats[Q.c].ok++; }
  });
  let html = '<div class="bigscore">'+right+' / '+done+' ('+pct+'%)</div>';
  html += '<p class="sub">'+(done<N ? (N-done)+' question'+(N-done===1?"":"s")+' unanswered — they are not counted against you. ' : '')+'A passing pace on the real ANCC is roughly the low-to-mid 70s percent range, so use this as a directional gauge, not a verdict.</p>';
  html += '<h2 style="font-size:.95rem;margin-bottom:6px">By category</h2>';
  Object.keys(cats).forEach(c=>{
    const o = cats[c];
    const p = o.ans ? Math.round((o.ok/o.ans)*100) : 0;
    html += '<div class="catrow"><span style="flex:0 0 44%">'+c+'</span><span class="bar"><i style="width:'+(o.ans? p:0)+'%"></i></span><span style="font-family:var(--mono);font-size:.8rem">'+o.ok+'/'+o.ans+(o.ans<o.n?' of '+o.n:'')+'</span></div>';
  });
  // missed list
  const missed = [];
  for(let i=0;i<N;i++) if(answers[i]!==null && answers[i]!==QUESTIONS[i].a) missed.push(i);
  if(missed.length){
    html += '<div class="missedlist"><h2 style="font-size:.95rem;margin-bottom:8px">Review missed questions</h2>';
    missed.forEach(i=>{ html += '<button data-jump="'+i+'">Q'+(i+1)+'</button>'; });
    html += '</div>';
  }
  html += '<div class="nav"><button class="btn ghost" id="backBtn">Back to questions</button><button class="btn" id="resetBtn">Start over</button></div>';
  resultsCard.innerHTML = html;
  resultsCard.classList.remove("hide");
  qcard.classList.add("hide");
  resultsCard.querySelectorAll("[data-jump]").forEach(b=>{
    b.addEventListener("click", ()=>{ idx = parseInt(b.dataset.jump,10); render(); });
  });
  document.getElementById("backBtn").addEventListener("click", ()=>{ render(); });
  document.getElementById("resetBtn").addEventListener("click", ()=>{
    if(confirm("Clear all answers and start over?")){
      answers = new Array(N).fill(null); idx = 0; render();
    }
  });
  paintStrip(); paintScore();
}

buildStrip();
render();
</script>
</body>
</html>
