<style>

<script>
const QUESTIONS = [
{c:"Stroke",q:"A 68-year-old develops sudden right-sided weakness and slurred speech 90 minutes ago. CT head shows no hemorrhage. BP is 168/92, glucose 110. He has no contraindications. Within what time window is IV thrombolysis (alteplase/tPA) indicated?",o:["Within 24 hours of symptom onset","Within 3 hours, extendable to 4.5 hours in eligible patients — this patient at 90 minutes qualifies","Only after 6 hours to allow the stroke to declare itself","tPA is never given without an MRI first"],a:1,r:"IV thrombolysis (alteplase/tenecteplase) for acute ischemic stroke: standard window is within 3 hours of symptom onset, extended to 4.5 hours in eligible patients (excluding age >80, severe stroke, anticoagulation, diabetes + prior stroke for the extended window). Non-contrast CT must exclude hemorrhage first. BP must be <185/110 before tPA. Mechanical thrombectomy: for large vessel occlusion, up to 24 hours in selected patients (with perfusion imaging). 'Time is brain' — ~2 million neurons die per minute during stroke. This patient at 90 minutes is well within the window. Absolute contraindications to tPA: hemorrhage, recent major surgery, active bleeding, BP >185/110 uncontrolled, recent stroke/head trauma."},
{c:"Stroke",q:"A patient presents with sudden vision loss in one eye described as 'a curtain coming down,' lasting 10 minutes, then resolving completely. Diagnosis and most important workup?",o:["Migraine aura — start prophylaxis","Amaurosis fugax (transient monocular blindness) — a form of TIA from carotid artery embolism; workup: carotid ultrasound, ECG, echocardiogram; antiplatelet therapy and risk factor management; consider carotid endarterectomy for significant stenosis","Retinal detachment — emergent ophthalmology","Optic neuritis — MRI brain for MS"],a:1,r:"Amaurosis fugax: transient monocular vision loss ('curtain descending or ascending'), typically from a cholesterol embolus (Hollenhorst plaque) originating from the ipsilateral carotid artery — a form of TIA. Workup: carotid duplex ultrasound (evaluate for stenosis), ECG (atrial fibrillation), echocardiogram (cardiac source of embolism), lipid panel, glucose. Management: antiplatelet therapy (aspirin or clopidogrel), statin, BP/glucose control, smoking cessation. Carotid endarterectomy (CEA) or stenting: for symptomatic carotid stenosis ≥70% (and selected 50-69%). This is a warning sign of impending stroke — same urgency as TIA. Distinguish from retinal detachment (flashes, floaters, persistent), migraine (positive visual phenomena, gradual), and optic neuritis (painful, with eye movement)."},
{c:"Stroke",q:"A patient who had a TIA yesterday (now fully resolved) is being evaluated. The ABCD2 score is used to estimate which risk?",o:["Risk of bleeding with anticoagulation","Risk of subsequent stroke after a TIA — based on Age, Blood pressure, Clinical features, Duration, Diabetes; higher scores warrant urgent evaluation and admission","Risk of myocardial infarction","Risk of recurrent TIA only, not stroke"],a:1,r:"ABCD2 score: estimates short-term stroke risk after a TIA. Components: Age ≥60 (1 point), Blood pressure ≥140/90 (1), Clinical features — unilateral weakness (2), speech disturbance without weakness (1), Duration ≥60 min (2) or 10-59 min (1), Diabetes (1). Score 0-3 = low risk; 4-5 = moderate; 6-7 = high risk. Higher scores (≥4) warrant urgent evaluation and often hospital admission. Regardless of score, all TIA patients need urgent workup: neuroimaging, carotid imaging, ECG, echocardiogram, and risk factor modification — stroke risk is highest in the first 48 hours. Dual antiplatelet therapy (aspirin + clopidogrel) for 21 days after high-risk TIA reduces recurrent stroke (CHANCE/POINT trials)."},
{c:"Seizures",q:"A 25-year-old has a first unprovoked generalized tonic-clonic seizure witnessed by family. He is now alert with a normal neuro exam. CT head, electrolytes, and glucose are normal. Should an antiepileptic drug be started after a single unprovoked seizure?",o:["Yes — always start an AED after any seizure","No AED is needed unless he has 3 or more seizures","Generally NO after a single unprovoked seizure with normal workup — the decision to treat depends on recurrence risk; EEG and MRI brain help stratify risk; AED is considered if EEG shows epileptiform activity, MRI shows a structural lesion, or there is a high recurrence risk","Lifelong AED therapy is mandatory after one seizure"],a:2,r:"First unprovoked seizure management: an AED is NOT automatically started. Decision hinges on recurrence risk. Workup: EEG (epileptiform discharges increase recurrence risk), MRI brain (preferred over CT — detects structural lesions), labs (glucose, electrolytes, calcium, magnesium, toxicology). Risk factors for recurrence: abnormal EEG, structural brain lesion on MRI, nocturnal seizure, prior brain injury, focal seizure. Starting an AED after a first seizure reduces short-term recurrence but does not change long-term prognosis. Epilepsy is diagnosed after: 2 unprovoked seizures >24h apart, OR 1 unprovoked seizure with ≥60% recurrence risk, OR an epilepsy syndrome. Counsel driving restrictions (state-specific reporting laws)."},
{c:"Seizures",q:"A patient presents in active generalized tonic-clonic seizure that has lasted 7 minutes and shows no sign of stopping. What is the FIRST-line medication for status epilepticus?",o:["Oral phenytoin loading dose","IV levetiracetam first","Benzodiazepine (IV lorazepam, or IM midazolam if no IV access) — first-line abortive treatment for status epilepticus; followed by a second-line AED (levetiracetam, fosphenytoin, or valproate) to prevent recurrence","Wait — most seizures stop within 10 minutes spontaneously"],a:2,r:"Status epilepticus: seizure lasting ≥5 minutes OR recurrent seizures without recovery of consciousness between them. Medical emergency — neuronal injury and systemic complications increase with duration. Treatment sequence: (1) FIRST-LINE: benzodiazepine — IV lorazepam (0.1 mg/kg) or IM midazolam (10 mg if no IV access — equally effective, faster to administer); (2) SECOND-LINE: long-acting AED to prevent recurrence — IV levetiracetam, fosphenytoin, or valproate (ESETT trial showed all three equivalent); (3) REFRACTORY status (continues despite first and second line): intubation + continuous IV anesthetic infusion (propofol, midazolam, or pentobarbital) with EEG monitoring. Concurrent: ABCs, glucose check, thiamine, treat underlying cause."},
{c:"Headache",q:"A 28-year-old woman has recurrent unilateral throbbing headaches with photophobia, phonophobia, nausea, and occasional preceding visual zigzag lines. Each lasts 6-12 hours. Neuro exam is normal. Diagnosis and acute treatment?",o:["Tension headache — acetaminophen","Cluster headache — high-flow oxygen","Migraine with aura — acute treatment: triptans (sumatriptan) are first-line for moderate-severe migraine; NSAIDs for mild attacks; antiemetics for nausea; avoid triptans in patients with cardiovascular disease, uncontrolled HTN, or hemiplegic/basilar migraine","Subarachnoid hemorrhage — CT and LP"],a:2,r:"Migraine: recurrent moderate-severe unilateral (or bilateral) throbbing headache + photophobia, phonophobia, nausea/vomiting, worse with activity. With aura: preceding reversible neurologic symptoms (visual scintillations/scotoma most common, lasting 5-60 min). Acute treatment: triptans (sumatriptan, rizatriptan) — first-line for moderate-severe; serotonin 5-HT1B/1D agonists. NSAIDs/acetaminophen for mild attacks. Antiemetics (metoclopramide) for nausea. Newer: gepants (ubrogepant, rimegepant), ditans (lasmiditan). Triptan contraindications: CAD, uncontrolled HTN, prior stroke/TIA, hemiplegic/basilar migraine, pregnancy (relative). Prophylaxis (≥4 migraines/month or significant disability): propranolol, topiramate, amitriptyline, CGRP monoclonal antibodies (erenumab). Avoid medication overuse headache (limit acute meds to <10-15 days/month)."},
{c:"Headache",q:"A 45-year-old male has severe, unilateral, stabbing periorbital pain lasting 45 minutes, occurring multiple times daily for 2 weeks, with ipsilateral tearing, nasal congestion, and a droopy eyelid. He is restless and paces during attacks. Diagnosis and acute treatment?",o:["Migraine — sumatriptan oral","Tension headache — stress management","Cluster headache — acute treatment: high-flow 100% oxygen (12-15 L/min via non-rebreather) and subcutaneous sumatriptan; verapamil for prophylaxis","Trigeminal neuralgia — carbamazepine"],a:2,r:"Cluster headache: severe, strictly UNILATERAL, periorbital/temporal stabbing pain, lasting 15-180 minutes, occurring in 'clusters' (multiple times daily for weeks-months, then remission). Autonomic features: ipsilateral lacrimation, conjunctival injection, nasal congestion, ptosis, miosis (partial Horner's). Patients are RESTLESS/agitated (vs migraine patients who lie still in a dark room). More common in men. Acute treatment: high-flow 100% OXYGEN (12-15 L/min via non-rebreather mask for 15 min) — abortive in 70%; subcutaneous or intranasal sumatriptan (faster than oral). Prophylaxis: VERAPAMIL (first-line), lithium, corticosteroid bridge during cluster periods. Trigeminal neuralgia: brief electric-shock facial pain triggered by touch/chewing — carbamazepine."},
{c:"Headache",q:"A 58-year-old with no headache history presents with 'the worst headache of my life,' sudden onset (thunderclap), peaking within seconds, with neck stiffness and photophobia. What is the most concerning diagnosis and workup?",o:["Migraine — give a triptan and observe","Tension headache — reassurance","Subarachnoid hemorrhage — non-contrast CT head immediately (highest sensitivity in first 6 hours); if CT negative and suspicion remains, lumbar puncture looking for xanthochromia (RBC breakdown); most common cause is ruptured berry aneurysm","Sinusitis — antibiotics"],a:2,r:"Subarachnoid hemorrhage (SAH): 'thunderclap headache' — sudden, severe, maximal at onset ('worst headache of life'), often with neck stiffness, photophobia, nausea, altered consciousness, focal deficits. Most common cause: ruptured saccular (berry) aneurysm. Workup: NON-CONTRAST CT HEAD immediately (sensitivity ~98% within 6 hours of onset, declining over time as blood degrades). If CT negative but high suspicion: LUMBAR PUNCTURE looking for xanthochromia (yellow CSF from RBC breakdown — distinguishes true SAH from traumatic tap) and elevated RBCs. CT angiography to localize the aneurysm. Management: neurosurgical/neuro-interventional consultation for aneurysm clipping or coiling; BP control; nimodipine to prevent vasospasm. Other thunderclap causes: RCVS, cervical artery dissection, cerebral venous thrombosis."},
{c:"Headache",q:"A 35-year-old obese woman has daily headaches, transient visual obscurations, pulsatile tinnitus, and papilledema on fundoscopy. MRI brain is normal. Lumbar puncture shows an elevated opening pressure of 32 cm H2O with normal CSF composition. Diagnosis and management?",o:["Brain tumor — neurosurgery referral","Migraine — start topiramate for migraine only","Idiopathic intracranial hypertension (pseudotumor cerebri) — weight loss + acetazolamide (reduces CSF production); serial visual field testing to monitor for vision loss; therapeutic LP; surgical options (optic nerve sheath fenestration, CSF shunt) for vision-threatening cases","Subarachnoid hemorrhage — CT angiography"],a:2,r:"Idiopathic intracranial hypertension (IIH/pseudotumor cerebri): elevated ICP without a mass lesion. Classic demographic: obese women of childbearing age. Symptoms: headache, transient visual obscurations, pulsatile tinnitus, diplopia (CN VI palsy from stretching), papilledema (key finding — risk of permanent vision loss). Diagnosis: normal neuroimaging (MRI/MRV to exclude mass and venous thrombosis) + elevated LP opening pressure (>25 cm H2O) + normal CSF composition. Management: WEIGHT LOSS (most effective long-term), acetazolamide (carbonic anhydrase inhibitor — reduces CSF production), serial visual field monitoring (vision loss is the major morbidity), therapeutic LP. Vision-threatening: optic nerve sheath fenestration or CSF shunting. Avoid contributory drugs (tetracyclines, vitamin A, growth hormone)."},
{c:"Parkinson's Disease",q:"A 68-year-old has a resting 'pill-rolling' tremor, bradykinesia, cogwheel rigidity, and a shuffling gait. Symptoms began asymmetrically on the right. Diagnosis and most effective symptomatic treatment?",o:["Essential tremor — propranolol","Parkinson's disease — cardinal features (TRAP: Tremor at rest, Rigidity, Akinesia/bradykinesia, Postural instability); levodopa/carbidopa is the most effective symptomatic treatment; dopamine agonists are an alternative in younger patients","Huntington's disease — tetrabenazine","Normal pressure hydrocephalus — VP shunt"],a:1,r:"Parkinson's disease (PD): loss of dopaminergic neurons in the substantia nigra. Cardinal features (TRAP): resting Tremor (pill-rolling, 4-6 Hz, asymmetric onset), cogwheel Rigidity, Akinesia/bradykinesia, Postural instability. Other: masked facies, micrographia, hypophonia, festinating gait, anosmia, REM sleep behavior disorder. Treatment: levodopa/carbidopa (most effective symptomatic treatment — levodopa is the dopamine precursor, carbidopa prevents peripheral conversion reducing nausea); dopamine agonists (pramipexole, ropinirole — used in younger patients to delay levodopa motor complications); MAO-B inhibitors (selegiline, rasagiline); amantadine (for dyskinesias). Levodopa long-term: motor fluctuations ('wearing off') and dyskinesias. Distinguish from essential tremor: ET is an ACTION/postural tremor (worse with movement, improves at rest), bilateral, improves with alcohol, treated with propranolol or primidone."},
{c:"Tremor",q:"A 60-year-old has a bilateral hand tremor that worsens when holding a cup or writing but disappears at rest. His father had a similar tremor. A small amount of alcohol improves it. Diagnosis and first-line treatment?",o:["Parkinson's disease — levodopa","Essential tremor — first-line treatment is propranolol (beta-blocker) or primidone; this is an action/postural tremor, often familial (autosomal dominant), and characteristically improves with alcohol","Cerebellar tremor — MRI brain","Hyperthyroidism — check TSH"],a:1,r:"Essential tremor (ET): the most common movement disorder. Features: bilateral ACTION/POSTURAL tremor (worse with sustained posture or movement — holding a cup, writing, eating soup), absent at rest, often involves hands, head ('yes-yes' or 'no-no'), and voice. Frequently FAMILIAL (autosomal dominant). Characteristically IMPROVES with small amounts of alcohol (a useful diagnostic clue). First-line treatment: propranolol (beta-blocker) or primidone (anticonvulsant) — both reduce tremor amplitude. Second-line: topiramate, gabapentin, benzodiazepines. Severe/refractory: deep brain stimulation (thalamic VIM nucleus) or focused ultrasound thalamotomy. Key distinction from Parkinson's: ET = action tremor improving at rest; PD = resting tremor improving with action. Always check TSH (hyperthyroidism causes enhanced physiologic tremor)."},
{c:"Multiple Sclerosis",q:"A 30-year-old woman has had two distinct episodes 6 months apart: optic neuritis (painful vision loss in one eye) and later, numbness/weakness in the legs. MRI shows multiple white matter lesions in the periventricular region and spinal cord. Diagnosis?",o:["Stroke — CT angiography","Guillain-Barré syndrome — lumbar puncture for albuminocytologic dissociation","Multiple sclerosis — demyelinating lesions disseminated in TIME (≥2 attacks) and SPACE (≥2 CNS locations); MRI white matter lesions + clinical episodes meet McDonald criteria; treatment includes disease-modifying therapies","Myasthenia gravis — acetylcholine receptor antibodies"],a:2,r:"Multiple sclerosis (MS): autoimmune demyelination of the CNS. Diagnosis requires dissemination in TIME (≥2 separate episodes) and SPACE (≥2 distinct CNS locations) — McDonald criteria (clinical + MRI). Classic presentations: optic neuritis (painful monocular vision loss), internuclear ophthalmoplegia, sensory disturbances, weakness, Lhermitte's sign (electric sensation down spine with neck flexion), Uhthoff's phenomenon (symptoms worsen with heat). MRI: T2/FLAIR hyperintense white matter lesions (periventricular, juxtacortical, infratentorial, spinal cord). LP: oligoclonal bands, elevated IgG index. Most common type: relapsing-remitting MS. Treatment: acute relapse — high-dose IV corticosteroids; long-term — disease-modifying therapies (interferons, glatiramer, dimethyl fumarate, natalizumab, ocrelizumab, S1P modulators). Most common in young women, higher-latitude regions."},
{c:"Bell's Palsy",q:"A 40-year-old wakes with complete right-sided facial droop, inability to close the right eye, loss of forehead wrinkling on the right, and altered taste. There is no limb weakness. Diagnosis and treatment?",o:["Stroke — activate stroke protocol immediately","Bell's palsy — peripheral CN VII palsy involving the FOREHEAD (unlike central lesions which spare the forehead); treat with oral corticosteroids started within 72 hours; eye protection (lubricating drops, taping at night) to prevent corneal damage; antivirals may be added for severe cases","Trigeminal neuralgia — carbamazepine","Myasthenia gravis — edrophonium test"],a:1,r:"Bell's palsy: acute idiopathic peripheral facial nerve (CN VII) palsy. KEY DISTINCTION: FOREHEAD IS INVOLVED (cannot raise eyebrow, no forehead wrinkling on affected side) — because a peripheral CN VII lesion affects all facial muscles. A CENTRAL lesion (stroke) SPARES the forehead (bilateral cortical innervation of the upper face). Features: unilateral facial weakness, inability to close eye, loss of nasolabial fold, drooping mouth corner, altered taste (chorda tympani), hyperacusis. Treatment: oral corticosteroids (prednisone 60 mg/day x5-7 days) started WITHIN 72 HOURS improves recovery; EYE PROTECTION is critical (artificial tears, ointment, taping/patching at night — risk of exposure keratopathy from incomplete eye closure). Antivirals (valacyclovir) added for severe palsy (possible HSV reactivation). Most recover within weeks-months. Forehead sparing → think stroke, image urgently."},
{c:"Peripheral Neuropathy",q:"A 25-year-old develops rapidly ascending symmetric weakness beginning in the legs and progressing upward over several days, with absent deep tendon reflexes (areflexia). He had a diarrheal illness 2 weeks ago. Diagnosis and most important monitoring?",o:["Multiple sclerosis — MRI brain","Myasthenia gravis — Tensilon test","Guillain-Barré syndrome (GBS, acute inflammatory demyelinating polyradiculoneuropathy) — ascending symmetric weakness with areflexia following infection (often Campylobacter); MONITOR RESPIRATORY FUNCTION (serial FVC and negative inspiratory force) — respiratory failure is the major risk; treat with IVIG or plasmapheresis","Botulism — antitoxin"],a:2,r:"Guillain-Barré syndrome (GBS): acute immune-mediated demyelinating polyneuropathy. Classic: ascending symmetric weakness/paralysis starting in the legs, AREFLEXIA (absent DTRs), often following an infection (Campylobacter jejuni most common, also CMV, EBV, Zika, recent vaccination). CSF: albuminocytologic dissociation (elevated protein, normal WBC). Nerve conduction studies confirm demyelination. CRITICAL MONITORING: serial respiratory function (FVC, negative inspiratory force) — respiratory failure requiring mechanical ventilation occurs in 25%; also autonomic instability (arrhythmias, BP swings). Treatment: IVIG or plasmapheresis (equally effective) — corticosteroids are NOT effective in GBS. Most patients recover over weeks-months. Miller Fisher variant: ophthalmoplegia, ataxia, areflexia (anti-GQ1b antibodies)."},
{c:"Myasthenia Gravis",q:"A 30-year-old woman has fluctuating muscle weakness that worsens with activity and improves with rest. She has ptosis and diplopia that worsen as the day progresses, and difficulty chewing. Diagnosis and confirmatory test?",o:["Multiple sclerosis — MRI brain","Myasthenia gravis — autoimmune disorder of the neuromuscular junction (anti-acetylcholine receptor antibodies); FATIGABLE weakness (worse with use, better with rest); confirm with anti-AChR antibodies (or anti-MuSK), EMG with repetitive nerve stimulation (decremental response), ice pack test for ptosis; treat with pyridostigmine + immunosuppression; evaluate for thymoma with chest CT","Guillain-Barré syndrome — ascending weakness","Lambert-Eaton syndrome — weakness improves with use"],a:1,r:"Myasthenia gravis (MG): autoimmune attack on postsynaptic acetylcholine receptors at the neuromuscular junction. Hallmark: FATIGABLE weakness — worsens with sustained activity, improves with rest; worse at end of day. Common: ocular (ptosis, diplopia — most common initial), bulbar (dysphagia, dysarthria, chewing fatigue), proximal limb weakness. Diagnosis: anti-acetylcholine receptor (AChR) antibodies (most specific, ~85% sensitive); anti-MuSK antibodies (in seronegative); EMG with repetitive nerve stimulation (decremental response); single-fiber EMG (most sensitive); ice pack test (ptosis improves with cold). CHEST CT/MRI: evaluate for thymoma (10-15% of MG patients — thymectomy may help). Treatment: pyridostigmine (acetylcholinesterase inhibitor — symptomatic), immunosuppression (corticosteroids, azathioprine, mycophenolate), IVIG/plasmapheresis for crisis. Myasthenic crisis: respiratory failure — monitor FVC. Lambert-Eaton: weakness IMPROVES with repeated use, associated with small cell lung cancer."},
{c:"Dementia",q:"A 74-year-old has an 18-month history of progressive memory loss (especially recent events), word-finding difficulty, and getting lost in familiar places. MMSE is 21/30. Workup excludes reversible causes. Brain MRI shows hippocampal atrophy. Most likely diagnosis and first-line treatment?",o:["Vascular dementia — control vascular risk factors only","Alzheimer's disease — most common dementia; insidious progressive memory loss with hippocampal atrophy; first-line: cholinesterase inhibitors (donepezil, rivastigmine, galantamine) for mild-moderate; memantine (NMDA antagonist) for moderate-severe","Lewy body dementia — avoid antipsychotics","Frontotemporal dementia — behavioral changes predominate"],a:1,r:"Alzheimer's disease (AD): most common dementia (60-70%). Insidious, progressive decline in memory (especially recent/episodic memory) + at least one other cognitive domain (language, visuospatial, executive). MRI: hippocampal and medial temporal lobe atrophy. Always exclude reversible causes first: B12 deficiency, hypothyroidism, depression (pseudodementia), normal pressure hydrocephalus, medication effects. Treatment: cholinesterase inhibitors (donepezil, rivastigmine, galantamine) for mild-moderate AD — modest symptomatic benefit, do not slow progression; memantine (NMDA receptor antagonist) for moderate-severe (can combine with cholinesterase inhibitor). Newer anti-amyloid monoclonal antibodies (lecanemab, donanemab) slow progression in early AD but carry ARIA risk (edema/hemorrhage). Manage comorbidities, caregiver support, safety planning."},
{c:"Dementia",q:"A 70-year-old develops fluctuating cognition, recurrent detailed visual hallucinations, spontaneous parkinsonism, and REM sleep behavior disorder. He had a severe adverse reaction (rigidity, worsening confusion) when given haloperidol for agitation. Diagnosis?",o:["Alzheimer's disease — memory is the dominant early feature","Vascular dementia — stepwise decline","Dementia with Lewy bodies (DLB) — core features: fluctuating cognition, visual hallucinations, parkinsonism, REM sleep behavior disorder; SEVERE neuroleptic sensitivity is characteristic — avoid typical antipsychotics","Frontotemporal dementia — personality changes"],a:2,r:"Dementia with Lewy bodies (DLB): second most common neurodegenerative dementia. Core clinical features: (1) FLUCTUATING cognition with variations in attention/alertness; (2) Recurrent well-formed VISUAL HALLUCINATIONS; (3) Spontaneous PARKINSONISM; (4) REM sleep behavior disorder (acting out dreams). NEUROLEPTIC SENSITIVITY: severe adverse reactions to antipsychotics (worsening parkinsonism, rigidity, neuroleptic malignant syndrome-like reaction, confusion) — AVOID typical antipsychotics (haloperidol); use quetiapine or pimavanserin cautiously if needed. Treatment: cholinesterase inhibitors (often very effective for cognition and hallucinations in DLB), carbidopa/levodopa for parkinsonism (cautiously — may worsen hallucinations), melatonin/clonazepam for REM behavior disorder. Parkinson's disease dementia: same pathology, but parkinsonism precedes dementia by >1 year (DLB: cognitive and motor within 1 year)."},
{c:"Delirium",q:"An 82-year-old hospitalized for pneumonia develops acute confusion, disorientation, and visual hallucinations that fluctuate throughout the day and worsen at night. She was cognitively normal at baseline 3 days ago. What is the most important first step in management?",o:["Start an antipsychotic immediately as first-line","Diagnose new-onset dementia and start donepezil","Identify and treat the underlying cause — delirium is acute, fluctuating, with inattention; search for precipitants (infection, medications, metabolic derangements, hypoxia, urinary retention, constipation, pain); non-pharmacologic measures first; antipsychotics only for severe agitation/safety","Physical restraints to prevent falls"],a:2,r:"Delirium: acute (hours-days), FLUCTUATING disturbance of attention and awareness, with altered cognition — distinct from dementia (chronic, progressive, stable attention). Hyperactive (agitated), hypoactive (lethargic — often missed, worse prognosis), or mixed. Hallmark: INATTENTION. Most important step: identify and treat the UNDERLYING CAUSE. Common precipitants (mnemonic 'DELIRIUM'): Drugs (anticholinergics, benzodiazepines, opioids), Electrolyte/metabolic, Infection (UTI, pneumonia), Reduced sensory input, Intracranial, Urinary retention/fecal impaction, Myocardial/pulmonary (hypoxia). Non-pharmacologic management FIRST: reorientation, sleep-wake cycle, mobilization, remove tethers (catheters, lines), correct sensory deficits (glasses, hearing aids), family presence. Antipsychotics (low-dose haloperidol or quetiapine): ONLY for severe agitation threatening safety. AVOID benzodiazepines (worsen delirium — except in alcohol/benzo withdrawal). Avoid restraints. Prevention is key."},
{c:"Normal Pressure Hydrocephalus",q:"A 75-year-old presents with a magnetic, shuffling 'stuck-to-the-floor' gait, urinary incontinence, and cognitive decline. MRI shows enlarged ventricles out of proportion to cortical atrophy. Diagnosis and potentially reversible treatment?",o:["Parkinson's disease — levodopa trial","Alzheimer's disease — cholinesterase inhibitor","Normal pressure hydrocephalus (NPH) — classic triad: gait disturbance ('wet, wacky, wobbly'), urinary incontinence, dementia; large-volume LP (tap test) — improvement supports diagnosis; ventriculoperitoneal (VP) shunt can reverse symptoms, especially gait","Vascular dementia — control risk factors"],a:2,r:"Normal pressure hydrocephalus (NPH): communicating hydrocephalus with normal opening pressure. Classic triad ('wet, wacky, and wobbly'): (1) Gait disturbance — magnetic/shuffling/wide-based 'stuck-to-the-floor' gait (usually the FIRST and most responsive symptom); (2) Urinary incontinence; (3) Cognitive impairment (subcortical dementia). MRI: ventriculomegaly disproportionate to cortical atrophy (high Evans index). Diagnosis: large-volume lumbar puncture ('tap test') — removing 30-50 mL of CSF and observing for gait improvement predicts shunt response. Treatment: ventriculoperitoneal (VP) shunt — a potentially REVERSIBLE cause of dementia (gait improves most reliably). One of the few treatable dementias — important not to miss. Distinguishes from Parkinson's by the magnetic gait and ventriculomegaly."},
{c:"Trigeminal Neuralgia",q:"A 55-year-old has recurrent episodes of sudden, severe, electric shock-like facial pain lasting seconds, triggered by chewing, talking, or light touch to the cheek. Between episodes she is pain-free. Neuro exam is normal. Diagnosis and first-line treatment?",o:["Cluster headache — high-flow oxygen","Temporal arteritis — high-dose steroids and ESR","Trigeminal neuralgia — paroxysmal electric-shock facial pain in the trigeminal (CN V) distribution, triggered by light touch/chewing; first-line treatment is CARBAMAZEPINE (or oxcarbazepine); MRI to rule out secondary causes (MS, vascular compression, tumor)","Dental abscess — antibiotics and extraction"],a:2,r:"Trigeminal neuralgia (tic douloureux): paroxysmal, severe, brief (seconds), electric-shock/stabbing facial pain in the trigeminal nerve distribution (V2/V3 most common). Triggered by innocuous stimuli — light touch, chewing, talking, brushing teeth, cold air. Pain-free between attacks. Often caused by neurovascular compression (aberrant loop of superior cerebellar artery compressing the trigeminal root). First-line: CARBAMAZEPINE (highly effective — diagnostic and therapeutic); oxcarbazepine (better tolerated alternative). Second-line: baclofen, lamotrigine, gabapentin. MRI brain: rule out secondary causes (multiple sclerosis — especially in young patients with bilateral symptoms, tumor, vascular compression). Refractory cases: microvascular decompression (surgical), gamma knife, or percutaneous rhizotomy. New onset in a young patient → think MS."},
{c:"Vertigo",q:"A 50-year-old has brief episodes of intense spinning vertigo lasting under a minute, triggered by rolling over in bed or tilting the head back. There is no hearing loss or tinnitus. The Dix-Hallpike maneuver reproduces vertigo with rotatory nystagmus. Diagnosis and treatment?",o:["Meniere's disease — sodium restriction and diuretics","Vestibular neuritis — corticosteroids","Benign paroxysmal positional vertigo (BPPV) — brief positional vertigo from displaced otoliths in the semicircular canals; Dix-Hallpike confirms; treatment is the Epley maneuver (canalith repositioning) — highly effective","Acoustic neuroma — MRI internal auditory canal"],a:2,r:"BPPV (benign paroxysmal positional vertigo): the MOST COMMON cause of vertigo. Brief (seconds to <1 minute) episodes of intense spinning triggered by head position changes (rolling in bed, looking up, bending). Caused by displaced otoconia (calcium carbonate crystals) in the semicircular canals (posterior canal most common). NO hearing loss or tinnitus (distinguishes from Meniere's). Diagnosis: Dix-Hallpike maneuver reproduces vertigo + characteristic upbeating-torsional nystagmus with latency and fatigability. Treatment: Epley maneuver (canalith repositioning procedure) — repositions the otoliths, highly effective. Compare: Meniere's disease (episodic vertigo lasting hours + sensorineural hearing loss + tinnitus + aural fullness; treat with salt restriction, diuretics); vestibular neuritis (acute prolonged vertigo days, after viral illness, no hearing loss); labyrinthitis (vertigo + hearing loss); acoustic neuroma (progressive unilateral hearing loss + imbalance — MRI)."},
{c:"ALS",q:"A 58-year-old has progressive asymmetric limb weakness, muscle atrophy, fasciculations (lower motor neuron signs), AND hyperreflexia with spasticity (upper motor neuron signs), without sensory loss or cognitive change. Diagnosis?",o:["Multiple sclerosis — sensory symptoms expected","Guillain-Barré syndrome — areflexia and ascending pattern","Amyotrophic lateral sclerosis (ALS) — combined UPPER and LOWER motor neuron findings without sensory involvement; riluzole and edaravone slow progression modestly; supportive multidisciplinary care; respiratory failure is the usual cause of death","Myasthenia gravis — fatigable weakness"],a:2,r:"Amyotrophic lateral sclerosis (ALS, Lou Gehrig's disease): progressive degeneration of BOTH upper and lower motor neurons. Hallmark: combination of UMN signs (hyperreflexia, spasticity, Babinski) AND LMN signs (atrophy, fasciculations, weakness) in the same patient, WITHOUT sensory loss, sphincter dysfunction, or (usually) cognitive change. Bulbar involvement: dysarthria, dysphagia. Progressive and fatal — respiratory failure is the usual cause of death (median survival 3-5 years). Diagnosis: clinical + EMG (denervation), exclude mimics. Treatment: riluzole (glutamate inhibitor — modestly prolongs survival ~3 months) and edaravone (antioxidant — slows functional decline); multidisciplinary supportive care (respiratory support/NIV, nutrition/PEG, speech therapy, mobility). No cure. The combination of UMN + LMN signs without sensory findings is the key diagnostic clue."},
{c:"Huntington's Disease",q:"A 42-year-old develops progressive involuntary writhing/dance-like movements (chorea), behavioral changes, and cognitive decline. His father died of a similar neurodegenerative condition. Genetic testing shows expanded CAG trinucleotide repeats. Diagnosis and inheritance?",o:["Parkinson's disease — sporadic, treat with levodopa","Wilson's disease — autosomal recessive copper disorder","Huntington's disease — autosomal DOMINANT trinucleotide (CAG) repeat expansion on chromosome 4; chorea + psychiatric symptoms + dementia; tetrabenazine or deutetrabenazine for chorea; genetic counseling is essential","Sydenham chorea — post-streptococcal"],a:2,r:"Huntington's disease (HD): AUTOSOMAL DOMINANT neurodegenerative disorder caused by CAG trinucleotide repeat expansion in the huntingtin (HTT) gene on chromosome 4. Anticipation: more repeats → earlier onset and worse severity in successive generations. Clinical triad: (1) CHOREA (involuntary, dance-like, writhing movements); (2) Psychiatric symptoms (depression, irritability, psychosis — high suicide risk); (3) Progressive cognitive decline (dementia). Onset typically ages 30-50. Treatment: symptomatic only (no cure) — tetrabenazine or deutetrabenazine (VMAT2 inhibitors) for chorea; antipsychotics; SSRIs for mood. Genetic counseling is CRITICAL (50% inheritance risk for each child; predictive testing has major psychological implications). Fatal over 15-20 years. Sydenham chorea: post-streptococcal, self-limited, in children."},
{c:"Syncope vs Seizure",q:"A 22-year-old briefly lost consciousness after standing in a hot, crowded room. Witnesses report pallor and a few brief jerks, with rapid full recovery and no confusion afterward. He recalls feeling lightheaded and nauseated beforehand. Most likely diagnosis?",o:["Generalized tonic-clonic seizure — start an AED","Vasovagal (neurocardiogenic) syncope — prodrome of lightheadedness/nausea/diaphoresis, brief LOC with rapid recovery and NO postictal confusion; brief myoclonic jerks (convulsive syncope) can occur and do not indicate epilepsy; reassurance and avoidance of triggers","Cardiac arrhythmia — implant a pacemaker","Stroke — CT angiography"],a:1,r:"Vasovagal (neurocardiogenic) syncope: most common cause of syncope. Triggered by prolonged standing, heat, pain, emotional stress, dehydration. PRODROME: lightheadedness, nausea, diaphoresis, pallor, tunnel vision (warning before fainting). Brief LOC with RAPID full recovery and NO postictal confusion. Distinguishing from seizure: Syncope — prodrome present, brief, rapid recovery, no/minimal confusion, brief myoclonic jerks possible (convulsive syncope — does NOT indicate epilepsy); tongue biting rare. Seizure — aura (or none), tonic-clonic activity lasting minutes, lateral tongue biting, incontinence, prolonged POSTICTAL confusion. Management of vasovagal syncope: reassurance, hydration, avoid triggers, counterpressure maneuvers (leg crossing, hand gripping), recognize prodrome and lie down. Red flags for cardiac syncope: exertional, no prodrome, palpitations, family history of sudden death, abnormal ECG — warrant cardiac workup."},
{c:"Brain Tumor",q:"A 55-year-old has new-onset seizures, progressively worsening morning headaches (worse when lying down), nausea, and papilledema. MRI shows a ring-enhancing mass with surrounding vasogenic edema. Which features suggest a brain tumor rather than benign headache?",o:["Headaches that improve with caffeine","Bilateral throbbing pain relieved by sleep","Red flags: NEW headache after age 50, progressive worsening, worse in the morning or with lying down/Valsalva, associated with neurologic deficits, seizures, papilledema, nausea/vomiting — these warrant urgent neuroimaging","Headaches only occurring with menses"],a:2,r:"Brain tumor headache red flags (warrant urgent neuroimaging): (1) NEW or changed headache, especially age >50; (2) Progressive worsening over weeks; (3) Worse in the MORNING or with lying down, coughing, bending, or Valsalva (increased ICP); (4) Associated neurologic deficits (focal weakness, vision changes, ataxia); (5) New-onset seizures; (6) Papilledema; (7) Nausea/vomiting (especially projectile, with ICP); (8) Personality/cognitive changes. Increased ICP signs: papilledema, CN VI palsy, Cushing's triad (late: hypertension, bradycardia, irregular respirations). MRI with contrast is the imaging of choice. Ring-enhancing lesions differential: tumor (glioblastoma, metastasis), abscess, toxoplasmosis (HIV), demyelination. Any headache with red flags requires prompt imaging — most headaches are benign (tension, migraine), but red flags change the workup entirely."},
{c:"Tension Headache",q:"A 35-year-old describes a bilateral, band-like, pressing (non-throbbing) headache of mild-moderate intensity, without nausea, photophobia, or phonophobia. It is not worsened by activity. These occur a few times monthly with work stress. Diagnosis and management?",o:["Migraine — sumatriptan","Cluster headache — high-flow oxygen","Tension-type headache — most common primary headache; bilateral, pressing/tightening, non-pulsatile, mild-moderate, no nausea or significant photophobia/phonophobia; treat acute episodes with NSAIDs or acetaminophen; for frequent episodes, amitriptyline is first-line prophylaxis; address stress and triggers","Subarachnoid hemorrhage — CT"],a:2,r:"Tension-type headache (TTH): most common primary headache. Features: BILATERAL, pressing/tightening (NON-pulsatile) quality, mild-to-moderate intensity, 'band around the head,' NOT aggravated by routine physical activity, NO nausea/vomiting, and at most one of photophobia OR phonophobia (this differentiates from migraine, which has throbbing pain, nausea, photophobia AND phonophobia, worsens with activity). Triggers: stress, poor posture, sleep deprivation, eye strain. Acute treatment: NSAIDs (ibuprofen, naproxen) or acetaminophen — limit to <15 days/month to avoid medication overuse headache. Prophylaxis (for frequent/chronic TTH): amitriptyline (first-line tricyclic). Non-pharmacologic: stress management, relaxation training, biofeedback, regular sleep and exercise, address ergonomics. Avoid opioids and butalbital (overuse and dependence risk)."},
{c:"Medication Overuse Headache",q:"A 40-year-old with chronic migraines has been taking sumatriptan and over-the-counter combination analgesics almost daily for 4 months. Her headaches have become more frequent and constant (15+ days/month). Diagnosis and management?",o:["Worsening migraine — increase the triptan frequency","Brain tumor — MRI urgently","Medication overuse headache (rebound headache) — from frequent use of acute headache medications (triptans, opioids, butalbital, combination analgesics >10-15 days/month); management: WITHDRAW the overused medication and start appropriate prophylaxis","New daily persistent headache — no treatment available"],a:2,r:"Medication overuse headache (MOH, rebound headache): chronic daily headache (≥15 days/month for >3 months) caused by frequent use of acute headache medications in a patient with a pre-existing headache disorder. High-risk medications and thresholds: triptans, ergots, opioids, butalbital-containing, and combination analgesics — overuse defined as ≥10 days/month; simple analgesics (acetaminophen, NSAIDs) — ≥15 days/month. Paradox: the acute medications meant to treat headaches now perpetuate them. Management: (1) Patient education; (2) WITHDRAW/taper the overused medication (abrupt for triptans/NSAIDs; gradual for opioids/butalbital/caffeine); (3) Expect a transient withdrawal headache; (4) Start preventive therapy (topiramate, amitriptyline, CGRP antagonists, beta-blocker); (5) Bridge therapy during withdrawal. Prevention: limit acute medication use, treat underlying headache disorder with prophylaxis."},
{c:"Wernicke Encephalopathy",q:"A 55-year-old man with chronic alcohol use disorder presents with confusion, ophthalmoplegia (abnormal eye movements), and ataxic gait. What is the diagnosis, the deficient nutrient, and the critical management point?",o:["Hepatic encephalopathy — lactulose","Stroke — CT and tPA evaluation","Wernicke encephalopathy — thiamine (vitamin B1) deficiency; classic triad: confusion, ophthalmoplegia, ataxia; give IV THIAMINE BEFORE any glucose (glucose administration before thiamine can precipitate or worsen Wernicke's); untreated, it progresses to irreversible Korsakoff syndrome","Delirium tremens — benzodiazepines only"],a:2,r:"Wernicke encephalopathy: acute neurological emergency from THIAMINE (vitamin B1) deficiency — most common in chronic alcohol use, but also malnutrition, hyperemesis gravidarum, bariatric surgery. Classic triad (often incomplete): (1) Confusion/encephalopathy; (2) Ophthalmoplegia/nystagmus (CN VI palsy, conjugate gaze palsy); (3) Ataxia (gait). CRITICAL: give IV/IM THIAMINE BEFORE administering glucose — glucose metabolism consumes thiamine and can precipitate or worsen Wernicke's in a thiamine-deficient patient (a classic board point and clinical pitfall). Wernicke's is REVERSIBLE with prompt thiamine; if untreated → Korsakoff syndrome (irreversible: anterograde amnesia + confabulation). 'Wernicke-Korsakoff syndrome.' Always give thiamine to malnourished/alcoholic patients before/with dextrose-containing fluids."},
{c:"Neuroleptic Malignant Syndrome",q:"A 30-year-old psychiatric patient on haloperidol develops high fever (40°C), severe muscle rigidity ('lead pipe'), altered mental status, autonomic instability, and markedly elevated creatine kinase (CK). Diagnosis and management?",o:["Serotonin syndrome — cyproheptadine","Malignant hyperthermia — only occurs with anesthesia","Neuroleptic malignant syndrome (NMS) — life-threatening reaction to dopamine antagonists (antipsychotics); STOP the offending agent immediately, aggressive supportive care/cooling, IV fluids; dantrolene and bromocriptine for severe cases","Sepsis — broad-spectrum antibiotics only"],a:2,r:"Neuroleptic malignant syndrome (NMS): life-threatening idiosyncratic reaction to dopamine ANTAGONISTS (typical antipsychotics like haloperidol; also atypicals, antiemetics like metoclopramide; or abrupt withdrawal of dopaminergic drugs in Parkinson's). Tetrad: (1) Hyperthermia (often >40°C); (2) 'Lead-pipe' muscle RIGIDITY; (3) Altered mental status; (4) Autonomic instability (tachycardia, labile BP, diaphoresis). Labs: markedly elevated CK (rhabdomyolysis → AKI risk), leukocytosis. Onset over 1-3 days. Management: STOP the offending drug immediately; aggressive supportive care (cooling, IV fluids, electrolyte correction); dantrolene (muscle relaxant) and bromocriptine (dopamine agonist) for severe cases; benzodiazepines for agitation. Distinguish from serotonin syndrome (serotonergic drugs, HYPERreflexia/clonus, more rapid onset, treat with cyproheptadine). NMS: rigidity + hyporeflexia, slower onset."},
,
{c:"Restless Leg Syndrome",q:"A 50-year-old woman has an irresistible urge to move her legs, worse in the evening and at rest, relieved by walking, disrupting her sleep. Which workup is essential before treatment?",o:["No workup needed — start a dopamine agonist empirically","MRI of the lumbar spine for all patients","Check serum FERRITIN and iron studies — iron deficiency is a common, treatable cause/contributor to restless leg syndrome; supplement iron if ferritin <75 ng/mL; also review medications (antihistamines, antidepressants can worsen RLS)","EEG to rule out seizure activity"],a:2,r:"Restless leg syndrome (RLS/Willis-Ekbom disease): irresistible urge to move the legs, with uncomfortable sensations, WORSE at rest and in the evening/night, RELIEVED by movement. Disrupts sleep. Essential workup: serum FERRITIN and iron studies — iron deficiency is a major modifiable contributor (iron is a cofactor for dopamine synthesis). Supplement iron if ferritin <75 ng/mL (RLS-specific threshold, higher than general anemia cutoff). Also: review aggravating medications (antihistamines, dopamine-blocking antiemetics, SSRIs/SNRIs, mirtazapine), reduce caffeine/alcohol/nicotine. Secondary causes: pregnancy, ESRD, peripheral neuropathy. Pharmacologic treatment (if iron repletion insufficient): alpha-2-delta ligands (gabapentin, pregabalin) are now preferred FIRST-LINE over dopamine agonists (pramipexole, ropinirole) due to AUGMENTATION risk (worsening/spreading symptoms with long-term dopaminergic use)."},
{c:"Diabetic Neuropathy",q:"A 60-year-old with 15-year history of type 2 diabetes has burning, tingling pain in both feet in a 'stocking' distribution, worse at night, with reduced vibration and pinprick sensation. First-line pharmacologic treatment for the neuropathic pain?",o:["Opioids — most effective for diabetic neuropathy","Topical capsaicin only","Pregabalin, gabapentin, duloxetine, or a tricyclic antidepressant (amitriptyline) — all first-line for painful diabetic peripheral neuropathy; pregabalin and duloxetine are FDA-approved; optimize glucose control to slow progression","Acetaminophen scheduled around the clock"],a:2,r:"Diabetic peripheral neuropathy (DPN): distal symmetric polyneuropathy — 'stocking-glove' distribution, burning/tingling/numbness, worse at night. Most common cause of neuropathy in developed countries. First-line pharmacologic agents for neuropathic pain: pregabalin (Lyrica — FDA-approved), gabapentin, duloxetine (Cymbalta — FDA-approved SNRI), tricyclic antidepressants (amitriptyline, nortriptyline — caution in elderly per Beers criteria). Choose based on comorbidities (duloxetine if concurrent depression; avoid TCAs in cardiac disease/elderly). GLUCOSE CONTROL is the most important measure to slow progression. Topical agents (capsaicin, lidocaine) as adjuncts. AVOID opioids as first-line (addiction, tolerance, no long-term benefit for neuropathic pain). Annual monofilament foot exams; foot care education to prevent ulcers."},
{c:"Carpal Tunnel — Neuro",q:"A 45-year-old has numbness and tingling in the thumb, index, and middle fingers that wakes her at night. Tapping over the volar wrist reproduces tingling. Which nerve is compressed and at what location?",o:["Ulnar nerve at the elbow (cubital tunnel)","Radial nerve in the spiral groove","Median nerve at the wrist (carpal tunnel) — compression beneath the transverse carpal ligament; numbness in the median distribution (thumb, index, middle, radial half of ring finger), positive Tinel's and Phalen's signs, nocturnal symptoms; first-line is night wrist splinting","Brachial plexus at the thoracic outlet"],a:2,r:"Carpal tunnel syndrome (CTS): compression of the MEDIAN NERVE as it passes through the carpal tunnel (beneath the transverse carpal ligament) at the WRIST. Symptoms: numbness/tingling in the median distribution — thumb, index, middle, and radial half of ring finger; nocturnal symptoms (waking with numbness, shaking hand for relief); thenar atrophy and weakness of thumb abduction in advanced cases. Provocative tests: Tinel's sign (tapping over the volar wrist → tingling), Phalen's maneuver (wrist flexion 60 sec → symptoms). Confirmation: nerve conduction studies/EMG. Risk factors: repetitive wrist use, pregnancy, hypothyroidism, diabetes, rheumatoid arthritis, obesity. First-line treatment: neutral wrist splint (especially at night), activity modification, NSAIDs; corticosteroid injection; surgical carpal tunnel release for refractory or severe (motor) cases. Ulnar neuropathy (cubital tunnel): affects ring/small fingers."},
{c:"Concussion",q:"A 16-year-old football player has a brief loss of awareness, headache, dizziness, and difficulty concentrating after a head impact. CT head is normal. What is the appropriate return-to-play guidance?",o:["Return to play the same game once symptoms resolve","Complete bed rest in a dark room for 2 weeks","Graduated, stepwise return-to-play protocol only AFTER becoming symptom-free at rest; advance through stages over days (light activity → sport-specific → contact) with no return to contact the same day; any symptom recurrence means stepping back","Permanent disqualification from all sports after one concussion"],a:2,r:"Concussion (mild traumatic brain injury): functional brain injury from biomechanical force; LOC is NOT required for diagnosis. CT often normal (concussion is functional, not structural — CT is for ruling out hemorrhage when red flags present: worsening headache, repeated vomiting, focal deficits, seizure, GCS <15, prolonged LOC). Management: NO return to play on the SAME day. Initial relative rest (24-48 hours) then gradual return to light cognitive and physical activity as tolerated (prolonged strict rest is no longer recommended). Graduated return-to-play protocol: stepwise progression (symptom-limited activity → light aerobic → sport-specific → non-contact training → full contact → game) — advance only if symptom-free at each stage, minimum 24 hours per stage. Return to LEARN (school) before return to play. Second-impact syndrome: rare, catastrophic brain swelling from a second concussion before the first resolves — the reason for careful clearance."},
{c:"Subdural Hematoma",q:"An 80-year-old on warfarin presents with gradually worsening confusion and headache over 2 weeks after a minor fall. CT head shows a crescent-shaped hyperdensity crossing suture lines. Diagnosis?",o:["Epidural hematoma — lens-shaped, from arterial bleed","Subarachnoid hemorrhage — blood in the sulci","Subdural hematoma — crescent-shaped (concave) collection from torn bridging veins, crosses suture lines; common in elderly and anticoagulated patients after minor trauma; can present subacutely/chronically with gradual symptoms","Ischemic stroke — wedge-shaped hypodensity"],a:2,r:"Subdural hematoma (SDH): bleeding from torn BRIDGING VEINS in the subdural space. CT: CRESCENT-shaped (concave/banana-shaped) collection that CROSSES suture lines (not limited by sutures). Risk factors: elderly (brain atrophy stretches bridging veins), anticoagulation/antiplatelet use, alcoholism, repeated falls. Presentation: can be acute (rapid) or CHRONIC/subacute (gradual confusion, headache, gait changes over days-weeks — easily mistaken for dementia or stroke in elderly). Management: reverse anticoagulation; neurosurgical evaluation (evacuation for large/symptomatic). Epidural hematoma: contrast — LENS-shaped (biconvex), does NOT cross suture lines, arterial (middle meningeal artery), classic 'lucid interval' then rapid deterioration, often from temporal bone fracture in younger trauma patients. In any anticoagulated elderly patient with new neuro/cognitive changes after a fall → CT to rule out SDH."},
{c:"Migraine Prophylaxis",q:"A 32-year-old has migraines 8 days per month that significantly impair her work despite acute treatment. Which is an appropriate FIRST-LINE prophylactic (preventive) medication?",o:["Daily sumatriptan — triptans are used for prevention","Daily opioids for baseline pain control","Propranolol, topiramate, or amitriptyline — established first-line oral migraine prophylactics; CGRP monoclonal antibodies (erenumab, fremanezumab) are options for refractory cases or those who cannot tolerate oral preventives","Daily butalbital-containing analgesics"],a:2,r:"Migraine prophylaxis indications: ≥4 migraine days/month, significant disability despite acute treatment, or acute medication overuse risk. First-line oral preventives (good evidence): (1) Beta-blockers — propranolol, metoprolol (avoid in asthma, use cautiously in depression); (2) Antiepileptics — topiramate (also aids weight loss, but cognitive side effects, teratogenic — avoid in pregnancy, contraindicated with pregnancy plans), valproate (teratogenic — avoid in women of childbearing potential); (3) Tricyclic antidepressants — amitriptyline (also helps with comorbid insomnia/tension headache). Newer: CGRP monoclonal antibodies (erenumab, galcanezumab, fremanezumab — monthly/quarterly injections) and gepants (atogepant, rimegepant) for prevention. Goal: reduce frequency/severity by ≥50%. Allow 2-3 months at adequate dose to assess efficacy. Avoid daily triptans/opioids/butalbital (MOH risk)."},
{c:"Spinal Cord Compression",q:"A 65-year-old with known prostate cancer develops progressive bilateral leg weakness, a sensory level at the mid-thorax, urinary retention, and severe back pain. What is the diagnosis and the most time-critical action?",o:["Lumbar disc herniation — outpatient MRI and physical therapy","Peripheral neuropathy — gabapentin","Malignant spinal cord compression (oncologic emergency) — emergent MRI of the entire spine and immediate high-dose IV corticosteroids (dexamethasone); urgent radiation oncology and/or neurosurgery consultation — delay risks permanent paralysis","Cauda equina syndrome only — no urgency if pain is controlled"],a:2,r:"Malignant spinal cord compression (MSCC): ONCOLOGIC EMERGENCY — metastatic tumor (or pathologic fracture) compressing the spinal cord. Common primaries: prostate, breast, lung, multiple myeloma, renal. Presentation: back pain (earliest, often nocturnal/worse lying down), progressive bilateral leg weakness, a SENSORY LEVEL (loss of sensation below the lesion), bowel/bladder dysfunction (late, poor prognostic sign). Time-critical management: (1) Immediate high-dose IV DEXAMETHASONE (reduces cord edema, preserves function) — do not delay; (2) EMERGENT MRI of the ENTIRE spine (often multiple levels); (3) Urgent radiation oncology and neurosurgery consultation (decompressive surgery and/or radiation). Neurologic function at presentation predicts outcome — ambulatory at diagnosis = best chance of remaining so. Delay risks permanent paraplegia. Any cancer patient with new back pain + neuro signs → treat as MSCC until excluded."},
{c:"Cranial Nerves",q:"A patient is unable to abduct the right eye (turn it outward), causing horizontal diplopia worse on right gaze. The rest of the neuro exam is normal. Which cranial nerve is affected?",o:["CN III (oculomotor) — would cause ptosis and a 'down and out' eye","CN IV (trochlear) — affects downward/inward gaze","CN VI (abducens) — innervates the lateral rectus muscle (eye abduction); palsy causes inability to abduct the eye and horizontal diplopia; CN VI has the longest intracranial course and is sensitive to increased ICP","CN VII (facial) — causes facial droop"],a:2,r:"Cranial nerve eye movements: CN VI (abducens) — innervates the LATERAL RECTUS (eye ABDUCTION/lateral movement); palsy → inability to abduct the eye, horizontal diplopia worse when looking toward the affected side, esotropia (eye turns inward at rest). CN VI has the longest intracranial course → vulnerable to increased ICP (a 'false localizing sign'), trauma, ischemia (diabetes, hypertension), tumors. CN III (oculomotor): innervates most extraocular muscles, eyelid (levator), and pupil; palsy → ptosis, 'down and out' eye, and a blown (dilated) pupil if compressive (aneurysm) — a CN III palsy with pupil involvement is an emergency (posterior communicating artery aneurysm). CN IV (trochlear): superior oblique (down and in gaze); palsy → vertical diplopia, head tilt. Mnemonic LR6SO4: Lateral Rectus = CN6, Superior Oblique = CN4, rest = CN3."},
{c:"Meningitis — Neuro",q:"A 19-year-old college student has fever, severe headache, neck stiffness, and photophobia. On exam, passive neck flexion causes involuntary hip and knee flexion. What is this sign and what does it suggest?",o:["Kernig's sign — suggests appendicitis","Brudzinski's sign — involuntary hip/knee flexion with passive neck flexion; a sign of meningeal irritation suggesting meningitis; perform urgent evaluation (LP after considering need for CT) and start empiric antibiotics without delay","Murphy's sign — suggests cholecystitis","Babinski's sign — upper motor neuron lesion"],a:1,r:"Meningeal irritation signs: Brudzinski's sign — passive NECK FLEXION causes involuntary HIP and KNEE flexion. Kernig's sign — with the hip flexed 90°, passive knee extension causes pain/resistance (hamstring spasm). Both suggest meningeal irritation (meningitis, subarachnoid hemorrhage). Note: these signs have LOW sensitivity (absence does NOT rule out meningitis) but reasonable specificity. Bacterial meningitis classic triad: fever + neck stiffness + altered mental status (only ~45% have all three; nearly all have at least 2 of: headache, fever, neck stiffness, altered mental status). Management: do NOT delay antibiotics — give empiric ceftriaxone + vancomycin (+ ampicillin if >50 or immunocompromised, for Listeria) + dexamethasone; obtain blood cultures; LP for CSF analysis (CT head first if focal deficits, papilledema, immunocompromise, or altered consciousness to exclude mass effect before LP). N. meningitidis: petechial/purpuric rash, droplet precautions, prophylaxis for close contacts."},
{c:"Myasthenic Crisis",q:"A patient with known myasthenia gravis develops worsening generalized weakness, difficulty swallowing, and increasing shortness of breath during a respiratory infection. What is the most important assessment and intervention?",o:["Order a chest X-ray and discharge if clear","Increase the pyridostigmine dose and observe at home","Assess respiratory status urgently (serial forced vital capacity and negative inspiratory force) — myasthenic crisis can cause respiratory failure requiring intubation; treat with IVIG or plasmapheresis; identify and treat the trigger (infection); ICU monitoring","Start an oral antibiotic and reassess in 1 week"],a:2,r:"Myasthenic crisis: severe exacerbation of myasthenia gravis causing respiratory failure from weakness of respiratory and bulbar muscles. Triggers: infection (most common), surgery, medication changes, pregnancy, certain drugs (aminoglycosides, fluoroquinolones, beta-blockers, magnesium). Most important assessment: RESPIRATORY function — serial forced vital capacity (FVC) and negative inspiratory force (NIF); declining FVC (<15-20 mL/kg) or NIF predicts impending respiratory failure → ICU + intubation BEFORE the patient decompensates (do not wait for hypoxia/hypercapnia — these are late). Treatment: IVIG or plasmapheresis (rapid-acting); corticosteroids; treat the trigger. Avoid medications that worsen MG. Distinguish from cholinergic crisis (excess acetylcholinesterase inhibitor → SLUDGE symptoms, weakness from depolarizing block — rare today). Pulse oximetry is a LATE indicator — use FVC/NIF for early detection."},
{c:"Transient Global Amnesia",q:"A 65-year-old suddenly cannot form new memories and repeatedly asks the same questions ('How did I get here?'). He knows who he is and can perform complex tasks, with no other neuro deficits. It resolves completely within several hours. Diagnosis?",o:["Stroke — activate stroke protocol","Complex partial seizure — start an AED","Transient global amnesia (TGA) — sudden, temporary, isolated anterograde amnesia with preserved identity and consciousness, resolving within 24 hours; benign and self-limited; rule out stroke/seizure but no specific treatment needed; low recurrence","Early dementia — start a cholinesterase inhibitor"],a:2,r:"Transient global amnesia (TGA): sudden, transient, ISOLATED anterograde amnesia (inability to form new memories) lasting <24 hours, with preserved personal identity, consciousness, and other cognitive/neurologic function. Hallmark: repetitive questioning ('Where am I? How did I get here?') as the patient cannot retain answers. Often preceded by physical exertion, emotional stress, Valsalva, or temperature changes. Benign and self-limited — resolves completely, low recurrence (~5%/year), does NOT increase stroke or dementia risk. Workup: rule out stroke (especially if any focal deficits — TGA has NONE), seizure, and hypoglycemia. No specific treatment needed; reassurance. Distinguish from: stroke (focal deficits), transient epileptic amnesia (recurrent, brief, may have other seizure features), and psychogenic amnesia (loss of personal identity — opposite of TGA, which preserves identity)."},
{c:"Stroke Localization",q:"A patient presents with right-sided face and arm weakness greater than leg weakness, right-sided sensory loss, and aphasia (difficulty with language). Which vascular territory is most likely affected?",o:["Posterior cerebral artery (PCA) — would cause visual field loss","Anterior cerebral artery (ACA) — would cause leg > arm weakness","Left middle cerebral artery (MCA) — face/arm weakness greater than leg, contralateral sensory loss, and aphasia (left hemisphere is dominant for language in most people); MCA is the most commonly affected stroke territory","Basilar artery — would cause coma and quadriplegia"],a:2,r:"Stroke localization by vascular territory: MIDDLE cerebral artery (MCA) — most common stroke territory; contralateral face and ARM weakness > leg, contralateral sensory loss, and APHASIA if the dominant (usually left) hemisphere is affected, or neglect if non-dominant (right) hemisphere. ANTERIOR cerebral artery (ACA): contralateral LEG weakness > arm/face (medial motor cortex = leg), behavioral changes. POSTERIOR cerebral artery (PCA): contralateral homonymous hemianopia (visual field loss), visual deficits. BASILAR/vertebrobasilar: brainstem signs — crossed deficits, vertigo, diplopia, dysarthria, ataxia, 'locked-in' syndrome, coma. Lacunar (small vessel): pure motor or pure sensory, no cortical signs (aphasia/neglect absent). The MCA distribution (face/arm > leg + cortical signs like aphasia) is the classic and most common presentation tested."},
{c:"Encephalitis",q:"A 35-year-old presents with fever, headache, confusion, personality changes, and a focal seizure. CSF shows lymphocytic pleocytosis. MRI shows temporal lobe involvement. What is the most likely treatable cause and immediate treatment?",o:["Bacterial meningitis — ceftriaxone","Migraine with aura — sumatriptan","Herpes simplex virus (HSV) encephalitis — temporal lobe involvement is classic; start IV ACYCLOVIR EMPIRICALLY and immediately on suspicion (do not wait for PCR confirmation) — delay increases mortality and morbidity; confirm with CSF HSV PCR","Multiple sclerosis — IV steroids"],a:2,r:"Herpes simplex virus (HSV) encephalitis: the most common cause of sporadic fatal viral encephalitis, and importantly TREATABLE. Presentation: fever, headache, altered mental status, personality/behavioral changes, focal neurologic deficits, and SEIZURES (especially focal). Classic: TEMPORAL LOBE involvement (HSV has tropism for the temporal and frontal lobes) — seen on MRI (temporal lobe edema/hemorrhage) and EEG (temporal periodic discharges). CSF: lymphocytic pleocytosis, elevated protein, often RBCs (hemorrhagic), normal glucose. Diagnosis: CSF HSV PCR (highly sensitive/specific). CRITICAL: start IV ACYCLOVIR EMPIRICALLY and IMMEDIATELY upon suspicion — do NOT wait for PCR results; early treatment dramatically reduces mortality (from ~70% untreated to ~20-30%) and morbidity. Continue acyclovir until HSV is excluded if another cause is not found."},
{c:"Peripheral Nerve — Radial",q:"A patient falls asleep with his arm draped over a chair back ('Saturday night palsy') and wakes with wrist drop (inability to extend the wrist and fingers). Sensation over the dorsum of the hand is reduced. Which nerve is injured?",o:["Median nerve — would cause thenar weakness","Ulnar nerve — would cause clawing of the 4th/5th fingers","Radial nerve — compression in the spiral groove of the humerus causes wrist drop (loss of wrist/finger extension) and sensory loss over the dorsal hand/thumb web; usually resolves with time and a wrist splint for support","Axillary nerve — would cause deltoid weakness"],a:2,r:"Radial nerve palsy ('Saturday night palsy' or 'honeymoon palsy'): compression of the radial nerve in the spiral groove of the humerus (e.g., arm draped over a chair while intoxicated/asleep, or a partner's head resting on the arm). Presentation: WRIST DROP (inability to extend the wrist and fingers — the radial nerve innervates the extensor muscles), and sensory loss over the dorsal hand and first web space. Triceps usually spared (innervated proximal to the spiral groove). Management: usually a neurapraxia (compression injury) that resolves spontaneously over weeks-months; supportive wrist splint to maintain function and prevent contractures, physical/occupational therapy. Compare: ulnar nerve (cubital tunnel) → claw hand, 4th/5th finger sensory loss; median nerve (carpal tunnel) → thenar weakness, lateral palm/digit sensory loss."},
{c:"Multiple Sclerosis — Treatment",q:"A 28-year-old with relapsing-remitting MS presents with an acute relapse: new severe vision loss in one eye and worsening leg weakness over 4 days. What is the appropriate treatment for the acute relapse?",o:["Start a disease-modifying therapy (DMT) to abort the relapse","Oral acetaminophen and rest","High-dose IV corticosteroids (methylprednisolone) — speeds recovery from acute MS relapses; plasmapheresis for steroid-refractory severe relapses; DMTs are for long-term relapse PREVENTION, not acute relapse treatment","Immediate plasmapheresis as first-line for all relapses"],a:2,r:"Acute MS relapse treatment: high-dose IV corticosteroids (methylprednisolone 1 g/day x3-5 days) — speeds recovery from the acute relapse (shortens duration), although it does not change long-term disability. Oral high-dose steroids are an alternative (similar efficacy). Plasmapheresis (plasma exchange): for severe relapses refractory to steroids. KEY DISTINCTION: acute relapse treatment (steroids) is DIFFERENT from disease-modifying therapy (DMT). DMTs (interferon-beta, glatiramer acetate, dimethyl fumarate, fingolimod/S1P modulators, natalizumab, ocrelizumab, cladribine) are for LONG-TERM relapse PREVENTION and slowing disability accumulation — NOT for treating an acute attack. Symptomatic management: spasticity (baclofen), fatigue, neuropathic pain, bladder dysfunction. Optic neuritis (common MS relapse): IV steroids speed recovery; most vision recovers."},
{c:"Cerebellar Function",q:"A patient has difficulty with rapid alternating movements (dysdiadochokinesia), past-pointing on finger-to-nose testing (dysmetria), a wide-based unsteady gait, and intention tremor (worse as the hand approaches a target). Which part of the nervous system is affected?",o:["Basal ganglia — would cause resting tremor and rigidity","Peripheral nerves — would cause stocking-glove sensory loss","Cerebellum — coordinates movement; lesions cause ataxia, dysmetria, dysdiadochokinesia, intention tremor, and nystagmus; causes include stroke, MS, alcohol, tumors, and degenerative ataxias","Frontal lobe — would cause personality change"],a:2,r:"Cerebellar dysfunction signs: the cerebellum coordinates movement, balance, and posture (it does not initiate movement). Lesion signs: (1) Ataxia — wide-based, unsteady, 'drunken' gait; (2) Dysmetria — inaccurate targeting (past-pointing on finger-to-nose, heel-to-shin); (3) Dysdiadochokinesia — impaired rapid alternating movements; (4) INTENTION tremor — worsens as the hand approaches a target (vs Parkinson's resting tremor or essential action tremor); (5) Nystagmus; (6) Scanning/staccato dysarthria; (7) Hypotonia. Ipsilateral signs (cerebellar hemisphere lesions affect the SAME side, unlike cerebral lesions). Causes: stroke (posterior circulation), MS, chronic alcohol use (vermis degeneration → gait ataxia), tumors, paraneoplastic, hereditary ataxias (Friedreich's, spinocerebellar). Acute cerebellar signs + headache → consider cerebellar stroke/hemorrhage (emergency — risk of brainstem compression and hydrocephalus)."},
{c:"Pseudoseizure",q:"A patient has episodes resembling seizures with side-to-side head movements, pelvic thrusting, asynchronous limb movements, and preserved awareness during bilateral shaking, with episodes lasting several minutes. Video EEG during an episode shows no epileptiform activity. What is the diagnosis?",o:["Generalized tonic-clonic seizure — increase AED dose","Frontal lobe epilepsy — normal scalp EEG is common","Psychogenic non-epileptic seizures (PNES, functional seizures) — events resembling seizures without EEG correlate; often associated with psychological stressors or trauma history; managed with psychotherapy (CBT), NOT antiepileptic drugs","Status epilepticus — IV lorazepam"],a:2,r:"Psychogenic non-epileptic seizures (PNES / functional seizures): episodes that resemble epileptic seizures but have NO electrical (epileptiform) correlate on EEG — they are involuntary and not consciously feigned (a functional neurologic disorder). Features suggesting PNES (vs epileptic seizures): side-to-side head movements, pelvic thrusting, asynchronous/out-of-phase limb movements, preserved awareness during bilateral motor activity, prolonged duration (>2 min), eye closure during the event, ictal crying, and rapid postictal reorientation. GOLD STANDARD diagnosis: video-EEG monitoring capturing a typical event with no epileptiform activity. Often associated with psychological stressors, trauma/abuse history, or comorbid psychiatric conditions. Management: compassionate explanation of the diagnosis, psychotherapy (CBT is first-line), treat comorbid depression/anxiety/PTSD — NOT antiepileptic drugs. Note: ~10-20% of patients have BOTH PNES and epilepsy."},
{c:"Migraine — Special",q:"A 26-year-old woman with migraine WITH AURA asks about contraception. Which contraceptive consideration is most important for her?",o:["Combined estrogen-containing oral contraceptives are the best choice","There are no contraindications — any contraceptive is fine","Combined hormonal (estrogen-containing) contraceptives are CONTRAINDICATED in migraine WITH AURA due to increased ischemic stroke risk; recommend progestin-only methods, IUD, or non-hormonal options","Migraine has no relationship to contraceptive choice"],a:2,r:"Migraine with aura + estrogen-containing contraception: combined hormonal contraceptives (containing estrogen) are CONTRAINDICATED (CDC Medical Eligibility Criteria category 4 — unacceptable risk) in women with migraine WITH AURA, because both independently increase ischemic stroke risk, and the combination is multiplicative. This is a critical women's health/neuro intersection. Acceptable alternatives: progestin-only methods (progestin-only pill, DMPA injection, etonogestrel implant), levonorgestrel or copper IUD, and non-hormonal/barrier methods (all category 1-2). Migraine WITHOUT aura: combined contraceptives are generally acceptable in women <35 without other stroke risk factors (category 2), but become category 3-4 with age ≥35 or additional risk factors (smoking, hypertension). Also counsel smoking cessation. Always ask about aura before prescribing estrogen-containing contraception in migraineurs."},
{c:"Babinski Sign",q:"During a neurologic exam, stroking the lateral sole of the foot causes the big toe to dorsiflex (extend upward) and the other toes to fan out. What does this Babinski sign indicate in an adult?",o:["Normal finding in all adults","Peripheral neuropathy","An UPPER motor neuron (corticospinal tract) lesion — the extensor plantar response (positive Babinski) is abnormal in adults and indicates pathology of the corticospinal tract (e.g., stroke, spinal cord lesion, MS); the normal adult response is plantar flexion (toes curl down)","Cerebellar dysfunction"],a:2,r:"Babinski sign (extensor plantar response): stroking the lateral sole from heel toward the toes causes the big toe to DORSIFLEX (extend upward) with fanning of the other toes. In ADULTS, a positive Babinski is ABNORMAL and indicates an UPPER MOTOR NEURON (corticospinal tract) lesion — stroke, spinal cord injury/compression, multiple sclerosis, ALS, brain tumor. The NORMAL adult response is plantar FLEXION (toes curl downward). Note: a positive Babinski is NORMAL in infants up to ~12-24 months (immature corticospinal tracts) — it disappears as myelination completes. Other UMN signs: hyperreflexia, spasticity, clonus, weakness in a pyramidal distribution. LMN signs (peripheral nerve, anterior horn): hyporeflexia, atrophy, fasciculations, flaccidity. The Babinski sign is one of the most reliable signs of corticospinal tract dysfunction."}
,
{c:"Cauda Equina",q:"A 45-year-old with acute severe low back pain develops numbness in the perineal/saddle region, urinary retention, and bilateral leg weakness. Diagnosis and required action?",o:["Lumbar strain — NSAIDs and rest","Sciatica — outpatient MRI in 2 weeks","Cauda equina syndrome — compression of the lumbosacral nerve roots; SADDLE anesthesia, urinary retention/incontinence, bilateral leg weakness, decreased rectal tone; EMERGENT MRI and urgent surgical decompression (within 24-48 hours) to prevent permanent bowel/bladder/sexual dysfunction","Diabetic neuropathy — gabapentin"],a:2,r:"Cauda equina syndrome (CES): compression of the cauda equina (the bundle of lumbosacral nerve roots below the conus medullaris) — most commonly from a large central disc herniation, also tumor, epidural abscess, hematoma, or fracture. SURGICAL EMERGENCY. Red flag features: (1) SADDLE anesthesia (numbness of perineum, buttocks, inner thighs); (2) Bladder dysfunction (urinary RETENTION, then overflow incontinence — most consistent finding); (3) Bowel dysfunction (incontinence, decreased rectal tone); (4) Bilateral leg weakness/sciatica; (5) Sexual dysfunction. Action: EMERGENT MRI of the lumbosacral spine + urgent neurosurgical/orthopedic consultation for surgical decompression — ideally within 24-48 hours. Delay risks PERMANENT bowel, bladder, and sexual dysfunction. Any back pain patient with new urinary retention or saddle anesthesia → emergency workup, do not delay."}
];

const N = QUESTIONS.length;
let idx = 0;
let answers = new Array(N).fill(null); // selected option index
const LETTERS = ["A","B","C","D"];

const strip = document.getElementById("strip");
const qcard = document.getElementById("qcard");
const resultsCard = document.getElementById("results");

function buildStrip(){
  strip.innerHTML = "";
  for(let i=0;i<N;i++){
    const t = document.createElement("div");
    t.className = "tick";
    t.title = "Question " + (i+1);
    t.addEventListener("click", ()=>{ idx = i; render(); });
    strip.appendChild(t);
  }
}
function paintStrip(){
  const ticks = strip.children;
  for(let i=0;i<N;i++){
    const t = ticks[i];
    t.className = "tick";
    if(answers[i] !== null){
      t.classList.add(answers[i] === QUESTIONS[i].a ? "ok" : "bad");
    }
    if(i === idx && !resultsVisible()) t.classList.add("cur");
  }
}
function resultsVisible(){ return !resultsCard.classList.contains("hide"); }

function counts(){
  let done=0, right=0;
  for(let i=0;i<N;i++){
    if(answers[i]!==null){ done++; if(answers[i]===QUESTIONS[i].a) right++; }
  }
  return {done,right};
}
function paintScore(){
  const {done,right} = counts();
  document.getElementById("sc-done").textContent = done;
  document.getElementById("sc-right").textContent = right;
}

function render(){
  resultsCard.classList.add("hide");
  qcard.classList.remove("hide");
  const Q = QUESTIONS[idx];
  const picked = answers[idx];
  let html = "";
  html += '<div class="meta"><span class="qnum">QUESTION ' + (idx+1) + ' / ' + N + '</span><span class="chip">' + Q.c + '</span></div>';
  html += '<p class="stem">' + Q.q + '</p>';
  Q.o.forEach((opt,i)=>{
    let cls = "opt";
    if(picked !== null){
      if(i === picked && picked === Q.a) cls += " sel-ok";
      else if(i === picked) cls += " sel-bad";
      else if(i === Q.a) cls += " reveal-ok";
    }
    html += '<button class="'+cls+'" data-i="'+i+'" '+(picked!==null?"disabled":"")+'><span class="ltr">'+LETTERS[i]+'</span><span>'+opt+'</span></button>';
  });
  if(picked !== null){
    const good = picked === Q.a;
    html += '<div class="verdict '+(good?"ok":"bad")+'">'+(good ? "Correct" : "Incorrect — answer is " + LETTERS[Q.a])+'</div>';
    html += '<div class="rationale">'+Q.r+'</div>';
  }
  html += '<div class="nav">';
  html += '<button class="btn ghost" id="prevBtn" '+(idx===0?"disabled":"")+'>Back</button>';
  if(idx < N-1){
    html += '<button class="btn" id="nextBtn">Next question</button>';
  } else {
    html += '<button class="btn" id="finishBtn">See results</button>';
  }
  html += '</div>';
  qcard.innerHTML = html;

  qcard.querySelectorAll(".opt").forEach(btn=>{
    btn.addEventListener("click", ()=>{
      if(answers[idx] !== null) return;
      answers[idx] = parseInt(btn.dataset.i,10);
      render();
    });
  });
  const prev = document.getElementById("prevBtn");
  if(prev) prev.addEventListener("click", ()=>{ idx--; render(); });
  const next = document.getElementById("nextBtn");
  if(next) next.addEventListener("click", ()=>{ idx++; render(); });
  const fin = document.getElementById("finishBtn");
  if(fin) fin.addEventListener("click", showResults);
  paintStrip(); paintScore();
}

function showResults(){
  const {done,right} = counts();
  const pct = done ? Math.round((right/done)*100) : 0;
  // category breakdown
  const cats = {};
  QUESTIONS.forEach((Q,i)=>{
    if(!cats[Q.c]) cats[Q.c] = {n:0, ok:0, ans:0};
    cats[Q.c].n++;
    if(answers[i]!==null){ cats[Q.c].ans++; if(answers[i]===Q.a) cats[Q.c].ok++; }
  });
  let html = '<div class="bigscore">'+right+' / '+done+' ('+pct+'%)</div>';
  html += '<p class="sub">'+(done<N ? (N-done)+' question'+(N-done===1?"":"s")+' unanswered — they are not counted against you. ' : '')+'A passing pace on the real ANCC is roughly the low-to-mid 70s percent range, so use this as a directional gauge, not a verdict.</p>';
  html += '<h2 style="font-size:.95rem;margin-bottom:6px">By category</h2>';
  Object.keys(cats).forEach(c=>{
    const o = cats[c];
    const p = o.ans ? Math.round((o.ok/o.ans)*100) : 0;
    html += '<div class="catrow"><span style="flex:0 0 44%">'+c+'</span><span class="bar"><i style="width:'+(o.ans? p:0)+'%"></i></span><span style="font-family:var(--mono);font-size:.8rem">'+o.ok+'/'+o.ans+(o.ans<o.n?' of '+o.n:'')+'</span></div>';
  });
  // missed list
  const missed = [];
  for(let i=0;i<N;i++) if(answers[i]!==null && answers[i]!==QUESTIONS[i].a) missed.push(i);
  if(missed.length){
    html += '<div class="missedlist"><h2 style="font-size:.95rem;margin-bottom:8px">Review missed questions</h2>';
    missed.forEach(i=>{ html += '<button data-jump="'+i+'">Q'+(i+1)+'</button>'; });
    html += '</div>';
  }
  html += '<div class="nav"><button class="btn ghost" id="backBtn">Back to questions</button><button class="btn" id="resetBtn">Start over</button></div>';
  resultsCard.innerHTML = html;
  resultsCard.classList.remove("hide");
  qcard.classList.add("hide");
  resultsCard.querySelectorAll("[data-jump]").forEach(b=>{
    b.addEventListener("click", ()=>{ idx = parseInt(b.dataset.jump,10); render(); });
  });
  document.getElementById("backBtn").addEventListener("click", ()=>{ render(); });
  document.getElementById("resetBtn").addEventListener("click", ()=>{
    if(confirm("Clear all answers and start over?")){
      answers = new Array(N).fill(null); idx = 0; render();
    }
  });
  paintStrip(); paintScore();
}

buildStrip();
render();
</script>

</html>
