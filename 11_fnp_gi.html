<script>
const QUESTIONS = [
{c:"GERD",q:"A 52-year-old with GERD on omeprazole has new onset dysphagia to solids and 15-pound unintentional weight loss. What is the next step?",o:["Double the PPI dose and reassess in 6 weeks","Reassure — dysphagia is a common GERD symptom","Urgent upper endoscopy — dysphagia + weight loss are ALARM SYMPTOMS requiring immediate evaluation to exclude esophageal malignancy or stricture","Switch to an H2 blocker and add metoclopramide"],a:2,r:"GERD alarm symptoms mandating URGENT ENDOSCOPY: dysphagia, odynophagia, unexplained weight loss, persistent vomiting, GI bleeding (hematemesis, melena), anemia, palpable mass, age >45-50 with new upper GI symptoms. These features may indicate malignancy, high-grade stricture, or Barrett's esophagus. Suppressing acid without investigating alarm symptoms risks delaying a cancer diagnosis. The most common malignancies detected: esophageal adenocarcinoma (Barrett's complication), esophageal squamous cell carcinoma, and gastric carcinoma. Routine GERD without alarm symptoms: PPI therapy; endoscopy only for suspected complications or inadequate response."},
{c:"GERD",q:"A patient with documented erosive esophagitis healed on 8 weeks of PPI therapy and is now asymptomatic. What is the preferred long-term management strategy?",o:["Continue the same PPI dose indefinitely without reassessment","Stop all therapy immediately — healed esophagitis does not require maintenance","Step-down therapy: try the lowest effective PPI dose or every-other-day dosing; for mild/intermittent GERD, consider switching to an H2 blocker or PRN PPI; ongoing PPI for severe erosive esophagitis or Barrett's","Double the PPI dose for prophylaxis"],a:2,r:"GERD step-down strategy: after healing, attempt dose reduction (step-down) to the minimum effective dose — use H2 blockers or PRN PPI for mild-intermittent GERD. Long-term PPI concerns: hypomagnesemia, C. diff risk, B12 deficiency, hip fracture risk, potential increase in community-acquired pneumonia. EXCEPTIONS requiring long-term PPI: severe erosive esophagitis (grade C/D), Barrett's esophagus (acid suppression reduces cancer progression risk), Zollinger-Ellison syndrome. Lifestyle modifications complement pharmacotherapy: head-of-bed elevation, avoid eating 2-3 hours before bed, reduce trigger foods (caffeine, chocolate, fatty food, alcohol, citrus), weight loss."},
{c:"GERD",q:"A 55-year-old male with GERD for 20 years, BMI 34, is found to have Barrett's esophagus (metaplastic columnar epithelium in the lower esophagus, intestinal type) on endoscopy. No dysplasia. What surveillance is recommended?",o:["No further endoscopy — Barrett's without dysplasia is benign","Surgery immediately — Barrett's always requires esophagectomy","Repeat endoscopy in 3-5 years with 4-quadrant biopsies every 2 cm (Seattle protocol) — Barrett's without dysplasia has ~0.3% annual cancer progression risk; low-grade dysplasia: repeat EGD in 6 months; high-grade dysplasia or T1a cancer: endoscopic eradication therapy (ablation)","Annual endoscopy indefinitely"],a:2,r:"Barrett's esophagus: replacement of normal squamous esophageal epithelium with intestinal-type columnar metaplasia — the precursor to esophageal adenocarcinoma (EAC). Risk factors: male, white, obesity, GERD >5 years, age >50, smoking. Surveillance intervals per ACG 2022: No dysplasia → EGD every 3-5 years. Low-grade dysplasia (confirmed by second pathologist) → EGD every 6-12 months or endoscopic eradication. High-grade dysplasia or intramucosal carcinoma → endoscopic eradication therapy (radiofrequency ablation, endoscopic mucosal resection). Continue PPI in all Barrett's patients (acid suppression may reduce dysplasia progression risk)."},
{c:"Peptic Ulcer Disease",q:"A 58-year-old on daily naproxen for knee OA is found to have a gastric ulcer on endoscopy. H. pylori testing is negative. What is the appropriate management?",o:["Stop naproxen and no further treatment needed — NSAIDs cause the ulcer and it will heal on its own","Continue naproxen and add misoprostol only","Stop or minimize naproxen; treat with PPI 8-12 weeks (longer for gastric than duodenal ulcers); if NSAID must continue, switch to celecoxib + PPI","Eradicate H. pylori regardless of test result"],a:2,r:"NSAID-induced peptic ulcer: NSAIDs inhibit COX-1 → reduced prostaglandin production → impaired mucosal defense → ulceration. Management: STOP the NSAID if possible; PPI 8-12 weeks (gastric ulcers take longer to heal than duodenal ulcers); confirm healing with repeat endoscopy for gastric ulcers (exclude malignancy). If NSAID cannot be stopped: switch to COX-2-selective inhibitor (celecoxib) + PPI — significantly reduces GI risk. Risk stratification for GI complications with NSAIDs: age >65, prior GI event, high-dose/multiple NSAIDs, concurrent anticoagulant/corticosteroid/aspirin use — these patients should receive concomitant PPI. H. pylori eradication: even if H. pylori is negative, still treat if NSAID-related; if positive, eradicate."},
{c:"H. Pylori",q:"A patient completes H. pylori eradication therapy. How and when should eradication be confirmed?",o:["Repeat endoscopy and biopsy is always required to confirm eradication","No confirmation is needed — symptoms resolving means the infection is cleared","Urea breath test or stool antigen test at least 4 weeks after completing antibiotics AND 1-2 weeks after stopping PPI — serology (IgG antibodies) remains positive for years and cannot confirm eradication","Confirm with blood H. pylori antibody test at 2 weeks post-treatment"],a:2,r:"H. pylori test of cure: mandatory after treatment for complicated ulcer (bleeding, perforation), gastric MALT lymphoma, or early gastric cancer resection; strongly recommended for all patients. Method: UREA BREATH TEST (UBT) or STOOL ANTIGEN TEST — both are accurate, non-invasive, and detect active infection. Timing: at least 4 weeks after COMPLETING antibiotics AND 1-2 weeks after STOPPING PPI (PPIs suppress H. pylori and cause false-negative results). Serology (IgG/IgA antibody): remains positive for life after successful treatment — CANNOT confirm eradication. Endoscopy with biopsy (CLO test, culture): only needed if initial diagnosis was by endoscopy and follow-up endoscopy is clinically indicated anyway."},
{c:"Dysphagia",q:"A 60-year-old has difficulty swallowing ONLY solid foods, not liquids. The sensation is of food getting stuck in the chest. Which type of dysphagia is this and what does it suggest?",o:["Oropharyngeal dysphagia — due to neuromuscular disorder (stroke, Parkinson's)","Esophageal dysphagia to solids only — suggests mechanical obstruction (stricture, ring, or malignancy); progressive solid dysphagia = malignancy until proven otherwise","Esophageal dysphagia to both solids and liquids — suggests motility disorder (achalasia, diffuse spasm)","Functional dysphagia — no anatomic cause possible"],a:1,r:"Dysphagia classification: Oropharyngeal (transfer dysphagia): difficulty initiating swallowing, coughing/choking, nasal regurgitation; causes = neuromuscular (stroke, Parkinson's, ALS, myasthenia). Esophageal dysphagia: Solids ONLY → mechanical obstruction: Schatzki ring (intermittent, lower esophagus, benign), peptic stricture (progressive, GERD history), esophageal carcinoma (progressive weight loss), eosinophilic esophagitis (young males, atopy). Solids AND liquids → motility disorder: achalasia (bird-beak on barium), diffuse esophageal spasm. Progressive dysphagia to solids + weight loss = alarm symptom → urgent EGD. Intermittent dysphagia to solids with globus sensation in young atopic male → eosinophilic esophagitis (EoE)."},
{c:"Celiac Disease",q:"A 34-year-old woman has chronic diarrhea, fatigue, and iron deficiency anemia not responding to iron supplementation. She has a first-degree relative with celiac disease. Initial diagnostic test?",o:["Upper endoscopy first — celiac disease cannot be diagnosed without biopsy","Genetic testing for HLA-DQ2/DQ8","Serum tissue transglutaminase IgA (tTG-IgA) — the most sensitive and specific initial test for celiac disease; total IgA level must also be checked (IgA deficiency causes false negative)","Hydrogen breath test for lactose intolerance"],a:2,r:"Celiac disease diagnosis: Initial serologic screening: serum tTG-IgA (tissue transglutaminase IgA antibody) — sensitivity >95%, specificity >95%. CRITICAL: also check total serum IgA — selective IgA deficiency (1:500 general population, 1:30 in celiac disease) causes false-negative tTG-IgA; if IgA deficient, use tTG-IgG or deamidated gliadin peptide IgG (DGP-IgG). Patient must be on a GLUTEN-CONTAINING DIET during testing (avoid false negatives). Confirmation: upper endoscopy with multiple duodenal biopsies (gold standard — villous atrophy, crypt hyperplasia, increased intraepithelial lymphocytes). HLA-DQ2/DQ8: very high negative predictive value — useful to exclude celiac disease in already gluten-free patients."},
{c:"Celiac Disease",q:"A patient is confirmed to have celiac disease. What is the treatment, and which nutrients require supplementation in newly diagnosed patients?",o:["Low-fat diet with gluten restriction only on symptomatic days","Gluten-free diet lifelong — even trace gluten exposure damages the mucosa; supplement iron, folate, calcium, vitamin D, and B12 as deficiencies are common from malabsorption","Corticosteroids for 6 months then gradual gluten reintroduction","Gluten-free diet only for 2 years then reassess for tolerance"],a:1,r:"Celiac disease treatment: STRICT LIFELONG gluten-free diet (GFD) — elimination of wheat, barley, rye (and oats if contaminated). Even trace gluten exposure perpetuates mucosal injury and increases cancer risk (enteropathy-associated T-cell lymphoma, adenocarcinoma). Nutrient repletion at diagnosis: iron (most common deficiency), folate, calcium, vitamin D, B12, zinc — all reduced by duodenal malabsorption. Referral to a registered dietitian with GFD expertise. Response monitoring: tTG-IgA should normalize in 6-12 months on strict GFD; repeat duodenal biopsy if serology does not normalize. Refractory celiac disease: persistent villous atrophy despite strict GFD for 12+ months → evaluate for microscopic colitis, lymphoma, or SIBO."},
{c:"IBD",q:"Which clinical features most reliably distinguish Crohn's disease from ulcerative colitis?",o:["UC affects the small bowel; Crohn's is limited to the colon","Both diseases are clinically identical — only biopsy can distinguish them","Crohn's: transmural inflammation, skip lesions, may involve any GI segment from mouth to anus, perianal disease (fistulas, abscesses), NO rectal bleeding initially; UC: continuous mucosal inflammation from rectum proximally, rectal involvement almost always, bloody diarrhea is the hallmark","UC has systemic manifestations; Crohn's is purely intestinal"],a:2,r:"Crohn's disease: TRANSMURAL inflammation → fistulas, abscesses, strictures; SKIP LESIONS (normal mucosa between affected areas); involves any part of GI tract (mouth to anus — ileocecal junction most common); perianal disease (fistulas, skin tags, abscesses) is pathognomonic; granulomas on histology. UC: MUCOSAL inflammation only → no fistulas; CONTINUOUS inflammation starting at RECTUM extending proximally (always involves rectum — if rectum spared, question diagnosis); bloody diarrhea; complications: toxic megacolon, colorectal cancer (cancer risk increases with disease duration and extent). Indeterminate colitis: features of both (~10% of IBD). Extraintestinal manifestations: both share uveitis, erythema nodosum, pyoderma gangrenosum, primary sclerosing cholangitis (more common in UC), peripheral arthritis."},
{c:"IBD",q:"A 26-year-old with ulcerative colitis develops sudden worsening abdominal pain, distension, fever of 39.5°C, and her stool frequency has paradoxically decreased. Abdominal X-ray shows colonic dilatation >6 cm. What is this life-threatening complication?",o:["Bowel obstruction from adhesions — nasogastric tube and observation","Normal UC flare — increase mesalamine dose","Toxic megacolon — dilation >6 cm with systemic toxicity; requires immediate IV corticosteroids, IV antibiotics, bowel rest, and urgent surgical consultation — perforation risk is high","Ischemic colitis — anticoagulation is indicated"],a:2,r:"Toxic megacolon: acute life-threatening complication of severe colitis (UC most common, but also Crohn's, C. diff, ischemic colitis, CMV colitis). Criteria (Jalan): colonic dilation >6 cm on X-ray PLUS at least 3 of: fever >38°C, HR >120, WBC >10.5, anemia — plus at least 1 of: dehydration, altered mental status, electrolyte disturbance, hypotension. Treatment: NPO, nasogastric tube, IV corticosteroids (methylprednisolone 60 mg/day), IV broad-spectrum antibiotics, correct electrolytes, DVT prophylaxis, serial abdominal exams. Avoid: opioids, antidiarrheals, colonoscopy (perforation risk). If no improvement in 48-72 hours or signs of perforation → urgent colectomy. Mortality: 5-10% with treatment, up to 40% with perforation."},
{c:"IBD",q:"A patient with newly diagnosed mild-moderate ulcerative colitis has disease limited to the rectum and sigmoid colon (left-sided). First-line pharmacologic treatment?",o:["Systemic corticosteroids — first-line for all IBD","Azathioprine immunomodulator — DMARD therapy immediately","Oral or rectal 5-aminosalicylic acid (5-ASA, mesalamine) — first-line for mild-moderate UC; topical (rectal suppository/enema) is superior to oral alone for distal disease; combination topical + oral achieves best remission rates","TNF inhibitor (infliximab) — reserved for all new UC diagnoses"],a:2,r:"UC treatment by severity: Mild-moderate: 5-ASA (mesalamine) — first-line. For distal/left-sided UC: rectal 5-ASA (suppository for proctitis, enema for left-sided) is MORE effective than oral alone; combination oral + rectal achieves the highest remission rates. Moderate-severe: systemic corticosteroids for induction, then immunomodulator (azathioprine, 6-MP) for maintenance; anti-TNF (infliximab, adalimumab, vedolizumab, ustekinumab) for steroid-refractory or steroid-dependent disease. Crohn's disease: 5-ASA has limited evidence; anti-TNF or immunomodulators are often used earlier. Unlike steroids, 5-ASA is safe for long-term maintenance and reduces colorectal cancer risk in UC."},
{c:"IBS",q:"A 32-year-old woman has recurrent abdominal pain for 6 months that is associated with defecation and a change in stool frequency. Colonoscopy, labs, and imaging are all normal. Per Rome IV criteria, what is the diagnosis and minimum diagnostic requirement?",o:["Functional dyspepsia — symptoms are epigastric","IBS requires ruling out all other diagnoses first — IBS is a diagnosis of exclusion only","Irritable bowel syndrome (IBS) — Rome IV: recurrent abdominal pain ≥1 day/week for 3 months associated with ≥2 of: change in stool frequency, change in stool form, or related to defecation","Celiac disease — must test tTG-IgA before diagnosing IBS"],a:2,r:"IBS Rome IV criteria: recurrent abdominal pain ≥1 day/week in the past 3 months (with symptom onset ≥6 months ago), associated with ≥2 of: (1) related to defecation; (2) associated with change in stool FREQUENCY; (3) associated with change in stool FORM (appearance). IBS subtypes: IBS-C (constipation predominant), IBS-D (diarrhea predominant), IBS-M (mixed). IBS is a POSITIVE clinical diagnosis — not purely exclusion. Limited workup is appropriate: CBC, TSH, celiac serology (tTG-IgA), CRP/fecal calprotectin (to exclude IBD). Colonoscopy NOT routinely needed in patients <45 without alarm features (rectal bleeding, weight loss, fever, nocturnal symptoms, family history of CRC/IBD)."},
{c:"IBS",q:"A 28-year-old with IBS-D has persistent diarrhea and cramping despite dietary modification. Which pharmacologic option is appropriate first-line?",o:["Loperamide PRN — most effective agent for diarrhea-predominant IBS","Mesalamine — anti-inflammatory for IBS","Loperamide PRN (for symptom control of diarrhea), rifaximin (7 days non-absorbable antibiotic for overall IBS-D symptoms — FDA approved), or eluxadoline — all are appropriate; tricyclic antidepressants (amitriptyline) also have evidence","Metronidazole — treats IBS-D with antibiotic therapy"],a:2,r:"IBS-D pharmacologic options: Loperamide: reduces stool frequency and urgency but doesn't address pain or overall IBS symptoms. Rifaximin (Xifaxan) 550 mg TID x14 days: FDA-approved for IBS-D — non-absorbable antibiotic targeting gut flora; reduces bloating, diarrhea, and overall symptoms; can repeat courses. Eluxadoline (mixed mu-opioid agonist/delta-antagonist): FDA-approved IBS-D; CONTRAINDICATED without a gallbladder (pancreatitis risk). Alosetron: 5-HT3 antagonist for severe IBS-D in women only (FDA REMS program). TCAs (amitriptyline): reduce gut motility and visceral pain. SSRIs: better for IBS-C or mixed. IBS-C: lubiprostone, linaclotide, plecanatide (secretagogues); psyllium fiber; PEG; low-dose TCAs (increase gut motility)."},
{c:"Pancreatitis",q:"A 45-year-old heavy drinker presents with severe epigastric pain radiating to the back, nausea, lipase 8x normal, and elevated hematocrit (hemoconcentration). CT shows peripancreatic fat stranding with no necrosis. Which initial intervention is MOST important?",o:["IV morphine — pain control is the priority","NPO, IV broad-spectrum antibiotics, and urgent ERCP","Aggressive IV fluid resuscitation (lactated Ringer's preferred) — the cornerstone of acute pancreatitis management; early goal-directed hydration (250-500 mL/hr in first 12-24 hours) prevents progression to necrotizing pancreatitis","Immediate surgical debridement"],a:2,r:"Acute pancreatitis management: IV fluid resuscitation is the CORNERSTONE — 'the pancreas is drowned in its own secretions.' Aggressive early hydration with LACTATED RINGER'S (preferred over normal saline — reduces systemic inflammation and organ failure risk per multiple trials) at 250-500 mL/hr in the first 12-24 hours. Reassess frequently to avoid fluid overload. NPO is appropriate initially; resume oral nutrition early when tolerated (within 48-72 hours if mild). Prophylactic antibiotics: NOT indicated in mild or moderate pancreatitis or even sterile necrosis — use only for confirmed infected necrosis. ERCP: indicated within 24 hours ONLY for concurrent cholangitis or persistent biliary obstruction. Analgesia: multimodal; opioids are acceptable (hydromorphone preferred over meperidine). Most causes: gallstones (40%), alcohol (30%)."},
{c:"Pancreatitis",q:"A patient with chronic pancreatitis from alcohol use has significant weight loss and fatty, foul-smelling stools (steatorrhea). Fasting blood glucose is 195 mg/dL. Which nutritional supplement is specifically indicated?",o:["Protein supplementation only — fat absorption is normal","High-fiber diet to improve gut transit","Pancreatic enzyme replacement therapy (PERT) with meals — exocrine insufficiency causes fat malabsorption; lipase (Creon) with each meal and snack; also supplement fat-soluble vitamins (A, D, E, K)","Cholestyramine to reduce steatorrhea"],a:2,r:"Chronic pancreatitis complications: Exocrine insufficiency: malabsorption of fat and fat-soluble vitamins → steatorrhea, weight loss, fat-soluble vitamin deficiencies (A, D, E, K). PERT (pancreatic enzyme replacement): lipase-containing products (Creon, Zenpep) with EVERY MEAL and SNACK — not with water only. Give with meals, not before or after. Adjust dose if steatorrhea persists. Endocrine insufficiency: β-cell destruction → type 3c diabetes mellitus (brittle diabetes, sensitive to insulin, avoid sulfonylureas as they risk hypoglycemia). Also monitor for: B12 deficiency, osteoporosis (calcium + vitamin D supplementation), fat-soluble vitamin supplementation. Pain: opioids, nerve block; address alcohol cessation."},
{c:"Cirrhosis",q:"A 58-year-old with alcoholic cirrhosis (Child-Pugh B) develops new ascites. Paracentesis shows SAAG of 1.4 g/dL. What does this SAAG value indicate?",o:["Exudative ascites — likely malignancy or infection","SAAG <1.1 confirms portal hypertension","SAAG ≥1.1 g/dL indicates portal hypertension-related ascites (hepatic, cardiac, or sinusoidal) — treatment: sodium restriction + diuretics (spironolactone first-line for cirrhotic ascites + furosemide if needed)","SAAG between 1.0-1.5 is indeterminate — re-test in 2 weeks"],a:2,r:"Serum-ascites albumin gradient (SAAG) = Serum albumin − Ascites albumin: SAAG ≥1.1 g/dL: HIGH GRADIENT = PORTAL HYPERTENSION (97% accuracy). Causes: cirrhosis (#1), congestive heart failure, Budd-Chiari syndrome, hepatic vein obstruction. SAAG <1.1 g/dL: LOW GRADIENT = non-portal hypertension causes. Causes: peritoneal malignancy (#1), TB peritonitis, nephrotic syndrome, pancreatitis, biliary leak. Management of cirrhotic ascites: sodium restriction (<2 g/day), spironolactone 100 mg/day (aldosterone antagonist — K-sparing, first-line) ± furosemide 40 mg/day (2.5:1 ratio maintained). Large-volume paracentesis with albumin replacement for tense ascites. Liver transplant evaluation."},
{c:"Cirrhosis",q:"A patient with cirrhosis and ascites presents with fever, abdominal pain, and diffuse abdominal tenderness. Diagnostic paracentesis shows PMN count of 650 cells/mm³. Diagnosis and immediate treatment?",o:["Peptic ulcer perforation — emergent surgery","Normal finding — repeat paracentesis in 1 week","Spontaneous bacterial peritonitis (SBP) — PMN ≥250 cells/mm³ in ascitic fluid is diagnostic; treat immediately with IV cefotaxime or ceftriaxone x5 days PLUS IV albumin (1.5 g/kg on day 1 and 0.5 g/kg on day 3) to prevent hepatorenal syndrome","Secondary bacterial peritonitis from bowel perforation — same antibiotic treatment, no surgery needed"],a:2,r:"SBP: infection of ascitic fluid without a surgically treatable source. Diagnostic criteria: ascitic fluid PMN ≥250 cells/mm³ (regardless of culture result — culture is negative in 40%). Symptoms: fever, abdominal pain, encephalopathy, but may be ASYMPTOMATIC — always tap new ascites or any deterioration. Treatment: IV third-generation cephalosporin (cefotaxime or ceftriaxone) x5 days + IV albumin (reduces hepatorenal syndrome, improves survival — critical component). Culture: inoculate blood culture bottles at bedside. Primary prophylaxis for SBP: ciprofloxacin or TMP-SMX daily for high-risk patients (ascitic fluid protein <1.5 g/dL + impaired renal/hepatic function). Secondary prophylaxis after first SBP: indefinite norfloxacin or ciprofloxacin daily."},
{c:"Cirrhosis",q:"A patient with cirrhosis develops confusion, flapping hand tremor (asterixis), and slurred speech. Which finding would most likely PRECIPITATE this episode of hepatic encephalopathy?",o:["A high-protein vegetable diet","Acetaminophen 500 mg once","GI bleed from esophageal varices, infection, constipation, dehydration/electrolyte disturbances, or use of sedating medications — all are classic precipitants","Mild exercise"],a:2,r:"Hepatic encephalopathy (HE) precipitants (mnemonics: TIPS): Infection (SBP, UTI, pneumonia — most common), GI bleeding (blood in gut = large protein load for ammonia-producing bacteria), Medications (opioids, benzodiazepines, diuretics causing electrolyte disturbances), Constipation, Dehydration, Renal failure, Hypokalemia, Alkalosis. Treatment: (1) Identify and treat the precipitant; (2) Lactulose: reduces gut ammonia production — titrate to 2-3 soft stools/day; (3) Rifaximin (Xifaxan): add-on to lactulose for recurrent HE — reduces hospitalizations. Low-protein diets are OBSOLETE — patients need adequate protein; branched-chain amino acids may help. Grade HE 1-4 (1=mild confusion, 4=coma). Asterixis (flapping tremor) = classic sign."},
{c:"Cirrhosis",q:"A patient with known esophageal varices from cirrhosis presents with hematemesis and blood pressure of 88/54. What is the INITIAL sequence of management?",o:["Emergent TIPS procedure — most effective immediate intervention","Propranolol and reassess — beta-blockers prevent rebleeding","Volume resuscitation + IV octreotide + IV antibiotics (norfloxacin or ceftriaxone x7 days) + urgent upper endoscopy for variceal banding — each component is essential; target Hgb ~7-8 g/dL (avoid over-transfusion)","Balloon tamponade (Sengstaken-Blakemore tube) as first-line"],a:2,r:"Variceal hemorrhage: 30-day mortality 15-20% even with treatment. Management bundle: (1) IV ACCESS + resuscitate: target Hgb 7-8 g/dL (over-transfusion raises portal pressure and increases rebleeding — restrictive transfusion is superior); (2) IV OCTREOTIDE (somatostatin analogue — reduces portal pressure): start immediately, continue 3-5 days; (3) IV ANTIBIOTICS: norfloxacin or ceftriaxone x7 days — reduces SBP, improves survival; (4) Airway: intubate before endoscopy if encephalopathic or unable to protect airway; (5) ENDOSCOPY within 12 hours: variceal band ligation (treatment of choice); TIPS: for failed endoscopic hemostasis or Child-Pugh B/C with active bleeding. Balloon tamponade: temporizing measure for uncontrolled bleeding awaiting TIPS. Secondary prophylaxis after variceal bleed: non-selective beta-blocker (propranolol or carvedilol) + repeat variceal band ligation."},
{c:"Liver Disease",q:"A 48-year-old with metabolic syndrome, BMI 38, type 2 diabetes, and AST/ALT mildly elevated (ratio <1) is found to have hepatic steatosis on ultrasound. FIB-4 score suggests advanced fibrosis. What is this condition called, and what is the most effective treatment?",o:["Alcoholic fatty liver — alcohol cessation","Hemochromatosis — phlebotomy","Non-alcoholic fatty liver disease (NAFLD)/metabolic dysfunction-associated steatotic liver disease (MASLD) — weight loss of 7-10% of body weight is the most effective intervention; also treat underlying conditions (DM, HTN, dyslipidemia); consider semaglutide or pioglitazone for steatohepatitis (NASH)","Primary biliary cholangitis — ursodiol"],a:2,r:"NAFLD/MASLD (new nomenclature 2023): fatty liver not caused by alcohol. Spectrum: steatosis (benign) → non-alcoholic steatohepatitis (NASH/MASH — inflammation + fibrosis) → cirrhosis → HCC. Risk factors: obesity, T2DM, metabolic syndrome, dyslipidemia. Diagnosis: liver biopsy (gold standard for staging), non-invasive tests (FIB-4 score, elastography/FibroScan). Treatment: (1) WEIGHT LOSS 7-10%: most effective — reverses steatosis, reduces fibrosis; (2) Exercise: independent of weight loss; (3) GLP-1 agonists (semaglutide — FDA-approved agent resmetirom, 2024 first FDA-approved for MASH); (4) Pioglitazone: reduces liver inflammation; (5) Vitamin E: for biopsy-proven NASH without DM. Avoid alcohol, hepatotoxic drugs. Annual HCC surveillance with ultrasound ± AFP if cirrhosis develops."},
{c:"Liver Disease",q:"A 35-year-old presents with fatigue, right upper quadrant pain, and elevated AST/ALT. ANA titer is 1:640, anti-smooth muscle antibody (ASMA) is positive, serum IgG is markedly elevated. Liver biopsy shows interface hepatitis. Diagnosis and treatment?",o:["Viral hepatitis B — check HBsAg","Non-alcoholic steatohepatitis — lifestyle modification","Autoimmune hepatitis (AIH) — positive ANA + ASMA + elevated IgG + interface hepatitis is the classic triad; first-line treatment is prednisone ± azathioprine","Primary biliary cholangitis — AMA is positive in PBC, not ANA"],a:2,r:"Autoimmune hepatitis (AIH): Type 1 (most common): anti-nuclear antibody (ANA) + anti-smooth muscle antibody (ASMA) + elevated serum IgG. Type 2: anti-LKM-1 (anti-liver-kidney microsomal). Histology: interface hepatitis (inflammation at hepatocyte-stroma border), plasma cell infiltration. Treatment: prednisone 40-60 mg/day → taper over weeks to months; add azathioprine 50-150 mg/day as a steroid-sparing agent. 80% achieve biochemical remission. Lifelong therapy often required — relapse common when treatment stopped. Progression to cirrhosis if untreated. Distinguish from PBC: PBC has positive AMA (anti-mitochondrial antibody), pruritus, elevated ALP (not primarily AST/ALT), affects middle-aged women. PBC treatment: ursodiol (UDCA)."},
{c:"Liver Disease",q:"A 42-year-old male has elevated transferrin saturation >45% and ferritin >1,000 ng/mL. Liver biopsy shows iron overload. Genetic testing reveals homozygous C282Y HFE mutation. Diagnosis and treatment?",o:["Hemolytic anemia — iron is released from destroyed RBCs","Hemochromatosis (hereditary) — treat with repeated therapeutic phlebotomy (500 mL blood = ~250 mg iron removed) weekly until ferritin <50 ng/mL and transferrin saturation <30%; prevent cirrhosis, diabetes, heart disease, and arthropathy","Secondary iron overload from multiple transfusions — treat with deferoxamine only","Alcoholic liver disease — ferritin elevates with heavy alcohol use"],a:1,r:"Hereditary hemochromatosis: autosomal recessive iron overload, most common in Caucasians. HFE gene mutations: C282Y homozygous most common (90%). Iron accumulates in liver (cirrhosis → HCC), pancreas (bronze diabetes), heart (cardiomyopathy, arrhythmias), skin (bronze pigmentation), pituitary/gonads (hypogonadism, infertility), joints (chondrocalcinosis). Screening: transferrin saturation >45% + elevated ferritin → genetic testing. Treatment: THERAPEUTIC PHLEBOTOMY — most effective, simple, safe. Remove 500 mL weekly until ferritin <50 ng/mL and Tsat <30%; then maintenance every 2-3 months. Chelation (deferoxamine): only if phlebotomy not possible (severe anemia). Screen first-degree relatives. Avoid iron supplements, alcohol, raw shellfish (Vibrio vulnificus risk with iron overload)."},
{c:"Liver Disease",q:"A 50-year-old woman with longstanding UC has progressive fatigue, pruritus, and jaundice. Labs show elevated alkaline phosphatase, total bilirubin, and positive anti-mitochondrial antibody (AMA). Ultrasound shows no biliary dilation. Diagnosis?",o:["Autoimmune hepatitis — ANA and ASMA would be positive","Choledocholithiasis — ERCP is indicated","Primary biliary cholangitis (PBC) — AMA positive + elevated ALP + cholestatic pattern in middle-aged woman; treatment: ursodiol (UDCA) 13-15 mg/kg/day; obeticholic acid for inadequate response","Primary sclerosing cholangitis — associated with IBD, ERCP shows beading"],a:2,r:"Primary biliary cholangitis (PBC): autoimmune destruction of SMALL intrahepatic bile ducts. Predominantly middle-aged women (90%). Anti-mitochondrial antibody (AMA): positive in >90% — highly specific. Elevated ALP (cholestatic pattern), pruritus (bile acid accumulation), fatigue. Association: NOT typically with IBD (that's PSC). Treatment: ursodeoxycholic acid (UDCA) 13-15 mg/kg/day — slows fibrosis and reduces liver-related mortality. Non-responders: obeticholic acid. Pruritus: cholestyramine, rifampicin, naltrexone. PSC (Primary sclerosing cholangitis): affects LARGE bile ducts, multifocal strictures (beads on a string on ERCP/MRCP), STRONGLY associated with UC, NO effective medical therapy, liver transplant for end-stage disease, high cholangiocarcinoma risk."},
{c:"Biliary",q:"A 45-year-old obese woman presents with right upper quadrant pain 1 hour after eating a fatty meal, radiating to the right shoulder. Murphy's sign is positive. Temperature is 38.5°C. Ultrasound shows gallbladder wall thickening, pericholecystic fluid, and a shadowing gallstone. Diagnosis and management?",o:["Biliary colic — analgesics and elective cholecystectomy outpatient","GERD — increase PPI dose","Acute cholecystitis — admit for IV antibiotics (covering gram-negative organisms and anaerobes), IV fluids, pain control, and cholecystectomy within 24-72 hours (within the index hospitalization)","Ascending cholangitis — urgent ERCP"],a:2,r:"Acute cholecystitis: cystic duct obstruction by gallstone → gallbladder inflammation. Murphy's sign: pain and arrest of inspiration with right subcostal palpation during deep inspiration (highly specific). Ultrasound findings: gallstone(s) + wall thickening >4mm + pericholecystic fluid + sonographic Murphy's sign. Treatment: (1) IV antibiotics: cover gram-negative rods and anaerobes — piperacillin-tazobactam or cefazolin + metronidazole; (2) IV fluids and NPO; (3) Laparoscopic cholecystectomy: ideally within 24-72 hours of presentation (reduces complications, shorter hospital stay — Tokyo 2018 guidelines). Delayed surgery increases risk of gangrenous cholecystitis, perforation, and empyema. Biliary colic: pain without fever/Murphy's sign, no imaging findings of inflammation — elective outpatient surgery. 5 Fs: Fair, Fat, Female, Fertile, Forty (risk factors)."},
{c:"Biliary",q:"A 70-year-old develops fever, RUQ pain, and jaundice (Charcot's triad) with hypotension and confusion. Labs confirm elevated bilirubin and ALP. Ultrasound shows biliary duct dilation. This presentation is Reynold's pentad. Diagnosis and emergent management?",o:["Acute cholecystitis — antibiotics and admit for cholecystectomy","Viral hepatitis — supportive care","Acute ascending cholangitis — most likely from choledocholithiasis; life-threatening sepsis; IV antibiotics immediately, aggressive fluid resuscitation, and EMERGENT ERCP with biliary decompression within 24-48 hours (or 12 hours for septic shock)","Primary sclerosing cholangitis — ursodiol"],a:2,r:"Ascending cholangitis: bacterial infection of the biliary tree from obstruction (gallstones most common, malignancy, stricture, parasites). Charcot's triad: fever + RUQ pain + jaundice. Reynold's pentad (severe): Charcot's triad + HYPOTENSION + ALTERED MENTAL STATUS = septic cholangitis = EMERGENCY (mortality >50% without decompression). Causative organisms: E. coli, Klebsiella, Enterococcus, Bacteroides. Management: IV antibiotics (piperacillin-tazobactam or carbapenems for severe), resuscitation, emergent ERCP with sphincterotomy + stone removal or biliary stenting for decompression. ERCP within 12 hours for Grade III (septic shock), within 48 hours for Grade I-II. Percutaneous transhepatic cholangiography (PTC): if ERCP fails or unavailable."},
{c:"GI Bleeding",q:"A 60-year-old presents with hematemesis and coffee-ground emesis. HR is 112, BP 102/68. Likely upper GI source. What are the initial management priorities and what is the most common cause of non-variceal upper GI bleeding?",o:["Lower GI bleeding source — colonoscopy first","Start aspirin and send for angiography","Two large-bore IVs, IV PPI (bolus + infusion), volume resuscitation, type and crossmatch; NPO; urgent upper endoscopy within 24 hours (within 12 hours if high-risk features); most common non-variceal UGIB cause is peptic ulcer disease","Barium swallow study first to identify the bleeding source"],a:2,r:"Upper GI bleeding (UGIB) management: ABCs first — two large-bore IVs, resuscitate (PRBCs target Hgb 7-8 g/dL — restrictive transfusion is superior for non-variceal UGIB, reduces mortality). IV PPI: high-dose bolus + infusion (pantoprazole 80 mg IV bolus then 8 mg/hr) — reduces rebleeding and need for surgery. NPO. Reverse coagulopathy (FFP, vitamin K, platelets). Urgent EGD within 24 hours (12 hours for persistent hemodynamic instability). Causes of non-variceal UGIB by frequency: (1) Peptic ulcer disease (most common, ~40-60%); (2) Esophagitis; (3) Gastric/Duodenal erosions; (4) Mallory-Weiss tear (after forceful vomiting); (5) AVM (Dieulafoy's); (6) Malignancy. Stigmata of recent hemorrhage on EGD guide intervention: active bleeding/visible vessel → endoscopic hemostasis."},
{c:"GI Bleeding",q:"A 72-year-old presents with painless bright red blood per rectum and a drop in hemoglobin from 13 to 9 g/dL over 24 hours. He is hemodynamically stable. Most likely diagnosis and first-line diagnostic evaluation?",o:["Upper GI bleeding — upper endoscopy first","Anorectal bleeding only — anoscopy is sufficient","Diverticulosis is the most common cause of significant lower GI bleeding in adults; colonoscopy after bowel preparation (once stable) is the diagnostic and therapeutic gold standard; CT angiography if colonoscopy cannot be performed or bleeding is too brisk","Barium enema is preferred over colonoscopy"],a:2,r:"Lower GI bleeding (LGIB): blood per rectum, typically painless. Most common causes by age: Young adult: hemorrhoids, anal fissure, IBD, polyps. Older adult: diverticulosis (most common cause of SIGNIFICANT LGIB in adults — 40-55% of LGIB), angiodysplasia (AVM), colorectal cancer, ischemic colitis. Diagnostic approach for moderate-severe LGIB: Colonoscopy after prep: gold standard (diagnostic + therapeutic — allows injection, coagulation, clipping). CT angiography: if bleeding too brisk or colonoscopy cannot be completed. Nuclear medicine bleeding scan: very sensitive but not therapeutic. If unstable: resuscitate, consider CT angiography ± IR intervention (embolization). Most LGIB stops spontaneously. Rebleeding within 1 year in 25% of diverticular bleeds."},
{c:"Colon",q:"A 60-year-old woman has a 12mm tubular adenoma removed during colonoscopy. No family history of CRC. When should surveillance colonoscopy be repeated?",o:["In 10 years — same as average-risk population","In 5 years — tubular adenomas always require 5-year surveillance","In 3-5 years — adenoma with advanced features (≥10mm, villous histology, HGD) requires earlier surveillance; tubular adenoma 10-19mm = repeat colonoscopy in 3 years","In 1 year — high-risk adenoma"],a:2,r:"Post-polypectomy surveillance (USMSTF 2020): 1-2 small (<10mm) tubular adenomas: 7-10 years. 3-4 adenomas OR one tubular adenoma ≥10mm: 3 years. 5+ adenomas: 1 year. Adenoma with villous features, high-grade dysplasia, or serrated polyp ≥10mm: 3 years. Sessile serrated lesion <10mm without dysplasia: 5 years. This 12mm tubular adenoma = advanced adenoma (≥10mm) → 3-year surveillance. Adenomas are premalignant — proper surveillance prevents interval CRC. Hyperplastic polyps in the rectosigmoid: no increased risk — no early surveillance. Hyperplastic polyps ≥10mm or proximal location (serrated adenoma concern): follow adenoma guidelines."},
{c:"Colon",q:"A 52-year-old presents with sudden onset crampy left-sided abdominal pain and bloody diarrhea 3 days after major cardiac surgery requiring pressors for hemodynamic compromise. CT shows left-sided colonic thickening at the splenic flexure. Most likely diagnosis?",o:["Acute diverticulitis — abscesses are typical at the splenic flexure","Ulcerative colitis — new onset after cardiac surgery","Ischemic colitis — the splenic flexure is a watershed area between the SMA and IMA blood supply; hypotension reduces mesenteric perfusion; non-occlusive ischemia after low-flow states is classic","Colon cancer — weight loss expected"],a:2,r:"Ischemic colitis: most common form of intestinal ischemia. The SPLENIC FLEXURE is the classic location — it is a watershed zone (poorest collateral blood supply) between the superior mesenteric artery (SMA) and inferior mesenteric artery (IMA). Also at risk: the rectosigmoid junction. Precipitating factors: hypotension, low-flow states (cardiac surgery, sepsis, shock), vasoconstrictors/pressors, aortic surgery (IMA ligation), hypercoagulable states. Symptoms: sudden onset crampy abdominal pain + bloody diarrhea. CT: colonic thickening, thumbprinting (submucosal edema). Management: bowel rest, IV fluids, monitor for colonic necrosis (peritonitis = emergency surgery). Most cases resolve spontaneously within 1-2 weeks. Necrosis or gangrenous colitis: surgical emergency."},
{c:"Anal/Rectal",q:"A 30-year-old has acute anal pain with defecation, and bright red blood on the toilet paper. Exam reveals a linear tear at the 6 o'clock position (posterior midline). Diagnosis and first-line treatment?",o:["Internal hemorrhoid — rubber band ligation","Rectal cancer — colonoscopy urgently","Anal fissure — first-line: sitz baths, high-fiber diet, and topical agents (nitroglycerin 0.4% or diltiazem 2% ointment to relax the internal sphincter); botulinum toxin injection for refractory cases; surgery (lateral internal sphincterotomy) if medical therapy fails","Perianal abscess — incision and drainage"],a:2,r:"Anal fissure: linear tear in the anoderm distal to the dentate line. ACUTE: most common at posterior midline (posterior commissure) — secondary to hard stools, constipation, or trauma. Symptoms: sharp, severe anal pain WITH defecation (a knife-like sensation), bright red blood on paper/in bowl. Chronic fissure: sentinel skin tag at the base. Treatment: high-fiber diet + increased fluid intake + sitz baths; topical nitroglycerin 0.4% ointment (relaxes internal anal sphincter) or topical diltiazem 2% (similar efficacy, fewer headache side effects from nitroglycerin). Botulinum toxin injection: for refractory cases. Lateral internal sphincterotomy: surgery for chronic fissures failing medical therapy — most effective (~95% cure) but risks fecal incontinence."},
{c:"Anal/Rectal",q:"A 45-year-old reports painless rectal bleeding and protrusion after bowel movements that reduces spontaneously. Grade classification and management?",o:["Grade IV internal hemorrhoids — emergent surgery","Grade I hemorrhoids — no treatment, observation only","Grade II internal hemorrhoids — prolapse with defecation but reduces spontaneously; first-line: high-fiber diet, sitz baths, and office procedures (rubber band ligation is most effective for grade II-III)","External hemorrhoids — topical analgesia is the only treatment"],a:2,r:"Hemorrhoid grading: Grade I: bleeding, no prolapse. Grade II: prolapse with straining, SPONTANEOUS REDUCTION. Grade III: prolapse requiring manual reduction. Grade IV: irreducible prolapse. Treatment by grade: All grades: high-fiber diet (reduce straining), sitz baths, topical anesthetics for symptomatic relief. Grade I-II: office-based procedures — rubber band ligation (RBL) is most effective (most common office procedure for internal hemorrhoids), infrared coagulation, sclerotherapy. Grade III-IV: surgical hemorrhoidectomy. External hemorrhoids: generally treated conservatively (fiber, sitz baths); acutely thrombosed external hemorrhoid: excision within 72 hours of onset → dramatic pain relief. Key: hemorrhoids are PAINLESS unless thrombosed or prolapsed — pain with defecation = anal fissure."},
{c:"Gastroparesis",q:"A 48-year-old with poorly controlled type 2 diabetes has early satiety, nausea, vomiting of undigested food hours after eating, and a 12-pound weight loss. Gastroscopy is normal. What confirms the diagnosis and what is the first-line treatment?",o:["Abdominal CT — gastric wall thickening confirms gastroparesis","Upper endoscopy alone — normal EGD confirms gastroparesis by exclusion","4-hour gastric emptying scintigraphy — gold standard; confirms delayed emptying; treat with optimize glycemic control + dietary modification (small frequent low-fat, low-fiber meals) + metoclopramide (dopamine antagonist — FDA-approved, most commonly used; limited to ≤12 weeks due to tardive dyskinesia risk) or domperidone","Hydrogen breath test — detects bacterial overgrowth"],a:2,r:"Gastroparesis: delayed gastric emptying without mechanical obstruction. Most common causes: diabetes (most common), post-surgical (vagal nerve injury), idiopathic, medications (opioids, GLP-1 agonists, anticholinergics). Diagnosis: 4-hour solid-phase gastric emptying scintigraphy (standardized Tc-99m egg meal) — gold standard. Treatment: (1) Optimize glucose control — hyperglycemia worsens gastric motility; (2) Dietary: small, frequent meals; low fat; low fiber; liquid/pureed if severe; (3) Prokinetics: metoclopramide (dopamine-2 antagonist, most used) — FDA black box warning for tardive dyskinesia with long-term use; limit to ≤12 weeks; domperidone (available via FDA IND); erythromycin (motilin agonist, short-term, rapid tachyphylaxis); (4) Antiemetics for symptoms; (5) Severe/refractory: gastric electrical stimulation (Enterra device)."},
{c:"Functional Dyspepsia",q:"A 38-year-old has persistent epigastric pain, bloating, and early satiety for 6 months. Upper endoscopy is normal. H. pylori testing is negative. Diagnosis and evidence-based treatment?",o:["Peptic ulcer disease — prescribe misoprostol","GERD — high-dose PPI for 3 months","Functional dyspepsia — low-dose tricyclic antidepressant (amitriptyline) or proton pump inhibitor trial; PPI is first-line if dyspepsia is ulcer-like; TCA is preferred for meal-related symptoms; H. pylori test-and-treat is recommended for all dyspepsia before EGD in patients <45 without alarm features","No treatment — functional disorders have no pharmacologic options"],a:2,r:"Functional dyspepsia (FD): Rome IV — bothersome postprandial fullness, early satiation, epigastric pain/burning for ≥3 months without structural disease. H. pylori test-and-treat: first-line approach for all dyspepsia in patients <45 without alarm features (before EGD) — eradication improves symptoms in 7-10% of H. pylori-positive dyspepsia patients. EGD: for alarm features or age ≥45. PPI trial: for epigastric burning (ulcer-like dyspepsia). Low-dose TCAs (amitriptyline 10-25 mg qhs): best evidence for meal-related FD (postprandial distress syndrome). Prokinetics (metoclopramide): for early satiety-predominant. Dietary advice: small meals, avoid fatty/spicy food. Psychological therapies (CBT) are effective adjuncts."},
{c:"Small Bowel",q:"A 70-year-old presents with acute colicky abdominal pain, distension, vomiting, and obstipation (no flatus or stool). Abdominal X-ray shows dilated small bowel loops with air-fluid levels and no gas in the colon or rectum. Most likely cause and management?",o:["Large bowel obstruction — colonoscopy decompression","Ileus — encourage ambulation and wait","Small bowel obstruction — most common cause is adhesions from prior abdominal surgery; initial management: NPO, nasogastric tube decompression, IV fluids, serial abdominal exams; surgery for complete or strangulated obstruction (fever, severe localized pain, leukocytosis, acidosis)","Acute pancreatitis — serum lipase measurement"],a:2,r:"Small bowel obstruction (SBO): most common cause in adults = ADHESIONS (prior abdominal surgery, ~60-70%). Other causes: hernia (2nd most common — always examine inguinal/femoral hernias), malignancy, volvulus, intussusception, Crohn's disease, gallstone ileus. Clinical: colicky pain, vomiting, distension, obstipation. X-ray: dilated small bowel (>3 cm), air-fluid levels, absent rectal gas. CT: gold standard (identifies level, cause, and complications). Management: partial SBO → conservative trial (NGT, IV fluids, bowel rest, 24-48 hours); complete or strangulated (fever, peritonitis, leukocytosis, acidosis, closed-loop obstruction) → immediate surgery. Water-soluble contrast (gastrografin) challenge: diagnostic + therapeutic in adhesive SBO."},
{c:"Wilson's Disease",q:"A 22-year-old presents with hepatitis, tremor, behavioral changes, and brownish rings at the corneal periphery. Serum ceruloplasmin is markedly low. Diagnosis and first-line treatment?",o:["Hemochromatosis — phlebotomy","Viral hepatitis — antiviral therapy","Wilson's disease — impaired copper transport (ATP7B mutation); copper accumulates in liver, brain, and eyes; Kayser-Fleischer rings are pathognomonic; first-line treatment: D-penicillamine or trientine (copper chelators); zinc for mild disease or maintenance","Autoimmune hepatitis — prednisone"],a:2,r:"Wilson's disease: autosomal recessive disorder of copper transport (ATP7B gene mutation) → copper accumulation in liver, brain (basal ganglia), cornea, kidneys. Presents in ages 5-35. Kayser-Fleischer (KF) rings: greenish-brown rings at the corneal periphery (Descemet's membrane) — visualized best with slit-lamp exam; present in virtually all neuropsychiatric Wilson's but only 50-60% of hepatic presentations. Diagnosis: low serum ceruloplasmin (<20 mg/dL), elevated 24-hour urine copper, slit-lamp KF rings, liver biopsy (hepatic copper quantification). Treatment: D-penicillamine (copper chelator — first-line, rashes, bone marrow suppression), trientine (better tolerated alternative), zinc acetate (blocks intestinal copper absorption — for maintenance or mild disease). Liver transplant: for acute liver failure or decompensated cirrhosis."},
{c:"Esophagus",q:"A 35-year-old has intermittent dysphagia to BOTH solids and liquids, regurgitation of undigested food, and a 10-pound weight loss. Barium swallow shows a 'bird's beak' narrowing at the gastroesophageal junction with esophageal dilation proximally. Esophageal manometry confirms absent peristalsis and incomplete LES relaxation. Diagnosis?",o:["Peptic stricture — PPI therapy","Eosinophilic esophagitis — eosinophils on biopsy","Achalasia — impaired LES relaxation and absent esophageal peristalsis; treatment: pneumatic balloon dilation or Heller myotomy (surgical); POEM (per-oral endoscopic myotomy) is an emerging minimally invasive option; botulinum toxin injection for poor surgical candidates","Schatzki ring — mechanical obstruction"],a:2,r:"Achalasia: failure of the lower esophageal sphincter to relax + absent peristalsis. Most common primary esophageal motility disorder. Symptoms: progressive dysphagia to BOTH solids and liquids (vs mechanical dysphagia = solids only), regurgitation of undigested food, chest pain, weight loss. Barium: bird's beak + megaesophagus. Manometry: absent peristalsis + incomplete LES relaxation (high-resolution manometry — Chicago Classification). Endoscopy: to rule out pseudoachalasia (malignancy mimicking achalasia). Treatment: (1) Pneumatic dilation (effective in 85%, repeated sessions needed); (2) Heller myotomy (laparoscopic, durable); (3) POEM (per-oral endoscopic myotomy — newer, effective); (4) Botulinum toxin injection: temporary (3-6 months) for poor surgical candidates. NOT a cure — symptoms managed, not reversed."},
{c:"Malabsorption",q:"A 55-year-old with chronic pancreatitis has bulky, fatty stools and a blood test showing low levels of vitamins A, D, E, and K. Prothrombin time is prolonged. Which vitamins are exclusively fat-soluble, and what is the primary clinical concern with vitamin K deficiency?",o:["Water-soluble vitamins (B12, folate, C) are the main concern in fat malabsorption","Fat-soluble vitamins A, D, E, K are not absorbed without adequate fat digestion and bile salts; vitamin K deficiency causes coagulopathy (prolonged PT) — risk of serious bleeding; supplement all four fat-soluble vitamins plus vitamin B12 in pancreatic exocrine insufficiency","Vitamin D deficiency is the only relevant fat-soluble vitamin in clinical practice","Fat-soluble vitamins are stored in muscle and are never depleted"],a:1,r:"Fat-soluble vitamins (ADEK): require fat digestion and bile salts for absorption in the small intestine. Deficiency effects: Vitamin A: night blindness, xerophthalmia (dry eyes), keratomalacia; Vitamin D: rickets (children), osteomalacia (adults), hypocalcemia, tetany; Vitamin E: hemolytic anemia (neonates), peripheral neuropathy, ataxia; Vitamin K: coagulopathy (prolonged PT → bleeding risk — warfarin acts by antagonizing vitamin K). Malabsorptive conditions causing deficiency: chronic pancreatitis (exocrine insufficiency), celiac disease, Crohn's disease, short bowel syndrome, cystic fibrosis, cholestatic liver disease. Treatment: pancreatic enzyme replacement + oral fat-soluble vitamin supplementation (water-miscible forms for severe malabsorption). B12 is also malabsorbed in terminal ileum disease (Crohn's, ileal resection)."},
{c:"Liver",q:"Which of the following is the most important initial step in evaluating a patient with suspected cirrhosis for liver cancer surveillance?",o:["CT scan of the abdomen with contrast every 3 months","Alpha-fetoprotein (AFP) level alone every 6 months — imaging is not needed","Abdominal ultrasound every 6 months (with or without AFP) — recommended for ALL cirrhotic patients regardless of etiology; detects early-stage HCC when curative treatment is possible","Upper endoscopy for HCC — hepatocellular carcinoma appears in the esophagus"],a:2,r:"Hepatocellular carcinoma (HCC) surveillance: ALL patients with cirrhosis should receive ultrasound ± AFP every 6 months — regardless of etiology (viral, alcoholic, NAFLD, autoimmune). Rationale: cirrhosis is the most important risk factor for HCC (annual incidence 2-7%); early detection enables curative therapies (resection, ablation, transplant). AFP alone: insufficient — sensitivity only ~60% for early HCC; add ultrasound to improve detection. CT/MRI: used for diagnosis/staging of suspicious nodules found on ultrasound (LIRADS classification), NOT for primary surveillance (cost, radiation). High-risk patients without cirrhosis: chronic HBV with family history of HCC, advanced fibrosis — also warrant surveillance. Treat underlying liver disease to reduce HCC risk (HCV cure with DAAs reduces but does not eliminate HCC risk)."},
{c:"Pancreas",q:"A 55-year-old presents with painless jaundice, a 20-pound weight loss, and a palpable, non-tender gallbladder (Courvoisier's sign). CA 19-9 is markedly elevated. CT shows a mass in the head of the pancreas with biliary duct dilation. Diagnosis and prognosis?",o:["Acute cholecystitis — cholecystectomy is needed","Gallbladder cancer — cholecystectomy with extended margins","Pancreatic adenocarcinoma — most cases are unresectable at diagnosis (20% are resectable); 5-year survival for resectable disease is only 20-25%; overall 5-year survival <10%; Whipple procedure (pancreaticoduodenectomy) for resectable head tumors","Choledocholithiasis — ERCP will resolve the jaundice"],a:2,r:"Pancreatic adenocarcinoma: most common exocrine pancreatic cancer, extremely poor prognosis. Classic presentation: painless progressive jaundice (head tumors compress CBD), weight loss, new-onset diabetes (endocrine disruption), migratory thrombophlebitis (Trousseau's sign). Courvoisier's sign: palpable, non-tender gallbladder + jaundice = malignant biliary obstruction (distended GB because a chronically inflamed GB from gallstones cannot distend). CA 19-9: elevated in 80% of pancreatic cancer, but not specific enough to diagnose — used for monitoring treatment response. Resectability: only 15-20% are resectable at diagnosis (confinement to pancreas, no distant mets, no major vessel involvement). Whipple procedure: pancreaticoduodenectomy for head cancers. Median survival even with surgery: 15-20 months."},
{c:"GI Screening",q:"A 55-year-old male with no family history presents for a routine wellness visit. He reports no GI symptoms. He has never had a colorectal cancer screening test. Which CRC screening option is NOT appropriate for initial average-risk screening?",o:["Annual FIT (fecal immunochemical test)","Colonoscopy every 10 years","Multi-target stool DNA (Cologuard) every 1-3 years","CT scan of the abdomen without contrast every 5 years"],a:3,r:"Colorectal cancer screening options for average-risk adults (beginning at age 45): Stool-based tests: annual high-sensitivity FOBT or FIT (requires every-year commitment — positive results REQUIRE colonoscopy); multi-target stool DNA (Cologuard) every 1-3 years; Direct visualization: colonoscopy every 10 years (gold standard — diagnostic and therapeutic); CT colonography (virtual colonoscopy) every 5 years; flexible sigmoidoscopy every 5 years. CT scan WITHOUT contrast: NOT an approved or validated CRC screening tool — poor sensitivity for polyps and flat lesions. CT colonography: WITH contrast and special bowel preparation IS an approved modality. All patients with a positive stool test MUST have follow-up colonoscopy — failure to do so is a patient safety issue."}
,
{c:"IBD",q:"A 34-year-old with Crohn's disease has a perianal fistula draining serous fluid. He is on mesalamine. What medication class is most effective for fistulizing Crohn's disease?",o:["Mesalamine — increase dose for fistulas","Antibiotics alone are curative for perianal Crohn's fistulas","Anti-TNF biologics (infliximab is FDA-approved for fistulizing Crohn's) — combined with surgical drainage of any abscess; antibiotics (metronidazole + ciprofloxacin) as adjuncts; azathioprine added for maintenance","High-dose prednisone — most effective for fistulas"],a:2,r:"Perianal fistulizing Crohn's disease: most challenging phenotype. Key steps: (1) Rule out abscess with MRI pelvis (standard imaging for perianal Crohn's) — drain any abscess BEFORE starting biologics (biologics can worsen undrained abscesses); (2) Antibiotics (metronidazole + ciprofloxacin): reduce drainage volume but rarely heal fistulas; (3) Infliximab: FDA-approved for fistulizing Crohn's — achieves complete fistula closure in ~36% and partial response in ~50%; (4) Azathioprine/6-MP: added for maintenance; (5) Seton placement: surgical suture thread through fistula tract to allow drainage; (6) Stem cell therapy (darvadstrocel): emerging option for refractory perianal Crohn's. 5-ASA drugs (mesalamine) have no proven efficacy in Crohn's disease — especially not for fistulas."},
{c:"Nausea/Vomiting",q:"A 28-year-old in her first trimester has severe nausea and vomiting with weight loss >5%, ketones in urine, and inability to tolerate any oral intake. Diagnosis and management?",o:["Normal morning sickness — ginger tea only","Appendicitis — abdominal CT urgently","Hyperemesis gravidarum — IV rehydration, electrolyte correction, antiemetics (ondansetron, promethazine, pyridoxine + doxylamine), thiamine supplementation BEFORE glucose administration to prevent Wernicke's encephalopathy","Acute pancreatitis — lipase measurement"],a:2,r:"Hyperemesis gravidarum (HG): severe nausea/vomiting of pregnancy with ≥5% weight loss, dehydration, ketonuria. Peak in weeks 8-12, usually resolves by 20 weeks. Treatment: IV hydration (normal saline), electrolyte correction (hypokalemia, hypomagnesemia). THIAMINE (B1) supplementation BEFORE glucose-containing fluids — to prevent Wernicke's encephalopathy (complication of HG). Antiemetics: pyridoxine + doxylamine (Bonjesta) — first-line, safest in pregnancy; ondansetron (caution in first trimester but widely used); promethazine, metoclopramide. Severe/refractory: corticosteroids, enteral nutrition via nasojejunal tube, TPN. Nutritional support as needed. Re-hydrate and advance diet as tolerated. Morning sickness (nausea without significant weight loss): oral pyridoxine + ginger, dietary adjustments only."},
{c:"H. Pylori",q:"A 52-year-old has new onset epigastric pain. Per current guidelines, what is the preferred initial management strategy before upper endoscopy in a patient UNDER 60 without alarm features?",o:["Upper endoscopy immediately for all new dyspepsia","Empiric PPI therapy for 8 weeks before any testing","H. pylori 'test and treat' strategy — test with urea breath test or stool antigen test; if positive, eradicate; this strategy is recommended before EGD in patients <60 without alarm features","Dietary modification and reassess in 6 months"],a:2,r:"H. pylori test-and-treat strategy for uninvestigated dyspepsia: in patients <60 (or <45 by some guidelines) WITHOUT alarm features (dysphagia, weight loss, bleeding, anemia, palpable mass, family history of GI malignancy): (1) Test for H. pylori with urea breath test (UBT) or stool antigen test — NOT serology (cannot distinguish active from past infection); (2) If positive → eradicate and reassess; (3) If negative or eradication fails to relieve symptoms → PPI trial; (4) Persistent symptoms → EGD. Rationale: H. pylori causes ~70-80% of duodenal ulcers and 50-60% of gastric ulcers — eradicating it resolves dyspepsia in a significant proportion. Age ≥60 (or ≥45) with NEW dyspepsia: go straight to EGD (higher malignancy risk)."},
{c:"Colon",q:"A 65-year-old with a 30-year history of pancolitis (ulcerative colitis) has no current symptoms on maintenance mesalamine. When should colorectal cancer surveillance begin?",o:["No surveillance needed — UC without symptoms has no cancer risk","Annual fecal occult blood test is sufficient","Colonoscopy with chromoendoscopy (or random biopsies if chromoendoscopy not available) every 1-2 years starting 8 years after pancolitis onset — UC patients have significantly increased CRC risk, proportional to extent and duration of disease","Colonoscopy only when symptoms occur"],a:2,r:"UC and colorectal cancer risk: cumulative CRC risk in pancolitis — 2% at 10 years, 8% at 20 years, 18% at 30 years. Surveillance guidelines: Start colonoscopy 8-10 years after disease onset. Frequency: pancolitis → every 1-2 years; left-sided colitis → every 2-3 years; proctitis only → no increased risk, no UC-specific surveillance. Technique: chromoendoscopy (dye-spray improves polyp detection) with targeted biopsies of suspicious areas is preferred; if unavailable: 4-quadrant random biopsies every 10 cm throughout the colon. Primary sclerosing cholangitis (PSC) + UC: annual colonoscopy from the time of PSC diagnosis (highest CRC risk of all IBD patients). 5-ASA therapy: reduces CRC risk in UC — another reason for maintenance therapy."},
{c:"Hepatitis",q:"A 45-year-old Asian immigrant has HBsAg positive for more than 12 months (confirmed chronic hepatitis B), HBeAg negative, HBV DNA 25,000 IU/mL, ALT mildly elevated. Which complication requires long-term surveillance?",o:["Hepatitis C superinfection — screen annually","No surveillance needed — chronic HBV without cirrhosis never causes complications","Hepatocellular carcinoma (HCC) — annual or semi-annual ultrasound ± AFP; cirrhosis development requires surveillance regardless of HBV DNA; high-risk HBV patients (Asian male >40, Asian female >50, family history of HCC, cirrhosis) warrant surveillance even without cirrhosis","Pancreatic cancer — HBV directly increases pancreatic cancer risk"],a:2,r:"Chronic hepatitis B complications: HCC risk is significantly elevated even WITHOUT cirrhosis in high-risk HBV patients. HCC surveillance indications for chronic HBV: ALL cirrhotic patients, plus non-cirrhotic HBV patients who are: Asian men ≥40, Asian women ≥50, any HBV patient with family history of HCC, African or North American Black patients with HBV. Surveillance: ultrasound every 6 months ± AFP. Treatment of chronic HBV: indicated when HBV DNA >2,000 IU/mL + ALT elevated, or significant fibrosis/cirrhosis; tenofovir or entecavir (first-line antivirals — high barrier to resistance). Vertical transmission prevention: vaccine + HBIG to all newborns of HBsAg+ mothers."},
{c:"GI — Special Topics",q:"A 72-year-old nursing home patient develops massive acute colonic dilation (cecum 11 cm) without mechanical obstruction after hip surgery. He is febrile and confused. CT shows dilated colon without perforation. Diagnosis and treatment?",o:["Toxic megacolon from UC — high-dose IV steroids","Sigmoid volvulus — sigmoidoscopy decompression","Acute colonic pseudo-obstruction (Ogilvie's syndrome) — administer IV neostigmine 2 mg slowly (cholinesterase inhibitor stimulates colonic motility — most effective pharmacologic treatment) with cardiac monitoring; decompressive colonoscopy if neostigmine fails or contraindicated","Diverticulitis — IV antibiotics and CT-guided drain"],a:2,r:"Ogilvie's syndrome (acute colonic pseudo-obstruction): massive colonic dilation without a mechanical obstruction — occurs in elderly, hospitalized/post-operative patients. Caused by autonomic imbalance (decreased parasympathetic/increased sympathetic tone). Cecal diameter >9-12 cm = risk of perforation. Precipitating factors: surgery, opioids, electrolyte disturbances, immobility. Treatment: (1) Conservative: correct electrolytes, ambulate, stop offending drugs, stimulating enemas; (2) IV neostigmine (cholinesterase inhibitor): 2-2.5 mg slowly IV with cardiac monitoring (bradycardia, bronchospasm risk — have atropine available) — 80-90% effective, dramatic immediate response; (3) Decompressive colonoscopy: if neostigmine contraindicated or fails; (4) Surgery: for perforation or ischemic bowel. Distinguishes from toxic megacolon: Ogilvie's occurs in non-IBD patients, post-operatively, no fever or systemic toxicity initially."},
{c:"GI — Motility",q:"A 40-year-old runner has recurrent episodes of mid-chest pain, dysphagia to solids AND liquids, and regurgitation. The episodes are brief and intermittent. Barium swallow shows a 'corkscrew esophagus.' Manometry shows diffuse high-amplitude simultaneous contractions. Diagnosis?",o:["Achalasia — absent peristalsis is the finding","GERD — PPI is first-line","Diffuse esophageal spasm (DES) — high-amplitude simultaneous contractions instead of coordinated peristalsis; treatment: calcium channel blockers (diltiazem), tricyclic antidepressants, peppermint oil; PPI if GERD contributes; smooth muscle relaxants","Eosinophilic esophagitis — eosinophils on biopsy"],a:2,r:"Diffuse esophageal spasm (DES): simultaneous, non-peristaltic, high-amplitude esophageal contractions. Symptoms: intermittent chest pain (may mimic angina), dysphagia to both solids and liquids, regurgitation. Corkscrew esophagus on barium swallow (classic appearance). Manometry: ≥20% simultaneous contractions (HRM: ≥20% premature contractions, DL <4.5 seconds). Distinguish from achalasia: DES has some normal peristalsis (mixed), LES relaxes normally. Distinguish from nutcracker/jackhammer esophagus: hypercontractile but coordinated. Treatment: calcium channel blockers (diltiazem, nifedipine), low-dose TCAs, peppermint oil, anticholinergics, phosphodiesterase inhibitors; POEM or botulinum toxin for severe cases; treat any concurrent GERD."},
{c:"GI — Nutrition",q:"A 55-year-old post-gastrectomy (total gastrectomy for gastric cancer) returns 6 months later with fatigue, pallor, glossitis, and a peripheral neuropathy. Labs show macrocytic anemia, low B12, elevated MMA. What is the mechanism?",o:["Folate deficiency from dietary restriction","Iron deficiency from blood loss after surgery","B12 deficiency due to absence of intrinsic factor (produced by gastric parietal cells, removed at gastrectomy); treatment: IM or high-dose oral B12 supplementation; CANNOT absorb dietary B12 without intrinsic factor regardless of oral intake","Thiamine deficiency from poor intake"],a:2,r:"Post-gastrectomy B12 deficiency: intrinsic factor (IF) is produced by GASTRIC PARIETAL CELLS — total gastrectomy removes ALL parietal cells → no IF → no ileal B12 absorption. B12 deficiency develops 2-5 years post-gastrectomy (body stores last 3-5 years). Clinical: megaloblastic anemia + subacute combined degeneration of the spinal cord (posterior and lateral column demyelination → neuropathy, ataxia). Treatment: monthly IM cyanocobalamin injections (bypasses need for intrinsic factor) OR very high-dose oral B12 (1000-2000 mcg daily — passive absorption without IF). Sublingual and intranasal also effective. Pernicious anemia: autoimmune destruction of parietal cells → same result. Test: low B12 + elevated methylmalonic acid (MMA) and homocysteine."},
{c:"Liver",q:"A 58-year-old with compensated cirrhosis has a new 2.5 cm arterially enhancing liver nodule with washout on portal venous phase on CT. Per AASLD LI-RADS criteria, this imaging appearance in a cirrhotic liver is diagnostic of what?",o:["Hemangioma — no further workup needed","Cholangiocarcinoma — ERCP required","Hepatocellular carcinoma (HCC) — the combination of arterial hyperenhancement + washout appearance in a cirrhotic liver is considered LI-RADS 5 (definitely HCC) for nodules ≥10mm; biopsy is NOT required for diagnosis; refer to multidisciplinary team for staging and treatment planning","Metastatic colorectal cancer — colonoscopy required"],a:2,r:"HCC diagnosis in cirrhosis: the hallmark imaging pattern is: (1) Arterial phase HYPERENHANCEMENT + (2) Portal venous/delayed phase WASHOUT (nodule becomes less enhancing than surrounding liver). In a cirrhotic liver, this pattern has ~95% specificity for HCC — NO BIOPSY IS REQUIRED for diagnosis when imaging meets criteria. LI-RADS 5 = definitely HCC. Treatment options by stage (Barcelona Clinic Liver Cancer — BCLC): Very early (single <2 cm, well-compensated): ablation or resection. Early (single ≤5 cm or 3 nodules ≤3 cm, CP-A): resection, ablation, transplant. Intermediate: TACE (transarterial chemoembolization). Advanced: sorafenib or lenvatinib (targeted therapy). Milan criteria for liver transplant: single HCC ≤5 cm or 3 nodules each ≤3 cm, no vascular invasion, no extrahepatic disease."},
{c:"GI — Emergencies",q:"A 30-year-old male is found unconscious. History reveals ingestion of a large amount of acetaminophen (Tylenol) 8 hours ago. Labs show ALT 12,000, elevated INR, creatinine 3.2, grade II hepatic encephalopathy. What is this presentation and the most important antidote?",o:["Hepatitis A — supportive care only","Alcohol-induced hepatitis — IV methylprednisolone","Acetaminophen-induced acute liver failure (ALF) — N-acetylcysteine (NAC) IV is the specific antidote; also consider liver transplant evaluation if King's College Criteria for poor prognosis are met","Viral hepatitis B — start tenofovir immediately"],a:2,r:"Acetaminophen toxicity: most common cause of acute liver failure (ALF) in the US. Mechanism: toxic metabolite NAPQI depletes glutathione → hepatocyte necrosis. N-ACETYLCYSTEINE (NAC): antidote — replenishes glutathione stores. Most effective if started within 8-10 hours of ingestion (before peak NAPQI formation), but beneficial even late (up to 72 hours). IV NAC protocol: loading dose 150 mg/kg over 60 min, then two maintenance infusions. Also: activated charcoal if within 1-4 hours of ingestion (reduces absorption). Acetaminophen level + Rumack-Matthew nomogram guide treatment decisions. King's College Criteria for liver transplant evaluation in ALF: pH <7.30 OR (PT >100 + creatinine >3.4 + grade III-IV encephalopathy). Prognosis without transplant if criteria met: <15-20% survival."}
];

const N = QUESTIONS.length;
let idx = 0;
let answers = new Array(N).fill(null); // selected option index
const LETTERS = ["A","B","C","D"];

const strip = document.getElementById("strip");
const qcard = document.getElementById("qcard");
const resultsCard = document.getElementById("results");

function buildStrip(){
  strip.innerHTML = "";
  for(let i=0;i<N;i++){
    const t = document.createElement("div");
    t.className = "tick";
    t.title = "Question " + (i+1);
    t.addEventListener("click", ()=>{ idx = i; render(); });
    strip.appendChild(t);
  }
}
function paintStrip(){
  const ticks = strip.children;
  for(let i=0;i<N;i++){
    const t = ticks[i];
    t.className = "tick";
    if(answers[i] !== null){
      t.classList.add(answers[i] === QUESTIONS[i].a ? "ok" : "bad");
    }
    if(i === idx && !resultsVisible()) t.classList.add("cur");
  }
}
function resultsVisible(){ return !resultsCard.classList.contains("hide"); }

function counts(){
  let done=0, right=0;
  for(let i=0;i<N;i++){
    if(answers[i]!==null){ done++; if(answers[i]===QUESTIONS[i].a) right++; }
  }
  return {done,right};
}
function paintScore(){
  const {done,right} = counts();
  document.getElementById("sc-done").textContent = done;
  document.getElementById("sc-right").textContent = right;
}

function render(){
  resultsCard.classList.add("hide");
  qcard.classList.remove("hide");
  const Q = QUESTIONS[idx];
  const picked = answers[idx];
  let html = "";
  html += '<div class="meta"><span class="qnum">QUESTION ' + (idx+1) + ' / ' + N + '</span><span class="chip">' + Q.c + '</span></div>';
  html += '<p class="stem">' + Q.q + '</p>';
  Q.o.forEach((opt,i)=>{
    let cls = "opt";
    if(picked !== null){
      if(i === picked && picked === Q.a) cls += " sel-ok";
      else if(i === picked) cls += " sel-bad";
      else if(i === Q.a) cls += " reveal-ok";
    }
    html += '<button class="'+cls+'" data-i="'+i+'" '+(picked!==null?"disabled":"")+'><span class="ltr">'+LETTERS[i]+'</span><span>'+opt+'</span></button>';
  });
  if(picked !== null){
    const good = picked === Q.a;
    html += '<div class="verdict '+(good?"ok":"bad")+'">'+(good ? "Correct" : "Incorrect — answer is " + LETTERS[Q.a])+'</div>';
    html += '<div class="rationale">'+Q.r+'</div>';
  }
  html += '<div class="nav">';
  html += '<button class="btn ghost" id="prevBtn" '+(idx===0?"disabled":"")+'>Back</button>';
  if(idx < N-1){
    html += '<button class="btn" id="nextBtn">Next question</button>';
  } else {
    html += '<button class="btn" id="finishBtn">See results</button>';
  }
  html += '</div>';
  qcard.innerHTML = html;

  qcard.querySelectorAll(".opt").forEach(btn=>{
    btn.addEventListener("click", ()=>{
      if(answers[idx] !== null) return;
      answers[idx] = parseInt(btn.dataset.i,10);
      render();
    });
  });
  const prev = document.getElementById("prevBtn");
  if(prev) prev.addEventListener("click", ()=>{ idx--; render(); });
  const next = document.getElementById("nextBtn");
  if(next) next.addEventListener("click", ()=>{ idx++; render(); });
  const fin = document.getElementById("finishBtn");
  if(fin) fin.addEventListener("click", showResults);
  paintStrip(); paintScore();
}

function showResults(){
  const {done,right} = counts();
  const pct = done ? Math.round((right/done)*100) : 0;
  // category breakdown
  const cats = {};
  QUESTIONS.forEach((Q,i)=>{
    if(!cats[Q.c]) cats[Q.c] = {n:0, ok:0, ans:0};
    cats[Q.c].n++;
    if(answers[i]!==null){ cats[Q.c].ans++; if(answers[i]===Q.a) cats[Q.c].ok++; }
  });
  let html = '<div class="bigscore">'+right+' / '+done+' ('+pct+'%)</div>';
  html += '<p class="sub">'+(done<N ? (N-done)+' question'+(N-done===1?"":"s")+' unanswered — they are not counted against you. ' : '')+'A passing pace on the real ANCC is roughly the low-to-mid 70s percent range, so use this as a directional gauge, not a verdict.</p>';
  html += '<h2 style="font-size:.95rem;margin-bottom:6px">By category</h2>';
  Object.keys(cats).forEach(c=>{
    const o = cats[c];
    const p = o.ans ? Math.round((o.ok/o.ans)*100) : 0;
    html += '<div class="catrow"><span style="flex:0 0 44%">'+c+'</span><span class="bar"><i style="width:'+(o.ans? p:0)+'%"></i></span><span style="font-family:var(--mono);font-size:.8rem">'+o.ok+'/'+o.ans+(o.ans<o.n?' of '+o.n:'')+'</span></div>';
  });
  // missed list
  const missed = [];
  for(let i=0;i<N;i++) if(answers[i]!==null && answers[i]!==QUESTIONS[i].a) missed.push(i);
  if(missed.length){
    html += '<div class="missedlist"><h2 style="font-size:.95rem;margin-bottom:8px">Review missed questions</h2>';
    missed.forEach(i=>{ html += '<button data-jump="'+i+'">Q'+(i+1)+'</button>'; });
    html += '</div>';
  }
  html += '<div class="nav"><button class="btn ghost" id="backBtn">Back to questions</button><button class="btn" id="resetBtn">Start over</button></div>';
  resultsCard.innerHTML = html;
  resultsCard.classList.remove("hide");
  qcard.classList.add("hide");
  resultsCard.querySelectorAll("[data-jump]").forEach(b=>{
    b.addEventListener("click", ()=>{ idx = parseInt(b.dataset.jump,10); render(); });
  });
  document.getElementById("backBtn").addEventListener("click", ()=>{ render(); });
  document.getElementById("resetBtn").addEventListener("click", ()=>{
    if(confirm("Clear all answers and start over?")){
      answers = new Array(N).fill(null); idx = 0; render();
    }
  });
  paintStrip(); paintScore();
}

buildStrip();
render();
</script>
